<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enable Microphone - Revise</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 40px;
      max-width: 420px;
      text-align: center;
    }
    h2 { font-size: 20px; color: #fff; margin-bottom: 12px; }
    p { font-size: 14px; color: #888; line-height: 1.6; margin-bottom: 24px; }
    button {
      padding: 12px 32px;
      background: linear-gradient(135deg, #5b6abf, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    #status {
      margin-top: 16px;
      font-size: 13px;
      min-height: 20px;
    }
    .success { color: #6ee7b7; }
    .error { color: #fca5a5; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Enable Microphone</h2>
    <p>Revise needs microphone access for the speech-to-text feature in the notes overlay. Click the button below and allow access when prompted.</p>
    <button id="grant">Allow Microphone Access</button>
    <p id="status"></p>
  </div>
  <script src="request-mic.js"></script>
</body>
</html>
