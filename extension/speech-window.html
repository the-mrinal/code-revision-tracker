<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Revise - Listening</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 20px;
      text-align: center;
    }
    .dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #f87171;
      margin-bottom: 16px;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.85); }
    }
    h3 { font-size: 16px; color: #fff; margin-bottom: 8px; }
    p { font-size: 12px; color: #888; margin-bottom: 20px; }
    #transcript {
      font-size: 13px;
      color: #aaa;
      max-height: 60px;
      overflow-y: auto;
      word-wrap: break-word;
      width: 100%;
    }
    .error { color: #fca5a5; font-size: 13px; }
  </style>
</head>
<body>
  <div class="dot" id="dot"></div>
  <h3>Listening...</h3>
  <p>Speak now. Close this window to stop.</p>
  <div id="transcript"></div>
  <script src="speech-window.js"></script>
</body>
</html>
