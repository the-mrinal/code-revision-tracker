<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="SF Mono, Menlo, monospace">
  <rect width="900" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" fill="#e2e8f0" font-size="17" font-weight="bold" text-anchor="middle">In-Place Matrix Rotation — 90° Clockwise</text>
  <text x="450" y="60" fill="#64748b" font-size="12" text-anchor="middle">Step 1: Transpose (swap across diagonal)  →  Step 2: Reverse each row</text>

  <!-- ─── ORIGINAL ─── -->
  <rect x="30" y="80" width="210" height="200" fill="#111" rx="8" stroke="#222" stroke-width="1.5"/>
  <text x="135" y="105" fill="#a78bfa" font-size="13" font-weight="bold" text-anchor="middle">Original</text>

  <!-- grid lines -->
  <line x1="30" y1="148" x2="240" y2="148" stroke="#222" stroke-width="1"/>
  <line x1="30" y1="208" x2="240" y2="208" stroke="#222" stroke-width="1"/>
  <line x1="100" y1="115" x2="100" y2="280" stroke="#222" stroke-width="1"/>
  <line x1="170" y1="115" x2="170" y2="280" stroke="#222" stroke-width="1"/>

  <!-- Original values -->
  <text x="65"  y="140" fill="#e2e8f0" font-size="22" text-anchor="middle">1</text>
  <text x="135" y="140" fill="#e2e8f0" font-size="22" text-anchor="middle">2</text>
  <text x="205" y="140" fill="#e2e8f0" font-size="22" text-anchor="middle">3</text>
  <text x="65"  y="200" fill="#e2e8f0" font-size="22" text-anchor="middle">4</text>
  <text x="135" y="200" fill="#e2e8f0" font-size="22" text-anchor="middle">5</text>
  <text x="205" y="200" fill="#e2e8f0" font-size="22" text-anchor="middle">6</text>
  <text x="65"  y="260" fill="#e2e8f0" font-size="22" text-anchor="middle">7</text>
  <text x="135" y="260" fill="#e2e8f0" font-size="22" text-anchor="middle">8</text>
  <text x="205" y="260" fill="#e2e8f0" font-size="22" text-anchor="middle">9</text>

  <!-- diagonal highlight -->
  <rect x="30"  y="115" width="70" height="33" fill="#5b6abf" fill-opacity="0.18" rx="3"/>
  <rect x="100" y="148" width="70" height="33" fill="#5b6abf" fill-opacity="0.18" rx="3"/>
  <rect x="170" y="208" width="70" height="33" fill="#5b6abf" fill-opacity="0.18" rx="3"/>
  <text x="135" y="298" fill="#64748b" font-size="11" text-anchor="middle">matrix[i][j]</text>

  <!-- Arrow 1 -->
  <line x1="248" y1="190" x2="308" y2="190" stroke="#5b6abf" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="308,183 322,190 308,197" fill="#5b6abf"/>
  <text x="285" y="183" fill="#5b6abf" font-size="11" text-anchor="middle">T</text>
  <text x="285" y="207" fill="#64748b" font-size="10" text-anchor="middle">Transpose</text>

  <!-- ─── TRANSPOSED ─── -->
  <rect x="320" y="80" width="210" height="200" fill="#111" rx="8" stroke="#222" stroke-width="1.5"/>
  <text x="425" y="105" fill="#34d399" font-size="13" font-weight="bold" text-anchor="middle">After Transpose</text>

  <line x1="320" y1="148" x2="530" y2="148" stroke="#222" stroke-width="1"/>
  <line x1="320" y1="208" x2="530" y2="208" stroke="#222" stroke-width="1"/>
  <line x1="390" y1="115" x2="390" y2="280" stroke="#222" stroke-width="1"/>
  <line x1="460" y1="115" x2="460" y2="280" stroke="#222" stroke-width="1"/>

  <!-- Transposed values: row i col j becomes row j col i -->
  <text x="355" y="140" fill="#e2e8f0" font-size="22" text-anchor="middle">1</text>
  <text x="425" y="140" fill="#34d399" font-size="22" text-anchor="middle">4</text>
  <text x="495" y="140" fill="#34d399" font-size="22" text-anchor="middle">7</text>
  <text x="355" y="200" fill="#34d399" font-size="22" text-anchor="middle">2</text>
  <text x="425" y="200" fill="#e2e8f0" font-size="22" text-anchor="middle">5</text>
  <text x="495" y="200" fill="#34d399" font-size="22" text-anchor="middle">8</text>
  <text x="355" y="260" fill="#34d399" font-size="22" text-anchor="middle">3</text>
  <text x="425" y="260" fill="#34d399" font-size="22" text-anchor="middle">6</text>
  <text x="495" y="260" fill="#e2e8f0" font-size="22" text-anchor="middle">9</text>

  <text x="425" y="298" fill="#64748b" font-size="11" text-anchor="middle">matrix[i][j] ↔ matrix[j][i]</text>

  <!-- swap arrows inside transpose diagram -->
  <path d="M 400 138 Q 425 120 450 138" stroke="#34d399" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
  <polygon points="450,132 455,140 443,140" fill="#34d399"/>

  <!-- Arrow 2 -->
  <line x1="538" y1="190" x2="598" y2="190" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="598,183 612,190 598,197" fill="#fbbf24"/>
  <text x="575" y="183" fill="#fbbf24" font-size="11" text-anchor="middle">R</text>
  <text x="575" y="207" fill="#64748b" font-size="10" text-anchor="middle">Reverse rows</text>

  <!-- ─── RESULT ─── -->
  <rect x="610" y="80" width="210" height="200" fill="#111" rx="8" stroke="#222" stroke-width="1.5"/>
  <text x="715" y="105" fill="#fbbf24" font-size="13" font-weight="bold" text-anchor="middle">90° CW Result</text>

  <line x1="610" y1="148" x2="820" y2="148" stroke="#222" stroke-width="1"/>
  <line x1="610" y1="208" x2="820" y2="208" stroke="#222" stroke-width="1"/>
  <line x1="680" y1="115" x2="680" y2="280" stroke="#222" stroke-width="1"/>
  <line x1="750" y1="115" x2="750" y2="280" stroke="#222" stroke-width="1"/>

  <text x="645" y="140" fill="#fbbf24" font-size="22" text-anchor="middle">7</text>
  <text x="715" y="140" fill="#fbbf24" font-size="22" text-anchor="middle">4</text>
  <text x="785" y="140" fill="#fbbf24" font-size="22" text-anchor="middle">1</text>
  <text x="645" y="200" fill="#fbbf24" font-size="22" text-anchor="middle">8</text>
  <text x="715" y="200" fill="#fbbf24" font-size="22" text-anchor="middle">5</text>
  <text x="785" y="200" fill="#fbbf24" font-size="22" text-anchor="middle">2</text>
  <text x="645" y="260" fill="#fbbf24" font-size="22" text-anchor="middle">9</text>
  <text x="715" y="260" fill="#fbbf24" font-size="22" text-anchor="middle">6</text>
  <text x="785" y="260" fill="#fbbf24" font-size="22" text-anchor="middle">3</text>

  <!-- row reverse arrows -->
  <line x1="618" y1="130" x2="812" y2="130" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="618" y1="190" x2="812" y2="190" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="618" y1="250" x2="812" y2="250" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <polygon points="618,126 610,130 618,134" fill="#fbbf24" opacity="0.5"/>
  <polygon points="618,186 610,190 618,194" fill="#fbbf24" opacity="0.5"/>
  <polygon points="618,246 610,250 618,254" fill="#fbbf24" opacity="0.5"/>

  <text x="715" y="298" fill="#64748b" font-size="11" text-anchor="middle">result[i][j] = original[n-1-j][i]</text>

  <!-- ─── Code box ─── -->
  <rect x="30" y="320" width="840" height="140" fill="#111" rx="8" stroke="#222" stroke-width="1.5"/>
  <text x="50" y="345" fill="#5b6abf" font-size="12" font-weight="bold">Algorithm (O(n²) time, O(1) space)</text>

  <text x="50" y="370" fill="#64748b" font-size="12"># Step 1: Transpose</text>
  <text x="50" y="388" fill="#e2e8f0" font-size="12">for i in range(n):  for j in range(i+1, n):  matrix[i][j], matrix[j][i] = matrix[j][i], matrix[i][j]</text>

  <text x="50" y="412" fill="#64748b" font-size="12"># Step 2: Reverse each row</text>
  <text x="50" y="430" fill="#e2e8f0" font-size="12">for i in range(n):  matrix[i].reverse()</text>

  <text x="50" y="452" fill="#64748b" font-size="12"># 90° CCW = Transpose then reverse each column  |  180° = Reverse rows then reverse each row</text>
</svg>
