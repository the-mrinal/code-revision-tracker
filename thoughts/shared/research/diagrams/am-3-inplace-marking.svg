<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="SF Mono, Menlo, monospace">
  <rect width="900" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" fill="#e2e8f0" font-size="17" font-weight="bold" text-anchor="middle">Set Matrix Zeroes — In-Place Marking with First Row/Col as Flags</text>
  <text x="450" y="57" fill="#64748b" font-size="12" text-anchor="middle">Use matrix[0][j] and matrix[i][0] to encode which rows/cols need zeroing — O(1) extra space</text>

  <!-- ─── Step 1: Original ─── -->
  <rect x="20" y="72" width="190" height="230" fill="#111" rx="8" stroke="#222" stroke-width="1.5"/>
  <text x="115" y="94" fill="#a78bfa" font-size="12" font-weight="bold" text-anchor="middle">Step 1: Original</text>

  <!-- 3x4 grid: cols at 35,85,135,185; rows at 100,145,190,235 -->
  <line x1="80"  y1="100" x2="80"  y2="285" stroke="#333" stroke-width="1"/>
  <line x1="130" y1="100" x2="130" y2="285" stroke="#333" stroke-width="1"/>
  <line x1="180" y1="100" x2="180" y2="285" stroke="#333" stroke-width="1"/>
  <line x1="30"  y1="145" x2="205" y2="145" stroke="#333" stroke-width="1"/>
  <line x1="30"  y1="190" x2="205" y2="190" stroke="#333" stroke-width="1"/>
  <line x1="30"  y1="235" x2="205" y2="235" stroke="#333" stroke-width="1"/>

  <!-- Values row 0 -->
  <text x="55"  y="130" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <text x="105" y="130" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <text x="155" y="130" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <text x="193" y="130" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <!-- row 1, zero at [1][1] -->
  <text x="55"  y="175" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <text x="105" y="175" fill="#f87171" font-size="22" text-anchor="middle" font-weight="bold">0</text>
  <text x="155" y="175" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <text x="193" y="175" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <!-- row 2 -->
  <text x="55"  y="220" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <text x="105" y="220" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <text x="155" y="220" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <text x="193" y="220" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <!-- row 3 -->
  <text x="55"  y="265" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <text x="105" y="265" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <text x="155" y="265" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <text x="193" y="265" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>

  <!-- zero highlight -->
  <rect x="80" y="147" width="50" height="43" fill="#f87171" fill-opacity="0.15" rx="3"/>

  <!-- Arrow 1 -->
  <line x1="215" y1="200" x2="250" y2="200" stroke="#5b6abf" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="250,194 263,200 250,206" fill="#5b6abf"/>
  <text x="238" y="193" fill="#64748b" font-size="10" text-anchor="middle">scan</text>

  <!-- ─── Step 2: Mark flags ─── -->
  <rect x="265" y="72" width="190" height="230" fill="#111" rx="8" stroke="#222" stroke-width="1.5"/>
  <text x="360" y="94" fill="#34d399" font-size="12" font-weight="bold" text-anchor="middle">Step 2: Mark Flags</text>

  <line x1="325" y1="100" x2="325" y2="285" stroke="#333" stroke-width="1"/>
  <line x1="375" y1="100" x2="375" y2="285" stroke="#333" stroke-width="1"/>
  <line x1="425" y1="100" x2="425" y2="285" stroke="#333" stroke-width="1"/>
  <line x1="275" y1="145" x2="450" y2="145" stroke="#333" stroke-width="1"/>
  <line x1="275" y1="190" x2="450" y2="190" stroke="#333" stroke-width="1"/>
  <line x1="275" y1="235" x2="450" y2="235" stroke="#333" stroke-width="1"/>

  <!-- First row highlighted as flags -->
  <rect x="275" y="100" width="175" height="45" fill="#34d399" fill-opacity="0.15" rx="3"/>
  <!-- First col highlighted as flags -->
  <rect x="275" y="100" width="50" height="185" fill="#5b6abf" fill-opacity="0.12" rx="3"/>

  <!-- row 0 (flag row) -->
  <text x="300" y="130" fill="#34d399" font-size="19" text-anchor="middle">1</text>
  <text x="350" y="130" fill="#f87171" font-size="19" text-anchor="middle" font-weight="bold">0</text>
  <text x="400" y="130" fill="#34d399" font-size="19" text-anchor="middle">1</text>
  <text x="438" y="130" fill="#34d399" font-size="19" text-anchor="middle">1</text>
  <!-- row 1 -->
  <text x="300" y="175" fill="#5b6abf" font-size="19" text-anchor="middle" font-weight="bold">0</text>
  <text x="350" y="175" fill="#f87171" font-size="22" text-anchor="middle" font-weight="bold">0</text>
  <text x="400" y="175" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <text x="438" y="175" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <!-- rows 2,3 -->
  <text x="300" y="220" fill="#5b6abf" font-size="19" text-anchor="middle">1</text>
  <text x="350" y="220" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <text x="400" y="220" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <text x="438" y="220" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <text x="300" y="265" fill="#5b6abf" font-size="19" text-anchor="middle">1</text>
  <text x="350" y="265" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <text x="400" y="265" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <text x="438" y="265" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>

  <!-- annotation -->
  <text x="360" y="300" fill="#34d399" font-size="10" text-anchor="middle">row 0: col 1 → 0 (col flag)</text>
  <text x="360" y="313" fill="#5b6abf" font-size="10" text-anchor="middle">col 0: row 1 → 0 (row flag)</text>

  <!-- Arrow 2 -->
  <line x1="460" y1="200" x2="495" y2="200" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="495,194 508,200 495,206" fill="#fbbf24"/>
  <text x="482" y="193" fill="#64748b" font-size="10" text-anchor="middle">apply</text>

  <!-- ─── Step 3: Result ─── -->
  <rect x="510" y="72" width="190" height="230" fill="#111" rx="8" stroke="#222" stroke-width="1.5"/>
  <text x="605" y="94" fill="#fbbf24" font-size="12" font-weight="bold" text-anchor="middle">Step 3: Zero Out</text>

  <line x1="570" y1="100" x2="570" y2="285" stroke="#333" stroke-width="1"/>
  <line x1="620" y1="100" x2="620" y2="285" stroke="#333" stroke-width="1"/>
  <line x1="670" y1="100" x2="670" y2="285" stroke="#333" stroke-width="1"/>
  <line x1="520" y1="145" x2="695" y2="145" stroke="#333" stroke-width="1"/>
  <line x1="520" y1="190" x2="695" y2="190" stroke="#333" stroke-width="1"/>
  <line x1="520" y1="235" x2="695" y2="235" stroke="#333" stroke-width="1"/>

  <!-- col 1 zeroed (entire col) -->
  <rect x="570" y="100" width="50" height="185" fill="#f87171" fill-opacity="0.18" rx="3"/>
  <!-- row 1 zeroed -->
  <rect x="520" y="147" width="175" height="43" fill="#f87171" fill-opacity="0.18" rx="3"/>

  <!-- row 0 -->
  <text x="545" y="130" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <text x="595" y="130" fill="#f87171" font-size="22" text-anchor="middle" font-weight="bold">0</text>
  <text x="645" y="130" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <text x="683" y="130" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <!-- row 1 all zero -->
  <text x="545" y="175" fill="#f87171" font-size="22" text-anchor="middle" font-weight="bold">0</text>
  <text x="595" y="175" fill="#f87171" font-size="22" text-anchor="middle" font-weight="bold">0</text>
  <text x="645" y="175" fill="#f87171" font-size="22" text-anchor="middle" font-weight="bold">0</text>
  <text x="683" y="175" fill="#f87171" font-size="22" text-anchor="middle" font-weight="bold">0</text>
  <!-- rows 2,3 col 1 zero -->
  <text x="545" y="220" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <text x="595" y="220" fill="#f87171" font-size="22" text-anchor="middle" font-weight="bold">0</text>
  <text x="645" y="220" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <text x="683" y="220" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <text x="545" y="265" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <text x="595" y="265" fill="#f87171" font-size="22" text-anchor="middle" font-weight="bold">0</text>
  <text x="645" y="265" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>
  <text x="683" y="265" fill="#e2e8f0" font-size="19" text-anchor="middle">1</text>

  <text x="605" y="300" fill="#f87171" font-size="10" text-anchor="middle">row 1 zeroed, col 1 zeroed</text>

  <!-- ─── Encoding trick panel ─── -->
  <rect x="715" y="72" width="165" height="230" fill="#111" rx="8" stroke="#222" stroke-width="1.5"/>
  <text x="797" y="92" fill="#a78bfa" font-size="12" font-weight="bold" text-anchor="middle">Encoding Trick</text>
  <text x="725" y="115" fill="#64748b" font-size="10">matrix[i][0] = 0</text>
  <text x="725" y="130" fill="#5b6abf" font-size="10">⇒ zero entire row i</text>
  <text x="725" y="155" fill="#64748b" font-size="10">matrix[0][j] = 0</text>
  <text x="725" y="170" fill="#34d399" font-size="10">⇒ zero entire col j</text>
  <line x1="725" y1="182" x2="872" y2="182" stroke="#333" stroke-width="1"/>
  <text x="725" y="200" fill="#fbbf24" font-size="10">Edge case:</text>
  <text x="725" y="215" fill="#64748b" font-size="10">Track row0 and col0</text>
  <text x="725" y="230" fill="#64748b" font-size="10">separately with bool</text>
  <text x="725" y="245" fill="#64748b" font-size="10">flags before using</text>
  <text x="725" y="260" fill="#64748b" font-size="10">them as markers</text>
  <line x1="725" y1="272" x2="872" y2="272" stroke="#333" stroke-width="1"/>
  <text x="725" y="287" fill="#e2e8f0" font-size="10">O(1) space</text>
  <text x="725" y="302" fill="#e2e8f0" font-size="10">O(m×n) time</text>

  <!-- ─── Code box ─── -->
  <rect x="20" y="318" width="860" height="148" fill="#111" rx="8" stroke="#222" stroke-width="1.5"/>
  <text x="40" y="338" fill="#5b6abf" font-size="12" font-weight="bold">Algorithm — 3 passes</text>
  <text x="40" y="357" fill="#64748b" font-size="11">Pass 1 — Scan for zeros, write flags into first row/col:</text>
  <text x="40" y="374" fill="#e2e8f0" font-size="11">  for i in range(1, m):  for j in range(1, n):  if matrix[i][j]==0: matrix[i][0]=0; matrix[0][j]=0</text>
  <text x="40" y="396" fill="#64748b" font-size="11">Pass 2 — Use flags to zero interior cells (i&gt;=1, j&gt;=1):</text>
  <text x="40" y="413" fill="#e2e8f0" font-size="11">  if matrix[i][0]==0 or matrix[0][j]==0: matrix[i][j] = 0</text>
  <text x="40" y="435" fill="#64748b" font-size="11">Pass 3 — Handle first row and first col using the saved bool flags:</text>
  <text x="40" y="452" fill="#e2e8f0" font-size="11">  if row0_zero: zero row 0;   if col0_zero: zero col 0</text>
</svg>
