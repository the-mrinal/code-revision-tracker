<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="SF Mono, Menlo, monospace">
  <rect width="900" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" fill="#e2e8f0" font-size="17" font-weight="bold" text-anchor="middle">Product of Array Except Self — Prefix × Suffix Two-Pass</text>
  <text x="450" y="57" fill="#64748b" font-size="12" text-anchor="middle">Input: [1, 2, 3, 4]  →  Answer: [24, 12, 8, 6]  |  O(n) time, O(1) extra space</text>

  <!-- ─── Input array ─── -->
  <text x="50" y="90" fill="#a78bfa" font-size="13" font-weight="bold">Input nums</text>
  <!-- cells -->
  <rect x="50"  y="98" width="90" height="48" fill="#1a1a2e" rx="6" stroke="#5b6abf" stroke-width="1.5"/>
  <rect x="160" y="98" width="90" height="48" fill="#1a1a2e" rx="6" stroke="#5b6abf" stroke-width="1.5"/>
  <rect x="270" y="98" width="90" height="48" fill="#1a1a2e" rx="6" stroke="#5b6abf" stroke-width="1.5"/>
  <rect x="380" y="98" width="90" height="48" fill="#1a1a2e" rx="6" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="95"  y="130" fill="#e2e8f0" font-size="24" text-anchor="middle" font-weight="bold">1</text>
  <text x="205" y="130" fill="#e2e8f0" font-size="24" text-anchor="middle" font-weight="bold">2</text>
  <text x="315" y="130" fill="#e2e8f0" font-size="24" text-anchor="middle" font-weight="bold">3</text>
  <text x="425" y="130" fill="#e2e8f0" font-size="24" text-anchor="middle" font-weight="bold">4</text>
  <!-- index labels -->
  <text x="95"  y="158" fill="#64748b" font-size="11" text-anchor="middle">[0]</text>
  <text x="205" y="158" fill="#64748b" font-size="11" text-anchor="middle">[1]</text>
  <text x="315" y="158" fill="#64748b" font-size="11" text-anchor="middle">[2]</text>
  <text x="425" y="158" fill="#64748b" font-size="11" text-anchor="middle">[3]</text>

  <!-- ─── PASS 1: Prefix Products ─── -->
  <text x="50" y="190" fill="#34d399" font-size="13" font-weight="bold">Pass 1 — Left prefix  (→)</text>
  <text x="520" y="190" fill="#64748b" font-size="11">prefix[i] = product of all nums[0..i-1]  (prefix[0] = 1)</text>

  <!-- prefix cells -->
  <rect x="50"  y="198" width="90" height="48" fill="#0d2b1e" rx="6" stroke="#34d399" stroke-width="1.5"/>
  <rect x="160" y="198" width="90" height="48" fill="#0d2b1e" rx="6" stroke="#34d399" stroke-width="1.5"/>
  <rect x="270" y="198" width="90" height="48" fill="#0d2b1e" rx="6" stroke="#34d399" stroke-width="1.5"/>
  <rect x="380" y="198" width="90" height="48" fill="#0d2b1e" rx="6" stroke="#34d399" stroke-width="1.5"/>
  <text x="95"  y="229" fill="#34d399" font-size="22" text-anchor="middle" font-weight="bold">1</text>
  <text x="205" y="229" fill="#34d399" font-size="22" text-anchor="middle" font-weight="bold">1</text>
  <text x="315" y="229" fill="#34d399" font-size="22" text-anchor="middle" font-weight="bold">2</text>
  <text x="425" y="229" fill="#34d399" font-size="22" text-anchor="middle" font-weight="bold">6</text>

  <!-- prefix annotations below -->
  <text x="95"  y="256" fill="#64748b" font-size="10" text-anchor="middle">=1</text>
  <text x="205" y="256" fill="#64748b" font-size="10" text-anchor="middle">=1×1</text>
  <text x="315" y="256" fill="#64748b" font-size="10" text-anchor="middle">=1×2</text>
  <text x="425" y="256" fill="#64748b" font-size="10" text-anchor="middle">=1×2×3</text>

  <!-- prefix arrows -->
  <line x1="145" y1="222" x2="155" y2="222" stroke="#34d399" stroke-width="2" stroke-linecap="round"/>
  <polygon points="155,217 163,222 155,227" fill="#34d399"/>
  <line x1="255" y1="222" x2="265" y2="222" stroke="#34d399" stroke-width="2" stroke-linecap="round"/>
  <polygon points="265,217 273,222 265,227" fill="#34d399"/>
  <line x1="365" y1="222" x2="375" y2="222" stroke="#34d399" stroke-width="2" stroke-linecap="round"/>
  <polygon points="375,217 383,222 375,227" fill="#34d399"/>

  <!-- prefix accumulation label -->
  <text x="700" y="215" fill="#34d399" font-size="12">left = 1</text>
  <text x="700" y="232" fill="#34d399" font-size="12">left *= nums[i-1]</text>
  <text x="700" y="249" fill="#34d399" font-size="12">res[i] = left</text>

  <!-- ─── PASS 2: Suffix Products ─── -->
  <text x="50" y="282" fill="#fbbf24" font-size="13" font-weight="bold">Pass 2 — Right suffix  (←)  multiply into result</text>
  <text x="520" y="282" fill="#64748b" font-size="11">suffix[i] = product of all nums[i+1..n-1]  (suffix[n-1] = 1)</text>

  <!-- suffix cells -->
  <rect x="50"  y="290" width="90" height="48" fill="#2b2000" rx="6" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="160" y="290" width="90" height="48" fill="#2b2000" rx="6" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="270" y="290" width="90" height="48" fill="#2b2000" rx="6" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="380" y="290" width="90" height="48" fill="#2b2000" rx="6" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="95"  y="321" fill="#fbbf24" font-size="22" text-anchor="middle" font-weight="bold">24</text>
  <text x="205" y="321" fill="#fbbf24" font-size="22" text-anchor="middle" font-weight="bold">12</text>
  <text x="315" y="321" fill="#fbbf24" font-size="22" text-anchor="middle" font-weight="bold">4</text>
  <text x="425" y="321" fill="#fbbf24" font-size="22" text-anchor="middle" font-weight="bold">1</text>

  <text x="95"  y="348" fill="#64748b" font-size="10" text-anchor="middle">=2×3×4</text>
  <text x="205" y="348" fill="#64748b" font-size="10" text-anchor="middle">=3×4</text>
  <text x="315" y="348" fill="#64748b" font-size="10" text-anchor="middle">=4</text>
  <text x="425" y="348" fill="#64748b" font-size="10" text-anchor="middle">=1</text>

  <!-- suffix arrows (right to left) -->
  <line x1="375" y1="314" x2="365" y2="314" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <polygon points="365,309 357,314 365,319" fill="#fbbf24"/>
  <line x1="265" y1="314" x2="255" y2="314" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <polygon points="255,309 247,314 255,319" fill="#fbbf24"/>
  <line x1="155" y1="314" x2="145" y2="314" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <polygon points="145,309 137,314 145,319" fill="#fbbf24"/>

  <text x="700" y="307" fill="#fbbf24" font-size="12">right = 1</text>
  <text x="700" y="324" fill="#fbbf24" font-size="12">res[i] *= right</text>
  <text x="700" y="341" fill="#fbbf24" font-size="12">right *= nums[i+1]</text>

  <!-- ─── Multiply arrows ─── -->
  <line x1="95"  y1="248" x2="95"  y2="288" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="205" y1="248" x2="205" y2="288" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="315" y1="248" x2="315" y2="288" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="425" y1="248" x2="425" y2="288" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="530" y="270" fill="#a78bfa" font-size="11">res[i] = prefix[i] × suffix[i]</text>

  <!-- ─── Final answer ─── -->
  <text x="50" y="380" fill="#a78bfa" font-size="13" font-weight="bold">Answer = prefix × suffix</text>
  <rect x="50"  y="388" width="90" height="48" fill="#1a0d2b" rx="6" stroke="#a78bfa" stroke-width="2"/>
  <rect x="160" y="388" width="90" height="48" fill="#1a0d2b" rx="6" stroke="#a78bfa" stroke-width="2"/>
  <rect x="270" y="388" width="90" height="48" fill="#1a0d2b" rx="6" stroke="#a78bfa" stroke-width="2"/>
  <rect x="380" y="388" width="90" height="48" fill="#1a0d2b" rx="6" stroke="#a78bfa" stroke-width="2"/>
  <text x="95"  y="420" fill="#a78bfa" font-size="22" text-anchor="middle" font-weight="bold">24</text>
  <text x="205" y="420" fill="#a78bfa" font-size="22" text-anchor="middle" font-weight="bold">12</text>
  <text x="315" y="420" fill="#a78bfa" font-size="22" text-anchor="middle" font-weight="bold">8</text>
  <text x="425" y="420" fill="#a78bfa" font-size="22" text-anchor="middle" font-weight="bold">6</text>
  <text x="95"  y="446" fill="#64748b" font-size="10" text-anchor="middle">1×24</text>
  <text x="205" y="446" fill="#64748b" font-size="10" text-anchor="middle">1×12</text>
  <text x="315" y="446" fill="#64748b" font-size="10" text-anchor="middle">2×4</text>
  <text x="425" y="446" fill="#64748b" font-size="10" text-anchor="middle">6×1</text>

  <!-- verification -->
  <text x="550" y="400" fill="#64748b" font-size="12">Verification:</text>
  <text x="550" y="418" fill="#e2e8f0" font-size="12">24 = 2×3×4  ✓</text>
  <text x="550" y="436" fill="#e2e8f0" font-size="12">12 = 1×3×4  ✓</text>
  <text x="700" y="418" fill="#e2e8f0" font-size="12">8 = 1×2×4  ✓</text>
  <text x="700" y="436" fill="#e2e8f0" font-size="12">6 = 1×2×3  ✓</text>
  <text x="550" y="458" fill="#34d399" font-size="11">No division used — handles zeros correctly</text>
</svg>
