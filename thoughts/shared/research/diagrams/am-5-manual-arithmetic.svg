<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="SF Mono, Menlo, monospace">
  <rect width="900" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" fill="#e2e8f0" font-size="17" font-weight="bold" text-anchor="middle">Plus One — Manual Carry Propagation (Right to Left)</text>
  <text x="450" y="57" fill="#64748b" font-size="12" text-anchor="middle">Iterate from last digit; propagate carry leftward; prepend 1 if carry remains after index 0</text>

  <!-- ─── Main Example: [1,2,9] + 1 ─── -->
  <rect x="30" y="72" width="420" height="290" fill="#111" rx="8" stroke="#222" stroke-width="1.5"/>
  <text x="240" y="95" fill="#a78bfa" font-size="13" font-weight="bold" text-anchor="middle">Example 1: [1, 2, 9] + 1</text>

  <!-- Step 1 -->
  <text x="50" y="120" fill="#5b6abf" font-size="12" font-weight="bold">Step 1 — Process index 2 (digit=9)</text>
  <!-- array cells -->
  <rect x="50"  y="128" width="60" height="40" fill="#111" rx="5" stroke="#333" stroke-width="1"/>
  <rect x="120" y="128" width="60" height="40" fill="#111" rx="5" stroke="#333" stroke-width="1"/>
  <rect x="190" y="128" width="60" height="40" fill="#2b1a00" rx="5" stroke="#fbbf24" stroke-width="2"/>
  <text x="80"  y="155" fill="#e2e8f0" font-size="20" text-anchor="middle">1</text>
  <text x="150" y="155" fill="#e2e8f0" font-size="20" text-anchor="middle">2</text>
  <text x="220" y="155" fill="#fbbf24" font-size="20" text-anchor="middle">9</text>
  <!-- pointer -->
  <polygon points="220,175 213,186 227,186" fill="#fbbf24"/>
  <text x="220" y="198" fill="#fbbf24" font-size="11" text-anchor="middle">i=2</text>
  <text x="310" y="148" fill="#64748b" font-size="11">9+1=10  →  digit=0, carry=1</text>
  <rect x="190" y="128" width="60" height="40" fill="none" rx="5" stroke="#fbbf24" stroke-width="2"/>
  <text x="310" y="163" fill="#f87171" font-size="12">result[2] = 0</text>
  <text x="310" y="178" fill="#34d399" font-size="12">carry = 1  →  continue</text>

  <!-- Step 2 -->
  <text x="50" y="220" fill="#5b6abf" font-size="12" font-weight="bold">Step 2 — Process index 1 (digit=2)</text>
  <rect x="50"  y="228" width="60" height="40" fill="#111" rx="5" stroke="#333" stroke-width="1"/>
  <rect x="120" y="228" width="60" height="40" fill="#2b1a00" rx="5" stroke="#fbbf24" stroke-width="2"/>
  <rect x="190" y="228" width="60" height="40" fill="#0d2b1e" rx="5" stroke="#34d399" stroke-width="1.5"/>
  <text x="80"  y="255" fill="#e2e8f0" font-size="20" text-anchor="middle">1</text>
  <text x="150" y="255" fill="#fbbf24" font-size="20" text-anchor="middle">2</text>
  <text x="220" y="255" fill="#34d399" font-size="20" text-anchor="middle">0</text>
  <polygon points="150,275 143,286 157,286" fill="#fbbf24"/>
  <text x="150" y="298" fill="#fbbf24" font-size="11" text-anchor="middle">i=1</text>
  <text x="310" y="248" fill="#64748b" font-size="11">2+1=3  →  digit=3, carry=0</text>
  <text x="310" y="263" fill="#f87171" font-size="12">result[1] = 3</text>
  <text x="310" y="278" fill="#34d399" font-size="12">carry = 0  →  STOP</text>

  <!-- Step 3: result -->
  <text x="50" y="322" fill="#5b6abf" font-size="12" font-weight="bold">Result</text>
  <rect x="50"  y="330" width="60" height="40" fill="#111" rx="5" stroke="#333" stroke-width="1"/>
  <rect x="120" y="330" width="60" height="40" fill="#0d2b1e" rx="5" stroke="#34d399" stroke-width="1.5"/>
  <rect x="190" y="330" width="60" height="40" fill="#0d2b1e" rx="5" stroke="#34d399" stroke-width="1.5"/>
  <text x="80"  y="357" fill="#e2e8f0" font-size="20" text-anchor="middle">1</text>
  <text x="150" y="357" fill="#34d399" font-size="20" text-anchor="middle">3</text>
  <text x="220" y="357" fill="#34d399" font-size="20" text-anchor="middle">0</text>
  <text x="310" y="357" fill="#a78bfa" font-size="14">[1, 2, 9] + 1  =  [1, 3, 0]</text>

  <!-- carry chain arrows -->
  <path d="M 230 168 Q 170 200 160 225" stroke="#fbbf24" stroke-width="2" fill="none" marker-end="url(#arrow-yellow)"/>
  <defs>
    <marker id="arrow-yellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f87171"/>
    </marker>
  </defs>
  <text x="168" y="200" fill="#fbbf24" font-size="10">carry=1</text>

  <!-- ─── Edge Case: [9,9,9] ─── -->
  <rect x="470" y="72" width="400" height="290" fill="#111" rx="8" stroke="#222" stroke-width="1.5"/>
  <text x="670" y="95" fill="#f87171" font-size="13" font-weight="bold" text-anchor="middle">Edge Case: [9, 9, 9] + 1</text>

  <!-- i=2 -->
  <text x="490" y="120" fill="#f87171" font-size="12" font-weight="bold">i=2: 9+1=10  carry=1  digit=0</text>
  <rect x="490" y="128" width="50" height="38" fill="#111" rx="5" stroke="#333"/>
  <rect x="550" y="128" width="50" height="38" fill="#111" rx="5" stroke="#333"/>
  <rect x="610" y="128" width="50" height="38" fill="#2b0000" rx="5" stroke="#f87171" stroke-width="2"/>
  <text x="515" y="153" fill="#e2e8f0" font-size="18" text-anchor="middle">9</text>
  <text x="575" y="153" fill="#e2e8f0" font-size="18" text-anchor="middle">9</text>
  <text x="635" y="153" fill="#f87171" font-size="18" text-anchor="middle">0</text>

  <!-- i=1 -->
  <text x="490" y="188" fill="#f87171" font-size="12" font-weight="bold">i=1: 9+1=10  carry=1  digit=0</text>
  <rect x="490" y="196" width="50" height="38" fill="#111" rx="5" stroke="#333"/>
  <rect x="550" y="196" width="50" height="38" fill="#2b0000" rx="5" stroke="#f87171" stroke-width="2"/>
  <rect x="610" y="196" width="50" height="38" fill="#0d2b1e" rx="5" stroke="#34d399"/>
  <text x="515" y="221" fill="#e2e8f0" font-size="18" text-anchor="middle">9</text>
  <text x="575" y="221" fill="#f87171" font-size="18" text-anchor="middle">0</text>
  <text x="635" y="221" fill="#34d399" font-size="18" text-anchor="middle">0</text>

  <!-- i=0 -->
  <text x="490" y="256" fill="#f87171" font-size="12" font-weight="bold">i=0: 9+1=10  carry=1  digit=0</text>
  <rect x="490" y="264" width="50" height="38" fill="#2b0000" rx="5" stroke="#f87171" stroke-width="2"/>
  <rect x="550" y="264" width="50" height="38" fill="#0d2b1e" rx="5" stroke="#34d399"/>
  <rect x="610" y="264" width="50" height="38" fill="#0d2b1e" rx="5" stroke="#34d399"/>
  <text x="515" y="289" fill="#f87171" font-size="18" text-anchor="middle">0</text>
  <text x="575" y="289" fill="#34d399" font-size="18" text-anchor="middle">0</text>
  <text x="635" y="289" fill="#34d399" font-size="18" text-anchor="middle">0</text>

  <!-- carry arrows -->
  <line x1="640" y1="168" x2="590" y2="194" stroke="#f87171" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="592,188 585,197 596,200" fill="#f87171"/>
  <line x1="580" y1="236" x2="530" y2="262" stroke="#f87171" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="532,256 525,265 536,268" fill="#f87171"/>

  <!-- carry still = 1 after loop -->
  <text x="490" y="320" fill="#fbbf24" font-size="12" font-weight="bold">carry=1 after loop! Prepend 1:</text>
  <rect x="490" y="328" width="50" height="38" fill="#2b2000" rx="5" stroke="#fbbf24" stroke-width="2"/>
  <rect x="550" y="328" width="50" height="38" fill="#0d2b1e" rx="5" stroke="#34d399"/>
  <rect x="610" y="328" width="50" height="38" fill="#0d2b1e" rx="5" stroke="#34d399"/>
  <rect x="670" y="328" width="50" height="38" fill="#0d2b1e" rx="5" stroke="#34d399"/>
  <text x="515" y="353" fill="#fbbf24" font-size="18" text-anchor="middle">1</text>
  <text x="575" y="353" fill="#34d399" font-size="18" text-anchor="middle">0</text>
  <text x="635" y="353" fill="#34d399" font-size="18" text-anchor="middle">0</text>
  <text x="695" y="353" fill="#34d399" font-size="18" text-anchor="middle">0</text>
  <text x="755" y="353" fill="#a78bfa" font-size="13">[1,0,0,0]</text>

  <!-- ─── Code box ─── -->
  <rect x="30" y="375" width="840" height="90" fill="#111" rx="8" stroke="#222" stroke-width="1.5"/>
  <text x="50" y="396" fill="#5b6abf" font-size="12" font-weight="bold">Algorithm</text>
  <text x="50" y="414" fill="#e2e8f0" font-size="12">for i in range(len(digits)-1, -1, -1):</text>
  <text x="50" y="431" fill="#e2e8f0" font-size="12">    if digits[i] &lt; 9:  digits[i] += 1;  return digits  # no carry — done early</text>
  <text x="50" y="448" fill="#e2e8f0" font-size="12">    digits[i] = 0  # this digit was 9, set to 0 and carry continues</text>
  <text x="50" y="465" fill="#fbbf24" font-size="12">return [1] + digits  # all nines case: entire array is 0s, prepend 1</text>
</svg>
