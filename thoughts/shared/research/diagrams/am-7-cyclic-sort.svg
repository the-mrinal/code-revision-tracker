<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="SF Mono, Menlo, monospace">
  <rect width="900" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" fill="#e2e8f0" font-size="17" font-weight="bold" text-anchor="middle">Cyclic Sort — Swap Each Value to Its Home Index, Then Scan for Gaps</text>
  <text x="450" y="57" fill="#64748b" font-size="12" text-anchor="middle">nums = [4,3,2,7,8,2,3,1]  Range: 1–8  →  home index of value v  is  v−1</text>

  <!-- ─── Before sort ─── -->
  <text x="30" y="83" fill="#f87171" font-size="12" font-weight="bold">Before (unsorted)</text>

  <!-- 8 cells -->
  <rect x="30"  y="90" width="72" height="46" fill="#2b0000" rx="5" stroke="#f87171" stroke-width="1.5"/>
  <rect x="112" y="90" width="72" height="46" fill="#2b0000" rx="5" stroke="#f87171" stroke-width="1.5"/>
  <rect x="194" y="90" width="72" height="46" fill="#2b0000" rx="5" stroke="#f87171" stroke-width="1.5"/>
  <rect x="276" y="90" width="72" height="46" fill="#2b0000" rx="5" stroke="#f87171" stroke-width="1.5"/>
  <rect x="358" y="90" width="72" height="46" fill="#2b0000" rx="5" stroke="#f87171" stroke-width="1.5"/>
  <rect x="440" y="90" width="72" height="46" fill="#2b0000" rx="5" stroke="#f87171" stroke-width="1.5"/>
  <rect x="522" y="90" width="72" height="46" fill="#2b0000" rx="5" stroke="#f87171" stroke-width="1.5"/>
  <rect x="604" y="90" width="72" height="46" fill="#2b0000" rx="5" stroke="#f87171" stroke-width="1.5"/>

  <text x="66"  y="120" fill="#e2e8f0" font-size="22" text-anchor="middle" font-weight="bold">4</text>
  <text x="148" y="120" fill="#e2e8f0" font-size="22" text-anchor="middle" font-weight="bold">3</text>
  <text x="230" y="120" fill="#e2e8f0" font-size="22" text-anchor="middle" font-weight="bold">2</text>
  <text x="312" y="120" fill="#e2e8f0" font-size="22" text-anchor="middle" font-weight="bold">7</text>
  <text x="394" y="120" fill="#e2e8f0" font-size="22" text-anchor="middle" font-weight="bold">8</text>
  <text x="476" y="120" fill="#f87171" font-size="22" text-anchor="middle" font-weight="bold">2</text>
  <text x="558" y="120" fill="#f87171" font-size="22" text-anchor="middle" font-weight="bold">3</text>
  <text x="640" y="120" fill="#e2e8f0" font-size="22" text-anchor="middle" font-weight="bold">1</text>

  <!-- index labels -->
  <text x="66"  y="146" fill="#64748b" font-size="10" text-anchor="middle">[0]</text>
  <text x="148" y="146" fill="#64748b" font-size="10" text-anchor="middle">[1]</text>
  <text x="230" y="146" fill="#64748b" font-size="10" text-anchor="middle">[2]</text>
  <text x="312" y="146" fill="#64748b" font-size="10" text-anchor="middle">[3]</text>
  <text x="394" y="146" fill="#64748b" font-size="10" text-anchor="middle">[4]</text>
  <text x="476" y="146" fill="#64748b" font-size="10" text-anchor="middle">[5]</text>
  <text x="558" y="146" fill="#64748b" font-size="10" text-anchor="middle">[6]</text>
  <text x="640" y="146" fill="#64748b" font-size="10" text-anchor="middle">[7]</text>

  <!-- duplicate label -->
  <text x="476" y="82" fill="#fbbf24" font-size="10" text-anchor="middle">dup!</text>
  <text x="558" y="82" fill="#fbbf24" font-size="10" text-anchor="middle">dup!</text>

  <!-- swap arrows: value → home -->
  <!-- 4 → idx 3, 7 → idx 6 (curved arcs below) -->
  <path d="M 66 138 Q 190 178 312 138" stroke="#5b6abf" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <polygon points="308,133 316,141 307,145" fill="#5b6abf"/>
  <text x="190" y="180" fill="#5b6abf" font-size="10" text-anchor="middle">4 → home[3]</text>

  <path d="M 312 138 Q 436 192 558 138" stroke="#a78bfa" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <polygon points="554,133 562,141 553,145" fill="#a78bfa"/>
  <text x="435" y="194" fill="#a78bfa" font-size="10" text-anchor="middle">7 → home[6]</text>

  <!-- ─── Cyclic sort process panel ─── -->
  <rect x="30" y="198" width="540" height="172" fill="#111" rx="8" stroke="#222" stroke-width="1.5"/>
  <text x="300" y="220" fill="#fbbf24" font-size="12" font-weight="bold" text-anchor="middle">Cyclic Sort Passes (key swaps shown)</text>

  <!-- swap table header -->
  <text x="50"  y="238" fill="#64748b" font-size="11" font-weight="bold">i</text>
  <text x="80"  y="238" fill="#64748b" font-size="11" font-weight="bold">nums[i]</text>
  <text x="160" y="238" fill="#64748b" font-size="11" font-weight="bold">home=val-1</text>
  <text x="270" y="238" fill="#64748b" font-size="11" font-weight="bold">Action</text>
  <text x="430" y="238" fill="#64748b" font-size="11" font-weight="bold">Array after swap</text>
  <line x1="40" y1="242" x2="560" y2="242" stroke="#333" stroke-width="1"/>

  <text x="50"  y="258" fill="#e2e8f0" font-size="11">0</text>
  <text x="80"  y="258" fill="#5b6abf" font-size="11">4</text>
  <text x="160" y="258" fill="#e2e8f0" font-size="11">3</text>
  <text x="270" y="258" fill="#34d399" font-size="11">swap([0],[3])</text>
  <text x="430" y="258" fill="#64748b" font-size="11">[7,3,2,4,8,2,3,1]</text>

  <text x="50"  y="274" fill="#e2e8f0" font-size="11">0</text>
  <text x="80"  y="274" fill="#5b6abf" font-size="11">7</text>
  <text x="160" y="274" fill="#e2e8f0" font-size="11">6</text>
  <text x="270" y="274" fill="#34d399" font-size="11">swap([0],[6])</text>
  <text x="430" y="274" fill="#64748b" font-size="11">[3,3,2,4,8,2,7,1]</text>

  <text x="50"  y="290" fill="#e2e8f0" font-size="11">0</text>
  <text x="80"  y="290" fill="#5b6abf" font-size="11">3</text>
  <text x="160" y="290" fill="#e2e8f0" font-size="11">2</text>
  <text x="270" y="290" fill="#34d399" font-size="11">swap([0],[2])</text>
  <text x="430" y="290" fill="#64748b" font-size="11">[2,3,3,4,8,2,7,1]</text>

  <text x="50"  y="306" fill="#e2e8f0" font-size="11">0</text>
  <text x="80"  y="306" fill="#5b6abf" font-size="11">2</text>
  <text x="160" y="306" fill="#e2e8f0" font-size="11">1</text>
  <text x="270" y="306" fill="#34d399" font-size="11">swap([0],[1])</text>
  <text x="430" y="306" fill="#64748b" font-size="11">[3,2,3,4,8,2,7,1]</text>

  <text x="50"  y="322" fill="#e2e8f0" font-size="11">...</text>
  <text x="270" y="322" fill="#64748b" font-size="11">continue until each i: nums[i]==i+1 or duplicate</text>

  <text x="50"  y="344" fill="#e2e8f0" font-size="11">4</text>
  <text x="80"  y="344" fill="#5b6abf" font-size="11">8</text>
  <text x="160" y="344" fill="#e2e8f0" font-size="11">7</text>
  <text x="270" y="344" fill="#34d399" font-size="11">swap([4],[7])</text>
  <text x="430" y="344" fill="#64748b" font-size="11">[1,2,3,4,X,X,7,8]</text>

  <text x="50"  y="360" fill="#fbbf24" font-size="11">Skip dup:</text>
  <text x="150" y="360" fill="#64748b" font-size="11">if nums[i]==nums[home]: i++  (avoid infinite loop on duplicates)</text>

  <!-- ─── After sort ─── -->
  <text x="30" y="390" fill="#34d399" font-size="12" font-weight="bold">After Cyclic Sort (sorted with duplicates occupying wrong slots)</text>

  <rect x="30"  y="398" width="72" height="46" fill="#0d2b1e" rx="5" stroke="#34d399" stroke-width="1.5"/>
  <rect x="112" y="398" width="72" height="46" fill="#0d2b1e" rx="5" stroke="#34d399" stroke-width="1.5"/>
  <rect x="194" y="398" width="72" height="46" fill="#0d2b1e" rx="5" stroke="#34d399" stroke-width="1.5"/>
  <rect x="276" y="398" width="72" height="46" fill="#0d2b1e" rx="5" stroke="#34d399" stroke-width="1.5"/>
  <rect x="358" y="398" width="72" height="46" fill="#2b1a00" rx="5" stroke="#fbbf24" stroke-width="2"/>
  <rect x="440" y="398" width="72" height="46" fill="#2b1a00" rx="5" stroke="#fbbf24" stroke-width="2"/>
  <rect x="522" y="398" width="72" height="46" fill="#0d2b1e" rx="5" stroke="#34d399" stroke-width="1.5"/>
  <rect x="604" y="398" width="72" height="46" fill="#0d2b1e" rx="5" stroke="#34d399" stroke-width="1.5"/>

  <text x="66"  y="428" fill="#34d399" font-size="22" text-anchor="middle" font-weight="bold">1</text>
  <text x="148" y="428" fill="#34d399" font-size="22" text-anchor="middle" font-weight="bold">2</text>
  <text x="230" y="428" fill="#34d399" font-size="22" text-anchor="middle" font-weight="bold">3</text>
  <text x="312" y="428" fill="#34d399" font-size="22" text-anchor="middle" font-weight="bold">4</text>
  <text x="394" y="428" fill="#fbbf24" font-size="22" text-anchor="middle" font-weight="bold">2</text>
  <text x="476" y="428" fill="#fbbf24" font-size="22" text-anchor="middle" font-weight="bold">3</text>
  <text x="558" y="428" fill="#34d399" font-size="22" text-anchor="middle" font-weight="bold">7</text>
  <text x="640" y="428" fill="#34d399" font-size="22" text-anchor="middle" font-weight="bold">8</text>

  <text x="66"  y="454" fill="#64748b" font-size="10" text-anchor="middle">[0] ✓</text>
  <text x="148" y="454" fill="#64748b" font-size="10" text-anchor="middle">[1] ✓</text>
  <text x="230" y="454" fill="#64748b" font-size="10" text-anchor="middle">[2] ✓</text>
  <text x="312" y="454" fill="#64748b" font-size="10" text-anchor="middle">[3] ✓</text>
  <text x="394" y="454" fill="#fbbf24" font-size="10" text-anchor="middle">[4] ≠5</text>
  <text x="476" y="454" fill="#fbbf24" font-size="10" text-anchor="middle">[5] ≠6</text>
  <text x="558" y="454" fill="#64748b" font-size="10" text-anchor="middle">[6] ✓</text>
  <text x="640" y="454" fill="#64748b" font-size="10" text-anchor="middle">[7] ✓</text>

  <!-- scan + result panel -->
  <rect x="590" y="198" width="280" height="172" fill="#111" rx="8" stroke="#222" stroke-width="1.5"/>
  <text x="730" y="218" fill="#a78bfa" font-size="12" font-weight="bold" text-anchor="middle">Scan for Missing</text>
  <text x="610" y="238" fill="#64748b" font-size="11">for i in range(n):</text>
  <text x="610" y="254" fill="#e2e8f0" font-size="11">  if nums[i] != i+1:</text>
  <text x="610" y="270" fill="#fbbf24" font-size="11">    missing.append(i+1)</text>
  <line x1="600" y1="280" x2="862" y2="280" stroke="#333" stroke-width="1"/>
  <text x="610" y="300" fill="#64748b" font-size="11">i=4: nums[4]=2 ≠ 5</text>
  <text x="610" y="316" fill="#fbbf24" font-size="11">  → missing: 5</text>
  <text x="610" y="336" fill="#64748b" font-size="11">i=5: nums[5]=3 ≠ 6</text>
  <text x="610" y="352" fill="#fbbf24" font-size="11">  → missing: 6</text>
  <line x1="600" y1="358" x2="862" y2="358" stroke="#333" stroke-width="1"/>
  <text x="610" y="376" fill="#34d399" font-size="12" font-weight="bold">Missing: [5, 6]</text>
</svg>
