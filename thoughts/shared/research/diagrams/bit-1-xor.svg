<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 480" font-family="SF Mono, Menlo, monospace">
  <rect width="1100" height="480" rx="12" fill="#0a0a0a"/>
  <text x="550" y="32" text-anchor="middle" fill="#34d399" font-size="16" font-weight="700">Bitwise XOR — Duplicate Cancellation</text>
  <text x="550" y="52" text-anchor="middle" fill="#777" font-size="11">a ^ a = 0  |  a ^ 0 = a  |  XOR all numbers → duplicates cancel, unique remains</text>

  <!-- Example: nums = [4, 1, 2, 1, 2] -->
  <rect x="60" y="75" width="980" height="210" rx="8" fill="#111" stroke="#222"/>
  <text x="550" y="100" text-anchor="middle" fill="#34d399" font-size="14" font-weight="600">#136 Single Number: nums = [4, 1, 2, 1, 2]</text>

  <!-- Step by step XOR -->
  <text x="100" y="135" fill="#ddd" font-size="13">result = 0</text>
  <text x="350" y="135" fill="#555" font-size="12">00000000</text>

  <text x="100" y="165" fill="#ddd" font-size="13">result ^= 4</text>
  <text x="350" y="165" fill="#555" font-size="12">000 ^ 100 =</text>
  <text x="520" y="165" fill="#34d399" font-size="13" font-weight="600">100  (4)</text>

  <text x="100" y="195" fill="#ddd" font-size="13">result ^= 1</text>
  <text x="350" y="195" fill="#555" font-size="12">100 ^ 001 =</text>
  <text x="520" y="195" fill="#34d399" font-size="13" font-weight="600">101  (5)</text>

  <text x="100" y="225" fill="#ddd" font-size="13">result ^= 2</text>
  <text x="350" y="225" fill="#555" font-size="12">101 ^ 010 =</text>
  <text x="520" y="225" fill="#34d399" font-size="13" font-weight="600">111  (7)</text>

  <text x="100" y="255" fill="#fbbf24" font-size="13">result ^= 1</text>
  <text x="350" y="255" fill="#555" font-size="12">111 ^ 001 =</text>
  <text x="520" y="255" fill="#fbbf24" font-size="13" font-weight="600">110  (6)</text>
  <text x="650" y="255" fill="#fbbf24" font-size="10">← 1 cancels with earlier 1</text>

  <text x="100" y="275" fill="#fbbf24" font-size="13">result ^= 2</text>
  <text x="350" y="275" fill="#555" font-size="12">110 ^ 010 =</text>
  <text x="520" y="275" fill="#34d399" font-size="15" font-weight="700">100  (4)</text>
  <text x="650" y="275" fill="#fbbf24" font-size="10">← 2 cancels with earlier 2</text>

  <!-- Intuition: rearranged -->
  <rect x="750" y="120" width="270" height="90" rx="6" fill="#0d0d0d" stroke="#34d399" stroke-width="1"/>
  <text x="885" y="145" text-anchor="middle" fill="#34d399" font-size="12" font-weight="600">Why it works (rearranged):</text>
  <text x="885" y="170" text-anchor="middle" fill="#ddd" font-size="12">(1^1) ^ (2^2) ^ 4</text>
  <text x="885" y="192" text-anchor="middle" fill="#ddd" font-size="12">=  0  ^  0  ^ 4  =  4</text>

  <!-- Variations -->
  <rect x="60" y="305" width="480" height="155" rx="8" fill="#111" stroke="#222"/>
  <text x="300" y="330" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="600">#268 Missing Number</text>
  <text x="300" y="355" text-anchor="middle" fill="#777" font-size="11">nums = [3, 0, 1]  range = [0, 1, 2, 3]</text>

  <text x="90" y="385" fill="#ddd" font-size="12">XOR indices:   0 ^ 1 ^ 2 ^ 3 = 0</text>
  <text x="90" y="410" fill="#ddd" font-size="12">XOR values:    3 ^ 0 ^ 1     = 2</text>
  <text x="90" y="435" fill="#34d399" font-size="12">XOR together:  0 ^ 2         = 2  ← missing!</text>
  <text x="90" y="455" fill="#555" font-size="10">(0^0)(1^1)(3^3) cancel → 2 remains</text>

  <rect x="580" y="305" width="460" height="155" rx="8" fill="#111" stroke="#222"/>
  <text x="810" y="330" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="600">#389 Find the Difference</text>
  <text x="810" y="355" text-anchor="middle" fill="#777" font-size="11">s = "abcd", t = "abcde"</text>

  <text x="610" y="385" fill="#ddd" font-size="12">XOR all chars from s:  a ^ b ^ c ^ d</text>
  <text x="610" y="410" fill="#ddd" font-size="12">XOR all chars from t:  a ^ b ^ c ^ d ^ e</text>
  <text x="610" y="435" fill="#34d399" font-size="12">XOR together: pairs cancel → e remains</text>
  <text x="610" y="455" fill="#555" font-size="10">chars are just integers (ASCII values)</text>
</svg>
