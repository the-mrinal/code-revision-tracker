<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 450" font-family="SF Mono, Menlo, monospace">
  <rect width="1100" height="450" rx="12" fill="#0a0a0a"/>
  <text x="550" y="32" text-anchor="middle" fill="#a78bfa" font-size="16" font-weight="700">Bitwise DP — Building Answers from Bit Patterns</text>
  <text x="550" y="52" text-anchor="middle" fill="#777" font-size="11">dp[n] depends on dp[n/2] or dp[n with lowest bit removed]  |  Bitmask DP for subsets</text>

  <!-- #338 Counting Bits DP relation -->
  <rect x="60" y="75" width="500" height="250" rx="8" fill="#111" stroke="#222"/>
  <text x="310" y="100" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="600">#338 Counting Bits — DP Relation</text>
  <text x="310" y="120" text-anchor="middle" fill="#777" font-size="11">dp[i] = dp[i >> 1] + (i &amp; 1)</text>

  <!-- Table showing n, binary, dp[n>>1], n&1, result -->
  <text x="90" y="150" fill="#555" font-size="11">n</text>
  <text x="140" y="150" fill="#555" font-size="11">binary</text>
  <text x="230" y="150" fill="#555" font-size="11">n >> 1</text>
  <text x="310" y="150" fill="#555" font-size="11">dp[n>>1]</text>
  <text x="400" y="150" fill="#555" font-size="11">n &amp; 1</text>
  <text x="480" y="150" fill="#555" font-size="11">dp[n]</text>

  <line x1="80" y1="158" x2="540" y2="158" stroke="#333" stroke-width="1"/>

  <text x="90" y="178" fill="#ddd" font-size="12">0</text>
  <text x="140" y="178" fill="#ddd" font-size="12">000</text>
  <text x="250" y="178" fill="#555" font-size="12">-</text>
  <text x="330" y="178" fill="#555" font-size="12">-</text>
  <text x="415" y="178" fill="#555" font-size="12">-</text>
  <text x="490" y="178" fill="#34d399" font-size="12" font-weight="700">0</text>

  <text x="90" y="198" fill="#ddd" font-size="12">1</text>
  <text x="140" y="198" fill="#a78bfa" font-size="12">001</text>
  <text x="250" y="198" fill="#ddd" font-size="12">0</text>
  <text x="330" y="198" fill="#ddd" font-size="12">0</text>
  <text x="415" y="198" fill="#fbbf24" font-size="12">1</text>
  <text x="490" y="198" fill="#34d399" font-size="12" font-weight="700">1</text>

  <text x="90" y="218" fill="#ddd" font-size="12">2</text>
  <text x="140" y="218" fill="#a78bfa" font-size="12">010</text>
  <text x="250" y="218" fill="#ddd" font-size="12">1</text>
  <text x="330" y="218" fill="#ddd" font-size="12">1</text>
  <text x="415" y="218" fill="#fbbf24" font-size="12">0</text>
  <text x="490" y="218" fill="#34d399" font-size="12" font-weight="700">1</text>

  <text x="90" y="238" fill="#ddd" font-size="12">3</text>
  <text x="140" y="238" fill="#a78bfa" font-size="12">011</text>
  <text x="250" y="238" fill="#ddd" font-size="12">1</text>
  <text x="330" y="238" fill="#ddd" font-size="12">1</text>
  <text x="415" y="238" fill="#fbbf24" font-size="12">1</text>
  <text x="490" y="238" fill="#34d399" font-size="12" font-weight="700">2</text>

  <text x="90" y="258" fill="#ddd" font-size="12">4</text>
  <text x="140" y="258" fill="#a78bfa" font-size="12">100</text>
  <text x="250" y="258" fill="#ddd" font-size="12">2</text>
  <text x="330" y="258" fill="#ddd" font-size="12">1</text>
  <text x="415" y="258" fill="#fbbf24" font-size="12">0</text>
  <text x="490" y="258" fill="#34d399" font-size="12" font-weight="700">1</text>

  <text x="90" y="278" fill="#ddd" font-size="12">5</text>
  <text x="140" y="278" fill="#a78bfa" font-size="12">101</text>
  <text x="250" y="278" fill="#ddd" font-size="12">2</text>
  <text x="330" y="278" fill="#ddd" font-size="12">1</text>
  <text x="415" y="278" fill="#fbbf24" font-size="12">1</text>
  <text x="490" y="278" fill="#34d399" font-size="12" font-weight="700">2</text>

  <text x="90" y="310" fill="#777" font-size="10">n >> 1 is n with last bit removed</text>
  <text x="90" y="325" fill="#777" font-size="10">n &amp; 1 tells if that last bit was 1</text>

  <!-- Bitmask DP explanation -->
  <rect x="600" y="75" width="440" height="250" rx="8" fill="#111" stroke="#222"/>
  <text x="820" y="100" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="600">Bitmask DP Concept (#1494)</text>
  <text x="820" y="120" text-anchor="middle" fill="#777" font-size="11">Represent subsets as integers (n ≤ 15)</text>

  <text x="630" y="150" fill="#ddd" font-size="12">4 courses → 4 bits → 16 states</text>

  <text x="630" y="180" fill="#555" font-size="11">mask = 0000  →  no courses done</text>
  <text x="630" y="200" fill="#555" font-size="11">mask = 0101  →  courses 0 and 2 done</text>
  <text x="630" y="220" fill="#555" font-size="11">mask = 1111  →  all 4 courses done</text>

  <text x="630" y="255" fill="#a78bfa" font-size="12" font-weight="600">dp[mask] = min semesters to reach this state</text>

  <text x="630" y="285" fill="#ddd" font-size="11">For each mask:</text>
  <text x="650" y="305" fill="#ddd" font-size="11">1. Find available courses (prereqs met)</text>
  <text x="650" y="325" fill="#ddd" font-size="11">2. Try every subset of size ≤ k</text>

  <!-- Summary -->
  <rect x="60" y="350" width="980" height="80" rx="8" fill="#111" stroke="#222"/>
  <text x="310" y="378" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="600">Bit-Property DP</text>
  <text x="310" y="400" text-anchor="middle" fill="#777" font-size="11">dp[i] = dp[i >> 1] + (i &amp; 1)</text>
  <text x="310" y="418" text-anchor="middle" fill="#555" font-size="10">O(n) time, O(n) space</text>

  <line x1="550" y1="358" x2="550" y2="425" stroke="#333" stroke-width="1" stroke-dasharray="4"/>

  <text x="810" y="378" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="600">Bitmask DP</text>
  <text x="810" y="400" text-anchor="middle" fill="#777" font-size="11">dp[mask] over all 2^n subsets</text>
  <text x="810" y="418" text-anchor="middle" fill="#555" font-size="10">O(2^n) time/space, feasible for n ≤ 15-20</text>
</svg>
