<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 480" font-family="SF Mono, Menlo, monospace">
  <rect width="1100" height="480" rx="12" fill="#0a0a0a"/>
  <text x="550" y="32" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="700">Power Check — Binary Structure of Powers</text>
  <text x="550" y="52" text-anchor="middle" fill="#777" font-size="11">Power of 2 = exactly one set bit  |  Power of 4 = set bit at even position</text>

  <!-- Powers of 2 -->
  <rect x="60" y="75" width="480" height="250" rx="8" fill="#111" stroke="#222"/>
  <text x="300" y="100" text-anchor="middle" fill="#34d399" font-size="14" font-weight="600">#231 Power of Two</text>

  <text x="100" y="135" fill="#34d399" font-size="13">  1 = 00000001</text>
  <text x="340" y="135" fill="#34d399" font-size="11">✓  2^0</text>

  <text x="100" y="160" fill="#34d399" font-size="13">  2 = 00000010</text>
  <text x="340" y="160" fill="#34d399" font-size="11">✓  2^1</text>

  <text x="100" y="185" fill="#34d399" font-size="13">  4 = 00000100</text>
  <text x="340" y="185" fill="#34d399" font-size="11">✓  2^2</text>

  <text x="100" y="210" fill="#34d399" font-size="13">  8 = 00001000</text>
  <text x="340" y="210" fill="#34d399" font-size="11">✓  2^3</text>

  <line x1="90" y1="225" x2="520" y2="225" stroke="#333" stroke-width="1"/>

  <text x="100" y="248" fill="#f87171" font-size="13">  3 = 00000011</text>
  <text x="340" y="248" fill="#f87171" font-size="11">✗  two 1-bits</text>

  <text x="100" y="273" fill="#f87171" font-size="13">  6 = 00000110</text>
  <text x="340" y="273" fill="#f87171" font-size="11">✗  two 1-bits</text>

  <text x="100" y="308" fill="#fbbf24" font-size="12" font-weight="600">Test: n > 0 &amp;&amp; (n &amp; (n-1)) == 0</text>

  <!-- Powers of 4 -->
  <rect x="580" y="75" width="460" height="250" rx="8" fill="#111" stroke="#222"/>
  <text x="810" y="100" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="600">#342 Power of Four</text>

  <text x="620" y="130" fill="#555" font-size="11">Position:  7  6  5  4  3  2  1  0</text>

  <text x="620" y="160" fill="#34d399" font-size="13">  1 = 00000001</text>
  <text x="900" y="160" fill="#34d399" font-size="11">pos 0 (even) ✓</text>

  <text x="620" y="185" fill="#34d399" font-size="13">  4 = 00000100</text>
  <text x="900" y="185" fill="#34d399" font-size="11">pos 2 (even) ✓</text>

  <text x="620" y="210" fill="#34d399" font-size="13"> 16 = 00010000</text>
  <text x="900" y="210" fill="#34d399" font-size="11">pos 4 (even) ✓</text>

  <line x1="610" y1="225" x2="1020" y2="225" stroke="#333" stroke-width="1"/>

  <text x="620" y="248" fill="#f87171" font-size="13">  2 = 00000010</text>
  <text x="900" y="248" fill="#f87171" font-size="11">pos 1 (odd)  ✗</text>

  <text x="620" y="273" fill="#f87171" font-size="13">  8 = 00001000</text>
  <text x="900" y="273" fill="#f87171" font-size="11">pos 3 (odd)  ✗</text>

  <text x="620" y="308" fill="#fbbf24" font-size="12" font-weight="600">Also check: n &amp; 0x55555555 != 0</text>

  <!-- Summary -->
  <rect x="60" y="350" width="980" height="110" rx="8" fill="#111" stroke="#222"/>
  <text x="550" y="378" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="600">One-Line Solutions</text>

  <text x="120" y="410" fill="#34d399" font-size="13">Power of 2:</text>
  <text x="260" y="410" fill="#ddd" font-size="13">n > 0  &amp;&amp;  (n &amp; (n-1)) == 0</text>

  <text x="120" y="440" fill="#fbbf24" font-size="13">Power of 4:</text>
  <text x="260" y="440" fill="#ddd" font-size="12">n > 0  &amp;&amp;  (n &amp; (n-1)) == 0  &amp;&amp;  (n &amp; 0x55555555) != 0</text>

  <text x="780" y="410" fill="#777" font-size="11">alt:  ... &amp;&amp; (n-1) % 3 == 0</text>
  <text x="780" y="440" fill="#555" font-size="10">(4^k - 1 is always divisible by 3)</text>
</svg>
