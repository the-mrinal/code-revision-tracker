<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 510" font-family="SF Mono, Menlo, monospace">
  <rect width="900" height="510" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#a78bfa" font-size="18" font-weight="bold">Rotated Sorted Array</text>
  <text x="450" y="62" text-anchor="middle" fill="#888" font-size="12">Find target=0 in [4, 5, 6, 7, 0, 1, 2]</text>

  <!-- Visual: the rotation as a "broken" sorted line -->
  <g transform="translate(80, 80)">
    <text x="0" y="12" fill="#666" font-size="10">Value</text>
    <!-- Y axis -->
    <line x1="30" y1="20" x2="30" y2="140" stroke="#333" stroke-width="1"/>
    <!-- X axis -->
    <line x1="30" y1="140" x2="400" y2="140" stroke="#333" stroke-width="1"/>

    <!-- Ascending portion: 4,5,6,7 -->
    <circle cx="70" cy="100" r="5" fill="#a78bfa"/>
    <text x="70" y="155" text-anchor="middle" fill="#666" font-size="9">4</text>
    <circle cx="120" cy="85" r="5" fill="#a78bfa"/>
    <text x="120" y="155" text-anchor="middle" fill="#666" font-size="9">5</text>
    <circle cx="170" cy="65" r="5" fill="#a78bfa"/>
    <text x="170" y="155" text-anchor="middle" fill="#666" font-size="9">6</text>
    <circle cx="220" cy="45" r="5" fill="#a78bfa"/>
    <text x="220" y="155" text-anchor="middle" fill="#666" font-size="9">7</text>
    <line x1="70" y1="100" x2="220" y2="45" stroke="#a78bfa" stroke-width="2"/>

    <!-- Drop -->
    <line x1="220" y1="45" x2="270" y2="130" stroke="#f87171" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="245" y="80" fill="#f87171" font-size="9">pivot</text>

    <!-- Ascending portion: 0,1,2 -->
    <circle cx="270" cy="130" r="6" fill="#34d399" stroke="#34d399" stroke-width="2"/>
    <text x="270" y="155" text-anchor="middle" fill="#34d399" font-size="9" font-weight="bold">0 ✓</text>
    <circle cx="320" cy="120" r="5" fill="#a78bfa"/>
    <text x="320" y="155" text-anchor="middle" fill="#666" font-size="9">1</text>
    <circle cx="370" cy="110" r="5" fill="#a78bfa"/>
    <text x="370" y="155" text-anchor="middle" fill="#666" font-size="9">2</text>
    <line x1="270" y1="130" x2="370" y2="110" stroke="#a78bfa" stroke-width="2"/>
  </g>

  <!-- Decision logic steps -->
  <g transform="translate(520, 85)">
    <rect x="0" y="0" width="330" height="140" rx="8" fill="#111" stroke="#a78bfa" stroke-width="1"/>
    <text x="165" y="22" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="bold">Decision at each mid</text>

    <text x="15" y="45" fill="#ccc" font-size="11">1. Which half is sorted?</text>
    <text x="25" y="63" fill="#888" font-size="10">nums[lo] ≤ nums[mid] → left sorted</text>
    <text x="25" y="78" fill="#888" font-size="10">else → right sorted</text>

    <text x="15" y="100" fill="#ccc" font-size="11">2. Is target in the sorted half?</text>
    <text x="25" y="118" fill="#888" font-size="10">Yes → search sorted half</text>
    <text x="25" y="133" fill="#888" font-size="10">No → search the other half</text>
  </g>

  <!-- Step-by-step trace -->
  <g transform="translate(60, 260)">
    <!-- Array boxes -->
    <rect x="0" y="0" width="50" height="40" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="25" y="26" text-anchor="middle" fill="#e0e0e0" font-size="14">4</text>
    <rect x="56" y="0" width="50" height="40" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="81" y="26" text-anchor="middle" fill="#e0e0e0" font-size="14">5</text>
    <rect x="112" y="0" width="50" height="40" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="137" y="26" text-anchor="middle" fill="#e0e0e0" font-size="14">6</text>
    <rect x="168" y="0" width="50" height="40" rx="6" fill="#111" stroke="#fbbf24" stroke-width="2"/>
    <text x="193" y="26" text-anchor="middle" fill="#fbbf24" font-size="14">7</text>
    <rect x="224" y="0" width="50" height="40" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="249" y="26" text-anchor="middle" fill="#e0e0e0" font-size="14">0</text>
    <rect x="280" y="0" width="50" height="40" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="305" y="26" text-anchor="middle" fill="#e0e0e0" font-size="14">1</text>
    <rect x="336" y="0" width="50" height="40" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="361" y="26" text-anchor="middle" fill="#e0e0e0" font-size="14">2</text>

    <!-- Step 1 annotations -->
    <text x="25" y="55" text-anchor="middle" fill="#5b6abf" font-size="9">lo=0</text>
    <text x="193" y="-8" text-anchor="middle" fill="#fbbf24" font-size="9">mid=3</text>
    <text x="361" y="55" text-anchor="middle" fill="#5b6abf" font-size="9">hi=6</text>

    <text x="430" y="15" fill="#888" font-size="11">Step 1: nums[0]=4 ≤ nums[3]=7</text>
    <text x="430" y="32" fill="#888" font-size="11">→ left [4,5,6,7] sorted</text>
    <text x="430" y="49" fill="#fbbf24" font-size="11">→ target 0 NOT in [4,7]</text>
    <text x="430" y="66" fill="#888" font-size="11">→ go RIGHT: lo=4</text>
  </g>

  <!-- Step 2 -->
  <g transform="translate(60, 345)">
    <rect x="224" y="0" width="50" height="40" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="249" y="26" text-anchor="middle" fill="#e0e0e0" font-size="14">0</text>
    <rect x="280" y="0" width="50" height="40" rx="6" fill="#111" stroke="#fbbf24" stroke-width="2"/>
    <text x="305" y="26" text-anchor="middle" fill="#fbbf24" font-size="14">1</text>
    <rect x="336" y="0" width="50" height="40" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="361" y="26" text-anchor="middle" fill="#e0e0e0" font-size="14">2</text>

    <text x="249" y="55" text-anchor="middle" fill="#5b6abf" font-size="9">lo=4</text>
    <text x="305" y="-8" text-anchor="middle" fill="#fbbf24" font-size="9">mid=5</text>
    <text x="361" y="55" text-anchor="middle" fill="#5b6abf" font-size="9">hi=6</text>

    <text x="430" y="15" fill="#888" font-size="11">Step 2: nums[4]=0 ≤ nums[5]=1</text>
    <text x="430" y="32" fill="#888" font-size="11">→ left [0,1] sorted</text>
    <text x="430" y="49" fill="#34d399" font-size="11">→ target 0 IS in [0,1]</text>
    <text x="430" y="66" fill="#888" font-size="11">→ go LEFT: hi=5</text>
  </g>

  <!-- Step 3 -->
  <g transform="translate(60, 420)">
    <rect x="224" y="0" width="50" height="40" rx="6" fill="#34d399" stroke="#34d399" stroke-width="2"/>
    <text x="249" y="26" text-anchor="middle" fill="#0a0a0a" font-size="14" font-weight="bold">0</text>
    <rect x="280" y="0" width="50" height="40" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="305" y="26" text-anchor="middle" fill="#e0e0e0" font-size="14">1</text>

    <text x="249" y="-8" text-anchor="middle" fill="#34d399" font-size="9">mid=4</text>

    <text x="430" y="15" fill="#34d399" font-size="12" font-weight="bold">Step 3: nums[4]=0 = target → FOUND!</text>
  </g>

  <!-- Key takeaway -->
  <rect x="60" y="468" width="780" height="30" rx="6" fill="#111" stroke="#a78bfa" stroke-width="1"/>
  <text x="450" y="488" text-anchor="middle" fill="#ccc" font-size="12">At every midpoint, at least ONE half is always sorted → decide which half the target is in</text>
</svg>
