<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="SF Mono, Menlo, monospace">
  <rect width="900" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#f87171" font-size="18" font-weight="bold">Median / Kth Element</text>
  <text x="450" y="62" text-anchor="middle" fill="#888" font-size="12">Binary search on VALUE + count how many elements ≤ mid</text>

  <!-- Matrix example -->
  <g transform="translate(60, 85)">
    <text x="0" y="15" fill="#888" font-size="12">LC 378: Kth Smallest in Sorted Matrix, k=8</text>

    <!-- Matrix grid -->
    <g transform="translate(0, 25)">
      <rect x="0" y="0" width="50" height="40" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
      <text x="25" y="26" text-anchor="middle" fill="#34d399" font-size="14">1</text>
      <rect x="55" y="0" width="50" height="40" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
      <text x="80" y="26" text-anchor="middle" fill="#34d399" font-size="14">5</text>
      <rect x="110" y="0" width="50" height="40" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
      <text x="135" y="26" text-anchor="middle" fill="#34d399" font-size="14">9</text>

      <rect x="0" y="45" width="50" height="40" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
      <text x="25" y="71" text-anchor="middle" fill="#34d399" font-size="14">10</text>
      <rect x="55" y="45" width="50" height="40" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
      <text x="80" y="71" text-anchor="middle" fill="#34d399" font-size="14">11</text>
      <rect x="110" y="45" width="50" height="40" rx="4" fill="#111" stroke="#fbbf24" stroke-width="2"/>
      <text x="135" y="71" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="bold">13</text>

      <rect x="0" y="90" width="50" height="40" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
      <text x="25" y="116" text-anchor="middle" fill="#34d399" font-size="14">12</text>
      <rect x="55" y="90" width="50" height="40" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
      <text x="80" y="116" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="bold">13</text>
      <rect x="110" y="90" width="50" height="40" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
      <text x="135" y="116" text-anchor="middle" fill="#e0e0e0" font-size="14">15</text>
    </g>

    <!-- Sorted order -->
    <text x="0" y="175" fill="#666" font-size="10">Sorted: 1, 5, 9, 10, 11, 12, 13, 13, 15</text>
    <text x="0" y="190" fill="#fbbf24" font-size="10">                                ↑ k=8 → answer = 13</text>
  </g>

  <!-- Binary search on value visualization -->
  <g transform="translate(350, 90)">
    <rect x="0" y="0" width="490" height="200" rx="8" fill="#111" stroke="#f87171" stroke-width="1"/>
    <text x="245" y="22" text-anchor="middle" fill="#f87171" font-size="13" font-weight="bold">Binary Search on VALUE Range [1, 15]</text>

    <!-- Step 1 -->
    <text x="15" y="50" fill="#fbbf24" font-size="11">mid=8:</text>
    <text x="80" y="50" fill="#888" font-size="11">count(≤8) = 2   (only 1,5)</text>
    <text x="340" y="50" fill="#f87171" font-size="11">2 &lt; 8 → go RIGHT</text>

    <!-- Step 2 -->
    <text x="15" y="78" fill="#fbbf24" font-size="11">mid=12:</text>
    <text x="80" y="78" fill="#888" font-size="11">count(≤12) = 6  (1,5,9,10,11,12)</text>
    <text x="340" y="78" fill="#f87171" font-size="11">6 &lt; 8 → go RIGHT</text>

    <!-- Step 3 -->
    <text x="15" y="106" fill="#34d399" font-size="11">mid=13:</text>
    <text x="80" y="106" fill="#888" font-size="11">count(≤13) = 8  (1,5,9,10,11,12,13,13)</text>
    <text x="340" y="106" fill="#34d399" font-size="11">8 ≥ 8 → hi = 13</text>

    <!-- Step 4 -->
    <text x="15" y="134" fill="#fbbf24" font-size="11">lo=13, hi=13 → converged!</text>
    <text x="245" y="134" fill="#fbbf24" font-size="11" font-weight="bold">Answer = 13</text>

    <!-- Counting technique -->
    <line x1="15" y1="155" x2="475" y2="155" stroke="#333" stroke-width="1"/>
    <text x="245" y="175" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="bold">Counting: Staircase Walk O(n)</text>
    <text x="245" y="193" text-anchor="middle" fill="#888" font-size="10">Start bottom-left. Go right if ≤ mid (add row). Go up if &gt; mid.</text>
  </g>

  <!-- Median of Two Sorted Arrays -->
  <g transform="translate(60, 310)">
    <rect x="0" y="0" width="390" height="170" rx="8" fill="#111" stroke="#a78bfa" stroke-width="1"/>
    <text x="195" y="22" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">LC 4: Median of Two Sorted Arrays</text>

    <text x="15" y="48" fill="#ccc" font-size="11">nums1: [1, 3]    nums2: [2]</text>
    <text x="15" y="70" fill="#888" font-size="10">Binary search on PARTITION of smaller array</text>

    <text x="15" y="95" fill="#888" font-size="10">Partition splits both arrays into left|right:</text>
    <text x="25" y="113" fill="#34d399" font-size="10">left: [1] | right: [3]     ← from nums1</text>
    <text x="25" y="128" fill="#34d399" font-size="10">left: [2] | right: []      ← from nums2</text>

    <text x="15" y="150" fill="#ccc" font-size="10">Check: maxLeft1 ≤ minRight2</text>
    <text x="15" y="165" fill="#ccc" font-size="10">   AND maxLeft2 ≤ minRight1 → valid!</text>
  </g>

  <!-- Pair Distance -->
  <g transform="translate(470, 310)">
    <rect x="0" y="0" width="370" height="170" rx="8" fill="#111" stroke="#fbbf24" stroke-width="1"/>
    <text x="185" y="22" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">LC 719: Kth Smallest Pair Distance</text>

    <text x="15" y="48" fill="#ccc" font-size="11">nums = [1, 3, 1] → sorted [1, 1, 3]</text>
    <text x="15" y="70" fill="#888" font-size="10">All distances: 0, 2, 2</text>

    <text x="15" y="95" fill="#888" font-size="10">BS on distance [0, max-min]</text>
    <text x="15" y="115" fill="#888" font-size="10">Count pairs ≤ mid: two pointers</text>
    <text x="15" y="133" fill="#888" font-size="10">For each right, advance left while</text>
    <text x="15" y="148" fill="#888" font-size="10">nums[right]-nums[left] &gt; mid</text>
    <text x="15" y="165" fill="#888" font-size="10">count += right - left</text>
  </g>
</svg>
