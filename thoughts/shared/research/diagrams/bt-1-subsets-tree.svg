<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" font-family="SF Mono, Menlo, monospace">
  <rect width="1100" height="600" rx="12" fill="#0a0a0a"/>
  <text x="550" y="32" text-anchor="middle" fill="#5b6abf" font-size="16" font-weight="700">Subsets Pattern — Decision Tree for [1, 2, 3]</text>
  <text x="550" y="52" text-anchor="middle" fill="#777" font-size="11">Each level: include element or skip it. Every node is a valid subset.</text>

  <!-- Level 0: root -->
  <rect x="500" y="75" width="100" height="32" rx="6" fill="#1a1a2e" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="550" y="96" text-anchor="middle" fill="#ddd" font-size="13">[ ]</text>

  <!-- Level 1 label -->
  <text x="30" y="170" fill="#fbbf24" font-size="11" font-weight="600">decide on 1</text>

  <!-- Level 1: decide on 1 -->
  <rect x="250" y="155" width="110" height="32" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="1.5"/>
  <text x="305" y="176" text-anchor="middle" fill="#34d399" font-size="13">[1]</text>
  <text x="305" y="202" text-anchor="middle" fill="#34d399" font-size="9">include 1</text>

  <rect x="740" y="155" width="110" height="32" rx="6" fill="#1a1a2e" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="795" y="176" text-anchor="middle" fill="#ddd" font-size="13">[ ]</text>
  <text x="795" y="202" text-anchor="middle" fill="#5b6abf" font-size="9">skip 1</text>

  <line x1="520" y1="107" x2="340" y2="155" stroke="#34d399" stroke-width="1.2"/>
  <line x1="580" y1="107" x2="760" y2="155" stroke="#5b6abf" stroke-width="1.2"/>

  <!-- Level 2 label -->
  <text x="30" y="265" fill="#fbbf24" font-size="11" font-weight="600">decide on 2</text>

  <!-- Level 2: decide on 2 -->
  <rect x="120" y="250" width="100" height="30" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="1.2"/>
  <text x="170" y="270" text-anchor="middle" fill="#34d399" font-size="12">[1, 2]</text>

  <rect x="400" y="250" width="100" height="30" rx="6" fill="#1a1a2e" stroke="#5b6abf" stroke-width="1.2"/>
  <text x="450" y="270" text-anchor="middle" fill="#ddd" font-size="12">[1]</text>

  <rect x="620" y="250" width="100" height="30" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="1.2"/>
  <text x="670" y="270" text-anchor="middle" fill="#34d399" font-size="12">[2]</text>

  <rect x="880" y="250" width="100" height="30" rx="6" fill="#1a1a2e" stroke="#5b6abf" stroke-width="1.2"/>
  <text x="930" y="270" text-anchor="middle" fill="#ddd" font-size="12">[ ]</text>

  <line x1="275" y1="187" x2="190" y2="250" stroke="#34d399" stroke-width="1"/>
  <line x1="335" y1="187" x2="430" y2="250" stroke="#5b6abf" stroke-width="1"/>
  <line x1="765" y1="187" x2="690" y2="250" stroke="#34d399" stroke-width="1"/>
  <line x1="825" y1="187" x2="910" y2="250" stroke="#5b6abf" stroke-width="1"/>

  <!-- Level 3 label -->
  <text x="30" y="360" fill="#fbbf24" font-size="11" font-weight="600">decide on 3</text>

  <!-- Level 3: decide on 3 — 8 leaf nodes evenly spaced -->
  <rect x="30" y="345" width="90" height="28" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="1.2"/>
  <text x="75" y="364" text-anchor="middle" fill="#34d399" font-size="11">[1,2,3]</text>

  <rect x="160" y="345" width="90" height="28" rx="6" fill="#1a1a2e" stroke="#5b6abf" stroke-width="1.2"/>
  <text x="205" y="364" text-anchor="middle" fill="#ddd" font-size="11">[1,2]</text>

  <rect x="300" y="345" width="90" height="28" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="1.2"/>
  <text x="345" y="364" text-anchor="middle" fill="#34d399" font-size="11">[1,3]</text>

  <rect x="430" y="345" width="90" height="28" rx="6" fill="#1a1a2e" stroke="#5b6abf" stroke-width="1.2"/>
  <text x="475" y="364" text-anchor="middle" fill="#ddd" font-size="11">[1]</text>

  <rect x="570" y="345" width="90" height="28" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="1.2"/>
  <text x="615" y="364" text-anchor="middle" fill="#34d399" font-size="11">[2,3]</text>

  <rect x="700" y="345" width="90" height="28" rx="6" fill="#1a1a2e" stroke="#5b6abf" stroke-width="1.2"/>
  <text x="745" y="364" text-anchor="middle" fill="#ddd" font-size="11">[2]</text>

  <rect x="840" y="345" width="90" height="28" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="1.2"/>
  <text x="885" y="364" text-anchor="middle" fill="#34d399" font-size="11">[3]</text>

  <rect x="970" y="345" width="90" height="28" rx="6" fill="#1a1a2e" stroke="#5b6abf" stroke-width="1.2"/>
  <text x="1015" y="364" text-anchor="middle" fill="#ddd" font-size="11">[ ]</text>

  <!-- Lines L2 → L3 -->
  <line x1="150" y1="280" x2="85" y2="345" stroke="#34d399" stroke-width="1"/>
  <line x1="190" y1="280" x2="195" y2="345" stroke="#5b6abf" stroke-width="1"/>
  <line x1="430" y1="280" x2="355" y2="345" stroke="#34d399" stroke-width="1"/>
  <line x1="470" y1="280" x2="465" y2="345" stroke="#5b6abf" stroke-width="1"/>
  <line x1="650" y1="280" x2="625" y2="345" stroke="#34d399" stroke-width="1"/>
  <line x1="690" y1="280" x2="735" y2="345" stroke="#5b6abf" stroke-width="1"/>
  <line x1="910" y1="280" x2="895" y2="345" stroke="#34d399" stroke-width="1"/>
  <line x1="950" y1="280" x2="1005" y2="345" stroke="#5b6abf" stroke-width="1"/>

  <!-- Result box -->
  <rect x="60" y="405" width="980" height="55" rx="8" fill="#111" stroke="#222"/>
  <text x="550" y="428" text-anchor="middle" fill="#5b6abf" font-size="12" font-weight="600">Result (all 2^3 = 8 leaf nodes):</text>
  <text x="550" y="450" text-anchor="middle" fill="#34d399" font-size="13">[1,2,3]   [1,2]   [1,3]   [1]   [2,3]   [2]   [3]   [ ]</text>

  <!-- Legend -->
  <rect x="60" y="480" width="980" height="100" rx="8" fill="#111" stroke="#222"/>
  <text x="550" y="505" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">How It Works</text>

  <rect x="90" y="520" width="14" height="14" rx="3" fill="#1a2e1a" stroke="#34d399"/>
  <text x="115" y="532" fill="#34d399" font-size="11">= included element (chose YES)</text>

  <rect x="90" y="548" width="14" height="14" rx="3" fill="#1a1a2e" stroke="#5b6abf"/>
  <text x="115" y="560" fill="#5b6abf" font-size="11">= skipped element (chose NO)</text>

  <text x="550" y="532" fill="#777" font-size="11">Key: start index prevents going backward</text>
  <text x="550" y="560" fill="#777" font-size="11">Loop: for i from START to n (only consider elements after current)</text>
</svg>
