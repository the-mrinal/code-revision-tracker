<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" font-family="SF Mono, Menlo, monospace">
  <rect width="1100" height="560" rx="12" fill="#0a0a0a"/>
  <text x="550" y="32" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="700">Combination Sum — candidates=[2, 3, 7], target=7</text>
  <text x="550" y="52" text-anchor="middle" fill="#777" font-size="11">Branch = add a candidate. Prune when remaining &lt; 0. Collect when remaining = 0.</text>

  <!-- Root -->
  <rect x="440" y="72" width="220" height="34" rx="6" fill="#1a1a2e" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="550" y="94" text-anchor="middle" fill="#fbbf24" font-size="13">target = 7, path = [ ]</text>

  <!-- Level 1: +2, +3, +7 -->
  <rect x="100" y="155" width="200" height="34" rx="6" fill="#2e2e1a" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="200" y="177" text-anchor="middle" fill="#fbbf24" font-size="12">+2  →  remaining = 5</text>

  <rect x="450" y="155" width="200" height="34" rx="6" fill="#2e2e1a" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="550" y="177" text-anchor="middle" fill="#fbbf24" font-size="12">+3  →  remaining = 4</text>

  <rect x="800" y="155" width="200" height="34" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="2"/>
  <text x="900" y="172" text-anchor="middle" fill="#34d399" font-size="12" font-weight="700">+7  →  remaining = 0</text>
  <text x="900" y="185" text-anchor="middle" fill="#34d399" font-size="10">FOUND: [7]</text>

  <line x1="490" y1="106" x2="250" y2="155" stroke="#fbbf24" stroke-width="1.2"/>
  <line x1="550" y1="106" x2="550" y2="155" stroke="#fbbf24" stroke-width="1.2"/>
  <line x1="610" y1="106" x2="850" y2="155" stroke="#34d399" stroke-width="1.5"/>

  <!-- Level 2 from +2 (rem=5) -->
  <rect x="30" y="245" width="170" height="34" rx="6" fill="#2e2e1a" stroke="#fbbf24" stroke-width="1"/>
  <text x="115" y="267" text-anchor="middle" fill="#fbbf24" font-size="11">+2  →  rem = 3</text>

  <rect x="240" y="245" width="170" height="34" rx="6" fill="#2e2e1a" stroke="#fbbf24" stroke-width="1"/>
  <text x="325" y="267" text-anchor="middle" fill="#fbbf24" font-size="11">+3  →  rem = 2</text>

  <!-- Level 2 from +3 (rem=4) -->
  <rect x="470" y="245" width="170" height="34" rx="6" fill="#2e2e1a" stroke="#fbbf24" stroke-width="1"/>
  <text x="555" y="267" text-anchor="middle" fill="#fbbf24" font-size="11">+3  →  rem = 1</text>

  <rect x="690" y="245" width="170" height="34" rx="6" fill="#2e1a1a" stroke="#f87171" stroke-width="1.5"/>
  <text x="775" y="267" text-anchor="middle" fill="#f87171" font-size="11">+7  →  rem = -3  PRUNE</text>

  <line x1="160" y1="189" x2="130" y2="245" stroke="#fbbf24" stroke-width="1"/>
  <line x1="240" y1="189" x2="310" y2="245" stroke="#fbbf24" stroke-width="1"/>
  <line x1="510" y1="189" x2="540" y2="245" stroke="#fbbf24" stroke-width="1"/>
  <line x1="590" y1="189" x2="740" y2="245" stroke="#f87171" stroke-width="1" stroke-dasharray="5"/>

  <!-- Level 3 from [2,2] (rem=3) -->
  <rect x="30" y="335" width="150" height="34" rx="6" fill="#2e2e1a" stroke="#fbbf24" stroke-width="1"/>
  <text x="105" y="357" text-anchor="middle" fill="#fbbf24" font-size="11">+2  →  rem = 1</text>

  <rect x="220" y="335" width="180" height="34" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="2"/>
  <text x="310" y="352" text-anchor="middle" fill="#34d399" font-size="11" font-weight="700">+3  →  rem = 0</text>
  <text x="310" y="365" text-anchor="middle" fill="#34d399" font-size="10">FOUND: [2, 2, 3]</text>

  <!-- Level 3 from [2,3] (rem=2) — pruned -->
  <rect x="460" y="335" width="180" height="34" rx="6" fill="#2e1a1a" stroke="#f87171" stroke-width="1.5"/>
  <text x="550" y="357" text-anchor="middle" fill="#f87171" font-size="11">+3  →  rem = -1  PRUNE</text>

  <!-- Level 3 from [3,3] (rem=1) — dead end -->
  <rect x="690" y="335" width="180" height="34" rx="6" fill="#2e1a1a" stroke="#f87171" stroke-width="1.5"/>
  <text x="780" y="357" text-anchor="middle" fill="#f87171" font-size="11">no candidate ≤ 1</text>

  <line x1="80" y1="279" x2="80" y2="335" stroke="#fbbf24" stroke-width="1"/>
  <line x1="150" y1="279" x2="280" y2="335" stroke="#34d399" stroke-width="1.5"/>
  <line x1="370" y1="279" x2="520" y2="335" stroke="#f87171" stroke-width="1" stroke-dasharray="5"/>
  <line x1="555" y1="279" x2="750" y2="335" stroke="#f87171" stroke-width="1" stroke-dasharray="5"/>

  <!-- Level 4 from [2,2,2] (rem=1) — dead end -->
  <rect x="30" y="415" width="180" height="34" rx="6" fill="#2e1a1a" stroke="#f87171" stroke-width="1.5"/>
  <text x="120" y="437" text-anchor="middle" fill="#f87171" font-size="11">no candidate ≤ 1  DEAD END</text>
  <line x1="80" y1="369" x2="100" y2="415" stroke="#f87171" stroke-width="1" stroke-dasharray="5"/>

  <!-- Result box -->
  <rect x="60" y="475" width="980" height="65" rx="8" fill="#111" stroke="#222"/>
  <text x="550" y="500" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="600">Results: 2 combinations that sum to 7</text>
  <text x="550" y="525" text-anchor="middle" fill="#34d399" font-size="15" font-weight="700">[2, 2, 3]          [7]</text>

  <!-- Legend -->
  <rect x="880" y="310" width="200" height="90" rx="6" fill="#111" stroke="#222"/>
  <rect x="900" y="330" width="12" height="12" rx="2" fill="#1a2e1a" stroke="#34d399"/>
  <text x="920" y="341" fill="#34d399" font-size="10">rem = 0 → FOUND</text>
  <rect x="900" y="352" width="12" height="12" rx="2" fill="#2e1a1a" stroke="#f87171"/>
  <text x="920" y="363" fill="#f87171" font-size="10">rem &lt; 0 → PRUNE</text>
  <rect x="900" y="374" width="12" height="12" rx="2" fill="#2e2e1a" stroke="#fbbf24"/>
  <text x="920" y="385" fill="#fbbf24" font-size="10">rem &gt; 0 → explore</text>
</svg>
