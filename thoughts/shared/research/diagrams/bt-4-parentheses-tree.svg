<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 580" font-family="SF Mono, Menlo, monospace">
  <rect width="1100" height="580" rx="12" fill="#0a0a0a"/>
  <text x="550" y="32" text-anchor="middle" fill="#38bdf8" font-size="16" font-weight="700">Parentheses Generation — n = 2 (2 pairs)</text>
  <text x="550" y="52" text-anchor="middle" fill="#777" font-size="11">Two rules control branching: add "(" if open &lt; n  |  add ")" if close &lt; open</text>

  <!-- Level 0: "" -->
  <rect x="440" y="75" width="220" height="40" rx="6" fill="#1a1a2e" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="550" y="95" text-anchor="middle" fill="#38bdf8" font-size="14" font-weight="600">""</text>
  <text x="550" y="110" text-anchor="middle" fill="#555" font-size="10">open = 0, close = 0</text>

  <!-- Only "(" is valid here -->
  <text x="550" y="140" text-anchor="middle" fill="#34d399" font-size="10">can add "(" (0 &lt; 2) ✓</text>
  <text x="550" y="153" text-anchor="middle" fill="#f87171" font-size="10">can't add ")" (0 not &lt; 0) ✗</text>

  <!-- Level 1: "(" -->
  <rect x="440" y="168" width="220" height="40" rx="6" fill="#1a2e2e" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="550" y="188" text-anchor="middle" fill="#38bdf8" font-size="14">"("</text>
  <text x="550" y="203" text-anchor="middle" fill="#555" font-size="10">open = 1, close = 0</text>
  <line x1="550" y1="115" x2="550" y2="168" stroke="#38bdf8" stroke-width="1.2"/>

  <!-- Level 2: "((" and "()" -->
  <rect x="180" y="268" width="220" height="40" rx="6" fill="#1a2e2e" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="290" y="288" text-anchor="middle" fill="#38bdf8" font-size="14">"(("</text>
  <text x="290" y="303" text-anchor="middle" fill="#555" font-size="10">open = 2, close = 0</text>

  <rect x="700" y="268" width="220" height="40" rx="6" fill="#1a2e2e" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="810" y="288" text-anchor="middle" fill="#38bdf8" font-size="14">"()"</text>
  <text x="810" y="303" text-anchor="middle" fill="#555" font-size="10">open = 1, close = 1</text>

  <line x1="480" y1="208" x2="350" y2="268" stroke="#38bdf8" stroke-width="1"/>
  <text x="370" y="240" fill="#34d399" font-size="10">add "("</text>
  <line x1="620" y1="208" x2="750" y2="268" stroke="#38bdf8" stroke-width="1"/>
  <text x="720" y="240" fill="#34d399" font-size="10">add ")"</text>

  <!-- Level 3 from "((": can only add ")" -->
  <text x="160" y="340" fill="#f87171" font-size="10">can't add "(" (open = n)</text>
  <text x="340" y="340" fill="#34d399" font-size="10">add ")" ✓</text>

  <rect x="180" y="355" width="220" height="40" rx="6" fill="#1a2e2e" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="290" y="375" text-anchor="middle" fill="#38bdf8" font-size="14">"(()"</text>
  <text x="290" y="390" text-anchor="middle" fill="#555" font-size="10">open = 2, close = 1</text>
  <line x1="290" y1="308" x2="290" y2="355" stroke="#38bdf8" stroke-width="1"/>

  <!-- Level 3 from "()": can only add "(" -->
  <text x="670" y="340" fill="#34d399" font-size="10">add "(" ✓</text>
  <text x="860" y="340" fill="#f87171" font-size="10">can't add ")" (close = open)</text>

  <rect x="700" y="355" width="220" height="40" rx="6" fill="#1a2e2e" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="810" y="375" text-anchor="middle" fill="#38bdf8" font-size="14">"()("</text>
  <text x="810" y="390" text-anchor="middle" fill="#555" font-size="10">open = 2, close = 1</text>
  <line x1="810" y1="308" x2="810" y2="355" stroke="#38bdf8" stroke-width="1"/>

  <!-- Level 4: both complete -->
  <rect x="180" y="440" width="220" height="40" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="2"/>
  <text x="290" y="460" text-anchor="middle" fill="#34d399" font-size="16" font-weight="700">"(())"</text>
  <text x="290" y="475" text-anchor="middle" fill="#34d399" font-size="10">len = 4 = 2n  DONE ✓</text>
  <line x1="290" y1="395" x2="290" y2="440" stroke="#34d399" stroke-width="1.5"/>
  <text x="290" y="425" text-anchor="middle" fill="#34d399" font-size="9">add ")"</text>

  <rect x="700" y="440" width="220" height="40" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="2"/>
  <text x="810" y="460" text-anchor="middle" fill="#34d399" font-size="16" font-weight="700">"()()"</text>
  <text x="810" y="475" text-anchor="middle" fill="#34d399" font-size="10">len = 4 = 2n  DONE ✓</text>
  <line x1="810" y1="395" x2="810" y2="440" stroke="#34d399" stroke-width="1.5"/>
  <text x="810" y="425" text-anchor="middle" fill="#34d399" font-size="9">add ")"</text>

  <!-- Rules box -->
  <rect x="60" y="505" width="980" height="55" rx="8" fill="#111" stroke="#222"/>
  <rect x="80" y="515" width="440" height="35" rx="4" fill="#0d0d0d" stroke="#34d399" stroke-width="1"/>
  <text x="300" y="537" text-anchor="middle" fill="#34d399" font-size="12" font-weight="600">Rule 1: Add "(" when open &lt; n</text>
  <text x="300" y="547" text-anchor="middle" fill="#555" font-size="9">"Still have opening parens to use"</text>

  <rect x="580" y="515" width="440" height="35" rx="4" fill="#0d0d0d" stroke="#38bdf8" stroke-width="1"/>
  <text x="800" y="537" text-anchor="middle" fill="#38bdf8" font-size="12" font-weight="600">Rule 2: Add ")" when close &lt; open</text>
  <text x="800" y="547" text-anchor="middle" fill="#555" font-size="9">"There's an unmatched ( to close"</text>
</svg>
