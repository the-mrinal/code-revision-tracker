<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 530" font-family="SF Mono, Menlo, monospace">
  <rect width="1100" height="530" rx="12" fill="#0a0a0a"/>
  <text x="550" y="32" text-anchor="middle" fill="#fb923c" font-size="16" font-weight="700">Word Search — Find "ABCCED" in Grid</text>
  <text x="550" y="52" text-anchor="middle" fill="#777" font-size="11">DFS from each cell, 4 directions, mark visited in-place, backtrack by restoring</text>

  <!-- Grid — larger cells, more spacing -->
  <g transform="translate(60, 80)">
    <!-- Row 0 -->
    <rect x="0" y="0" width="70" height="70" fill="#1a2e1a" stroke="#34d399" stroke-width="2.5"/>
    <text x="35" y="42" text-anchor="middle" fill="#34d399" font-size="28" font-weight="700">A</text>
    <text x="35" y="62" text-anchor="middle" fill="#34d399" font-size="9">step 1</text>

    <rect x="80" y="0" width="70" height="70" fill="#1a2e1a" stroke="#34d399" stroke-width="2.5"/>
    <text x="115" y="42" text-anchor="middle" fill="#34d399" font-size="28" font-weight="700">B</text>
    <text x="115" y="62" text-anchor="middle" fill="#34d399" font-size="9">step 2</text>

    <rect x="160" y="0" width="70" height="70" fill="#1a2e1a" stroke="#34d399" stroke-width="2.5"/>
    <text x="195" y="42" text-anchor="middle" fill="#34d399" font-size="28" font-weight="700">C</text>
    <text x="195" y="62" text-anchor="middle" fill="#34d399" font-size="9">step 3</text>

    <rect x="240" y="0" width="70" height="70" fill="#111" stroke="#333"/>
    <text x="275" y="42" text-anchor="middle" fill="#555" font-size="28">E</text>

    <!-- Row 1 -->
    <rect x="0" y="80" width="70" height="70" fill="#111" stroke="#333"/>
    <text x="35" y="122" text-anchor="middle" fill="#555" font-size="28">S</text>

    <rect x="80" y="80" width="70" height="70" fill="#111" stroke="#333"/>
    <text x="115" y="122" text-anchor="middle" fill="#555" font-size="28">F</text>

    <rect x="160" y="80" width="70" height="70" fill="#1a2e1a" stroke="#34d399" stroke-width="2.5"/>
    <text x="195" y="122" text-anchor="middle" fill="#34d399" font-size="28" font-weight="700">C</text>
    <text x="195" y="142" text-anchor="middle" fill="#34d399" font-size="9">step 4</text>

    <rect x="240" y="80" width="70" height="70" fill="#111" stroke="#333"/>
    <text x="275" y="122" text-anchor="middle" fill="#555" font-size="28">S</text>

    <!-- Row 2 -->
    <rect x="0" y="160" width="70" height="70" fill="#111" stroke="#333"/>
    <text x="35" y="202" text-anchor="middle" fill="#555" font-size="28">A</text>

    <rect x="80" y="160" width="70" height="70" fill="#1a2e1a" stroke="#34d399" stroke-width="2.5"/>
    <text x="115" y="202" text-anchor="middle" fill="#34d399" font-size="28" font-weight="700">D</text>
    <text x="115" y="222" text-anchor="middle" fill="#34d399" font-size="9">step 6</text>

    <rect x="160" y="160" width="70" height="70" fill="#1a2e1a" stroke="#34d399" stroke-width="2.5"/>
    <text x="195" y="202" text-anchor="middle" fill="#34d399" font-size="28" font-weight="700">E</text>
    <text x="195" y="222" text-anchor="middle" fill="#34d399" font-size="9">step 5</text>

    <rect x="240" y="160" width="70" height="70" fill="#111" stroke="#333"/>
    <text x="275" y="202" text-anchor="middle" fill="#555" font-size="28">E</text>

    <!-- Path arrows (thick yellow) -->
    <line x1="65" y1="35" x2="80" y2="35" stroke="#fbbf24" stroke-width="3"/>
    <line x1="145" y1="35" x2="160" y2="35" stroke="#fbbf24" stroke-width="3"/>
    <line x1="195" y1="65" x2="195" y2="80" stroke="#fbbf24" stroke-width="3"/>
    <line x1="195" y1="145" x2="195" y2="160" stroke="#fbbf24" stroke-width="3"/>
    <line x1="165" y1="195" x2="150" y2="195" stroke="#fbbf24" stroke-width="3"/>
  </g>

  <!-- Path visualization on the right -->
  <g transform="translate(440, 90)">
    <text x="0" y="0" fill="#fbbf24" font-size="14" font-weight="600">Path traced through the grid:</text>

    <rect x="0" y="20" width="55" height="45" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="1.5"/>
    <text x="28" y="50" text-anchor="middle" fill="#34d399" font-size="20" font-weight="700">A</text>

    <text x="68" y="50" fill="#fbbf24" font-size="16">→</text>

    <rect x="82" y="20" width="55" height="45" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="1.5"/>
    <text x="110" y="50" text-anchor="middle" fill="#34d399" font-size="20" font-weight="700">B</text>

    <text x="150" y="50" fill="#fbbf24" font-size="16">→</text>

    <rect x="164" y="20" width="55" height="45" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="1.5"/>
    <text x="192" y="50" text-anchor="middle" fill="#34d399" font-size="20" font-weight="700">C</text>

    <text x="232" y="50" fill="#fbbf24" font-size="16">↓</text>

    <rect x="246" y="20" width="55" height="45" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="1.5"/>
    <text x="274" y="50" text-anchor="middle" fill="#34d399" font-size="20" font-weight="700">C</text>

    <text x="314" y="50" fill="#fbbf24" font-size="16">↓</text>

    <rect x="328" y="20" width="55" height="45" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="1.5"/>
    <text x="356" y="50" text-anchor="middle" fill="#34d399" font-size="20" font-weight="700">E</text>

    <text x="396" y="50" fill="#fbbf24" font-size="16">←</text>

    <rect x="410" y="20" width="55" height="45" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="1.5"/>
    <text x="438" y="50" text-anchor="middle" fill="#34d399" font-size="20" font-weight="700">D</text>

    <!-- Coordinates -->
    <text x="28" y="82" text-anchor="middle" fill="#555" font-size="9">(0,0)</text>
    <text x="110" y="82" text-anchor="middle" fill="#555" font-size="9">(0,1)</text>
    <text x="192" y="82" text-anchor="middle" fill="#555" font-size="9">(0,2)</text>
    <text x="274" y="82" text-anchor="middle" fill="#555" font-size="9">(1,2)</text>
    <text x="356" y="82" text-anchor="middle" fill="#555" font-size="9">(2,2)</text>
    <text x="438" y="82" text-anchor="middle" fill="#555" font-size="9">(2,1)</text>
  </g>

  <!-- Backtracking mechanism box -->
  <rect x="440" y="210" width="620" height="190" rx="8" fill="#111" stroke="#222"/>
  <text x="750" y="238" text-anchor="middle" fill="#fb923c" font-size="14" font-weight="600">The In-Place Visited Trick</text>

  <text x="465" y="268" fill="#ddd" font-size="12">1. Save original:  temp = board[r][c]</text>
  <text x="465" y="293" fill="#fb923c" font-size="12">2. Mark visited:   board[r][c] = '#'</text>
  <text x="465" y="318" fill="#ddd" font-size="12">3. Explore:         DFS in 4 directions</text>
  <text x="465" y="343" fill="#34d399" font-size="12">4. If found:        return true</text>
  <text x="465" y="368" fill="#fb923c" font-size="12">5. Backtrack:       board[r][c] = temp</text>
  <text x="465" y="388" fill="#555" font-size="10">                    (restore original letter)</text>

  <!-- Bottom: #79 vs #212 -->
  <rect x="60" y="430" width="480" height="80" rx="8" fill="#111" stroke="#fb923c" stroke-width="1"/>
  <text x="300" y="458" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="600">#79 Word Search (single word)</text>
  <text x="300" y="478" text-anchor="middle" fill="#777" font-size="11">DFS from every cell, check one word at a time</text>
  <text x="300" y="498" text-anchor="middle" fill="#555" font-size="10">Time: O(m * n * 4^L) where L = word length</text>

  <rect x="580" y="430" width="480" height="80" rx="8" fill="#111" stroke="#a78bfa" stroke-width="1"/>
  <text x="820" y="458" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="600">#212 Word Search II (many words)</text>
  <text x="820" y="478" text-anchor="middle" fill="#777" font-size="11">Build Trie from word list, single DFS checks all</text>
  <text x="820" y="498" text-anchor="middle" fill="#555" font-size="10">Trie prunes branches where no word has this prefix</text>
</svg>
