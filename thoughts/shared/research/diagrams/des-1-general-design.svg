<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <style>
      text { font-family: 'SF Mono', Menlo, monospace; fill: #e0e0e0; }
      .title { font-size: 16px; font-weight: bold; fill: #5b6abf; }
      .subtitle { font-size: 11px; fill: #888; }
      .label { font-size: 10px; fill: #ccc; }
      .label-sm { font-size: 9px; fill: #aaa; }
      .accent { fill: #5b6abf; }
      .green { fill: #34d399; }
      .yellow { fill: #fbbf24; }
      .red { fill: #f87171; }
      .purple { fill: #a78bfa; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" class="title">General Design — LRU Cache (HashMap + Doubly Linked List)</text>
  <text x="450" y="48" text-anchor="middle" class="subtitle">Composing data structures for O(1) get + O(1) put with eviction</text>

  <!-- HashMap Section -->
  <rect x="30" y="70" width="250" height="200" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="155" y="92" text-anchor="middle" class="label" style="fill:#5b6abf;font-weight:bold">HashMap&lt;Key, Node*&gt;</text>

  <!-- HashMap entries -->
  <rect x="50" y="105" width="210" height="28" rx="4" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="100" y="123" text-anchor="middle" class="label">key: 1</text>
  <text x="200" y="123" text-anchor="middle" class="label" style="fill:#34d399">→ node A</text>

  <rect x="50" y="140" width="210" height="28" rx="4" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="100" y="158" text-anchor="middle" class="label">key: 3</text>
  <text x="200" y="158" text-anchor="middle" class="label" style="fill:#34d399">→ node C</text>

  <rect x="50" y="175" width="210" height="28" rx="4" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="100" y="193" text-anchor="middle" class="label">key: 5</text>
  <text x="200" y="193" text-anchor="middle" class="label" style="fill:#34d399">→ node E</text>

  <text x="155" y="230" text-anchor="middle" class="label-sm">O(1) lookup by key</text>
  <text x="155" y="245" text-anchor="middle" class="label-sm">O(1) insert/delete</text>
  <text x="155" y="260" text-anchor="middle" class="label-sm" style="fill:#f87171">No ordering info!</text>

  <!-- Arrow connecting HashMap to DLL -->
  <line x1="280" y1="170" x2="320" y2="170" stroke="#5b6abf" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#5b6abf"/>
    </marker>
  </defs>

  <!-- DLL Section -->
  <rect x="320" y="70" width="550" height="200" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="595" y="92" text-anchor="middle" class="label" style="fill:#5b6abf;font-weight:bold">Doubly Linked List (recency order)</text>

  <!-- DLL: Head dummy -->
  <rect x="340" y="130" width="60" height="50" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1" stroke-dasharray="4"/>
  <text x="370" y="150" text-anchor="middle" class="label-sm" style="fill:#666">HEAD</text>
  <text x="370" y="165" text-anchor="middle" class="label-sm" style="fill:#666">dummy</text>

  <!-- DLL arrows -->
  <line x1="400" y1="148" x2="430" y2="148" stroke="#34d399" stroke-width="1.5"/>
  <line x1="430" y1="162" x2="400" y2="162" stroke="#f87171" stroke-width="1.5"/>

  <!-- Node C (MRU) -->
  <rect x="430" y="120" width="90" height="68" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="1.5"/>
  <text x="475" y="140" text-anchor="middle" class="label" style="fill:#34d399;font-weight:bold">Node C</text>
  <text x="475" y="155" text-anchor="middle" class="label-sm">key:3 val:C</text>
  <text x="475" y="170" text-anchor="middle" class="label-sm" style="fill:#fbbf24">← MRU</text>

  <!-- DLL arrows -->
  <line x1="520" y1="148" x2="550" y2="148" stroke="#34d399" stroke-width="1.5"/>
  <line x1="550" y1="162" x2="520" y2="162" stroke="#f87171" stroke-width="1.5"/>

  <!-- Node A -->
  <rect x="550" y="120" width="90" height="68" rx="6" fill="#1a1a2e" stroke="#5b6abf" stroke-width="1"/>
  <text x="595" y="140" text-anchor="middle" class="label" style="fill:#5b6abf">Node A</text>
  <text x="595" y="155" text-anchor="middle" class="label-sm">key:1 val:A</text>

  <!-- DLL arrows -->
  <line x1="640" y1="148" x2="670" y2="148" stroke="#34d399" stroke-width="1.5"/>
  <line x1="670" y1="162" x2="640" y2="162" stroke="#f87171" stroke-width="1.5"/>

  <!-- Node E (LRU) -->
  <rect x="670" y="120" width="90" height="68" rx="6" fill="#2e1a1a" stroke="#f87171" stroke-width="1.5"/>
  <text x="715" y="140" text-anchor="middle" class="label" style="fill:#f87171;font-weight:bold">Node E</text>
  <text x="715" y="155" text-anchor="middle" class="label-sm">key:5 val:E</text>
  <text x="715" y="170" text-anchor="middle" class="label-sm" style="fill:#f87171">← LRU</text>

  <!-- DLL arrows -->
  <line x1="760" y1="148" x2="790" y2="148" stroke="#34d399" stroke-width="1.5"/>
  <line x1="790" y1="162" x2="760" y2="162" stroke="#f87171" stroke-width="1.5"/>

  <!-- Tail dummy -->
  <rect x="790" y="130" width="60" height="50" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1" stroke-dasharray="4"/>
  <text x="820" y="150" text-anchor="middle" class="label-sm" style="fill:#666">TAIL</text>
  <text x="820" y="165" text-anchor="middle" class="label-sm" style="fill:#666">dummy</text>

  <text x="595" y="240" text-anchor="middle" class="label-sm">O(1) move to head (mark as recent)</text>
  <text x="595" y="255" text-anchor="middle" class="label-sm">O(1) remove from tail (evict LRU)</text>

  <!-- Operations Section -->
  <rect x="30" y="290" width="840" height="100" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="450" y="312" text-anchor="middle" class="label" style="fill:#fbbf24;font-weight:bold">Operations</text>

  <!-- get(key) -->
  <rect x="50" y="325" width="240" height="50" rx="6" fill="#1a1a2e" stroke="#5b6abf" stroke-width="1"/>
  <text x="170" y="343" text-anchor="middle" class="label" style="fill:#5b6abf">get(key)</text>
  <text x="170" y="358" text-anchor="middle" class="label-sm">map.get → moveToHead → O(1)</text>

  <!-- put(key, val) -->
  <rect x="310" y="325" width="290" height="50" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="1"/>
  <text x="455" y="343" text-anchor="middle" class="label" style="fill:#34d399">put(key, val)</text>
  <text x="455" y="358" text-anchor="middle" class="label-sm">map.set + addToHead + evict if full → O(1)</text>

  <!-- evict -->
  <rect x="620" y="325" width="230" height="50" rx="6" fill="#2e1a1a" stroke="#f87171" stroke-width="1"/>
  <text x="735" y="343" text-anchor="middle" class="label" style="fill:#f87171">evict (capacity full)</text>
  <text x="735" y="358" text-anchor="middle" class="label-sm">removeTail + map.delete → O(1)</text>

  <!-- Other Design Patterns Summary -->
  <rect x="30" y="410" width="840" height="100" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="450" y="432" text-anchor="middle" class="label" style="fill:#a78bfa;font-weight:bold">Common Design Compositions</text>

  <text x="50" y="452" class="label-sm" style="fill:#34d399">ArrayList + HashMap</text>
  <text x="50" y="466" class="label-sm">→ Insert/Delete/GetRandom O(1)</text>

  <text x="270" y="452" class="label-sm" style="fill:#fbbf24">Two Stacks</text>
  <text x="270" y="466" class="label-sm">→ Min Stack, Queue from Stacks</text>

  <text x="460" y="452" class="label-sm" style="fill:#f87171">HashMap + Two Heaps</text>
  <text x="460" y="466" class="label-sm">→ Median Stream, Stock Price</text>

  <text x="700" y="452" class="label-sm" style="fill:#5b6abf">Circular Buffer</text>
  <text x="700" y="466" class="label-sm">→ Queue, Deque, Moving Avg</text>

  <text x="50" y="488" class="label-sm" style="fill:#a78bfa">HashMap + Freq DLLs</text>
  <text x="50" y="502" class="label-sm">→ LFU Cache, All O'one</text>

  <text x="270" y="488" class="label-sm" style="fill:#34d399">HashMap + Binary Search</text>
  <text x="270" y="502" class="label-sm">→ TimeMap, Snapshot Array</text>

  <text x="460" y="488" class="label-sm" style="fill:#fbbf24">Prefix Products</text>
  <text x="460" y="502" class="label-sm">→ Product of Last K</text>

  <text x="700" y="488" class="label-sm" style="fill:#f87171">Lazy Increment Array</text>
  <text x="700" y="502" class="label-sm">→ Stack with Increment O(1)</text>
</svg>
