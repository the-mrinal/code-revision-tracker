<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="16" font-weight="bold">Fibonacci Style DP Pattern</text>
  <text x="450" y="50" text-anchor="middle" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="11">Overlapping Subproblems + Optimal Substructure</text>

  <!-- ===== LEFT: Recursion Tree ===== -->
  <text x="250" y="78" text-anchor="middle" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold">Naive Recursion Tree for f(5)</text>

  <!-- Tree edges (drawn first, behind nodes) -->
  <!-- f(5) -> f(4) -->
  <line x1="250" y1="105" x2="155" y2="145" stroke="#333" stroke-width="1.5"/>
  <!-- f(5) -> f(3) -->
  <line x1="250" y1="105" x2="345" y2="145" stroke="#333" stroke-width="1.5"/>
  <!-- f(4) -> f(3) -->
  <line x1="155" y1="165" x2="100" y2="205" stroke="#333" stroke-width="1.5"/>
  <!-- f(4) -> f(2) -->
  <line x1="155" y1="165" x2="210" y2="205" stroke="#333" stroke-width="1.5"/>
  <!-- f(3) right -> f(2) -->
  <line x1="345" y1="165" x2="305" y2="205" stroke="#333" stroke-width="1.5"/>
  <!-- f(3) right -> f(1) -->
  <line x1="345" y1="165" x2="390" y2="205" stroke="#333" stroke-width="1.5"/>
  <!-- f(3) left -> f(2) -->
  <line x1="100" y1="225" x2="60" y2="265" stroke="#333" stroke-width="1.5"/>
  <!-- f(3) left -> f(1) -->
  <line x1="100" y1="225" x2="140" y2="265" stroke="#333" stroke-width="1.5"/>
  <!-- f(2) center -> f(1) -->
  <line x1="210" y1="225" x2="185" y2="265" stroke="#333" stroke-width="1.5"/>
  <!-- f(2) center -> f(0) -->
  <line x1="210" y1="225" x2="235" y2="265" stroke="#333" stroke-width="1.5"/>
  <!-- f(2) right -> f(1) -->
  <line x1="305" y1="225" x2="280" y2="265" stroke="#333" stroke-width="1.5"/>
  <!-- f(2) right -> f(0) -->
  <line x1="305" y1="225" x2="330" y2="265" stroke="#333" stroke-width="1.5"/>
  <!-- f(2) leftmost -> f(1) -->
  <line x1="60" y1="285" x2="40" y2="315" stroke="#333" stroke-width="1.5"/>
  <!-- f(2) leftmost -> f(0) -->
  <line x1="60" y1="285" x2="80" y2="315" stroke="#333" stroke-width="1.5"/>

  <!-- Level 0: f(5) -->
  <rect x="222" y="88" width="56" height="24" rx="6" fill="#111" stroke="#5b6abf" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="250" y="104" text-anchor="middle" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold">f(5)</text>

  <!-- Level 1: f(4), f(3) -->
  <rect x="127" y="148" width="56" height="24" rx="6" fill="#111" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="155" y="164" text-anchor="middle" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="12">f(4)</text>

  <rect x="317" y="148" width="56" height="24" rx="6" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="345" y="164" text-anchor="middle" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="12">f(3)</text>

  <!-- Level 2: f(3), f(2), f(2), f(1) -->
  <rect x="72" y="208" width="56" height="24" rx="6" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="100" y="224" text-anchor="middle" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="12">f(3)</text>

  <rect x="182" y="208" width="56" height="24" rx="6" fill="#111" stroke="#f87171" stroke-width="1.5"/>
  <text x="210" y="224" text-anchor="middle" fill="#f87171" font-family="SF Mono, Menlo, monospace" font-size="12">f(2)</text>

  <rect x="277" y="208" width="56" height="24" rx="6" fill="#111" stroke="#f87171" stroke-width="1.5"/>
  <text x="305" y="224" text-anchor="middle" fill="#f87171" font-family="SF Mono, Menlo, monospace" font-size="12">f(2)</text>

  <rect x="362" y="208" width="56" height="24" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="390" y="224" text-anchor="middle" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="12">f(1)</text>

  <!-- Level 3: f(2), f(1), f(1), f(0), f(1), f(0) -->
  <rect x="32" y="268" width="56" height="24" rx="6" fill="#111" stroke="#f87171" stroke-width="1.5"/>
  <text x="60" y="284" text-anchor="middle" fill="#f87171" font-family="SF Mono, Menlo, monospace" font-size="12">f(2)</text>

  <rect x="112" y="268" width="56" height="24" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="140" y="284" text-anchor="middle" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="12">f(1)</text>

  <rect x="157" y="268" width="56" height="24" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="185" y="284" text-anchor="middle" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="12">f(1)</text>

  <rect x="207" y="268" width="56" height="24" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="235" y="284" text-anchor="middle" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="12">f(0)</text>

  <rect x="252" y="268" width="56" height="24" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="280" y="284" text-anchor="middle" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="12">f(1)</text>

  <rect x="302" y="268" width="56" height="24" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="330" y="284" text-anchor="middle" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="12">f(0)</text>

  <!-- Level 4: f(1), f(0) from leftmost f(2) -->
  <rect x="12" y="318" width="56" height="24" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="40" y="334" text-anchor="middle" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="12">f(1)</text>

  <rect x="52" y="318" width="56" height="24" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="80" y="334" text-anchor="middle" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="12">f(0)</text>

  <!-- Duplicate annotation -->
  <text x="250" y="365" text-anchor="middle" fill="#f87171" font-family="SF Mono, Menlo, monospace" font-size="10">f(3) computed 2x, f(2) computed 3x</text>
  <text x="250" y="380" text-anchor="middle" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="10">Time: O(2^n) -- exponential waste!</text>

  <!-- ===== RIGHT: Bottom-Up Optimization ===== -->
  <rect x="490" y="68" width="395" height="295" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="688" y="90" text-anchor="middle" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold">Bottom-Up (Tabulation)</text>

  <!-- DP array visualization -->
  <text x="510" y="118" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">idx:</text>
  <text x="510" y="140" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">dp:</text>

  <!-- Index row -->
  <g font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="middle" fill="#666">
    <text x="570" y="118">0</text>
    <text x="620" y="118">1</text>
    <text x="670" y="118">2</text>
    <text x="720" y="118">3</text>
    <text x="770" y="118">4</text>
    <text x="820" y="118">5</text>
  </g>

  <!-- DP value cells -->
  <rect x="548" y="126" width="44" height="24" rx="4" fill="#1a1a2e" stroke="#333"/>
  <text x="570" y="142" text-anchor="middle" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="12">0</text>

  <rect x="598" y="126" width="44" height="24" rx="4" fill="#1a1a2e" stroke="#333"/>
  <text x="620" y="142" text-anchor="middle" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="12">1</text>

  <rect x="648" y="126" width="44" height="24" rx="4" fill="#1a1a2e" stroke="#333"/>
  <text x="670" y="142" text-anchor="middle" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="12">1</text>

  <rect x="698" y="126" width="44" height="24" rx="4" fill="#1a1a2e" stroke="#5b6abf"/>
  <text x="720" y="142" text-anchor="middle" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="12">2</text>

  <rect x="748" y="126" width="44" height="24" rx="4" fill="#1a1a2e" stroke="#5b6abf"/>
  <text x="770" y="142" text-anchor="middle" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="12">3</text>

  <rect x="798" y="126" width="44" height="24" rx="4" fill="#1a2e1a" stroke="#34d399"/>
  <text x="820" y="142" text-anchor="middle" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold">5</text>

  <!-- Arrows showing dp[i] = dp[i-1] + dp[i-2] -->
  <path d="M720,152 Q720,168 770,152" fill="none" stroke="#5b6abf" stroke-width="1" marker-end="url(#arrowBlue)"/>
  <path d="M670,152 Q695,175 770,152" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="720" y="178" text-anchor="middle" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="9">dp[i] = dp[i-1] + dp[i-2]</text>

  <!-- Space optimization section -->
  <text x="688" y="210" text-anchor="middle" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold">Space-Optimized Version</text>

  <!-- Code block -->
  <rect x="520" y="220" width="336" height="110" rx="6" fill="#0a0a0a" stroke="#222"/>
  <g font-family="SF Mono, Menlo, monospace" font-size="10" fill="#ccc">
    <text x="530" y="238" fill="#a78bfa">def</text><text x="554" y="238" fill="#5b6abf"> fib</text><text x="578" y="238">(n):</text>
    <text x="540" y="254" fill="#888">if</text><text x="556" y="254"> n &lt;= 1: </text><text x="620" y="254" fill="#888">return</text><text x="660" y="254"> n</text>
    <text x="540" y="270">prev2, prev1 = </text><text x="668" y="270" fill="#fbbf24">0</text><text x="678" y="270">, </text><text x="688" y="270" fill="#fbbf24">1</text>
    <text x="540" y="286" fill="#888">for</text><text x="564" y="286"> i </text><text x="580" y="286" fill="#888">in</text><text x="596" y="286"> range(2, n+1):</text>
    <text x="556" y="302">prev2, prev1 = prev1, prev2+prev1</text>
    <text x="540" y="318" fill="#888">return</text><text x="580" y="318"> prev1</text>
  </g>

  <!-- Arrows showing variable rotation -->
  <text x="688" y="348" text-anchor="middle" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10">Only 2 variables needed -- no array!</text>

  <!-- ===== Legend ===== -->
  <rect x="15" y="395" width="450" height="110" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="240" y="415" text-anchor="middle" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold">Legend</text>

  <rect x="30" y="425" width="12" height="12" rx="2" fill="#111" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="50" y="435" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">Unique computation</text>

  <rect x="30" y="445" width="12" height="12" rx="2" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="50" y="455" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">Duplicate (2x)</text>

  <rect x="30" y="465" width="12" height="12" rx="2" fill="#111" stroke="#f87171" stroke-width="1.5"/>
  <text x="50" y="475" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">Duplicate (3x)</text>

  <rect x="250" y="425" width="12" height="12" rx="2" fill="#111" stroke="#34d399" stroke-width="1.5"/>
  <text x="270" y="435" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">Final answer</text>

  <rect x="250" y="445" width="12" height="12" rx="2" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="270" y="455" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">Base case (f(0)=0, f(1)=1)</text>

  <!-- Key info box -->
  <rect x="490" y="395" width="395" height="110" rx="8" fill="#111" stroke="#5b6abf" stroke-width="1"/>
  <text x="688" y="418" text-anchor="middle" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold">Key Insight</text>
  <text x="505" y="440" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">Time:  O(n) -- linear scan</text>
  <text x="505" y="458" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10">Space: O(1) with two variables</text>
  <text x="505" y="476" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">Pattern: When dp[i] depends only on</text>
  <text x="505" y="492" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">dp[i-1] and dp[i-2], drop the array.</text>
</svg>