<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'SF Mono', Menlo, monospace">
  <rect width="900" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#5b6abf" font-size="18" font-weight="bold">Longest Increasing Subsequence</text>
  <text x="450" y="56" text-anchor="middle" fill="#666" font-size="11">O(n log n) with tails array + binary search | nums = [10, 9, 2, 5, 3, 7, 101, 18]</text>

  <!-- Input array -->
  <g transform="translate(40,70)">
    <text x="0" y="14" fill="#888" font-size="10">Index:</text>
    <text x="80" y="14" fill="#555" font-size="10">0</text>
    <text x="132" y="14" fill="#555" font-size="10">1</text>
    <text x="184" y="14" fill="#555" font-size="10">2</text>
    <text x="236" y="14" fill="#555" font-size="10">3</text>
    <text x="288" y="14" fill="#555" font-size="10">4</text>
    <text x="340" y="14" fill="#555" font-size="10">5</text>
    <text x="392" y="14" fill="#555" font-size="10">6</text>
    <text x="444" y="14" fill="#555" font-size="10">7</text>

    <text x="0" y="38" fill="#888" font-size="10">nums:</text>
    <!-- Elements: 10,9,2,5,3,7,101,18 - LIS: 2,3,7,101 or 2,3,7,18 or 2,5,7,101 etc -->
    <rect x="66" y="22" width="40" height="26" rx="6" fill="#111" stroke="#222"/>
    <text x="86" y="40" text-anchor="middle" fill="#888" font-size="12">10</text>

    <rect x="118" y="22" width="40" height="26" rx="6" fill="#111" stroke="#222"/>
    <text x="138" y="40" text-anchor="middle" fill="#888" font-size="12">9</text>

    <rect x="170" y="22" width="40" height="26" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="1.5"/>
    <text x="190" y="40" text-anchor="middle" fill="#34d399" font-size="12" font-weight="bold">2</text>

    <rect x="222" y="22" width="40" height="26" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="1.5"/>
    <text x="242" y="40" text-anchor="middle" fill="#34d399" font-size="12" font-weight="bold">5</text>

    <rect x="274" y="22" width="40" height="26" rx="6" fill="#111" stroke="#222"/>
    <text x="294" y="40" text-anchor="middle" fill="#888" font-size="12">3</text>

    <rect x="326" y="22" width="40" height="26" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="1.5"/>
    <text x="346" y="40" text-anchor="middle" fill="#34d399" font-size="12" font-weight="bold">7</text>

    <rect x="378" y="22" width="40" height="26" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="1.5"/>
    <text x="398" y="40" text-anchor="middle" fill="#34d399" font-size="12" font-weight="bold">101</text>

    <rect x="430" y="22" width="40" height="26" rx="6" fill="#111" stroke="#222"/>
    <text x="450" y="40" text-anchor="middle" fill="#888" font-size="12">18</text>

    <text x="490" y="40" fill="#34d399" font-size="10">LIS = [2,5,7,101] len=4</text>
  </g>

  <!-- Tails array step by step -->
  <text x="40" y="125" fill="#fbbf24" font-size="11" font-weight="bold">Building tails[] (O(n log n) approach):</text>

  <g transform="translate(40,135)">
    <!-- Header -->
    <text x="0" y="14" fill="#888" font-size="9">Step</text>
    <text x="50" y="14" fill="#888" font-size="9">Process</text>
    <text x="115" y="14" fill="#888" font-size="9">Action</text>
    <text x="310" y="14" fill="#888" font-size="9">tails[]</text>

    <!-- Step 1: 10 -->
    <text x="0" y="34" fill="#555" font-size="9">1</text>
    <text x="50" y="34" fill="#e2e8f0" font-size="10">10</text>
    <text x="115" y="34" fill="#a78bfa" font-size="9">append (empty)</text>
    <rect x="300" y="22" width="32" height="20" rx="4" fill="#111" stroke="#a78bfa" stroke-width="1"/>
    <text x="316" y="37" text-anchor="middle" fill="#a78bfa" font-size="10">10</text>

    <!-- Step 2: 9 -->
    <text x="0" y="56" fill="#555" font-size="9">2</text>
    <text x="50" y="56" fill="#e2e8f0" font-size="10">9</text>
    <text x="115" y="56" fill="#fbbf24" font-size="9">replace at pos 0 (bisect: 9&lt;10)</text>
    <rect x="300" y="44" width="32" height="20" rx="4" fill="#111" stroke="#fbbf24" stroke-width="1"/>
    <text x="316" y="59" text-anchor="middle" fill="#fbbf24" font-size="10">9</text>

    <!-- Step 3: 2 -->
    <text x="0" y="78" fill="#555" font-size="9">3</text>
    <text x="50" y="78" fill="#e2e8f0" font-size="10">2</text>
    <text x="115" y="78" fill="#fbbf24" font-size="9">replace at pos 0 (bisect: 2&lt;9)</text>
    <rect x="300" y="66" width="32" height="20" rx="4" fill="#111" stroke="#fbbf24" stroke-width="1"/>
    <text x="316" y="81" text-anchor="middle" fill="#fbbf24" font-size="10">2</text>

    <!-- Step 4: 5 -->
    <text x="0" y="100" fill="#555" font-size="9">4</text>
    <text x="50" y="100" fill="#e2e8f0" font-size="10">5</text>
    <text x="115" y="100" fill="#a78bfa" font-size="9">append (5 &gt; 2)</text>
    <rect x="300" y="88" width="32" height="20" rx="4" fill="#111" stroke="#222"/>
    <text x="316" y="103" text-anchor="middle" fill="#888" font-size="10">2</text>
    <rect x="338" y="88" width="32" height="20" rx="4" fill="#111" stroke="#a78bfa" stroke-width="1"/>
    <text x="354" y="103" text-anchor="middle" fill="#a78bfa" font-size="10">5</text>

    <!-- Step 5: 3 -->
    <text x="0" y="122" fill="#555" font-size="9">5</text>
    <text x="50" y="122" fill="#e2e8f0" font-size="10">3</text>
    <text x="115" y="122" fill="#fbbf24" font-size="9">replace at pos 1 (bisect: 3&lt;5)</text>
    <rect x="300" y="110" width="32" height="20" rx="4" fill="#111" stroke="#222"/>
    <text x="316" y="125" text-anchor="middle" fill="#888" font-size="10">2</text>
    <rect x="338" y="110" width="32" height="20" rx="4" fill="#111" stroke="#fbbf24" stroke-width="1"/>
    <text x="354" y="125" text-anchor="middle" fill="#fbbf24" font-size="10">3</text>

    <!-- Step 6: 7 -->
    <text x="0" y="144" fill="#555" font-size="9">6</text>
    <text x="50" y="144" fill="#e2e8f0" font-size="10">7</text>
    <text x="115" y="144" fill="#a78bfa" font-size="9">append (7 &gt; 3)</text>
    <rect x="300" y="132" width="32" height="20" rx="4" fill="#111" stroke="#222"/>
    <text x="316" y="147" text-anchor="middle" fill="#888" font-size="10">2</text>
    <rect x="338" y="132" width="32" height="20" rx="4" fill="#111" stroke="#222"/>
    <text x="354" y="147" text-anchor="middle" fill="#888" font-size="10">3</text>
    <rect x="376" y="132" width="32" height="20" rx="4" fill="#111" stroke="#a78bfa" stroke-width="1"/>
    <text x="392" y="147" text-anchor="middle" fill="#a78bfa" font-size="10">7</text>

    <!-- Step 7: 101 -->
    <text x="0" y="166" fill="#555" font-size="9">7</text>
    <text x="50" y="166" fill="#e2e8f0" font-size="10">101</text>
    <text x="115" y="166" fill="#a78bfa" font-size="9">append (101 &gt; 7)</text>
    <rect x="300" y="154" width="32" height="20" rx="4" fill="#111" stroke="#222"/>
    <text x="316" y="169" text-anchor="middle" fill="#888" font-size="10">2</text>
    <rect x="338" y="154" width="32" height="20" rx="4" fill="#111" stroke="#222"/>
    <text x="354" y="169" text-anchor="middle" fill="#888" font-size="10">3</text>
    <rect x="376" y="154" width="32" height="20" rx="4" fill="#111" stroke="#222"/>
    <text x="392" y="169" text-anchor="middle" fill="#888" font-size="10">7</text>
    <rect x="414" y="154" width="36" height="20" rx="4" fill="#111" stroke="#a78bfa" stroke-width="1"/>
    <text x="432" y="169" text-anchor="middle" fill="#a78bfa" font-size="10">101</text>

    <!-- Step 8: 18 -->
    <text x="0" y="188" fill="#555" font-size="9">8</text>
    <text x="50" y="188" fill="#e2e8f0" font-size="10">18</text>
    <text x="115" y="188" fill="#fbbf24" font-size="9">replace at pos 3 (bisect: 18&lt;101)</text>
    <rect x="300" y="176" width="32" height="20" rx="4" fill="#1a2e1a" stroke="#34d399" stroke-width="1.5"/>
    <text x="316" y="191" text-anchor="middle" fill="#34d399" font-size="10">2</text>
    <rect x="338" y="176" width="32" height="20" rx="4" fill="#1a2e1a" stroke="#34d399" stroke-width="1.5"/>
    <text x="354" y="191" text-anchor="middle" fill="#34d399" font-size="10">3</text>
    <rect x="376" y="176" width="32" height="20" rx="4" fill="#1a2e1a" stroke="#34d399" stroke-width="1.5"/>
    <text x="392" y="191" text-anchor="middle" fill="#34d399" font-size="10">7</text>
    <rect x="414" y="176" width="36" height="20" rx="4" fill="#1a2e1a" stroke="#34d399" stroke-width="1.5"/>
    <text x="432" y="191" text-anchor="middle" fill="#34d399" font-size="10">18</text>

    <text x="460" y="191" fill="#34d399" font-size="10" font-weight="bold">len = 4</text>
  </g>

  <!-- O(n^2) DP comparison -->
  <g transform="translate(550,135)">
    <rect x="0" y="0" width="310" height="115" rx="8" fill="#111" stroke="#222"/>
    <text x="15" y="18" fill="#f87171" font-size="10" font-weight="bold">O(n^2) DP Array (for comparison)</text>
    <text x="15" y="36" fill="#888" font-size="9">dp[i] = length of LIS ending at i</text>

    <text x="15" y="56" fill="#555" font-size="9">idx:  0  1  2  3  4  5   6   7</text>
    <text x="15" y="72" fill="#555" font-size="9">num: 10  9  2  5  3  7 101  18</text>
    <text x="15" y="88" fill="#a78bfa" font-size="9">dp:   1  1  1  2  2  3   4   4</text>
    <text x="15" y="106" fill="#888" font-size="9">ans = max(dp) = 4</text>
  </g>

  <!-- Patience sorting info box -->
  <g transform="translate(550,260)">
    <rect x="0" y="0" width="310" height="90" rx="8" fill="#111" stroke="#5b6abf" stroke-width="1"/>
    <text x="15" y="18" fill="#5b6abf" font-size="10" font-weight="bold">Patience Sorting Analogy</text>
    <text x="15" y="36" fill="#e2e8f0" font-size="9">Place each card on leftmost pile</text>
    <text x="15" y="50" fill="#e2e8f0" font-size="9">where top card >= current card.</text>
    <text x="15" y="64" fill="#e2e8f0" font-size="9">If no pile works, start new pile.</text>
    <text x="15" y="82" fill="#34d399" font-size="9" font-weight="bold">Number of piles = LIS length!</text>
  </g>

  <!-- Legend and key takeaways -->
  <g transform="translate(40,365)">
    <rect x="0" y="0" width="820" height="55" rx="8" fill="#111" stroke="#222"/>
    <text x="15" y="18" fill="#888" font-size="10" font-weight="bold">Legend:</text>
    <rect x="70" y="6" width="14" height="14" rx="3" fill="#111" stroke="#a78bfa"/>
    <text x="90" y="18" fill="#888" font-size="10">Append (extend)</text>
    <rect x="200" y="6" width="14" height="14" rx="3" fill="#111" stroke="#fbbf24"/>
    <text x="220" y="18" fill="#888" font-size="10">Replace (binary search)</text>
    <rect x="370" y="6" width="14" height="14" rx="3" fill="#1a2e1a" stroke="#34d399"/>
    <text x="390" y="18" fill="#888" font-size="10">LIS elements</text>

    <text x="15" y="42" fill="#888" font-size="10">tails[i] = smallest tail element for increasing subseq of length i+1</text>
    <text x="530" y="42" fill="#888" font-size="10">Note: tails[] is NOT the actual LIS</text>
  </g>

  <!-- Complexity box -->
  <g transform="translate(40,430)">
    <rect x="0" y="0" width="820" height="75" rx="8" fill="#111" stroke="#222"/>
    <text x="15" y="18" fill="#888" font-size="10" font-weight="bold">Complexity Comparison:</text>
    <text x="15" y="38" fill="#f87171" font-size="10">O(n^2) DP:</text>
    <text x="110" y="38" fill="#888" font-size="10">For each i, check all j &lt; i. Simple but slow for large n.</text>
    <text x="15" y="56" fill="#34d399" font-size="10">O(n log n):</text>
    <text x="110" y="56" fill="#888" font-size="10">Maintain sorted tails[], binary search for position. Use bisect_left in Python.</text>
    <text x="500" y="38" fill="#888" font-size="10">Problems: LIS, Russian Doll Envelopes,</text>
    <text x="500" y="56" fill="#888" font-size="10">Longest Chain, Number of LIS</text>
  </g>
</svg>