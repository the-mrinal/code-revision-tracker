<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="'SF Mono', Menlo, monospace">
  <rect width="900" height="580" rx="12" fill="#0a0a0a"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5b6abf"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#34d399"/>
    </marker>
    <marker id="arrowYellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fbbf24"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#5b6abf" font-size="18" font-weight="bold">Stock Problems Pattern — State Machine DP</text>
  <text x="450" y="50" text-anchor="middle" fill="#666" font-size="11">prices = [7, 1, 5, 3, 6, 4] | Transition between holding/not-holding states</text>

  <!-- ===== LEFT COLUMN: State Machines ===== -->

  <!-- Basic State Machine -->
  <g transform="translate(30, 70)">
    <text x="0" y="0" fill="#fbbf24" font-size="11" font-weight="bold">Basic State Machine (1 transaction):</text>

    <!-- NOT_HOLDING state -->
    <rect x="10" y="20" width="130" height="44" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
    <text x="75" y="40" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold">NOT HOLDING</text>
    <text x="75" y="54" text-anchor="middle" fill="#555" font-size="9">cash / can buy</text>

    <!-- HOLDING state -->
    <rect x="240" y="20" width="130" height="44" rx="6" fill="#111" stroke="#5b6abf" stroke-width="1.5"/>
    <text x="305" y="40" text-anchor="middle" fill="#5b6abf" font-size="11" font-weight="bold">HOLDING</text>
    <text x="305" y="54" text-anchor="middle" fill="#555" font-size="9">stock / can sell</text>

    <!-- Buy arrow -->
    <line x1="140" y1="35" x2="240" y2="35" stroke="#5b6abf" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <text x="190" y="30" text-anchor="middle" fill="#5b6abf" font-size="9" font-weight="bold">BUY</text>

    <!-- Sell arrow -->
    <line x1="240" y1="55" x2="140" y2="55" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
    <text x="190" y="72" text-anchor="middle" fill="#34d399" font-size="9" font-weight="bold">SELL</text>

    <!-- Self loops -->
    <path d="M 40,20 Q 40,2 110,20" fill="none" stroke="#444" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="75" y="10" text-anchor="middle" fill="#444" font-size="8">rest</text>
    <path d="M 270,20 Q 270,2 340,20" fill="none" stroke="#444" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="305" y="10" text-anchor="middle" fill="#444" font-size="8">rest</text>
  </g>

  <!-- Cooldown variant -->
  <g transform="translate(30, 180)">
    <text x="0" y="0" fill="#f87171" font-size="11" font-weight="bold">Cooldown Variant (3 states):</text>

    <!-- NOT_HOLDING -->
    <rect x="10" y="18" width="120" height="40" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
    <text x="70" y="36" text-anchor="middle" fill="#34d399" font-size="10" font-weight="bold">NOT HOLDING</text>
    <text x="70" y="50" text-anchor="middle" fill="#555" font-size="8">can buy</text>

    <!-- HOLDING -->
    <rect x="230" y="18" width="120" height="40" rx="6" fill="#111" stroke="#5b6abf" stroke-width="1.5"/>
    <text x="290" y="36" text-anchor="middle" fill="#5b6abf" font-size="10" font-weight="bold">HOLDING</text>
    <text x="290" y="50" text-anchor="middle" fill="#555" font-size="8">can sell</text>

    <!-- COOLDOWN -->
    <rect x="120" y="85" width="120" height="40" rx="6" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="180" y="103" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">COOLDOWN</text>
    <text x="180" y="117" text-anchor="middle" fill="#555" font-size="8">must wait</text>

    <!-- Buy: NOT_HOLDING -> HOLDING -->
    <line x1="130" y1="32" x2="230" y2="32" stroke="#5b6abf" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <text x="180" y="27" text-anchor="middle" fill="#5b6abf" font-size="8" font-weight="bold">BUY</text>

    <!-- Sell: HOLDING -> COOLDOWN -->
    <line x1="290" y1="58" x2="240" y2="85" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
    <text x="280" y="78" fill="#34d399" font-size="8" font-weight="bold">SELL</text>

    <!-- Rest: COOLDOWN -> NOT_HOLDING -->
    <line x1="120" y1="100" x2="70" y2="58" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowYellow)"/>
    <text x="80" y="88" fill="#fbbf24" font-size="8" font-weight="bold">REST</text>
  </g>

  <!-- ===== RIGHT COLUMN: Price Timeline ===== -->

  <!-- Price timeline -->
  <g transform="translate(440, 70)">
    <text x="0" y="0" fill="#fbbf24" font-size="11" font-weight="bold">Optimal for unlimited transactions:</text>

    <g transform="translate(0, 16)">
      <!-- Day 0: price=7 -->
      <rect x="0" y="10" width="44" height="56" rx="4" fill="#222"/>
      <text x="22" y="78" text-anchor="middle" fill="#888" font-size="9">d0</text>
      <text x="22" y="6" text-anchor="middle" fill="#888" font-size="10">7</text>

      <!-- Day 1: price=1 — BUY -->
      <rect x="56" y="58" width="44" height="8" rx="4" fill="#1a1a2e" stroke="#5b6abf" stroke-width="1.5"/>
      <text x="78" y="78" text-anchor="middle" fill="#5b6abf" font-size="9" font-weight="bold">BUY</text>
      <text x="78" y="54" text-anchor="middle" fill="#5b6abf" font-size="10">1</text>

      <!-- Day 2: price=5 — SELL -->
      <rect x="112" y="26" width="44" height="40" rx="4" fill="#1a2e1a" stroke="#34d399" stroke-width="1.5"/>
      <text x="134" y="78" text-anchor="middle" fill="#34d399" font-size="9" font-weight="bold">SELL</text>
      <text x="134" y="22" text-anchor="middle" fill="#34d399" font-size="10">5</text>
      <text x="134" y="90" text-anchor="middle" fill="#34d399" font-size="8">+4</text>

      <!-- Day 3: price=3 — BUY -->
      <rect x="168" y="42" width="44" height="24" rx="4" fill="#1a1a2e" stroke="#5b6abf" stroke-width="1.5"/>
      <text x="190" y="78" text-anchor="middle" fill="#5b6abf" font-size="9" font-weight="bold">BUY</text>
      <text x="190" y="38" text-anchor="middle" fill="#5b6abf" font-size="10">3</text>

      <!-- Day 4: price=6 — SELL -->
      <rect x="224" y="18" width="44" height="48" rx="4" fill="#1a2e1a" stroke="#34d399" stroke-width="1.5"/>
      <text x="246" y="78" text-anchor="middle" fill="#34d399" font-size="9" font-weight="bold">SELL</text>
      <text x="246" y="14" text-anchor="middle" fill="#34d399" font-size="10">6</text>
      <text x="246" y="90" text-anchor="middle" fill="#34d399" font-size="8">+3</text>

      <!-- Day 5: price=4 -->
      <rect x="280" y="34" width="44" height="32" rx="4" fill="#222"/>
      <text x="302" y="78" text-anchor="middle" fill="#888" font-size="9">d5</text>
      <text x="302" y="30" text-anchor="middle" fill="#888" font-size="10">4</text>

      <text x="350" y="50" fill="#34d399" font-size="14" font-weight="bold">= 7</text>
    </g>
  </g>

  <!-- State Transition Equations -->
  <g transform="translate(440, 190)">
    <rect x="0" y="0" width="430" height="120" rx="8" fill="#111" stroke="#5b6abf" stroke-width="1"/>
    <text x="15" y="20" fill="#5b6abf" font-size="11" font-weight="bold">State Transition Equations</text>

    <text x="15" y="40" fill="#34d399" font-size="10" font-weight="bold">Basic (unlimited):</text>
    <text x="15" y="55" fill="#e2e8f0" font-size="9">hold[i] = max(hold[i-1], nothold[i-1] - price[i])</text>
    <text x="15" y="68" fill="#e2e8f0" font-size="9">nothold[i] = max(nothold[i-1], hold[i-1] + price[i])</text>

    <text x="15" y="88" fill="#fbbf24" font-size="10" font-weight="bold">With cooldown:</text>
    <text x="15" y="103" fill="#e2e8f0" font-size="9">hold[i] = max(hold[i-1], rest[i-1] - price[i])</text>
    <text x="15" y="115" fill="#e2e8f0" font-size="9">sold[i] = hold[i-1] + price[i]   rest[i] = max(rest[i-1], sold[i-1])</text>
  </g>

  <!-- ===== BOTTOM ROW ===== -->

  <!-- K transactions variant -->
  <g transform="translate(30, 340)">
    <rect x="0" y="0" width="410" height="90" rx="8" fill="#111" stroke="#a78bfa" stroke-width="1"/>
    <text x="15" y="18" fill="#a78bfa" font-size="11" font-weight="bold">At Most K Transactions (generalized)</text>
    <text x="15" y="38" fill="#e2e8f0" font-size="10">dp[k][0] = max(dp[k][0], dp[k][1] + price[i])</text>
    <text x="15" y="52" fill="#888" font-size="9">  not holding after k-th txn</text>
    <text x="15" y="70" fill="#e2e8f0" font-size="10">dp[k][1] = max(dp[k][1], dp[k-1][0] - price[i])</text>
    <text x="15" y="84" fill="#888" font-size="9">  holding, using k-th buy</text>
  </g>

  <!-- k >= n/2 optimization -->
  <g transform="translate(460, 340)">
    <rect x="0" y="0" width="410" height="90" rx="8" fill="#111" stroke="#fbbf24" stroke-width="1"/>
    <text x="15" y="18" fill="#fbbf24" font-size="11" font-weight="bold">k &gt;= n/2 Optimization</text>
    <text x="15" y="38" fill="#e2e8f0" font-size="10">When k &gt;= n/2, unlimited transactions are possible</text>
    <text x="15" y="54" fill="#e2e8f0" font-size="10">(can't do more than n/2 buy-sell pairs in n days).</text>
    <text x="15" y="76" fill="#34d399" font-size="10">Reduces O(nk) to O(n) greedy: sum all gains</text>
  </g>

  <!-- Problem variants legend -->
  <g transform="translate(30, 450)">
    <rect x="0" y="0" width="840" height="55" rx="8" fill="#111" stroke="#222"/>
    <text x="15" y="18" fill="#888" font-size="10" font-weight="bold">Problem Variants:</text>

    <rect x="15" y="30" width="10" height="10" rx="2" fill="#34d399"/>
    <text x="30" y="40" fill="#888" font-size="9">I: 1 txn (track min)</text>

    <rect x="180" y="30" width="10" height="10" rx="2" fill="#5b6abf"/>
    <text x="195" y="40" fill="#888" font-size="9">II: unlimited (greedy)</text>

    <rect x="360" y="30" width="10" height="10" rx="2" fill="#a78bfa"/>
    <text x="375" y="40" fill="#888" font-size="9">III: 2 txns (k=2)</text>

    <rect x="520" y="30" width="10" height="10" rx="2" fill="#fbbf24"/>
    <text x="535" y="40" fill="#888" font-size="9">IV: k txns (general)</text>

    <rect x="690" y="30" width="10" height="10" rx="2" fill="#f87171"/>
    <text x="705" y="40" fill="#888" font-size="9">Cooldown / Fee</text>
  </g>

  <!-- Footer note -->
  <text x="450" y="530" text-anchor="middle" fill="#555" font-size="9">All variants reduce to state machine DP. Space can be optimized to O(1) or O(k) since only previous day matters.</text>
</svg>