<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b6abf"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="16" font-weight="bold">Coin Change DP Pattern</text>
  <text x="450" y="50" text-anchor="middle" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="11">coins = [1, 2, 5], amount = 11 -- min coins needed</text>

  <!-- DP Table -->
  <text x="20" y="78" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold">DP Table: dp[amt] = min coins to make amt</text>

  <!-- Amount headers -->
  <g font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle" fill="#555">
    <text x="90" y="98">0</text>
    <text x="155" y="98">1</text>
    <text x="220" y="98">2</text>
    <text x="285" y="98">3</text>
    <text x="350" y="98">4</text>
    <text x="415" y="98">5</text>
    <text x="480" y="98">6</text>
    <text x="545" y="98">7</text>
    <text x="610" y="98">8</text>
    <text x="675" y="98">9</text>
    <text x="740" y="98">10</text>
    <text x="805" y="98">11</text>
  </g>

  <!-- DP cells row -->
  <!-- dp[0] = 0 -->
  <rect x="66" y="104" width="48" height="30" rx="4" fill="#1a1a2e" stroke="#5b6abf"/>
  <text x="90" y="123" text-anchor="middle" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="13" font-weight="bold">0</text>

  <!-- dp[1] = 1 -->
  <rect x="131" y="104" width="48" height="30" rx="4" fill="#1a1a1a" stroke="#333"/>
  <text x="155" y="123" text-anchor="middle" fill="#ccc" font-family="SF Mono, Menlo, monospace" font-size="13">1</text>

  <!-- dp[2] = 1 -->
  <rect x="196" y="104" width="48" height="30" rx="4" fill="#1a1a1a" stroke="#333"/>
  <text x="220" y="123" text-anchor="middle" fill="#ccc" font-family="SF Mono, Menlo, monospace" font-size="13">1</text>

  <!-- dp[3] = 2 -->
  <rect x="261" y="104" width="48" height="30" rx="4" fill="#1a1a1a" stroke="#333"/>
  <text x="285" y="123" text-anchor="middle" fill="#ccc" font-family="SF Mono, Menlo, monospace" font-size="13">2</text>

  <!-- dp[4] = 2 -->
  <rect x="326" y="104" width="48" height="30" rx="4" fill="#1a1a1a" stroke="#333"/>
  <text x="350" y="123" text-anchor="middle" fill="#ccc" font-family="SF Mono, Menlo, monospace" font-size="13">2</text>

  <!-- dp[5] = 1 -->
  <rect x="391" y="104" width="48" height="30" rx="4" fill="#1a1a1a" stroke="#fbbf24"/>
  <text x="415" y="123" text-anchor="middle" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="13">1</text>

  <!-- dp[6] = 2 -->
  <rect x="456" y="104" width="48" height="30" rx="4" fill="#1a1a1a" stroke="#333"/>
  <text x="480" y="123" text-anchor="middle" fill="#ccc" font-family="SF Mono, Menlo, monospace" font-size="13">2</text>

  <!-- dp[7] = 2 -->
  <rect x="521" y="104" width="48" height="30" rx="4" fill="#1a1a1a" stroke="#333"/>
  <text x="545" y="123" text-anchor="middle" fill="#ccc" font-family="SF Mono, Menlo, monospace" font-size="13">2</text>

  <!-- dp[8] = 3 -->
  <rect x="586" y="104" width="48" height="30" rx="4" fill="#1a1a1a" stroke="#333"/>
  <text x="610" y="123" text-anchor="middle" fill="#ccc" font-family="SF Mono, Menlo, monospace" font-size="13">3</text>

  <!-- dp[9] = 3 -->
  <rect x="651" y="104" width="48" height="30" rx="4" fill="#1a1a1a" stroke="#333"/>
  <text x="675" y="123" text-anchor="middle" fill="#ccc" font-family="SF Mono, Menlo, monospace" font-size="13">3</text>

  <!-- dp[10] = 2 -->
  <rect x="716" y="104" width="48" height="30" rx="4" fill="#1a1a1a" stroke="#333"/>
  <text x="740" y="123" text-anchor="middle" fill="#ccc" font-family="SF Mono, Menlo, monospace" font-size="13">2</text>

  <!-- dp[11] = 3 (answer) -->
  <rect x="781" y="104" width="48" height="30" rx="4" fill="#0f2a1f" stroke="#34d399" stroke-width="2"/>
  <text x="805" y="123" text-anchor="middle" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="13" font-weight="bold">3</text>

  <!-- Transition arrows showing how dp[11]=3 is computed -->
  <!-- dp[11] comes from dp[11-5]=dp[6]+1=3, dp[11-2]=dp[9]+1=4, dp[11-1]=dp[10]+1=3 -->
  <!-- Arrow: dp[6] -> dp[11] via coin 5 -->
  <path d="M480,136 C480,160 805,160 805,136" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="642" y="168" text-anchor="middle" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="9">+coin(5) = 2+1 = 3</text>

  <!-- Arrow: dp[10] -> dp[11] via coin 1 -->
  <path d="M740,136 C740,148 805,148 805,136" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowPurple)"/>
  <text x="772" y="152" text-anchor="middle" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="8">+1</text>

  <!-- Arrow: dp[9] -> dp[11] via coin 2 -->
  <path d="M675,136 C675,155 805,155 805,136" fill="none" stroke="#5b6abf" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowAccent)"/>
  <text x="740" y="162" text-anchor="middle" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="8">+2</text>

  <!-- Transition formula -->
  <rect x="20" y="182" width="860" height="32" rx="6" fill="#111" stroke="#5b6abf" stroke-width="1"/>
  <text x="450" y="202" text-anchor="middle" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="11">dp[amt] = min(dp[amt], dp[amt - coin] + 1)  for each coin in coins  |  dp[0] = 0, rest = INF</text>

  <!-- Trace for dp[5] showing why it's 1 -->
  <rect x="20" y="224" width="420" height="145" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="230" y="246" text-anchor="middle" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold">Trace: Building dp[5]</text>

  <g font-family="SF Mono, Menlo, monospace" font-size="10">
    <text x="35" y="268" fill="#888">Try coin=1: dp[5-1]+1 = dp[4]+1 = 3</text>
    <text x="35" y="288" fill="#888">Try coin=2: dp[5-2]+1 = dp[3]+1 = 3</text>
    <text x="35" y="308" fill="#34d399">Try coin=5: dp[5-5]+1 = dp[0]+1 = 1</text>
    <text x="340" y="308" fill="#34d399" font-weight="bold">BEST</text>
    <text x="35" y="332" fill="#a78bfa">dp[5] = min(3, 3, 1) = 1</text>
    <text x="35" y="352" fill="#555">One coin of 5 makes amount 5</text>
  </g>

  <!-- Trace for dp[11] -->
  <rect x="460" y="224" width="420" height="145" rx="8" fill="#111" stroke="#34d399" stroke-width="1"/>
  <text x="670" y="246" text-anchor="middle" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold">Trace: Building dp[11] (Answer)</text>

  <g font-family="SF Mono, Menlo, monospace" font-size="10">
    <text x="475" y="268" fill="#888">Try coin=1: dp[11-1]+1 = dp[10]+1 = 3</text>
    <text x="475" y="288" fill="#888">Try coin=2: dp[11-2]+1 = dp[9]+1 = 4</text>
    <text x="475" y="308" fill="#34d399">Try coin=5: dp[11-5]+1 = dp[6]+1 = 3</text>
    <text x="785" y="308" fill="#34d399" font-weight="bold">TIE</text>
    <text x="475" y="332" fill="#a78bfa">dp[11] = min(3, 4, 3) = 3</text>
    <text x="475" y="352" fill="#555">Coins used: 5 + 5 + 1 = 11</text>
  </g>

  <!-- Loop order info box -->
  <rect x="20" y="384" width="860" height="120" rx="8" fill="#111" stroke="#a78bfa" stroke-width="1"/>
  <text x="450" y="408" text-anchor="middle" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold">Combinations vs Permutations: Loop Order Matters!</text>

  <!-- Two columns -->
  <rect x="35" y="418" width="400" height="74" rx="6" fill="#0a0a0a" stroke="#222"/>
  <text x="235" y="436" text-anchor="middle" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10" font-weight="bold">Combinations (unique sets)</text>
  <g font-family="SF Mono, Menlo, monospace" font-size="10" fill="#ccc">
    <text x="50" y="454" fill="#fbbf24">for</text><text x="74" y="454"> coin </text><text x="106" y="454" fill="#fbbf24">in</text><text x="122" y="454"> coins:        </text><text x="240" y="454" fill="#555"># outer</text>
    <text x="66" y="470" fill="#fbbf24">for</text><text x="90" y="470"> amt </text><text x="118" y="470" fill="#fbbf24">in</text><text x="134" y="470"> range(coin, n+1):</text><text x="290" y="470" fill="#555"># inner</text>
    <text x="82" y="486">dp[amt] += dp[amt - coin]</text>
  </g>

  <rect x="455" y="418" width="410" height="74" rx="6" fill="#0a0a0a" stroke="#222"/>
  <text x="660" y="436" text-anchor="middle" fill="#f87171" font-family="SF Mono, Menlo, monospace" font-size="10" font-weight="bold">Permutations (order matters)</text>
  <g font-family="SF Mono, Menlo, monospace" font-size="10" fill="#ccc">
    <text x="470" y="454" fill="#fbbf24">for</text><text x="494" y="454"> amt </text><text x="522" y="454" fill="#fbbf24">in</text><text x="538" y="454"> range(1, n+1):  </text><text x="690" y="454" fill="#555"># outer</text>
    <text x="486" y="470" fill="#fbbf24">for</text><text x="510" y="470"> coin </text><text x="542" y="470" fill="#fbbf24">in</text><text x="558" y="470"> coins:           </text><text x="690" y="470" fill="#555"># inner</text>
    <text x="502" y="486">dp[amt] += dp[amt - coin]</text>
  </g>
</svg>