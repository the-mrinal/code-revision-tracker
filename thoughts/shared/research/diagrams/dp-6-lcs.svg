<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'SF Mono','Menlo',monospace">
  <defs>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#34d399"/>
    </marker>
    <marker id="arrowY" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#fbbf24"/>
    </marker>
    <marker id="arrowB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#5b6abf"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#5b6abf" font-size="18" font-weight="bold">Longest Common Subsequence — 2D DP</text>
  <text x="450" y="58" text-anchor="middle" fill="#666" font-size="12">text1 = "abcde", text2 = "ace" → LCS = "ace", length = 3</text>

  <!-- DP Table -->
  <g transform="translate(120, 80)">
    <!-- Column headers: "", a, c, e -->
    <text x="40" y="20" text-anchor="middle" fill="#555" font-size="11">""</text>
    <text x="100" y="20" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">a</text>
    <text x="160" y="20" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">c</text>
    <text x="220" y="20" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">e</text>

    <!-- Row headers: "", a, b, c, d, e -->
    <text x="-20" y="58" text-anchor="middle" fill="#555" font-size="11">""</text>
    <text x="-20" y="118" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">a</text>
    <text x="-20" y="178" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">b</text>
    <text x="-20" y="238" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">c</text>
    <text x="-20" y="298" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">d</text>
    <text x="-20" y="358" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">e</text>

    <!-- Row 0: 0 0 0 0 -->
    <rect x="10" y="32" width="55" height="46" rx="6" fill="#111" stroke="#222"/>
    <text x="37" y="60" text-anchor="middle" fill="#555" font-size="14">0</text>
    <rect x="70" y="32" width="55" height="46" rx="6" fill="#111" stroke="#222"/>
    <text x="97" y="60" text-anchor="middle" fill="#555" font-size="14">0</text>
    <rect x="130" y="32" width="55" height="46" rx="6" fill="#111" stroke="#222"/>
    <text x="157" y="60" text-anchor="middle" fill="#555" font-size="14">0</text>
    <rect x="190" y="32" width="55" height="46" rx="6" fill="#111" stroke="#222"/>
    <text x="217" y="60" text-anchor="middle" fill="#555" font-size="14">0</text>

    <!-- Row 1 (a): 0 1 1 1 -->
    <rect x="10" y="92" width="55" height="46" rx="6" fill="#111" stroke="#222"/>
    <text x="37" y="120" text-anchor="middle" fill="#555" font-size="14">0</text>
    <!-- Match a=a diagonal -->
    <rect x="70" y="92" width="55" height="46" rx="6" fill="#0f2a1f" stroke="#34d399" stroke-width="2"/>
    <text x="97" y="120" text-anchor="middle" fill="#34d399" font-size="14" font-weight="bold">1</text>
    <rect x="130" y="92" width="55" height="46" rx="6" fill="#111" stroke="#222"/>
    <text x="157" y="120" text-anchor="middle" fill="#888" font-size="14">1</text>
    <rect x="190" y="92" width="55" height="46" rx="6" fill="#111" stroke="#222"/>
    <text x="217" y="120" text-anchor="middle" fill="#888" font-size="14">1</text>

    <!-- Row 2 (b): 0 1 1 1 -->
    <rect x="10" y="152" width="55" height="46" rx="6" fill="#111" stroke="#222"/>
    <text x="37" y="180" text-anchor="middle" fill="#555" font-size="14">0</text>
    <rect x="70" y="152" width="55" height="46" rx="6" fill="#111" stroke="#222"/>
    <text x="97" y="180" text-anchor="middle" fill="#888" font-size="14">1</text>
    <rect x="130" y="152" width="55" height="46" rx="6" fill="#111" stroke="#222"/>
    <text x="157" y="180" text-anchor="middle" fill="#888" font-size="14">1</text>
    <rect x="190" y="152" width="55" height="46" rx="6" fill="#111" stroke="#222"/>
    <text x="217" y="180" text-anchor="middle" fill="#888" font-size="14">1</text>

    <!-- Row 3 (c): 0 1 2 2 -->
    <rect x="10" y="212" width="55" height="46" rx="6" fill="#111" stroke="#222"/>
    <text x="37" y="240" text-anchor="middle" fill="#555" font-size="14">0</text>
    <rect x="70" y="212" width="55" height="46" rx="6" fill="#111" stroke="#222"/>
    <text x="97" y="240" text-anchor="middle" fill="#888" font-size="14">1</text>
    <!-- Match c=c diagonal -->
    <rect x="130" y="212" width="55" height="46" rx="6" fill="#0f2a1f" stroke="#34d399" stroke-width="2"/>
    <text x="157" y="240" text-anchor="middle" fill="#34d399" font-size="14" font-weight="bold">2</text>
    <rect x="190" y="212" width="55" height="46" rx="6" fill="#111" stroke="#222"/>
    <text x="217" y="240" text-anchor="middle" fill="#888" font-size="14">2</text>

    <!-- Row 4 (d): 0 1 2 2 -->
    <rect x="10" y="272" width="55" height="46" rx="6" fill="#111" stroke="#222"/>
    <text x="37" y="300" text-anchor="middle" fill="#555" font-size="14">0</text>
    <rect x="70" y="272" width="55" height="46" rx="6" fill="#111" stroke="#222"/>
    <text x="97" y="300" text-anchor="middle" fill="#888" font-size="14">1</text>
    <rect x="130" y="272" width="55" height="46" rx="6" fill="#111" stroke="#222"/>
    <text x="157" y="300" text-anchor="middle" fill="#888" font-size="14">2</text>
    <rect x="190" y="272" width="55" height="46" rx="6" fill="#111" stroke="#222"/>
    <text x="217" y="300" text-anchor="middle" fill="#888" font-size="14">2</text>

    <!-- Row 5 (e): 0 1 2 3 -->
    <rect x="10" y="332" width="55" height="46" rx="6" fill="#111" stroke="#222"/>
    <text x="37" y="360" text-anchor="middle" fill="#555" font-size="14">0</text>
    <rect x="70" y="332" width="55" height="46" rx="6" fill="#111" stroke="#222"/>
    <text x="97" y="360" text-anchor="middle" fill="#888" font-size="14">1</text>
    <rect x="130" y="332" width="55" height="46" rx="6" fill="#111" stroke="#222"/>
    <text x="157" y="360" text-anchor="middle" fill="#888" font-size="14">2</text>
    <!-- Match e=e diagonal, final answer -->
    <rect x="190" y="332" width="55" height="46" rx="6" fill="#0f2a1f" stroke="#34d399" stroke-width="2.5"/>
    <text x="217" y="360" text-anchor="middle" fill="#34d399" font-size="16" font-weight="bold">3</text>

    <!-- LCS traceback path arrows (green diagonals for matches) -->
    <!-- (1,1) -> (3,2) via down steps, then diagonal -->
    <!-- Traceback: (5,3) -> (3,2) -> (1,1) -> (0,0) -->
    <!-- Diagonal arrow: (0,0) diag to (1,1) match 'a' -->
    <line x1="52" y1="78" x2="82" y2="98" stroke="#34d399" stroke-width="2.5" marker-end="url(#arrowG)"/>
    <!-- Down from (1,1) to (2,1) no match -->
    <line x1="97" y1="140" x2="97" y2="156" stroke="#555" stroke-width="1.5" stroke-dasharray="3,3"/>
    <!-- Diagonal arrow: (2,1) diag to (3,2) match 'c' -->
    <line x1="112" y1="198" x2="142" y2="218" stroke="#34d399" stroke-width="2.5" marker-end="url(#arrowG)"/>
    <!-- Down from (3,2) to (4,2) no match -->
    <line x1="157" y1="260" x2="157" y2="276" stroke="#555" stroke-width="1.5" stroke-dasharray="3,3"/>
    <!-- Diagonal arrow: (4,2) diag to (5,3) match 'e' -->
    <line x1="172" y1="318" x2="202" y2="338" stroke="#34d399" stroke-width="2.5" marker-end="url(#arrowG)"/>
  </g>

  <!-- Rules box -->
  <g transform="translate(420, 90)">
    <rect x="0" y="0" width="440" height="130" rx="8" fill="#111" stroke="#222"/>
    <text x="20" y="24" fill="#5b6abf" font-size="13" font-weight="bold">Recurrence Relation</text>

    <text x="20" y="50" fill="#fbbf24" font-size="12">If text1[i] == text2[j]:</text>
    <text x="30" y="68" fill="#34d399" font-size="12">dp[i][j] = dp[i-1][j-1] + 1</text>
    <text x="280" y="68" fill="#555" font-size="11">(diagonal + 1)</text>

    <text x="20" y="92" fill="#fbbf24" font-size="12">If text1[i] != text2[j]:</text>
    <text x="30" y="110" fill="#a78bfa" font-size="12">dp[i][j] = max(dp[i-1][j], dp[i][j-1])</text>
    <text x="340" y="110" fill="#555" font-size="11">(max of up, left)</text>
  </g>

  <!-- Visual arrows showing match vs no-match -->
  <g transform="translate(420, 240)">
    <rect x="0" y="0" width="210" height="140" rx="8" fill="#111" stroke="#222"/>
    <text x="15" y="22" fill="#5b6abf" font-size="11" font-weight="bold">Match (diagonal + 1)</text>

    <!-- 2x2 mini grid -->
    <rect x="30" y="38" width="40" height="30" rx="4" fill="#1a1a1a" stroke="#333"/>
    <text x="50" y="58" text-anchor="middle" fill="#888" font-size="11">k</text>
    <rect x="75" y="38" width="40" height="30" rx="4" fill="#1a1a1a" stroke="#333"/>
    <rect x="30" y="72" width="40" height="30" rx="4" fill="#1a1a1a" stroke="#333"/>
    <rect x="75" y="72" width="40" height="30" rx="4" fill="#0f2a1f" stroke="#34d399"/>
    <text x="95" y="92" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold">k+1</text>
    <line x1="62" y1="62" x2="82" y2="78" stroke="#34d399" stroke-width="2" marker-end="url(#arrowG)"/>

    <text x="130" y="70" fill="#34d399" font-size="22">&#x2714;</text>
    <text x="130" y="95" fill="#888" font-size="10">chars match</text>
  </g>

  <g transform="translate(640, 240)">
    <rect x="0" y="0" width="220" height="140" rx="8" fill="#111" stroke="#222"/>
    <text x="15" y="22" fill="#5b6abf" font-size="11" font-weight="bold">No Match (max of neighbors)</text>

    <!-- 2x2 mini grid -->
    <rect x="30" y="38" width="40" height="30" rx="4" fill="#1a1a1a" stroke="#333"/>
    <rect x="75" y="38" width="40" height="30" rx="4" fill="#1a1530" stroke="#a78bfa"/>
    <text x="95" y="58" text-anchor="middle" fill="#a78bfa" font-size="11">x</text>
    <rect x="30" y="72" width="40" height="30" rx="4" fill="#1a1530" stroke="#a78bfa"/>
    <text x="50" y="92" text-anchor="middle" fill="#a78bfa" font-size="11">y</text>
    <rect x="75" y="72" width="40" height="30" rx="4" fill="#1a1a1a" stroke="#fbbf24"/>
    <text x="95" y="90" text-anchor="middle" fill="#fbbf24" font-size="10">max</text>
    <text x="95" y="100" text-anchor="middle" fill="#fbbf24" font-size="9">(x,y)</text>
    <!-- arrows -->
    <line x1="95" y1="70" x2="95" y2="76" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowB)"/>
    <line x1="72" y1="87" x2="78" y2="87" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowB)"/>

    <text x="135" y="70" fill="#f87171" font-size="22">&#x2718;</text>
    <text x="135" y="95" fill="#888" font-size="10">chars differ</text>
  </g>

  <!-- Legend and complexity -->
  <g transform="translate(420, 400)">
    <rect x="0" y="0" width="440" height="100" rx="8" fill="#111" stroke="#222"/>
    <text x="20" y="22" fill="#888" font-size="11" font-weight="bold">Legend</text>
    <rect x="20" y="32" width="14" height="14" rx="2" fill="#0f2a1f" stroke="#34d399"/>
    <text x="40" y="44" fill="#ccc" font-size="10">Diagonal match (char in LCS)</text>
    <line x1="20" y1="58" x2="46" y2="58" stroke="#34d399" stroke-width="2.5"/>
    <text x="52" y="62" fill="#ccc" font-size="10">LCS traceback path</text>
    <line x1="200" y1="58" x2="226" y2="58" stroke="#555" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="232" y="62" fill="#ccc" font-size="10">Skip (no match, move down)</text>

    <text x="20" y="82" fill="#5b6abf" font-size="11" font-weight="bold">Complexity:</text>
    <text x="130" y="82" fill="#888" font-size="10">Time O(m*n)  Space O(m*n), optimizable to O(min(m,n))</text>
  </g>
</svg>