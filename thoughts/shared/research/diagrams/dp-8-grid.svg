<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'SF Mono','Menlo',monospace">
  <defs>
    <marker id="pathArrow1" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#5b6abf"/>
    </marker>
    <marker id="pathArrow2" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#a78bfa"/>
    </marker>
    <marker id="pathArrow3" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#fbbf24"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#5b6abf" font-size="18" font-weight="bold">Unique Paths — Grid DP</text>
  <text x="450" y="55" text-anchor="middle" fill="#666" font-size="12">m = 3, n = 7 grid. Count paths from top-left to bottom-right (only right or down moves)</text>

  <!-- Grid -->
  <g transform="translate(80, 72)">
    <!-- Column labels -->
    <text x="30" y="-6" text-anchor="middle" fill="#555" font-size="9">j=0</text>
    <text x="90" y="-6" text-anchor="middle" fill="#555" font-size="9">j=1</text>
    <text x="150" y="-6" text-anchor="middle" fill="#555" font-size="9">j=2</text>
    <text x="210" y="-6" text-anchor="middle" fill="#555" font-size="9">j=3</text>
    <text x="270" y="-6" text-anchor="middle" fill="#555" font-size="9">j=4</text>
    <text x="330" y="-6" text-anchor="middle" fill="#555" font-size="9">j=5</text>
    <text x="390" y="-6" text-anchor="middle" fill="#555" font-size="9">j=6</text>

    <!-- Row labels -->
    <text x="-14" y="34" text-anchor="middle" fill="#555" font-size="9">i=0</text>
    <text x="-14" y="94" text-anchor="middle" fill="#555" font-size="9">i=1</text>
    <text x="-14" y="154" text-anchor="middle" fill="#555" font-size="9">i=2</text>

    <!-- Row 0: all 1s -->
    <rect x="2" y="4" width="56" height="52" rx="6" fill="#111a25" stroke="#5b6abf" stroke-width="1.5"/>
    <text x="30" y="28" text-anchor="middle" fill="#5b6abf" font-size="16" font-weight="bold">1</text>
    <text x="30" y="46" text-anchor="middle" fill="#555" font-size="8">START</text>

    <rect x="62" y="4" width="56" height="52" rx="6" fill="#111" stroke="#333"/>
    <text x="90" y="35" text-anchor="middle" fill="#ccc" font-size="16">1</text>
    <rect x="122" y="4" width="56" height="52" rx="6" fill="#111" stroke="#333"/>
    <text x="150" y="35" text-anchor="middle" fill="#ccc" font-size="16">1</text>
    <rect x="182" y="4" width="56" height="52" rx="6" fill="#111" stroke="#333"/>
    <text x="210" y="35" text-anchor="middle" fill="#ccc" font-size="16">1</text>
    <rect x="242" y="4" width="56" height="52" rx="6" fill="#111" stroke="#333"/>
    <text x="270" y="35" text-anchor="middle" fill="#ccc" font-size="16">1</text>
    <rect x="302" y="4" width="56" height="52" rx="6" fill="#111" stroke="#333"/>
    <text x="330" y="35" text-anchor="middle" fill="#ccc" font-size="16">1</text>
    <rect x="362" y="4" width="56" height="52" rx="6" fill="#111" stroke="#333"/>
    <text x="390" y="35" text-anchor="middle" fill="#ccc" font-size="16">1</text>

    <!-- Row 1: 1 2 3 4 5 6 7 -->
    <rect x="2" y="64" width="56" height="52" rx="6" fill="#111" stroke="#333"/>
    <text x="30" y="95" text-anchor="middle" fill="#ccc" font-size="16">1</text>
    <rect x="62" y="64" width="56" height="52" rx="6" fill="#111" stroke="#333"/>
    <text x="90" y="95" text-anchor="middle" fill="#ccc" font-size="16">2</text>
    <rect x="122" y="64" width="56" height="52" rx="6" fill="#111" stroke="#333"/>
    <text x="150" y="95" text-anchor="middle" fill="#ccc" font-size="16">3</text>
    <rect x="182" y="64" width="56" height="52" rx="6" fill="#111" stroke="#333"/>
    <text x="210" y="95" text-anchor="middle" fill="#ccc" font-size="16">4</text>
    <rect x="242" y="64" width="56" height="52" rx="6" fill="#111" stroke="#333"/>
    <text x="270" y="95" text-anchor="middle" fill="#ccc" font-size="16">5</text>
    <rect x="302" y="64" width="56" height="52" rx="6" fill="#111" stroke="#333"/>
    <text x="330" y="95" text-anchor="middle" fill="#ccc" font-size="16">6</text>
    <rect x="362" y="64" width="56" height="52" rx="6" fill="#111" stroke="#333"/>
    <text x="390" y="95" text-anchor="middle" fill="#ccc" font-size="16">7</text>

    <!-- Row 2: 1 3 6 10 15 21 28 -->
    <rect x="2" y="124" width="56" height="52" rx="6" fill="#111" stroke="#333"/>
    <text x="30" y="155" text-anchor="middle" fill="#ccc" font-size="16">1</text>
    <rect x="62" y="124" width="56" height="52" rx="6" fill="#111" stroke="#333"/>
    <text x="90" y="155" text-anchor="middle" fill="#ccc" font-size="16">3</text>
    <rect x="122" y="124" width="56" height="52" rx="6" fill="#111" stroke="#333"/>
    <text x="150" y="155" text-anchor="middle" fill="#ccc" font-size="16">6</text>
    <rect x="182" y="124" width="56" height="52" rx="6" fill="#111" stroke="#333"/>
    <text x="210" y="155" text-anchor="middle" fill="#ccc" font-size="16">10</text>
    <rect x="242" y="124" width="56" height="52" rx="6" fill="#111" stroke="#333"/>
    <text x="270" y="155" text-anchor="middle" fill="#ccc" font-size="16">15</text>
    <rect x="302" y="124" width="56" height="52" rx="6" fill="#111" stroke="#333"/>
    <text x="330" y="155" text-anchor="middle" fill="#ccc" font-size="16">21</text>
    <!-- Answer cell -->
    <rect x="362" y="124" width="56" height="52" rx="6" fill="#0f2a1f" stroke="#34d399" stroke-width="2.5"/>
    <text x="390" y="150" text-anchor="middle" fill="#34d399" font-size="18" font-weight="bold">28</text>
    <text x="390" y="168" text-anchor="middle" fill="#34d399" font-size="8">ANSWER</text>

    <!-- Sample path 1: blue — all right then down -->
    <polyline points="30,56 90,30 150,30 210,30 270,30 330,30 390,30 390,90 390,150"
              fill="none" stroke="#5b6abf" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5" marker-end="url(#pathArrow1)"/>

    <!-- Sample path 2: purple — down, down, then all right -->
    <polyline points="30,30 30,90 30,150 90,150 150,150 210,150 270,150 330,150 385,150"
              fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5" marker-end="url(#pathArrow2)"/>

    <!-- Sample path 3: yellow — zigzag -->
    <polyline points="30,44 90,30 150,30 150,90 210,90 270,90 270,150 330,150 385,150"
              fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5" marker-end="url(#pathArrow3)"/>
  </g>

  <!-- Formula illustration -->
  <g transform="translate(530, 80)">
    <rect x="0" y="0" width="330" height="130" rx="8" fill="#111" stroke="#222"/>
    <text x="20" y="24" fill="#5b6abf" font-size="13" font-weight="bold">Recurrence</text>
    <text x="20" y="48" fill="#fbbf24" font-size="13">dp[i][j] = dp[i-1][j] + dp[i][j-1]</text>

    <!-- Mini 2x2 illustration -->
    <rect x="40" y="60" width="36" height="28" rx="4" fill="#1a1a1a" stroke="#f87171" stroke-width="1"/>
    <text x="58" y="79" text-anchor="middle" fill="#f87171" font-size="10">up</text>
    <rect x="82" y="60" width="36" height="28" rx="4" fill="#1a1a1a" stroke="#333"/>

    <rect x="40" y="92" width="36" height="28" rx="4" fill="#1a1a1a" stroke="#5b6abf" stroke-width="1"/>
    <text x="58" y="111" text-anchor="middle" fill="#5b6abf" font-size="10">left</text>
    <rect x="82" y="92" width="36" height="28" rx="4" fill="#1a1530" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="100" y="111" text-anchor="middle" fill="#a78bfa" font-size="10">sum</text>

    <!-- arrows -->
    <line x1="58" y1="90" x2="88" y2="96" stroke="#f87171" stroke-width="1.5"/>
    <line x1="78" y1="106" x2="84" y2="106" stroke="#5b6abf" stroke-width="1.5"/>

    <text x="145" y="80" fill="#888" font-size="10">from above</text>
    <text x="145" y="95" fill="#888" font-size="10">+ from left</text>
    <text x="145" y="110" fill="#888" font-size="10">= total paths</text>
  </g>

  <!-- Base case -->
  <g transform="translate(530, 226)">
    <rect x="0" y="0" width="330" height="66" rx="8" fill="#111" stroke="#222"/>
    <text x="20" y="22" fill="#5b6abf" font-size="12" font-weight="bold">Base Cases</text>
    <text x="20" y="42" fill="#888" font-size="11">dp[0][j] = 1   (top row, only right)</text>
    <text x="20" y="58" fill="#888" font-size="11">dp[i][0] = 1   (left col, only down)</text>
  </g>

  <!-- Obstacle handling info box -->
  <g transform="translate(530, 308)">
    <rect x="0" y="0" width="330" height="116" rx="8" fill="#111" stroke="#f87171" stroke-width="0.5" stroke-dasharray="4,3"/>
    <text x="20" y="22" fill="#f87171" font-size="12" font-weight="bold">Obstacle Handling (Variant)</text>
    <text x="20" y="42" fill="#888" font-size="10">If grid[i][j] has obstacle:</text>
    <text x="30" y="58" fill="#fbbf24" font-size="11">dp[i][j] = 0</text>
    <text x="20" y="76" fill="#888" font-size="10">Obstacles in first row/col block</text>
    <text x="20" y="90" fill="#888" font-size="10">all subsequent cells in that row/col</text>
    <text x="20" y="108" fill="#555" font-size="10">LC 63: Unique Paths II</text>
  </g>

  <!-- Legend -->
  <g transform="translate(40, 270)">
    <rect x="0" y="0" width="440" height="80" rx="8" fill="#111" stroke="#222"/>
    <text x="16" y="20" fill="#888" font-size="11" font-weight="bold">Sample Paths (3 of 28)</text>
    <line x1="16" y1="36" x2="48" y2="36" stroke="#5b6abf" stroke-width="2.5" opacity="0.6"/>
    <text x="56" y="40" fill="#ccc" font-size="10">Path 1: all right, then down</text>
    <line x1="16" y1="52" x2="48" y2="52" stroke="#a78bfa" stroke-width="2.5" opacity="0.6"/>
    <text x="56" y="56" fill="#ccc" font-size="10">Path 2: all down, then right</text>
    <line x1="16" y1="68" x2="48" y2="68" stroke="#fbbf24" stroke-width="2.5" opacity="0.6"/>
    <text x="56" y="72" fill="#ccc" font-size="10">Path 3: zigzag pattern</text>

    <text x="260" y="40" fill="#34d399" font-size="12" font-weight="bold">Answer: dp[2][6] = 28</text>
    <text x="260" y="58" fill="#888" font-size="10">= C(8,2) = 8!/(2!*6!) = 28</text>
    <text x="260" y="72" fill="#555" font-size="9">Combinatorial: C(m+n-2, m-1)</text>
  </g>

  <!-- Complexity -->
  <g transform="translate(40, 366)">
    <rect x="0" y="0" width="440" height="50" rx="8" fill="#111" stroke="#222"/>
    <text x="16" y="20" fill="#5b6abf" font-size="11" font-weight="bold">Complexity</text>
    <text x="16" y="38" fill="#888" font-size="11">Time: O(m * n)    Space: O(m * n), optimizable to O(n)</text>
  </g>

  <!-- Math insight -->
  <g transform="translate(40, 432)">
    <rect x="0" y="0" width="820" height="50" rx="8" fill="#111" stroke="#222"/>
    <text x="16" y="20" fill="#5b6abf" font-size="11" font-weight="bold">Key Insight</text>
    <text x="16" y="38" fill="#888" font-size="11">Each path requires exactly (m-1) down moves + (n-1) right moves = 8 total moves. Choose 2 positions for down moves out of 8 = C(8,2) = 28.</text>
  </g>
</svg>