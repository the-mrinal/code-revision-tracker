<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" rx="12" fill="#0a0a0a"/>

  <text x="450" y="32" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="16" font-weight="bold" text-anchor="middle">Jump Game — Greedy Farthest Reach</text>

  <!-- Array visualization -->
  <text x="40" y="70" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="12">nums = [2, 3, 1, 1, 4]</text>

  <!-- Index boxes -->
  <rect x="100" y="85" width="80" height="50" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="140" y="105" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">i=0</text>
  <text x="140" y="125" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="18" text-anchor="middle">2</text>

  <rect x="200" y="85" width="80" height="50" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="240" y="105" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">i=1</text>
  <text x="240" y="125" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="18" text-anchor="middle">3</text>

  <rect x="300" y="85" width="80" height="50" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="340" y="105" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">i=2</text>
  <text x="340" y="125" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="18" text-anchor="middle">1</text>

  <rect x="400" y="85" width="80" height="50" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="440" y="105" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">i=3</text>
  <text x="440" y="125" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="18" text-anchor="middle">1</text>

  <rect x="500" y="85" width="80" height="50" rx="6" fill="#111" stroke="#34d399" stroke-width="2"/>
  <text x="540" y="105" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">i=4</text>
  <text x="540" y="125" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="18" text-anchor="middle">4</text>
  <text x="540" y="80" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">GOAL</text>

  <!-- Jump Game I: maxReach tracking -->
  <line x1="30" y1="155" x2="870" y2="155" stroke="#222" stroke-width="1"/>
  <text x="450" y="180" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="13" font-weight="bold" text-anchor="middle">Jump Game I — Track maxReach</text>

  <!-- Reach bars -->
  <text x="60" y="210" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="10">i=0: reach 0+2=2</text>
  <rect x="100" y="215" width="200" height="12" rx="3" fill="#fbbf24" fill-opacity="0.2" stroke="#fbbf24" stroke-width="1"/>
  <text x="305" y="225" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="9">maxReach=2</text>

  <text x="60" y="240" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10">i=1: reach 1+3=4</text>
  <rect x="100" y="245" width="400" height="12" rx="3" fill="#34d399" fill-opacity="0.2" stroke="#34d399" stroke-width="1.5"/>
  <text x="505" y="255" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="9" font-weight="bold">maxReach=4 >= 4 ✓ DONE!</text>

  <text x="60" y="280" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">Can already reach the end at i=1. Return true.</text>

  <!-- Jump Game II: BFS levels -->
  <line x1="30" y1="305" x2="870" y2="305" stroke="#222" stroke-width="1"/>
  <text x="450" y="330" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="13" font-weight="bold" text-anchor="middle">Jump Game II — Implicit BFS Levels</text>

  <!-- Level 0 -->
  <rect x="100" y="345" width="80" height="40" rx="6" fill="#5b6abf" fill-opacity="0.2" stroke="#5b6abf" stroke-width="2"/>
  <text x="140" y="360" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">2</text>
  <text x="140" y="378" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="8" text-anchor="middle">Level 0</text>

  <!-- Level 1 -->
  <rect x="200" y="345" width="180" height="40" rx="6" fill="#a78bfa" fill-opacity="0.15" stroke="#a78bfa" stroke-width="2"/>
  <text x="240" y="360" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">3</text>
  <text x="340" y="360" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">1</text>
  <text x="290" y="378" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="8" text-anchor="middle">Level 1 (jump=1)</text>

  <!-- Level 2 -->
  <rect x="400" y="345" width="180" height="40" rx="6" fill="#34d399" fill-opacity="0.15" stroke="#34d399" stroke-width="2"/>
  <text x="440" y="360" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">1</text>
  <text x="540" y="360" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">4</text>
  <text x="490" y="378" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="8" text-anchor="middle">Level 2 (jump=2) ← GOAL</text>

  <!-- Jump arrows -->
  <path d="M140,345 Q170,320 240,345" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M290,345 Q390,300 490,345" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,2"/>

  <text x="170" y="315" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="9">jump 1</text>
  <text x="380" y="300" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="9">jump 2</text>

  <!-- Variables explanation -->
  <rect x="40" y="400" width="820" height="85" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="60" y="425" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold">Key Variables for Jump Game II</text>

  <text x="60" y="445" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="10">currentEnd</text>
  <text x="180" y="445" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">= boundary of current BFS level (when to increment jumps)</text>

  <text x="60" y="463" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="10">farthest</text>
  <text x="180" y="463" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">= farthest reachable within next level (max of i+nums[i])</text>

  <text x="60" y="478" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10">When i == currentEnd: jumps++, currentEnd = farthest</text>

  <!-- Legend -->
  <rect x="650" y="65" width="220" height="80" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="670" y="85" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="10" font-weight="bold">Legend</text>
  <rect x="670" y="93" width="10" height="10" rx="2" fill="#fbbf24" fill-opacity="0.3"/>
  <text x="686" y="103" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="9">Current reach range</text>
  <rect x="670" y="109" width="10" height="10" rx="2" fill="#34d399" fill-opacity="0.3"/>
  <text x="686" y="119" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="9">Extended reach (done!)</text>
  <rect x="670" y="125" width="10" height="10" rx="2" fill="#34d399"/>
  <text x="686" y="135" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="9">Goal position</text>
</svg>