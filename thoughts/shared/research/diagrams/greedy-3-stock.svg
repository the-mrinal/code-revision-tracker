<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <rect width="900" height="480" rx="12" fill="#0a0a0a"/>

  <text x="450" y="32" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="16" font-weight="bold" text-anchor="middle">Buy/Sell Stock — Track Min Price &amp; Sum Gains</text>

  <!-- Price chart -->
  <text x="40" y="60" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="11">prices = [7, 1, 5, 3, 6, 4]</text>

  <!-- Y axis -->
  <line x1="80" y1="80" x2="80" y2="230" stroke="#333" stroke-width="1"/>
  <text x="65" y="95" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="8">7</text>
  <text x="65" y="137" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="8">5</text>
  <text x="65" y="158" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="8">4</text>
  <text x="65" y="179" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="8">3</text>
  <text x="65" y="220" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="8">1</text>

  <!-- X axis -->
  <line x1="80" y1="230" x2="500" y2="230" stroke="#333" stroke-width="1"/>

  <!-- Price line -->
  <polyline points="120,90 200,218 280,135 360,177 440,114 520,156" fill="none" stroke="#5b6abf" stroke-width="2.5"/>

  <!-- Price dots -->
  <circle cx="120" cy="90" r="5" fill="#5b6abf"/>
  <text x="120" y="82" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">7</text>

  <circle cx="200" cy="218" r="5" fill="#34d399"/>
  <text x="200" y="235" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">1</text>
  <text x="200" y="248" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="8" text-anchor="middle">BUY</text>

  <circle cx="280" cy="135" r="4" fill="#5b6abf"/>
  <text x="280" y="127" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">5</text>

  <circle cx="360" cy="177" r="4" fill="#5b6abf"/>
  <text x="360" y="193" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">3</text>

  <circle cx="440" cy="114" r="5" fill="#fbbf24"/>
  <text x="440" y="106" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">6</text>
  <text x="440" y="95" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="8" text-anchor="middle">SELL</text>

  <circle cx="520" cy="156" r="4" fill="#5b6abf"/>
  <text x="520" y="148" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">4</text>

  <!-- Profit arrow for Stock I -->
  <line x1="205" y1="218" x2="205" y2="114" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="215" y="170" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10">profit=5</text>

  <!-- Stock I summary -->
  <rect x="560" y="75" width="310" height="90" rx="8" fill="#111" stroke="#34d399" stroke-width="1.5"/>
  <text x="580" y="97" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold">Stock I (One Trade)</text>
  <text x="580" y="117" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">Track minPrice as you scan</text>
  <text x="580" y="135" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">maxProfit = max(price - minPrice)</text>
  <text x="580" y="155" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="10">Answer: 6 - 1 = 5</text>

  <!-- Divider -->
  <line x1="30" y1="270" x2="870" y2="270" stroke="#222" stroke-width="1"/>

  <!-- Stock II visualization -->
  <text x="450" y="295" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="13" font-weight="bold" text-anchor="middle">Stock II — Sum All Uphill Segments</text>

  <!-- Price line for Stock II -->
  <line x1="80" y1="430" x2="80" y2="310" stroke="#333" stroke-width="1"/>
  <line x1="80" y1="430" x2="500" y2="430" stroke="#333" stroke-width="1"/>

  <polyline points="120,315 200,418 280,355 360,377 440,335 520,356" fill="none" stroke="#5b6abf" stroke-width="2"/>

  <!-- Uphill segments highlighted -->
  <!-- 1→5 -->
  <line x1="200" y1="418" x2="280" y2="355" stroke="#34d399" stroke-width="3"/>
  <text x="240" y="345" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">+4</text>

  <!-- 3→6 -->
  <line x1="360" y1="377" x2="440" y2="335" stroke="#34d399" stroke-width="3"/>
  <text x="400" y="325" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">+3</text>

  <!-- Downhill segments (dimmed) -->
  <line x1="120" y1="315" x2="200" y2="418" stroke="#f87171" stroke-width="2" opacity="0.4"/>
  <text x="160" y="385" fill="#f87171" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle" opacity="0.5">-6</text>

  <line x1="280" y1="355" x2="360" y2="377" stroke="#f87171" stroke-width="2" opacity="0.4"/>
  <text x="320" y="380" fill="#f87171" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle" opacity="0.5">-2</text>

  <line x1="440" y1="335" x2="520" y2="356" stroke="#f87171" stroke-width="2" opacity="0.4"/>
  <text x="480" y="360" fill="#f87171" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle" opacity="0.5">-2</text>

  <!-- Dots -->
  <circle cx="120" cy="315" r="4" fill="#5b6abf"/>
  <circle cx="200" cy="418" r="4" fill="#34d399"/>
  <circle cx="280" cy="355" r="4" fill="#fbbf24"/>
  <circle cx="360" cy="377" r="4" fill="#34d399"/>
  <circle cx="440" cy="335" r="4" fill="#fbbf24"/>
  <circle cx="520" cy="356" r="4" fill="#5b6abf"/>

  <!-- Labels -->
  <text x="120" y="308" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">7</text>
  <text x="200" y="435" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">1 buy</text>
  <text x="280" y="348" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">5 sell</text>
  <text x="360" y="393" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">3 buy</text>
  <text x="440" y="328" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">6 sell</text>
  <text x="520" y="370" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">4</text>

  <!-- Stock II summary -->
  <rect x="560" y="310" width="310" height="110" rx="8" fill="#111" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="580" y="332" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold">Stock II (Unlimited Trades)</text>
  <text x="580" y="352" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">Sum all positive differences:</text>
  <text x="580" y="372" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10">(5-1) + (6-3) = 4 + 3 = 7</text>
  <text x="580" y="395" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="9">Only take days where price went UP.</text>
  <text x="580" y="410" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="9">Skip all drops. Equivalent to</text>
  <text x="580" y="422" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="9">buying every valley, selling every peak.</text>

  <!-- Bottom comparison -->
  <rect x="560" y="435" width="310" height="35" rx="6" fill="#111" stroke="#5b6abf" stroke-width="1"/>
  <text x="715" y="457" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">Stock I: profit=5 | Stock II: profit=7</text>
</svg>