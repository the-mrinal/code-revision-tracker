<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <rect width="900" height="480" rx="12" fill="#0a0a0a"/>

  <text x="450" y="32" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="16" font-weight="bold" text-anchor="middle">Task Scheduling — Frequency-Based Frame Layout</text>

  <text x="40" y="60" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="11">tasks = [A,A,A,B,B,B], n=2 (cooldown between same tasks)</text>

  <!-- Frame visualization -->
  <text x="40" y="95" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold">Step 1: Build frames from most frequent task (A, freq=3)</text>

  <!-- Frame grid -->
  <!-- Row 1 -->
  <rect x="100" y="105" width="70" height="40" rx="4" fill="#5b6abf" fill-opacity="0.3" stroke="#5b6abf" stroke-width="2"/>
  <text x="135" y="130" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">A</text>
  <rect x="175" y="105" width="70" height="40" rx="4" fill="#111" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="210" y="130" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">_</text>
  <rect x="250" y="105" width="70" height="40" rx="4" fill="#111" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="285" y="130" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">_</text>

  <!-- Row 2 -->
  <rect x="100" y="150" width="70" height="40" rx="4" fill="#5b6abf" fill-opacity="0.3" stroke="#5b6abf" stroke-width="2"/>
  <text x="135" y="175" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">A</text>
  <rect x="175" y="150" width="70" height="40" rx="4" fill="#111" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="210" y="175" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">_</text>
  <rect x="250" y="150" width="70" height="40" rx="4" fill="#111" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="285" y="175" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">_</text>

  <!-- Row 3 (last row — only maxFreq tasks) -->
  <rect x="100" y="195" width="70" height="40" rx="4" fill="#5b6abf" fill-opacity="0.3" stroke="#5b6abf" stroke-width="2"/>
  <text x="135" y="220" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">A</text>

  <!-- Frame labels -->
  <text x="340" y="130" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="9">← frame of n+1=3 slots</text>
  <text x="340" y="175" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="9">← frame of n+1=3 slots</text>
  <text x="185" y="220" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="9">← last row (only max-freq tasks)</text>

  <!-- Arrow to step 2 -->
  <text x="450" y="95" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold">Step 2: Fill gaps with remaining tasks</text>

  <!-- Filled frame grid -->
  <rect x="500" y="105" width="70" height="40" rx="4" fill="#5b6abf" fill-opacity="0.3" stroke="#5b6abf" stroke-width="2"/>
  <text x="535" y="130" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">A</text>
  <rect x="575" y="105" width="70" height="40" rx="4" fill="#a78bfa" fill-opacity="0.3" stroke="#a78bfa" stroke-width="2"/>
  <text x="610" y="130" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">B</text>
  <rect x="650" y="105" width="70" height="40" rx="4" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="685" y="130" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="12" text-anchor="middle">idle</text>

  <rect x="500" y="150" width="70" height="40" rx="4" fill="#5b6abf" fill-opacity="0.3" stroke="#5b6abf" stroke-width="2"/>
  <text x="535" y="175" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">A</text>
  <rect x="575" y="150" width="70" height="40" rx="4" fill="#a78bfa" fill-opacity="0.3" stroke="#a78bfa" stroke-width="2"/>
  <text x="610" y="175" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">B</text>
  <rect x="650" y="150" width="70" height="40" rx="4" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="685" y="175" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="12" text-anchor="middle">idle</text>

  <rect x="500" y="195" width="70" height="40" rx="4" fill="#5b6abf" fill-opacity="0.3" stroke="#5b6abf" stroke-width="2"/>
  <text x="535" y="220" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">A</text>
  <rect x="575" y="195" width="70" height="40" rx="4" fill="#a78bfa" fill-opacity="0.3" stroke="#a78bfa" stroke-width="2"/>
  <text x="610" y="220" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">B</text>

  <text x="740" y="130" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="9">A B _ A B _ A B</text>
  <text x="740" y="145" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="9">= 8 time units</text>

  <!-- Formula -->
  <rect x="40" y="250" width="820" height="50" rx="8" fill="#111" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="450" y="270" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" text-anchor="middle">Formula: (maxFreq - 1) × (n + 1) + countMaxFreq</text>
  <text x="450" y="290" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="middle">(3 - 1) × (2 + 1) + 2 = 2 × 3 + 2 = 8    |    Answer = max(8, 6) = 8</text>

  <!-- Reorganize String section -->
  <line x1="30" y1="315" x2="870" y2="315" stroke="#222" stroke-width="1"/>

  <text x="450" y="340" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="13" font-weight="bold" text-anchor="middle">Reorganize String — No Two Adjacent Same</text>

  <text x="40" y="365" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="11">s = "aaabb" → freq: a=3, b=2</text>

  <!-- Fill even then odd indices -->
  <text x="40" y="395" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="10">Fill even indices (0,2,4) with most frequent, then odd (1,3):</text>

  <!-- Index boxes -->
  <rect x="100" y="405" width="60" height="40" rx="4" fill="#5b6abf" fill-opacity="0.3" stroke="#5b6abf" stroke-width="2"/>
  <text x="130" y="422" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="8" text-anchor="middle">idx 0</text>
  <text x="130" y="438" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">a</text>

  <rect x="170" y="405" width="60" height="40" rx="4" fill="#a78bfa" fill-opacity="0.3" stroke="#a78bfa" stroke-width="2"/>
  <text x="200" y="422" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="8" text-anchor="middle">idx 1</text>
  <text x="200" y="438" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">b</text>

  <rect x="240" y="405" width="60" height="40" rx="4" fill="#5b6abf" fill-opacity="0.3" stroke="#5b6abf" stroke-width="2"/>
  <text x="270" y="422" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="8" text-anchor="middle">idx 2</text>
  <text x="270" y="438" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">a</text>

  <rect x="310" y="405" width="60" height="40" rx="4" fill="#a78bfa" fill-opacity="0.3" stroke="#a78bfa" stroke-width="2"/>
  <text x="340" y="422" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="8" text-anchor="middle">idx 3</text>
  <text x="340" y="438" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">b</text>

  <rect x="380" y="405" width="60" height="40" rx="4" fill="#5b6abf" fill-opacity="0.3" stroke="#5b6abf" stroke-width="2"/>
  <text x="410" y="422" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="8" text-anchor="middle">idx 4</text>
  <text x="410" y="438" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">a</text>

  <text x="460" y="430" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="11">= "ababa" ✓</text>

  <!-- Impossibility check -->
  <rect x="560" y="365" width="300" height="90" rx="8" fill="#111" stroke="#f87171" stroke-width="1.5"/>
  <text x="580" y="387" fill="#f87171" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold">Impossibility Check</text>
  <text x="580" y="407" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">If maxFreq > ⌈len/2⌉:</text>
  <text x="580" y="425" fill="#f87171" font-family="SF Mono, Menlo, monospace" font-size="10">  return "" (impossible)</text>
  <text x="580" y="445" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="9">e.g. "aaab" → a=3 > ⌈4/2⌉=2 → ""</text>
</svg>