<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="SF Mono, Menlo, monospace">
  <rect width="900" height="500" rx="12" fill="#0a0a0a"/>
  <text x="450" y="35" text-anchor="middle" fill="#5b6abf" font-size="18" font-weight="bold">Bridges &amp; Articulation Points — Tarjan's Algorithm</text>

  <!-- Graph with bridge highlighted -->
  <g transform="translate(50, 55)">
    <text x="120" y="0" text-anchor="middle" fill="#888" font-size="12">Critical Connections (1192)</text>
    <g transform="translate(0, 20)">
      <!-- Nodes -->
      <circle cx="30" cy="30" r="24" fill="#111" stroke="#34d399" stroke-width="2"/>
      <text x="30" y="25" text-anchor="middle" fill="#34d399" font-size="13">0</text>
      <text x="30" y="40" text-anchor="middle" fill="#34d399" font-size="8">d=0,l=0</text>

      <circle cx="150" cy="30" r="24" fill="#111" stroke="#a78bfa" stroke-width="2"/>
      <text x="150" y="25" text-anchor="middle" fill="#a78bfa" font-size="13">1</text>
      <text x="150" y="40" text-anchor="middle" fill="#a78bfa" font-size="8">d=1,l=0</text>

      <circle cx="90" cy="120" r="24" fill="#111" stroke="#34d399" stroke-width="2"/>
      <text x="90" y="115" text-anchor="middle" fill="#34d399" font-size="13">2</text>
      <text x="90" y="130" text-anchor="middle" fill="#34d399" font-size="8">d=2,l=0</text>

      <circle cx="250" cy="30" r="24" fill="#111" stroke="#fbbf24" stroke-width="2"/>
      <text x="250" y="25" text-anchor="middle" fill="#fbbf24" font-size="13">3</text>
      <text x="250" y="40" text-anchor="middle" fill="#fbbf24" font-size="8">d=3,l=3</text>

      <!-- Edges -->
      <line x1="52" y1="22" x2="126" y2="22" stroke="#34d399" stroke-width="1.5"/>
      <line x1="140" y1="52" x2="102" y2="100" stroke="#34d399" stroke-width="1.5"/>
      <line x1="68" y1="108" x2="40" y2="52" stroke="#34d399" stroke-width="1.5"/>
      <text x="65" y="60" fill="#34d399" font-size="9">cycle</text>

      <!-- Bridge edge (1-3) -->
      <line x1="174" y1="30" x2="226" y2="30" stroke="#f87171" stroke-width="3"/>
      <text x="200" y="22" text-anchor="middle" fill="#f87171" font-size="11" font-weight="bold">BRIDGE</text>
    </g>
  </g>

  <!-- Bridge detection logic -->
  <g transform="translate(350, 55)">
    <text x="0" y="0" fill="#888" font-size="12">Tarjan's Bridge Detection</text>
    <rect x="0" y="12" width="510" height="155" rx="8" fill="#111" stroke="#222"/>

    <text x="15" y="35" fill="#5b6abf" font-size="12" font-weight="bold">disc[u] = discovery time</text>
    <text x="15" y="52" fill="#5b6abf" font-size="12" font-weight="bold">low[u] = earliest reachable via back edges</text>

    <text x="15" y="78" fill="#ccc" font-size="11">dfs(0): disc[0]=0, low[0]=0</text>
    <text x="15" y="95" fill="#ccc" font-size="11">  dfs(1): disc[1]=1, low[1]=1</text>
    <text x="15" y="112" fill="#ccc" font-size="11">    dfs(2): disc[2]=2, low[2]=2 → back edge to 0 → low[2]=0</text>
    <text x="15" y="129" fill="#ccc" font-size="11">    low[1]=min(1,low[2])=0</text>
    <text x="15" y="146" fill="#ccc" font-size="11">    dfs(3): disc[3]=3, low[3]=3 → no back edges</text>
    <text x="15" y="160" fill="#f87171" font-size="11" font-weight="bold">    low[3]=3 > disc[1]=1 → edge (1,3) is a BRIDGE!</text>
  </g>

  <!-- Bridge condition explanation -->
  <g transform="translate(50, 240)">
    <rect x="0" y="0" width="380" height="100" rx="8" fill="#111" stroke="#f87171" stroke-width="1.5"/>
    <text x="20" y="22" fill="#f87171" font-size="13" font-weight="bold">Bridge Condition</text>
    <text x="20" y="45" fill="#ccc" font-size="12">Edge (u, v) is a bridge iff:</text>
    <text x="20" y="65" fill="#fbbf24" font-size="14" font-weight="bold">low[v] &gt; disc[u]</text>
    <text x="20" y="85" fill="#888" font-size="11">v's subtree can't reach u or above without (u,v)</text>
  </g>

  <!-- Articulation point condition -->
  <g transform="translate(460, 240)">
    <rect x="0" y="0" width="390" height="100" rx="8" fill="#111" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="20" y="22" fill="#a78bfa" font-size="13" font-weight="bold">Articulation Point Condition</text>
    <text x="20" y="45" fill="#ccc" font-size="12">Node u is an articulation point iff:</text>
    <text x="20" y="65" fill="#fbbf24" font-size="14" font-weight="bold">low[v] &gt;= disc[u]</text>
    <text x="20" y="85" fill="#888" font-size="11">Root: articulaton point iff DFS tree has ≥2 children</text>
  </g>

  <!-- Visual: what low[v] means -->
  <g transform="translate(50, 360)">
    <text x="0" y="0" fill="#888" font-size="12">What low[v] represents</text>
    <g transform="translate(0, 18)">
      <rect x="0" y="0" width="250" height="35" rx="6" fill="#111" stroke="#34d399" stroke-width="1"/>
      <text x="15" y="22" fill="#34d399" font-size="11">low[v] &lt;= disc[u]: back edge escapes ✓</text>

      <rect x="270" y="0" width="250" height="35" rx="6" fill="#111" stroke="#f87171" stroke-width="1"/>
      <text x="285" y="22" fill="#f87171" font-size="11">low[v] &gt; disc[u]: trapped below u ✗</text>

      <rect x="540" y="0" width="310" height="35" rx="6" fill="#111" stroke="#888" stroke-width="1"/>
      <text x="555" y="22" fill="#888" font-size="11">Removing (u,v) disconnects v's subtree</text>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(50, 420)">
    <rect x="0" y="0" width="800" height="35" rx="8" fill="#111" stroke="#222"/>
    <line x1="20" y1="18" x2="50" y2="18" stroke="#34d399" stroke-width="2"/>
    <text x="60" y="22" fill="#ccc" font-size="11">Non-bridge (in cycle)</text>
    <line x1="220" y1="18" x2="250" y2="18" stroke="#f87171" stroke-width="3"/>
    <text x="260" y="22" fill="#ccc" font-size="11">Bridge (critical)</text>
    <text x="430" y="22" fill="#888" font-size="11">d=disc time, l=low value</text>
  </g>

  <!-- Summary -->
  <g transform="translate(50, 462)">
    <rect x="0" y="0" width="800" height="32" rx="8" fill="#111" stroke="#5b6abf" stroke-width="1"/>
    <text x="20" y="22" fill="#5b6abf" font-size="12" font-weight="bold">Key:</text>
    <text x="65" y="22" fill="#ccc" font-size="11">Tarjan's DFS with disc/low arrays. Bridge: low[v]>disc[u]. Articulation: low[v]>=disc[u]. Single O(V+E) pass.</text>
  </g>
</svg>