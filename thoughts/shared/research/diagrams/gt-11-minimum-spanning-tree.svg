<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="SF Mono, Menlo, monospace">
  <rect width="900" height="500" rx="12" fill="#0a0a0a"/>
  <text x="450" y="35" text-anchor="middle" fill="#5b6abf" font-size="18" font-weight="bold">Minimum Spanning Tree — Kruskal's Algorithm</text>

  <!-- Graph with all edges -->
  <g transform="translate(50, 55)">
    <text x="120" y="0" text-anchor="middle" fill="#888" font-size="12">Min Cost to Connect Points (1584)</text>
    <g transform="translate(0, 20)">
      <!-- Points -->
      <circle cx="30" cy="100" r="18" fill="#111" stroke="#fbbf24" stroke-width="2"/>
      <text x="30" y="105" text-anchor="middle" fill="#fbbf24" font-size="12">0</text>
      <circle cx="100" cy="50" r="18" fill="#111" stroke="#fbbf24" stroke-width="2"/>
      <text x="100" y="55" text-anchor="middle" fill="#fbbf24" font-size="12">1</text>
      <circle cx="130" cy="150" r="18" fill="#111" stroke="#fbbf24" stroke-width="2"/>
      <text x="130" y="155" text-anchor="middle" fill="#fbbf24" font-size="12">2</text>
      <circle cx="190" cy="70" r="18" fill="#111" stroke="#fbbf24" stroke-width="2"/>
      <text x="190" y="75" text-anchor="middle" fill="#fbbf24" font-size="12">3</text>
      <circle cx="230" cy="130" r="18" fill="#111" stroke="#fbbf24" stroke-width="2"/>
      <text x="230" y="135" text-anchor="middle" fill="#fbbf24" font-size="12">4</text>

      <!-- Non-MST edges (faded) -->
      <line x1="30" y1="82" x2="100" y2="68" stroke="#333" stroke-width="1" opacity="0.3"/>
      <line x1="100" y1="68" x2="130" y2="132" stroke="#333" stroke-width="1" opacity="0.3"/>

      <!-- MST edges (highlighted) -->
      <line x1="112" y1="58" x2="176" y2="62" stroke="#34d399" stroke-width="2.5"/>
      <text x="145" y="52" fill="#34d399" font-size="10" font-weight="bold">3</text>

      <line x1="45" y1="92" x2="85" y2="58" stroke="#34d399" stroke-width="2.5"/>
      <text x="55" y="68" fill="#34d399" font-size="10" font-weight="bold">4</text>

      <line x1="200" y1="85" x2="220" y2="115" stroke="#34d399" stroke-width="2.5"/>
      <text x="218" y="98" fill="#34d399" font-size="10" font-weight="bold">4</text>

      <line x1="112" y1="60" x2="122" y2="132" stroke="#34d399" stroke-width="2.5"/>
      <text x="105" y="100" fill="#34d399" font-size="10" font-weight="bold">9</text>
    </g>
    <text x="120" y="200" text-anchor="middle" fill="#34d399" font-size="12" font-weight="bold">MST weight = 3+4+4+9 = 20</text>
  </g>

  <!-- Kruskal's step-by-step -->
  <g transform="translate(310, 55)">
    <text x="0" y="0" fill="#888" font-size="12">Kruskal's — Sort edges, add if no cycle</text>
    <rect x="0" y="12" width="560" height="200" rx="8" fill="#111" stroke="#222"/>

    <text x="15" y="35" fill="#5b6abf" font-size="11" font-weight="bold">Edge</text>
    <text x="100" y="35" fill="#5b6abf" font-size="11" font-weight="bold">Weight</text>
    <text x="170" y="35" fill="#5b6abf" font-size="11" font-weight="bold">Action</text>
    <text x="330" y="35" fill="#5b6abf" font-size="11" font-weight="bold">Components</text>
    <line x1="10" y1="42" x2="550" y2="42" stroke="#333"/>

    <text x="15" y="60" fill="#34d399" font-size="11">(1,3)</text>
    <text x="110" y="60" fill="#34d399" font-size="11">3</text>
    <text x="170" y="60" fill="#34d399" font-size="11">ADD ✓ find(1)≠find(3)</text>
    <text x="330" y="60" fill="#888" font-size="10">{0} {1,3} {2} {4}</text>

    <text x="15" y="82" fill="#34d399" font-size="11">(0,1)</text>
    <text x="110" y="82" fill="#34d399" font-size="11">4</text>
    <text x="170" y="82" fill="#34d399" font-size="11">ADD ✓ find(0)≠find(1)</text>
    <text x="330" y="82" fill="#888" font-size="10">{0,1,3} {2} {4}</text>

    <text x="15" y="104" fill="#34d399" font-size="11">(3,4)</text>
    <text x="110" y="104" fill="#34d399" font-size="11">4</text>
    <text x="170" y="104" fill="#34d399" font-size="11">ADD ✓ find(3)≠find(4)</text>
    <text x="330" y="104" fill="#888" font-size="10">{0,1,3,4} {2}</text>

    <text x="15" y="126" fill="#f87171" font-size="11">(0,3)</text>
    <text x="110" y="126" fill="#f87171" font-size="11">7</text>
    <text x="170" y="126" fill="#f87171" font-size="11">SKIP ✗ find(0)=find(3)</text>
    <text x="330" y="126" fill="#888" font-size="10">same component</text>

    <text x="15" y="148" fill="#f87171" font-size="11">(0,4)</text>
    <text x="110" y="148" fill="#f87171" font-size="11">7</text>
    <text x="170" y="148" fill="#f87171" font-size="11">SKIP ✗</text>

    <text x="15" y="170" fill="#34d399" font-size="11">(1,2)</text>
    <text x="110" y="170" fill="#34d399" font-size="11">9</text>
    <text x="170" y="170" fill="#34d399" font-size="11">ADD ✓ find(1)≠find(2)</text>
    <text x="330" y="170" fill="#34d399" font-size="10">{0,1,2,3,4} ← done!</text>

    <text x="15" y="195" fill="#34d399" font-size="12" font-weight="bold">4 edges = n-1 ✓   Total = 20</text>
  </g>

  <!-- Kruskal vs Prim -->
  <g transform="translate(50, 300)">
    <rect x="0" y="0" width="380" height="80" rx="8" fill="#111" stroke="#34d399" stroke-width="1"/>
    <text x="15" y="22" fill="#34d399" font-size="12" font-weight="bold">Kruskal's (edge-centric)</text>
    <text x="15" y="42" fill="#ccc" font-size="11">Sort edges → add cheapest non-cycle</text>
    <text x="15" y="58" fill="#888" font-size="10">O(E log E). Uses Union-Find. Better for sparse graphs.</text>
    <text x="15" y="72" fill="#888" font-size="10">Natural fit when edges are given as a list.</text>
  </g>

  <g transform="translate(460, 300)">
    <rect x="0" y="0" width="390" height="80" rx="8" fill="#111" stroke="#a78bfa" stroke-width="1"/>
    <text x="15" y="22" fill="#a78bfa" font-size="12" font-weight="bold">Prim's (node-centric)</text>
    <text x="15" y="42" fill="#ccc" font-size="11">Start node → grow tree via min-heap</text>
    <text x="15" y="58" fill="#888" font-size="10">O(E log V). Uses priority queue. Better for dense graphs.</text>
    <text x="15" y="72" fill="#888" font-size="10">Avoids storing all O(n²) edges for complete graphs.</text>
  </g>

  <!-- Legend -->
  <g transform="translate(50, 400)">
    <rect x="0" y="0" width="800" height="40" rx="8" fill="#111" stroke="#222"/>
    <line x1="20" y1="20" x2="50" y2="20" stroke="#34d399" stroke-width="2.5"/>
    <text x="60" y="24" fill="#ccc" font-size="11">MST edge</text>
    <line x1="165" y1="20" x2="195" y2="20" stroke="#333" stroke-width="1"/>
    <text x="205" y="24" fill="#ccc" font-size="11">Non-MST edge</text>
    <text x="350" y="24" fill="#888" font-size="11">MST: n-1 edges, no cycles, minimum total weight, spans all nodes</text>
  </g>

  <!-- Summary -->
  <g transform="translate(50, 450)">
    <rect x="0" y="0" width="800" height="40" rx="8" fill="#111" stroke="#5b6abf" stroke-width="1"/>
    <text x="20" y="25" fill="#5b6abf" font-size="13" font-weight="bold">Key:</text>
    <text x="65" y="25" fill="#ccc" font-size="12">Greedy on edge weight. Kruskal's = sort + Union-Find. Prim's = grow from node + min-heap. Both give optimal MST.</text>
  </g>
</svg>