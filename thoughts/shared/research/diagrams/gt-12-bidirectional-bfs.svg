<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="SF Mono, Menlo, monospace">
  <rect width="900" height="500" rx="12" fill="#0a0a0a"/>
  <text x="450" y="35" text-anchor="middle" fill="#5b6abf" font-size="18" font-weight="bold">Bidirectional BFS — Word Ladder</text>

  <!-- One-way BFS comparison -->
  <g transform="translate(50, 55)">
    <text x="150" y="0" text-anchor="middle" fill="#888" font-size="12">One-Way BFS — explores entire radius d</text>
    <g transform="translate(0, 15)">
      <circle cx="150" cy="100" r="95" fill="none" stroke="#f87171" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
      <circle cx="150" cy="100" r="70" fill="none" stroke="#f87171" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
      <circle cx="150" cy="100" r="45" fill="none" stroke="#f87171" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
      <circle cx="150" cy="100" r="20" fill="none" stroke="#f87171" stroke-width="1.5"/>
      <circle cx="150" cy="100" r="5" fill="#34d399"/>
      <text x="150" y="104" text-anchor="middle" fill="#fff" font-size="7">S</text>
      <circle cx="240" cy="80" r="5" fill="#f87171"/>
      <text x="240" y="74" text-anchor="middle" fill="#f87171" font-size="8">T</text>
      <text x="150" y="215" text-anchor="middle" fill="#f87171" font-size="11">~b^d nodes explored</text>
    </g>
  </g>

  <!-- Bidirectional BFS -->
  <g transform="translate(380, 55)">
    <text x="200" y="0" text-anchor="middle" fill="#888" font-size="12">Bidirectional BFS — two smaller spheres meet</text>
    <g transform="translate(0, 15)">
      <!-- Forward sphere -->
      <circle cx="130" cy="100" r="55" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
      <circle cx="130" cy="100" r="30" fill="none" stroke="#34d399" stroke-width="1.5"/>
      <circle cx="130" cy="100" r="5" fill="#34d399"/>
      <text x="130" y="104" text-anchor="middle" fill="#fff" font-size="7">S</text>
      <text x="130" y="170" text-anchor="middle" fill="#34d399" font-size="10">forward</text>

      <!-- Backward sphere -->
      <circle cx="270" cy="100" r="55" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
      <circle cx="270" cy="100" r="30" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
      <circle cx="270" cy="100" r="5" fill="#a78bfa"/>
      <text x="270" y="104" text-anchor="middle" fill="#fff" font-size="7">T</text>
      <text x="270" y="170" text-anchor="middle" fill="#a78bfa" font-size="10">backward</text>

      <!-- Overlap point -->
      <circle cx="200" cy="100" r="8" fill="#fbbf24" stroke="#fbbf24" stroke-width="2"/>
      <text x="200" y="88" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">MEET!</text>

      <text x="200" y="215" text-anchor="middle" fill="#34d399" font-size="11">~2 × b^(d/2) nodes explored</text>
    </g>
  </g>

  <!-- Word Ladder example -->
  <g transform="translate(50, 300)">
    <text x="0" y="0" fill="#888" font-size="12">Word Ladder (127): "hit" → "cog"</text>
    <rect x="0" y="12" width="800" height="95" rx="8" fill="#111" stroke="#222"/>

    <!-- Forward -->
    <text x="15" y="35" fill="#34d399" font-size="12" font-weight="bold">Forward →</text>
    <rect x="120" y="22" width="55" height="24" rx="4" fill="#1a3a1a" stroke="#34d399"/>
    <text x="147" y="39" text-anchor="middle" fill="#34d399" font-size="11">hit</text>
    <text x="185" y="39" fill="#888">→</text>
    <rect x="195" y="22" width="55" height="24" rx="4" fill="#1a3a1a" stroke="#34d399"/>
    <text x="222" y="39" text-anchor="middle" fill="#34d399" font-size="11">hot</text>
    <text x="260" y="39" fill="#888">→</text>
    <rect x="270" y="22" width="55" height="24" rx="4" fill="#1a3a1a" stroke="#34d399"/>
    <text x="297" y="39" text-anchor="middle" fill="#34d399" font-size="11">dot</text>
    <rect x="335" y="22" width="55" height="24" rx="4" fill="#1a3a1a" stroke="#34d399"/>
    <text x="362" y="39" text-anchor="middle" fill="#34d399" font-size="11">lot</text>

    <!-- Backward -->
    <text x="15" y="72" fill="#a78bfa" font-size="12" font-weight="bold">← Backward</text>
    <rect x="120" y="58" width="55" height="24" rx="4" fill="#1a1a2a" stroke="#a78bfa"/>
    <text x="147" y="75" text-anchor="middle" fill="#a78bfa" font-size="11">cog</text>
    <text x="185" y="75" fill="#888">→</text>
    <rect x="195" y="58" width="55" height="24" rx="4" fill="#1a1a2a" stroke="#a78bfa"/>
    <text x="222" y="75" text-anchor="middle" fill="#a78bfa" font-size="11">dog</text>
    <rect x="260" y="58" width="55" height="24" rx="4" fill="#1a1a2a" stroke="#a78bfa"/>
    <text x="287" y="75" text-anchor="middle" fill="#a78bfa" font-size="11">log</text>

    <!-- Meet point -->
    <line x1="297" y1="46" x2="222" y2="58" stroke="#fbbf24" stroke-width="2"/>
    <text x="260" y="55" fill="#fbbf24" font-size="9" font-weight="bold">dot→dog</text>

    <!-- Result -->
    <text x="430" y="50" fill="#fbbf24" font-size="12" font-weight="bold">MEET! depth=2+2=4 edges → 5 words</text>

    <!-- Key optimization -->
    <text x="15" y="100" fill="#f87171" font-size="11" font-weight="bold">Always expand the SMALLER frontier</text>
    <text x="310" y="100" fill="#888" font-size="10">Balances growth → minimizes total explored nodes</text>
  </g>

  <!-- Speedup math -->
  <g transform="translate(50, 420)">
    <rect x="0" y="0" width="390" height="35" rx="8" fill="#111" stroke="#222"/>
    <text x="15" y="23" fill="#888" font-size="11">One-way: O(b^d)</text>
    <text x="155" y="23" fill="#34d399" font-size="11">Bi-directional: O(2 × b^(d/2))</text>
    <text x="348" y="23" fill="#fbbf24" font-size="11" font-weight="bold">≪</text>
  </g>

  <!-- Summary -->
  <g transform="translate(50, 462)">
    <rect x="0" y="0" width="800" height="32" rx="8" fill="#111" stroke="#5b6abf" stroke-width="1"/>
    <text x="20" y="22" fill="#5b6abf" font-size="12" font-weight="bold">Key:</text>
    <text x="65" y="22" fill="#ccc" font-size="11">Search from both ends simultaneously. Always expand smaller set. Meet in the middle = exponential speedup.</text>
  </g>
</svg>