<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="SF Mono, Menlo, monospace">
  <rect width="900" height="500" rx="12" fill="#0a0a0a"/>
  <text x="450" y="35" text-anchor="middle" fill="#5b6abf" font-size="18" font-weight="bold">DFS Cycle Detection — 3-Color Marking</text>

  <!-- No-cycle graph -->
  <g transform="translate(50, 60)">
    <text x="100" y="0" text-anchor="middle" fill="#34d399" font-size="13" font-weight="bold">No Cycle ✓</text>
    <g transform="translate(0, 20)">
      <!-- Node 0 -->
      <circle cx="100" cy="30" r="22" fill="#111" stroke="#34d399" stroke-width="2"/>
      <text x="100" y="35" text-anchor="middle" fill="#34d399" font-size="14">0</text>
      <!-- Node 1 -->
      <circle cx="40" cy="110" r="22" fill="#111" stroke="#34d399" stroke-width="2"/>
      <text x="40" y="115" text-anchor="middle" fill="#34d399" font-size="14">1</text>
      <!-- Node 2 -->
      <circle cx="160" cy="110" r="22" fill="#111" stroke="#34d399" stroke-width="2"/>
      <text x="160" y="115" text-anchor="middle" fill="#34d399" font-size="14">2</text>
      <!-- Node 3 -->
      <circle cx="100" cy="190" r="22" fill="#111" stroke="#34d399" stroke-width="2"/>
      <text x="100" y="195" text-anchor="middle" fill="#34d399" font-size="14">3</text>
      <!-- Edges (arrows) -->
      <line x1="82" y1="45" x2="55" y2="93" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowG)"/>
      <line x1="118" y1="45" x2="145" y2="93" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowG)"/>
      <line x1="52" y1="128" x2="85" y2="175" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowG)"/>
      <line x1="148" y1="128" x2="115" y2="175" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowG)"/>
    </g>
    <text x="100" y="260" text-anchor="middle" fill="#888" font-size="11">All nodes reach BLACK</text>
    <text x="100" y="275" text-anchor="middle" fill="#34d399" font-size="11">Can finish all courses ✓</text>
  </g>

  <!-- Cycle graph -->
  <g transform="translate(280, 60)">
    <text x="100" y="0" text-anchor="middle" fill="#f87171" font-size="13" font-weight="bold">Cycle Detected ✗</text>
    <g transform="translate(0, 20)">
      <!-- Node 0 -->
      <circle cx="100" cy="30" r="22" fill="#111" stroke="#fbbf24" stroke-width="2"/>
      <text x="100" y="35" text-anchor="middle" fill="#fbbf24" font-size="14">0</text>
      <text x="135" y="35" fill="#fbbf24" font-size="9">GRAY</text>
      <!-- Node 1 -->
      <circle cx="40" cy="110" r="22" fill="#111" stroke="#fbbf24" stroke-width="2"/>
      <text x="40" y="115" text-anchor="middle" fill="#fbbf24" font-size="14">1</text>
      <text x="-5" y="115" fill="#fbbf24" font-size="9">GRAY</text>
      <!-- Node 2 -->
      <circle cx="160" cy="110" r="22" fill="#111" stroke="#888" stroke-width="1.5"/>
      <text x="160" y="115" text-anchor="middle" fill="#888" font-size="14">2</text>
      <!-- Node 3 -->
      <circle cx="40" cy="190" r="22" fill="#111" stroke="#fbbf24" stroke-width="2"/>
      <text x="40" y="195" text-anchor="middle" fill="#fbbf24" font-size="14">3</text>
      <text x="-5" y="195" fill="#fbbf24" font-size="9">GRAY</text>
      <!-- Edges -->
      <line x1="82" y1="45" x2="55" y2="93" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowY)"/>
      <line x1="118" y1="45" x2="145" y2="93" stroke="#555" stroke-width="1" marker-end="url(#arrowGray)"/>
      <line x1="40" y1="132" x2="40" y2="165" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowY)"/>
      <!-- Back edge (cycle!) -->
      <path d="M 55 178 Q 140 140 112 48" fill="none" stroke="#f87171" stroke-width="2.5" stroke-dasharray="5,3" marker-end="url(#arrowR)"/>
      <text x="145" y="145" fill="#f87171" font-size="11" font-weight="bold">BACK EDGE!</text>
      <text x="145" y="160" fill="#f87171" font-size="10">3→0 (both GRAY)</text>
    </g>
    <text x="100" y="260" text-anchor="middle" fill="#888" font-size="11">GRAY→GRAY = cycle</text>
    <text x="100" y="275" text-anchor="middle" fill="#f87171" font-size="11">Cannot finish courses ✗</text>
  </g>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#34d399"/></marker>
    <marker id="arrowY" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#fbbf24"/></marker>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#f87171"/></marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#555"/></marker>
  </defs>

  <!-- 3-Color explanation -->
  <g transform="translate(530, 60)">
    <text x="0" y="0" fill="#888" font-size="12">Three-Color DFS States</text>
    <rect x="0" y="12" width="340" height="170" rx="8" fill="#111" stroke="#222"/>

    <circle cx="30" cy="45" r="12" fill="#111" stroke="#888" stroke-width="1.5"/>
    <text x="30" y="49" text-anchor="middle" fill="#888" font-size="10">W</text>
    <text x="55" y="49" fill="#ccc" font-size="12">WHITE — not yet visited</text>

    <circle cx="30" cy="85" r="12" fill="#111" stroke="#fbbf24" stroke-width="2"/>
    <text x="30" y="89" text-anchor="middle" fill="#fbbf24" font-size="10">G</text>
    <text x="55" y="89" fill="#ccc" font-size="12">GRAY — on current DFS path</text>
    <text x="55" y="105" fill="#888" font-size="10">(entered but not yet finished)</text>

    <circle cx="30" cy="135" r="12" fill="#111" stroke="#34d399" stroke-width="2"/>
    <text x="30" y="139" text-anchor="middle" fill="#34d399" font-size="10">B</text>
    <text x="55" y="139" fill="#ccc" font-size="12">BLACK — fully processed</text>
    <text x="55" y="155" fill="#888" font-size="10">(all descendants explored, no cycle)</text>

    <text x="15" y="175" fill="#f87171" font-size="11" font-weight="bold">GRAY → GRAY = back edge = CYCLE!</text>
  </g>

  <!-- DFS trace -->
  <g transform="translate(530, 260)">
    <text x="0" y="0" fill="#888" font-size="12">DFS Trace (no cycle case)</text>
    <rect x="0" y="12" width="340" height="100" rx="8" fill="#111" stroke="#222"/>
    <text x="15" y="35" fill="#fbbf24" font-size="11">dfs(0): color[0]=GRAY</text>
    <text x="30" y="52" fill="#fbbf24" font-size="11">dfs(1): color[1]=GRAY</text>
    <text x="45" y="69" fill="#fbbf24" font-size="11">dfs(3): color[3]=GRAY → BLACK</text>
    <text x="30" y="86" fill="#34d399" font-size="11">color[1]=BLACK ✓</text>
    <text x="15" y="103" fill="#34d399" font-size="11">dfs(2)→dfs(3 BLACK skip)→BLACK ✓</text>
  </g>

  <!-- Legend -->
  <g transform="translate(50, 375)">
    <rect x="0" y="0" width="800" height="45" rx="8" fill="#111" stroke="#222"/>
    <text x="20" y="28" fill="#888" font-size="12">Edge types in directed DFS:</text>
    <line x1="240" y1="20" x2="280" y2="20" stroke="#34d399" stroke-width="2"/>
    <text x="290" y="25" fill="#ccc" font-size="11">Tree edge (W→G)</text>
    <line x1="430" y1="20" x2="470" y2="20" stroke="#f87171" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="480" y="25" fill="#ccc" font-size="11">Back edge (G→G) = CYCLE</text>
    <line x1="660" y1="20" x2="700" y2="20" stroke="#555" stroke-width="1.5"/>
    <text x="710" y="25" fill="#ccc" font-size="11">Cross (→B)</text>
  </g>

  <!-- Summary -->
  <g transform="translate(50, 435)">
    <rect x="0" y="0" width="800" height="55" rx="8" fill="#111" stroke="#5b6abf" stroke-width="1"/>
    <text x="20" y="22" fill="#5b6abf" font-size="13" font-weight="bold">Key Insight</text>
    <text x="20" y="42" fill="#ccc" font-size="12">2 colors (visited/not) work for undirected. Directed needs 3 colors to distinguish "currently exploring" from "done".</text>
  </g>
</svg>