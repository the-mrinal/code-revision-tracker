<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="SF Mono, Menlo, monospace">
  <rect width="900" height="500" rx="12" fill="#0a0a0a"/>
  <text x="450" y="35" text-anchor="middle" fill="#5b6abf" font-size="18" font-weight="bold">Deep Copy / Cloning — HashMap as Visited Set</text>

  <!-- Original Graph -->
  <g transform="translate(50, 60)">
    <text x="100" y="0" text-anchor="middle" fill="#888" font-size="13">Original Graph</text>
    <g transform="translate(0, 20)">
      <circle cx="30" cy="30" r="22" fill="#111" stroke="#5b6abf" stroke-width="2"/>
      <text x="30" y="35" text-anchor="middle" fill="#5b6abf" font-size="15" font-weight="bold">1</text>
      <circle cx="170" cy="30" r="22" fill="#111" stroke="#5b6abf" stroke-width="2"/>
      <text x="170" y="35" text-anchor="middle" fill="#5b6abf" font-size="15" font-weight="bold">2</text>
      <circle cx="170" cy="150" r="22" fill="#111" stroke="#5b6abf" stroke-width="2"/>
      <text x="170" y="155" text-anchor="middle" fill="#5b6abf" font-size="15" font-weight="bold">3</text>
      <circle cx="30" cy="150" r="22" fill="#111" stroke="#5b6abf" stroke-width="2"/>
      <text x="30" y="155" text-anchor="middle" fill="#5b6abf" font-size="15" font-weight="bold">4</text>
      <!-- Edges -->
      <line x1="52" y1="30" x2="148" y2="30" stroke="#5b6abf" stroke-width="1.5"/>
      <line x1="170" y1="52" x2="170" y2="128" stroke="#5b6abf" stroke-width="1.5"/>
      <line x1="148" y1="150" x2="52" y2="150" stroke="#5b6abf" stroke-width="1.5"/>
      <line x1="30" y1="128" x2="30" y2="52" stroke="#5b6abf" stroke-width="1.5"/>
    </g>
  </g>

  <!-- Arrow -->
  <g transform="translate(260, 140)">
    <text x="0" y="0" fill="#fbbf24" font-size="14" font-weight="bold">DFS + Map</text>
    <text x="20" y="20" fill="#fbbf24" font-size="24">→</text>
  </g>

  <!-- Cloned Graph -->
  <g transform="translate(340, 60)">
    <text x="100" y="0" text-anchor="middle" fill="#888" font-size="13">Cloned Graph</text>
    <g transform="translate(0, 20)">
      <circle cx="30" cy="30" r="22" fill="#111" stroke="#34d399" stroke-width="2"/>
      <text x="30" y="35" text-anchor="middle" fill="#34d399" font-size="15" font-weight="bold">1'</text>
      <circle cx="170" cy="30" r="22" fill="#111" stroke="#34d399" stroke-width="2"/>
      <text x="170" y="35" text-anchor="middle" fill="#34d399" font-size="15" font-weight="bold">2'</text>
      <circle cx="170" cy="150" r="22" fill="#111" stroke="#34d399" stroke-width="2"/>
      <text x="170" y="155" text-anchor="middle" fill="#34d399" font-size="15" font-weight="bold">3'</text>
      <circle cx="30" cy="150" r="22" fill="#111" stroke="#34d399" stroke-width="2"/>
      <text x="30" y="155" text-anchor="middle" fill="#34d399" font-size="15" font-weight="bold">4'</text>
      <!-- Edges -->
      <line x1="52" y1="30" x2="148" y2="30" stroke="#34d399" stroke-width="1.5"/>
      <line x1="170" y1="52" x2="170" y2="128" stroke="#34d399" stroke-width="1.5"/>
      <line x1="148" y1="150" x2="52" y2="150" stroke="#34d399" stroke-width="1.5"/>
      <line x1="30" y1="128" x2="30" y2="52" stroke="#34d399" stroke-width="1.5"/>
    </g>
  </g>

  <!-- Hash Map -->
  <g transform="translate(580, 60)">
    <text x="0" y="0" fill="#888" font-size="13">HashMap (old → new)</text>
    <rect x="0" y="12" width="280" height="130" rx="8" fill="#111" stroke="#222"/>
    <text x="60" y="38" text-anchor="middle" fill="#5b6abf" font-size="12" font-weight="bold">Old</text>
    <text x="200" y="38" text-anchor="middle" fill="#34d399" font-size="12" font-weight="bold">New</text>
    <line x1="130" y1="22" x2="130" y2="135" stroke="#333" stroke-width="1"/>
    <text x="15" y="60" fill="#5b6abf" font-size="13">Node 1</text>
    <text x="120" y="60" fill="#fbbf24" font-size="13">→</text>
    <text x="155" y="60" fill="#34d399" font-size="13">Node 1'</text>
    <text x="15" y="80" fill="#5b6abf" font-size="13">Node 2</text>
    <text x="120" y="80" fill="#fbbf24" font-size="13">→</text>
    <text x="155" y="80" fill="#34d399" font-size="13">Node 2'</text>
    <text x="15" y="100" fill="#5b6abf" font-size="13">Node 3</text>
    <text x="120" y="100" fill="#fbbf24" font-size="13">→</text>
    <text x="155" y="100" fill="#34d399" font-size="13">Node 3'</text>
    <text x="15" y="120" fill="#5b6abf" font-size="13">Node 4</text>
    <text x="120" y="120" fill="#fbbf24" font-size="13">→</text>
    <text x="155" y="120" fill="#34d399" font-size="13">Node 4'</text>
  </g>

  <!-- DFS Clone Trace -->
  <g transform="translate(580, 210)">
    <text x="0" y="0" fill="#888" font-size="12">DFS Clone Trace</text>
    <rect x="0" y="12" width="280" height="140" rx="8" fill="#111" stroke="#222"/>
    <text x="15" y="35" fill="#fbbf24" font-size="11">clone(1): create 1', map[1]=1'</text>
    <text x="30" y="52" fill="#fbbf24" font-size="11">clone(2): create 2', map[2]=2'</text>
    <text x="45" y="69" fill="#34d399" font-size="11">  → nbr 1: IN MAP → return 1'</text>
    <text x="45" y="86" fill="#fbbf24" font-size="11">clone(3): create 3'</text>
    <text x="60" y="103" fill="#34d399" font-size="11">  → nbr 2: IN MAP → 2'</text>
    <text x="60" y="120" fill="#fbbf24" font-size="11">clone(4): create 4'</text>
    <text x="75" y="137" fill="#34d399" font-size="11">  → 1,3: IN MAP ✓</text>
  </g>

  <!-- Critical note -->
  <g transform="translate(50, 310)">
    <rect x="0" y="0" width="480" height="65" rx="8" fill="#111" stroke="#f87171" stroke-width="1.5"/>
    <text x="20" y="22" fill="#f87171" font-size="13" font-weight="bold">Critical: Register clone BEFORE recursing!</text>
    <text x="20" y="42" fill="#ccc" font-size="11">map[node] = clone   // ← FIRST, before visiting neighbors</text>
    <text x="20" y="58" fill="#888" font-size="10">This prevents infinite loops on cycles — back edge hits the map and returns early</text>
  </g>

  <!-- Legend -->
  <g transform="translate(50, 395)">
    <rect x="0" y="0" width="800" height="45" rx="8" fill="#111" stroke="#222"/>
    <circle cx="30" cy="22" r="10" fill="#111" stroke="#5b6abf" stroke-width="1.5"/>
    <text x="50" y="27" fill="#ccc" font-size="11">Original node</text>
    <circle cx="170" cy="22" r="10" fill="#111" stroke="#34d399" stroke-width="1.5"/>
    <text x="190" y="27" fill="#ccc" font-size="11">Cloned node</text>
    <text x="310" y="27" fill="#fbbf24" font-size="11">→ = mapping in HashMap</text>
    <text x="520" y="27" fill="#888" font-size="11">Map serves as both visited set + clone lookup</text>
  </g>

  <!-- Summary -->
  <g transform="translate(50, 450)">
    <rect x="0" y="0" width="800" height="40" rx="8" fill="#111" stroke="#5b6abf" stroke-width="1"/>
    <text x="20" y="25" fill="#5b6abf" font-size="13" font-weight="bold">Key:</text>
    <text x="65" y="25" fill="#ccc" font-size="12">The old→new HashMap IS the visited set. No separate cycle detection needed. Works for graphs, linked lists, trees.</text>
  </g>
</svg>