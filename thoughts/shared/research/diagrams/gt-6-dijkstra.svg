<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="SF Mono, Menlo, monospace">
  <rect width="900" height="500" rx="12" fill="#0a0a0a"/>
  <text x="450" y="35" text-anchor="middle" fill="#5b6abf" font-size="18" font-weight="bold">Dijkstra's Algorithm — Shortest Path (Weighted)</text>

  <defs>
    <marker id="da" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#888"/></marker>
    <marker id="dg" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#34d399"/></marker>
  </defs>

  <!-- Graph -->
  <g transform="translate(50, 55)">
    <text x="120" y="0" text-anchor="middle" fill="#888" font-size="12">Network Delay Time (743)</text>
    <g transform="translate(0, 20)">
      <!-- Nodes -->
      <circle cx="120" cy="20" r="24" fill="#111" stroke="#fbbf24" stroke-width="2.5"/>
      <text x="120" y="25" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="bold">2</text>
      <text x="155" y="18" fill="#fbbf24" font-size="10">src, d=0</text>

      <circle cx="30" cy="110" r="24" fill="#111" stroke="#34d399" stroke-width="2"/>
      <text x="30" y="115" text-anchor="middle" fill="#34d399" font-size="15" font-weight="bold">1</text>
      <text x="-10" y="108" fill="#34d399" font-size="10">d=1</text>

      <circle cx="210" cy="110" r="24" fill="#111" stroke="#34d399" stroke-width="2"/>
      <text x="210" y="115" text-anchor="middle" fill="#34d399" font-size="15" font-weight="bold">3</text>
      <text x="245" y="108" fill="#34d399" font-size="10">d=1</text>

      <circle cx="210" cy="200" r="24" fill="#111" stroke="#a78bfa" stroke-width="2"/>
      <text x="210" y="205" text-anchor="middle" fill="#a78bfa" font-size="15" font-weight="bold">4</text>
      <text x="245" y="198" fill="#a78bfa" font-size="10">d=2</text>

      <!-- Edges with weights -->
      <line x1="100" y1="35" x2="48" y2="93" stroke="#34d399" stroke-width="2" marker-end="url(#dg)"/>
      <text x="60" y="55" fill="#34d399" font-size="12" font-weight="bold">1</text>

      <line x1="140" y1="35" x2="192" y2="93" stroke="#34d399" stroke-width="2" marker-end="url(#dg)"/>
      <text x="175" y="55" fill="#34d399" font-size="12" font-weight="bold">1</text>

      <line x1="210" y1="134" x2="210" y2="173" stroke="#a78bfa" stroke-width="2" marker-end="url(#da)"/>
      <text x="222" y="158" fill="#a78bfa" font-size="12" font-weight="bold">1</text>
    </g>
  </g>

  <!-- Priority Queue trace -->
  <g transform="translate(320, 55)">
    <text x="0" y="0" fill="#888" font-size="12">Min-Heap Priority Queue Trace</text>
    <rect x="0" y="12" width="540" height="170" rx="8" fill="#111" stroke="#222"/>

    <text x="15" y="38" fill="#5b6abf" font-size="12" font-weight="bold">Step</text>
    <text x="70" y="38" fill="#5b6abf" font-size="12" font-weight="bold">Pop</text>
    <text x="160" y="38" fill="#5b6abf" font-size="12" font-weight="bold">Action</text>
    <text x="350" y="38" fill="#5b6abf" font-size="12" font-weight="bold">Heap after</text>

    <line x1="10" y1="45" x2="530" y2="45" stroke="#333"/>

    <text x="15" y="62" fill="#ccc" font-size="11">0</text>
    <text x="70" y="62" fill="#fbbf24" font-size="11">(0, 2)</text>
    <text x="160" y="62" fill="#ccc" font-size="11">Push (1,1), (1,3)</text>
    <text x="350" y="62" fill="#ccc" font-size="11">[(1,1), (1,3)]</text>

    <text x="15" y="85" fill="#ccc" font-size="11">1</text>
    <text x="70" y="85" fill="#34d399" font-size="11">(1, 1)</text>
    <text x="160" y="85" fill="#ccc" font-size="11">No outgoing from 1</text>
    <text x="350" y="85" fill="#ccc" font-size="11">[(1,3)]</text>

    <text x="15" y="108" fill="#ccc" font-size="11">2</text>
    <text x="70" y="108" fill="#34d399" font-size="11">(1, 3)</text>
    <text x="160" y="108" fill="#ccc" font-size="11">Push (2,4)</text>
    <text x="350" y="108" fill="#ccc" font-size="11">[(2,4)]</text>

    <text x="15" y="131" fill="#ccc" font-size="11">3</text>
    <text x="70" y="131" fill="#a78bfa" font-size="11">(2, 4)</text>
    <text x="160" y="131" fill="#ccc" font-size="11">No outgoing from 4</text>
    <text x="350" y="131" fill="#ccc" font-size="11">[] empty</text>

    <text x="15" y="160" fill="#34d399" font-size="12" font-weight="bold">Result: max(dist) = 2</text>
    <text x="250" y="160" fill="#888" font-size="11">All nodes reached ✓</text>
  </g>

  <!-- Modified Dijkstra variants -->
  <g transform="translate(50, 295)">
    <text x="400" y="0" text-anchor="middle" fill="#888" font-size="12">Dijkstra Variants</text>
    <g transform="translate(0, 15)">
      <!-- Standard -->
      <rect x="0" y="0" width="260" height="70" rx="8" fill="#111" stroke="#34d399" stroke-width="1"/>
      <text x="15" y="20" fill="#34d399" font-size="12" font-weight="bold">Standard (sum)</text>
      <text x="15" y="40" fill="#ccc" font-size="11">dist[v] = dist[u] + w(u,v)</text>
      <text x="15" y="58" fill="#888" font-size="10">743, 1976, 2045</text>

      <!-- Minimax -->
      <rect x="280" y="0" width="260" height="70" rx="8" fill="#111" stroke="#a78bfa" stroke-width="1"/>
      <text x="295" y="20" fill="#a78bfa" font-size="12" font-weight="bold">Minimax (max along path)</text>
      <text x="295" y="40" fill="#ccc" font-size="11">dist[v] = max(dist[u], w(u,v))</text>
      <text x="295" y="58" fill="#888" font-size="10">778, 1631 — minimize worst edge</text>

      <!-- 0-1 BFS -->
      <rect x="560" y="0" width="260" height="70" rx="8" fill="#111" stroke="#fbbf24" stroke-width="1"/>
      <text x="575" y="20" fill="#fbbf24" font-size="12" font-weight="bold">0-1 BFS (deque)</text>
      <text x="575" y="40" fill="#ccc" font-size="11">w=0: push front, w=1: push back</text>
      <text x="575" y="58" fill="#888" font-size="10">2290 — O(V+E) vs O((V+E)logV)</text>
    </g>
  </g>

  <!-- Skip stale optimization -->
  <g transform="translate(50, 400)">
    <rect x="0" y="0" width="800" height="45" rx="8" fill="#111" stroke="#f87171" stroke-width="1"/>
    <text x="20" y="18" fill="#f87171" font-size="12" font-weight="bold">Stale entry skip:</text>
    <text x="175" y="18" fill="#ccc" font-size="11">if d > dist[u]: continue</text>
    <text x="20" y="37" fill="#888" font-size="10">Same node may be pushed multiple times. By the time we pop a stale entry, we already found a shorter path. Skip = O(1).</text>
  </g>

  <!-- Summary -->
  <g transform="translate(50, 455)">
    <rect x="0" y="0" width="800" height="38" rx="8" fill="#111" stroke="#5b6abf" stroke-width="1"/>
    <text x="20" y="24" fill="#5b6abf" font-size="13" font-weight="bold">Key:</text>
    <text x="65" y="24" fill="#ccc" font-size="12">Greedy on distance — always process closest node. Non-negative weights only. O((V+E) log V) with binary heap.</text>
  </g>
</svg>