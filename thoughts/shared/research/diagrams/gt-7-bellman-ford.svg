<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="SF Mono, Menlo, monospace">
  <rect width="900" height="500" rx="12" fill="#0a0a0a"/>
  <text x="450" y="35" text-anchor="middle" fill="#5b6abf" font-size="18" font-weight="bold">Bellman-Ford — Shortest Path with K Stops</text>

  <!-- Graph -->
  <g transform="translate(50, 55)">
    <text x="100" y="0" text-anchor="middle" fill="#888" font-size="12">Cheapest Flights (787) — K=1 stop</text>
    <g transform="translate(0, 20)">
      <circle cx="30" cy="30" r="22" fill="#111" stroke="#fbbf24" stroke-width="2.5"/>
      <text x="30" y="35" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="bold">0</text>
      <text x="60" y="22" fill="#fbbf24" font-size="9">src</text>

      <circle cx="30" cy="140" r="22" fill="#111" stroke="#a78bfa" stroke-width="2"/>
      <text x="30" y="145" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold">1</text>

      <circle cx="190" cy="30" r="22" fill="#111" stroke="#a78bfa" stroke-width="2"/>
      <text x="190" y="35" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold">2</text>

      <circle cx="190" cy="140" r="22" fill="#111" stroke="#34d399" stroke-width="2.5"/>
      <text x="190" y="145" text-anchor="middle" fill="#34d399" font-size="14" font-weight="bold">3</text>
      <text x="220" y="148" fill="#34d399" font-size="9">dst</text>

      <!-- Edges -->
      <line x1="30" y1="52" x2="30" y2="115" stroke="#888" stroke-width="1.5" marker-end="url(#bfa)"/>
      <text x="8" y="85" fill="#fbbf24" font-size="11">$100</text>

      <line x1="48" y1="18" x2="168" y2="18" stroke="#888" stroke-width="1.5" marker-end="url(#bfa)"/>
      <text x="100" y="14" fill="#fbbf24" font-size="11">$500</text>

      <line x1="42" y1="155" x2="168" y2="155" stroke="#888" stroke-width="1.5" marker-end="url(#bfa)"/>
      <text x="100" y="170" fill="#a78bfa" font-size="11">$600</text>

      <line x1="48" y1="135" x2="172" y2="45" stroke="#888" stroke-width="1.5" marker-end="url(#bfa)"/>
      <text x="95" y="80" fill="#a78bfa" font-size="11">$100</text>

      <line x1="190" y1="52" x2="190" y2="115" stroke="#888" stroke-width="1.5" marker-end="url(#bfa)"/>
      <text x="200" y="85" fill="#a78bfa" font-size="11">$200</text>

      <!-- Highlight shortest path -->
      <path d="M 52 38 L 52 130 L 168 145" fill="none" stroke="#34d399" stroke-width="2.5" stroke-dasharray="6,3"/>
      <text x="100" y="200" fill="#34d399" font-size="12" font-weight="bold">Best: 0→1→3 = $700</text>
      <text x="100" y="215" fill="#f87171" font-size="10">0→1→2→3 = $400 but needs 2 stops ✗</text>
    </g>
  </g>

  <defs>
    <marker id="bfa" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#888"/></marker>
  </defs>

  <!-- Round-by-round relaxation -->
  <g transform="translate(300, 55)">
    <text x="0" y="0" fill="#888" font-size="12">Round-by-Round Relaxation (K+1 = 2 rounds)</text>
    <rect x="0" y="12" width="570" height="200" rx="8" fill="#111" stroke="#222"/>

    <!-- Headers -->
    <text x="15" y="38" fill="#5b6abf" font-size="12" font-weight="bold">Round</text>
    <text x="80" y="38" fill="#5b6abf" font-size="12" font-weight="bold">dist[0]</text>
    <text x="155" y="38" fill="#5b6abf" font-size="12" font-weight="bold">dist[1]</text>
    <text x="230" y="38" fill="#5b6abf" font-size="12" font-weight="bold">dist[2]</text>
    <text x="305" y="38" fill="#5b6abf" font-size="12" font-weight="bold">dist[3]</text>
    <text x="380" y="38" fill="#5b6abf" font-size="12" font-weight="bold">Relaxed edges</text>
    <line x1="10" y1="45" x2="560" y2="45" stroke="#333"/>

    <!-- Round 0 (initial) -->
    <text x="15" y="68" fill="#888" font-size="12">Init</text>
    <text x="95" y="68" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold">0</text>
    <text x="170" y="68" text-anchor="middle" fill="#555" font-size="12">∞</text>
    <text x="245" y="68" text-anchor="middle" fill="#555" font-size="12">∞</text>
    <text x="320" y="68" text-anchor="middle" fill="#555" font-size="12">∞</text>
    <text x="380" y="68" fill="#888" font-size="11">—</text>

    <!-- Round 1 -->
    <text x="15" y="100" fill="#a78bfa" font-size="12" font-weight="bold">1</text>
    <text x="95" y="100" text-anchor="middle" fill="#fbbf24" font-size="12">0</text>
    <text x="170" y="100" text-anchor="middle" fill="#34d399" font-size="12" font-weight="bold">100</text>
    <text x="245" y="100" text-anchor="middle" fill="#34d399" font-size="12" font-weight="bold">500</text>
    <text x="320" y="100" text-anchor="middle" fill="#555" font-size="12">∞</text>
    <text x="380" y="100" fill="#ccc" font-size="10">0→1 ($100), 0→2 ($500)</text>
    <text x="380" y="115" fill="#888" font-size="9">Uses prev round's dist[]</text>

    <!-- Round 2 -->
    <text x="15" y="145" fill="#a78bfa" font-size="12" font-weight="bold">2</text>
    <text x="95" y="145" text-anchor="middle" fill="#fbbf24" font-size="12">0</text>
    <text x="170" y="145" text-anchor="middle" fill="#ccc" font-size="12">100</text>
    <text x="245" y="145" text-anchor="middle" fill="#34d399" font-size="12" font-weight="bold">200</text>
    <text x="320" y="145" text-anchor="middle" fill="#34d399" font-size="12" font-weight="bold">700</text>
    <text x="380" y="145" fill="#ccc" font-size="10">1→2 ($200), 1→3 ($700)</text>
    <text x="380" y="160" fill="#888" font-size="9">2→3 ($700) — no improvement</text>

    <!-- Result -->
    <rect x="10" y="175" width="550" height="30" rx="4" fill="#0a0a0a" stroke="#34d399" stroke-width="1"/>
    <text x="25" y="195" fill="#34d399" font-size="13" font-weight="bold">Answer: dist[3] = $700</text>
    <text x="250" y="195" fill="#888" font-size="11">(at most K=1 stops = 2 edges)</text>
  </g>

  <!-- Critical insight: prev copy -->
  <g transform="translate(50, 310)">
    <rect x="0" y="0" width="400" height="70" rx="8" fill="#111" stroke="#f87171" stroke-width="1.5"/>
    <text x="20" y="22" fill="#f87171" font-size="12" font-weight="bold">Why copy prev distances?</text>
    <text x="20" y="42" fill="#ccc" font-size="11">prev = copy(dist)  // use PREVIOUS round</text>
    <text x="20" y="60" fill="#888" font-size="10">Without copy: updates in same round "leak" extra edges, breaking K constraint</text>
  </g>

  <!-- Comparison: Dijkstra vs Bellman-Ford -->
  <g transform="translate(480, 310)">
    <rect x="0" y="0" width="380" height="70" rx="8" fill="#111" stroke="#222"/>
    <text x="15" y="20" fill="#5b6abf" font-size="12" font-weight="bold">Dijkstra vs Bellman-Ford</text>
    <text x="15" y="40" fill="#34d399" font-size="10">Dijkstra: O((V+E)logV), no neg weights, no K limit</text>
    <text x="15" y="57" fill="#a78bfa" font-size="10">B-F: O(K×E), handles neg weights, enforces K stops</text>
  </g>

  <!-- Legend -->
  <g transform="translate(50, 400)">
    <rect x="0" y="0" width="800" height="40" rx="8" fill="#111" stroke="#222"/>
    <text x="20" y="25" fill="#fbbf24" font-size="11">● Source</text>
    <text x="110" y="25" fill="#34d399" font-size="11">● Destination / updated</text>
    <text x="310" y="25" fill="#a78bfa" font-size="11">● Intermediate</text>
    <text x="470" y="25" fill="#888" font-size="11">K stops = K+1 relaxation rounds</text>
  </g>

  <!-- Summary -->
  <g transform="translate(50, 450)">
    <rect x="0" y="0" width="800" height="40" rx="8" fill="#111" stroke="#5b6abf" stroke-width="1"/>
    <text x="20" y="25" fill="#5b6abf" font-size="13" font-weight="bold">Key:</text>
    <text x="65" y="25" fill="#ccc" font-size="12">Relax ALL edges K+1 times using previous round's distances. The prev copy enforces the edge count limit.</text>
  </g>
</svg>