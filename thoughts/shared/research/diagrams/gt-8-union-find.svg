<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="SF Mono, Menlo, monospace">
  <rect width="900" height="500" rx="12" fill="#0a0a0a"/>
  <text x="450" y="35" text-anchor="middle" fill="#5b6abf" font-size="18" font-weight="bold">Union-Find (Disjoint Set Union)</text>

  <!-- Step-by-step union operations -->
  <g transform="translate(50, 55)">
    <text x="0" y="0" fill="#888" font-size="12">Redundant Connection (684) — edges: [1,2], [1,3], [2,3]</text>

    <!-- State 0: Initial -->
    <g transform="translate(0, 25)">
      <text x="60" y="0" text-anchor="middle" fill="#a78bfa" font-size="11">Initial</text>
      <circle cx="20" cy="30" r="16" fill="#111" stroke="#888" stroke-width="1.5"/>
      <text x="20" y="35" text-anchor="middle" fill="#888" font-size="13">1</text>
      <circle cx="60" cy="30" r="16" fill="#111" stroke="#888" stroke-width="1.5"/>
      <text x="60" y="35" text-anchor="middle" fill="#888" font-size="13">2</text>
      <circle cx="100" cy="30" r="16" fill="#111" stroke="#888" stroke-width="1.5"/>
      <text x="100" y="35" text-anchor="middle" fill="#888" font-size="13">3</text>
      <text x="60" y="65" text-anchor="middle" fill="#555" font-size="9">3 components</text>
    </g>

    <!-- Arrow -->
    <text x="140" y="60" fill="#5b6abf" font-size="16">→</text>

    <!-- State 1: After union(1,2) -->
    <g transform="translate(165, 25)">
      <text x="50" y="0" text-anchor="middle" fill="#34d399" font-size="11">union(1,2)</text>
      <circle cx="40" cy="25" r="16" fill="#111" stroke="#34d399" stroke-width="2"/>
      <text x="40" y="30" text-anchor="middle" fill="#34d399" font-size="13">1</text>
      <circle cx="40" cy="60" r="16" fill="#111" stroke="#34d399" stroke-width="1.5"/>
      <text x="40" y="65" text-anchor="middle" fill="#34d399" font-size="13">2</text>
      <line x1="40" y1="41" x2="40" y2="44" stroke="#34d399" stroke-width="1.5"/>
      <circle cx="90" cy="25" r="16" fill="#111" stroke="#888" stroke-width="1.5"/>
      <text x="90" y="30" text-anchor="middle" fill="#888" font-size="13">3</text>
      <text x="50" y="90" text-anchor="middle" fill="#555" font-size="9">2 components</text>
    </g>

    <text x="305" y="60" fill="#5b6abf" font-size="16">→</text>

    <!-- State 2: After union(1,3) -->
    <g transform="translate(330, 25)">
      <text x="40" y="0" text-anchor="middle" fill="#a78bfa" font-size="11">union(1,3)</text>
      <circle cx="40" cy="25" r="16" fill="#111" stroke="#a78bfa" stroke-width="2"/>
      <text x="40" y="30" text-anchor="middle" fill="#a78bfa" font-size="13">1</text>
      <circle cx="20" cy="60" r="16" fill="#111" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="20" y="65" text-anchor="middle" fill="#a78bfa" font-size="13">2</text>
      <circle cx="60" cy="60" r="16" fill="#111" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="60" y="65" text-anchor="middle" fill="#a78bfa" font-size="13">3</text>
      <line x1="32" y1="39" x2="25" y2="44" stroke="#a78bfa" stroke-width="1.5"/>
      <line x1="48" y1="39" x2="55" y2="44" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="40" y="90" text-anchor="middle" fill="#555" font-size="9">1 component</text>
    </g>

    <text x="445" y="60" fill="#5b6abf" font-size="16">→</text>

    <!-- State 3: union(2,3) — REDUNDANT -->
    <g transform="translate(470, 25)">
      <text x="70" y="0" text-anchor="middle" fill="#f87171" font-size="11" font-weight="bold">union(2,3) ✗</text>
      <rect x="0" y="10" width="140" height="75" rx="6" fill="#111" stroke="#f87171" stroke-width="2" stroke-dasharray="5,3"/>
      <text x="70" y="38" text-anchor="middle" fill="#f87171" font-size="12">find(2) = 1</text>
      <text x="70" y="55" text-anchor="middle" fill="#f87171" font-size="12">find(3) = 1</text>
      <text x="70" y="75" text-anchor="middle" fill="#f87171" font-size="12" font-weight="bold">SAME ROOT!</text>
      <text x="70" y="100" text-anchor="middle" fill="#f87171" font-size="11">[2,3] is redundant</text>
    </g>
  </g>

  <!-- Path Compression visualization -->
  <g transform="translate(50, 210)">
    <text x="0" y="0" fill="#888" font-size="12">Path Compression — find(4)</text>
    <g transform="translate(0, 20)">
      <!-- Before -->
      <text x="50" y="0" text-anchor="middle" fill="#888" font-size="11">Before</text>
      <circle cx="50" cy="25" r="14" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="50" y="30" text-anchor="middle" fill="#fbbf24" font-size="12">1</text>
      <circle cx="50" cy="60" r="14" fill="#111" stroke="#888" stroke-width="1"/>
      <text x="50" y="65" text-anchor="middle" fill="#888" font-size="12">3</text>
      <circle cx="50" cy="95" r="14" fill="#111" stroke="#888" stroke-width="1"/>
      <text x="50" y="100" text-anchor="middle" fill="#888" font-size="12">4</text>
      <line x1="50" y1="39" x2="50" y2="46" stroke="#888" stroke-width="1"/>
      <line x1="50" y1="74" x2="50" y2="81" stroke="#888" stroke-width="1"/>
      <text x="70" y="100" fill="#888" font-size="9">4→3→1</text>

      <!-- Arrow -->
      <text x="115" y="60" fill="#5b6abf" font-size="16">→</text>

      <!-- After -->
      <text x="195" y="0" text-anchor="middle" fill="#34d399" font-size="11">After</text>
      <circle cx="195" cy="25" r="14" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="195" y="30" text-anchor="middle" fill="#fbbf24" font-size="12">1</text>
      <circle cx="170" cy="60" r="14" fill="#111" stroke="#34d399" stroke-width="1.5"/>
      <text x="170" y="65" text-anchor="middle" fill="#34d399" font-size="12">3</text>
      <circle cx="220" cy="60" r="14" fill="#111" stroke="#34d399" stroke-width="1.5"/>
      <text x="220" y="65" text-anchor="middle" fill="#34d399" font-size="12">4</text>
      <line x1="183" y1="37" x2="178" y2="46" stroke="#34d399" stroke-width="1.5"/>
      <line x1="207" y1="37" x2="212" y2="46" stroke="#34d399" stroke-width="1.5"/>
      <text x="255" y="65" fill="#34d399" font-size="9">4→1 direct!</text>
    </g>
  </g>

  <!-- Core operations -->
  <g transform="translate(320, 210)">
    <text x="0" y="0" fill="#888" font-size="12">Core Operations</text>
    <rect x="0" y="12" width="280" height="130" rx="8" fill="#111" stroke="#222"/>
    <text x="15" y="35" fill="#5b6abf" font-size="12" font-weight="bold">find(x):</text>
    <text x="15" y="52" fill="#ccc" font-size="11">  if parent[x] ≠ x:</text>
    <text x="15" y="67" fill="#34d399" font-size="11">    parent[x] = find(parent[x])</text>
    <text x="15" y="82" fill="#ccc" font-size="11">  return parent[x]</text>
    <text x="15" y="105" fill="#5b6abf" font-size="12" font-weight="bold">union(x, y):</text>
    <text x="15" y="120" fill="#ccc" font-size="11">  rootX, rootY = find(x), find(y)</text>
    <text x="15" y="135" fill="#ccc" font-size="11">  if rootX == rootY: return false</text>
  </g>

  <!-- Use cases -->
  <g transform="translate(630, 210)">
    <text x="0" y="0" fill="#888" font-size="12">When to use Union-Find</text>
    <rect x="0" y="12" width="240" height="130" rx="8" fill="#111" stroke="#222"/>
    <text x="15" y="35" fill="#34d399" font-size="11">✓ Dynamic edge additions</text>
    <text x="15" y="52" fill="#34d399" font-size="11">✓ Detect redundant edges</text>
    <text x="15" y="69" fill="#34d399" font-size="11">✓ Count components over time</text>
    <text x="15" y="86" fill="#34d399" font-size="11">✓ Kruskal's MST</text>
    <text x="15" y="110" fill="#f87171" font-size="11">✗ Shortest path</text>
    <text x="15" y="127" fill="#f87171" font-size="11">✗ Edge removal (only additions)</text>
  </g>

  <!-- Time complexity -->
  <g transform="translate(50, 395)">
    <rect x="0" y="0" width="800" height="40" rx="8" fill="#111" stroke="#222"/>
    <text x="20" y="25" fill="#fbbf24" font-size="12" font-weight="bold">Amortized O(α(n)) per operation</text>
    <text x="310" y="25" fill="#888" font-size="11">α = inverse Ackermann ≈ constant for any practical n. Path compression + union by rank = near O(1).</text>
  </g>

  <!-- Summary -->
  <g transform="translate(50, 450)">
    <rect x="0" y="0" width="800" height="40" rx="8" fill="#111" stroke="#5b6abf" stroke-width="1"/>
    <text x="20" y="25" fill="#5b6abf" font-size="13" font-weight="bold">Key:</text>
    <text x="65" y="25" fill="#ccc" font-size="12">Path compression flattens trees, union by rank keeps them balanced. Together = near-constant per operation.</text>
  </g>
</svg>