<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="SF Mono, Menlo, monospace">
  <rect width="900" height="520" rx="12" fill="#0a0a0a"/>
  <text x="450" y="35" text-anchor="middle" fill="#5b6abf" font-size="18" font-weight="bold">Strongly Connected Components — Kosaraju's</text>

  <defs>
    <marker id="sa" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#888"/></marker>
    <marker id="sg" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#34d399"/></marker>
    <marker id="sp" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#a78bfa"/></marker>
  </defs>

  <!-- Original directed graph -->
  <g transform="translate(50, 55)">
    <text x="160" y="0" text-anchor="middle" fill="#888" font-size="12">Directed Graph with 2 SCCs</text>
    <g transform="translate(20, 20)">
      <!-- SCC 1: {0,1,2} -->
      <rect x="-5" y="-5" width="140" height="110" rx="10" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="5,3" opacity="0.4"/>
      <circle cx="25" cy="18" r="18" fill="#111" stroke="#34d399" stroke-width="2"/>
      <text x="25" y="23" text-anchor="middle" fill="#34d399" font-size="13">0</text>
      <circle cx="110" cy="18" r="18" fill="#111" stroke="#34d399" stroke-width="2"/>
      <text x="110" y="23" text-anchor="middle" fill="#34d399" font-size="13">1</text>
      <circle cx="67" cy="80" r="18" fill="#111" stroke="#34d399" stroke-width="2"/>
      <text x="67" y="85" text-anchor="middle" fill="#34d399" font-size="13">2</text>
      <line x1="43" y1="18" x2="90" y2="18" stroke="#34d399" stroke-width="1.5" marker-end="url(#sg)"/>
      <line x1="100" y1="34" x2="80" y2="64" stroke="#34d399" stroke-width="1.5" marker-end="url(#sg)"/>
      <line x1="52" y1="72" x2="33" y2="36" stroke="#34d399" stroke-width="1.5" marker-end="url(#sg)"/>

      <!-- SCC 2: {3,4,5} -->
      <rect x="175" y="20" width="130" height="110" rx="10" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="5,3" opacity="0.4"/>
      <circle cx="240" cy="45" r="18" fill="#111" stroke="#a78bfa" stroke-width="2"/>
      <text x="240" y="50" text-anchor="middle" fill="#a78bfa" font-size="13">3</text>
      <circle cx="200" cy="110" r="18" fill="#111" stroke="#a78bfa" stroke-width="2"/>
      <text x="200" y="115" text-anchor="middle" fill="#a78bfa" font-size="13">4</text>
      <circle cx="280" cy="110" r="18" fill="#111" stroke="#a78bfa" stroke-width="2"/>
      <text x="280" y="115" text-anchor="middle" fill="#a78bfa" font-size="13">5</text>
      <line x1="228" y1="60" x2="210" y2="94" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#sp)"/>
      <line x1="218" y1="110" x2="260" y2="110" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#sp)"/>
      <line x1="272" y1="94" x2="252" y2="60" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#sp)"/>

      <!-- Bridge edge 2→3 -->
      <line x1="83" y1="72" x2="222" y2="50" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#sa)"/>
      <text x="148" y="50" fill="#fbbf24" font-size="9">bridge</text>
    </g>
    <text x="30" y="160" fill="#34d399" font-size="11">SCC₁ = {0,1,2}</text>
    <text x="200" y="160" fill="#a78bfa" font-size="11">SCC₂ = {3,4,5}</text>
  </g>

  <!-- Kosaraju's two passes -->
  <g transform="translate(420, 55)">
    <text x="0" y="0" fill="#888" font-size="12">Kosaraju's — Two Passes</text>
    <rect x="0" y="12" width="440" height="100" rx="8" fill="#111" stroke="#222"/>
    <text x="15" y="35" fill="#fbbf24" font-size="12" font-weight="bold">Pass 1: DFS on original graph</text>
    <text x="15" y="52" fill="#ccc" font-size="11">Record finish order in a stack</text>
    <text x="15" y="69" fill="#888" font-size="10">Stack: [0, 2, 1, 3, 5, 4]</text>
    <text x="15" y="90" fill="#34d399" font-size="12" font-weight="bold">Pass 2: DFS on REVERSED graph</text>
    <text x="15" y="105" fill="#ccc" font-size="11">Process in reverse finish order</text>
  </g>

  <!-- Pass 2 detail -->
  <g transform="translate(420, 175)">
    <rect x="0" y="0" width="440" height="80" rx="8" fill="#111" stroke="#34d399" stroke-width="1"/>
    <text x="15" y="20" fill="#34d399" font-size="12" font-weight="bold">Pass 2 — Reversed Graph:</text>
    <text x="15" y="40" fill="#ccc" font-size="11">Pop 4: dfs(4)→3→5</text>
    <text x="220" y="40" fill="#a78bfa" font-size="11">SCC = {4,3,5} ✓</text>
    <text x="15" y="58" fill="#ccc" font-size="11">Pop 1: dfs(1)→0→2</text>
    <text x="220" y="58" fill="#34d399" font-size="11">SCC = {1,0,2} ✓</text>
    <text x="15" y="74" fill="#888" font-size="10">2 SCCs found</text>
  </g>

  <!-- Condensation DAG -->
  <g transform="translate(50, 280)">
    <text x="0" y="0" fill="#888" font-size="12">Condensation DAG</text>
    <g transform="translate(20, 18)">
      <rect x="0" y="0" width="80" height="32" rx="8" fill="#111" stroke="#34d399" stroke-width="2"/>
      <text x="40" y="21" text-anchor="middle" fill="#34d399" font-size="11">{0,1,2}</text>
      <line x1="80" y1="16" x2="120" y2="16" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#sa)"/>
      <rect x="125" y="0" width="80" height="32" rx="8" fill="#111" stroke="#a78bfa" stroke-width="2"/>
      <text x="165" y="21" text-anchor="middle" fill="#a78bfa" font-size="11">{3,4,5}</text>
    </g>
    <text x="20" y="68" fill="#888" font-size="10">Contract each SCC to a single node → results in a DAG</text>
  </g>

  <!-- Tarjan's alternative -->
  <g transform="translate(420, 280)">
    <rect x="0" y="0" width="440" height="68" rx="8" fill="#111" stroke="#222"/>
    <text x="15" y="20" fill="#5b6abf" font-size="12" font-weight="bold">Alternative: Tarjan's Algorithm</text>
    <text x="15" y="38" fill="#ccc" font-size="11">Single DFS pass with disc[] and low[]</text>
    <text x="15" y="55" fill="#888" font-size="10">Same O(V+E). More efficient, harder to implement.</text>
  </g>

  <!-- Legend -->
  <g transform="translate(50, 380)">
    <rect x="0" y="0" width="810" height="55" rx="8" fill="#111" stroke="#222"/>
    <rect x="20" y="12" width="14" height="14" rx="3" fill="none" stroke="#34d399" stroke-dasharray="4,2"/>
    <text x="42" y="24" fill="#ccc" font-size="11">SCC 1</text>
    <rect x="110" y="12" width="14" height="14" rx="3" fill="none" stroke="#a78bfa" stroke-dasharray="4,2"/>
    <text x="132" y="24" fill="#ccc" font-size="11">SCC 2</text>
    <line x1="210" y1="20" x2="250" y2="20" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="260" y="24" fill="#ccc" font-size="11">Cross-SCC edge</text>
    <text x="20" y="44" fill="#888" font-size="10">Within an SCC: every node can reach every other node. Between SCCs: only one direction.</text>
  </g>

  <!-- Summary -->
  <g transform="translate(50, 450)">
    <rect x="0" y="0" width="810" height="55" rx="8" fill="#111" stroke="#5b6abf" stroke-width="1"/>
    <text x="20" y="22" fill="#5b6abf" font-size="13" font-weight="bold">Key Takeaway</text>
    <text x="20" y="42" fill="#ccc" font-size="11">SCCs = groups of mutually reachable nodes in directed graphs.</text>
    <text x="490" y="42" fill="#888" font-size="11">Kosaraju's: 2 DFS passes (original + reversed).</text>
  </g>
</svg>