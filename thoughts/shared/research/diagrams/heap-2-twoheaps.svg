<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" font-family="SF Mono, Menlo, monospace">
  <rect width="1100" height="520" rx="12" fill="#0a0a0a"/>
  <text x="550" y="32" text-anchor="middle" fill="#a78bfa" font-size="16" font-weight="700">Two Heaps — Running Median from Data Stream</text>
  <text x="550" y="52" text-anchor="middle" fill="#777" font-size="11">MaxHeap (lower half) + MinHeap (upper half) → Median at the boundary</text>

  <!-- Visual heap structure -->
  <rect x="60" y="75" width="480" height="180" rx="8" fill="#111" stroke="#222"/>
  <text x="300" y="100" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="600">After adding [5, 15, 1, 3, 8]</text>

  <!-- Max heap (lower) -->
  <rect x="90" y="115" width="200" height="120" rx="6" fill="#0d0d0d" stroke="#34d399" stroke-width="1"/>
  <text x="190" y="138" text-anchor="middle" fill="#34d399" font-size="12" font-weight="600">MaxHeap (lower)</text>
  <text x="190" y="158" text-anchor="middle" fill="#34d399" font-size="11">↑ biggest on top</text>

  <circle cx="190" cy="185" r="16" fill="none" stroke="#34d399" stroke-width="2"/>
  <text x="190" y="190" text-anchor="middle" fill="#34d399" font-size="14" font-weight="700">5</text>

  <circle cx="155" cy="218" r="14" fill="none" stroke="#34d399" stroke-width="1"/>
  <text x="155" y="223" text-anchor="middle" fill="#34d399" font-size="12">3</text>

  <circle cx="225" cy="218" r="14" fill="none" stroke="#34d399" stroke-width="1"/>
  <text x="225" y="223" text-anchor="middle" fill="#34d399" font-size="12">1</text>

  <line x1="178" y1="198" x2="162" y2="207" stroke="#34d399" stroke-width="1"/>
  <line x1="202" y1="198" x2="218" y2="207" stroke="#34d399" stroke-width="1"/>

  <!-- Min heap (upper) -->
  <rect x="320" y="115" width="200" height="120" rx="6" fill="#0d0d0d" stroke="#38bdf8" stroke-width="1"/>
  <text x="420" y="138" text-anchor="middle" fill="#38bdf8" font-size="12" font-weight="600">MinHeap (upper)</text>
  <text x="420" y="158" text-anchor="middle" fill="#38bdf8" font-size="11">↓ smallest on top</text>

  <circle cx="420" cy="185" r="16" fill="none" stroke="#38bdf8" stroke-width="2"/>
  <text x="420" y="190" text-anchor="middle" fill="#38bdf8" font-size="14" font-weight="700">8</text>

  <circle cx="385" cy="218" r="14" fill="none" stroke="#38bdf8" stroke-width="1"/>
  <text x="385" y="223" text-anchor="middle" fill="#38bdf8" font-size="12">15</text>

  <line x1="408" y1="198" x2="392" y2="207" stroke="#38bdf8" stroke-width="1"/>

  <!-- Median arrow -->
  <text x="305" y="190" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="700">→</text>
  <text x="305" y="230" text-anchor="middle" fill="#fbbf24" font-size="10">median</text>
  <text x="305" y="245" text-anchor="middle" fill="#fbbf24" font-size="10">= 5</text>

  <!-- Step-by-step trace -->
  <rect x="580" y="75" width="460" height="260" rx="8" fill="#111" stroke="#222"/>
  <text x="810" y="100" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="600">#295 — Step-by-Step Trace</text>

  <text x="610" y="130" fill="#555" font-size="11">Add</text>
  <text x="670" y="130" fill="#555" font-size="11">MaxHeap (lower)</text>
  <text x="830" y="130" fill="#555" font-size="11">MinHeap (upper)</text>
  <text x="970" y="130" fill="#555" font-size="11">Median</text>

  <line x1="600" y1="140" x2="1020" y2="140" stroke="#333" stroke-width="1"/>

  <text x="610" y="163" fill="#ddd" font-size="12">5</text>
  <text x="670" y="163" fill="#34d399" font-size="12">[5]</text>
  <text x="830" y="163" fill="#38bdf8" font-size="12">[]</text>
  <text x="970" y="163" fill="#fbbf24" font-size="12">5.0</text>

  <text x="610" y="190" fill="#ddd" font-size="12">15</text>
  <text x="670" y="190" fill="#34d399" font-size="12">[5]</text>
  <text x="830" y="190" fill="#38bdf8" font-size="12">[15]</text>
  <text x="970" y="190" fill="#fbbf24" font-size="12">10.0</text>

  <text x="610" y="217" fill="#ddd" font-size="12">1</text>
  <text x="670" y="217" fill="#34d399" font-size="12">[5, 1]</text>
  <text x="830" y="217" fill="#38bdf8" font-size="12">[15]</text>
  <text x="970" y="217" fill="#fbbf24" font-size="12">5.0</text>

  <text x="610" y="244" fill="#ddd" font-size="12">3</text>
  <text x="670" y="244" fill="#34d399" font-size="12">[3, 1]</text>
  <text x="830" y="244" fill="#38bdf8" font-size="12">[5, 15]</text>
  <text x="970" y="244" fill="#fbbf24" font-size="12">4.0</text>

  <text x="610" y="271" fill="#ddd" font-size="12">8</text>
  <text x="670" y="271" fill="#34d399" font-size="12">[5, 3, 1]</text>
  <text x="830" y="271" fill="#38bdf8" font-size="12">[8, 15]</text>
  <text x="970" y="271" fill="#fbbf24" font-size="14" font-weight="700">5.0</text>

  <text x="610" y="305" fill="#777" font-size="10">Odd count → median = maxHeap top</text>
  <text x="610" y="320" fill="#777" font-size="10">Even count → median = (maxTop + minTop) / 2</text>

  <!-- Invariants -->
  <rect x="60" y="280" width="480" height="80" rx="8" fill="#111" stroke="#222"/>
  <text x="300" y="305" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="600">Two Invariants to Maintain</text>
  <text x="100" y="330" fill="#ddd" font-size="12">1. Ordering: maxHeap.top ≤ minHeap.top</text>
  <text x="100" y="350" fill="#ddd" font-size="12">2. Balance: |maxHeap.size - minHeap.size| ≤ 1</text>

  <!-- Add algorithm -->
  <rect x="60" y="385" width="980" height="110" rx="8" fill="#111" stroke="#222"/>
  <text x="550" y="410" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="600">addNum(num) Algorithm</text>

  <text x="100" y="440" fill="#34d399" font-size="12">1. Push num to maxHeap</text>
  <text x="400" y="440" fill="#38bdf8" font-size="12">2. Move maxHeap top → minHeap (fix ordering)</text>
  <text x="100" y="470" fill="#fbbf24" font-size="12">3. If minHeap bigger: move minHeap top → maxHeap (fix balance)</text>
  <text x="680" y="470" fill="#777" font-size="11">O(log n) per add, O(1) median</text>
</svg>
