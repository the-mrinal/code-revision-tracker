<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" font-family="SF Mono, Menlo, monospace">
  <rect width="1100" height="520" rx="12" fill="#0a0a0a"/>
  <text x="550" y="32" text-anchor="middle" fill="#38bdf8" font-size="16" font-weight="700">K-way Merge — Min-Heap Frontier Across K Sorted Lists</text>
  <text x="550" y="52" text-anchor="middle" fill="#777" font-size="11">Heap holds 1 element per list (the current head). Pop min, advance that list, push next.</text>

  <!-- K lists visualization -->
  <rect x="60" y="75" width="500" height="270" rx="8" fill="#111" stroke="#222"/>
  <text x="310" y="100" text-anchor="middle" fill="#38bdf8" font-size="14" font-weight="600">#23 — Merge [1,4,5], [1,3,4], [2,6]</text>

  <!-- List 0 -->
  <text x="90" y="135" fill="#34d399" font-size="12">List 0:</text>
  <rect x="170" y="120" width="40" height="25" rx="4" fill="#0d0d0d" stroke="#34d399" stroke-width="2"/>
  <text x="190" y="138" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700">1</text>
  <text x="220" y="138" fill="#555" font-size="12">→</text>
  <rect x="235" y="120" width="40" height="25" rx="4" fill="#0d0d0d" stroke="#555" stroke-width="1"/>
  <text x="255" y="138" text-anchor="middle" fill="#555" font-size="12">4</text>
  <text x="285" y="138" fill="#555" font-size="12">→</text>
  <rect x="300" y="120" width="40" height="25" rx="4" fill="#0d0d0d" stroke="#555" stroke-width="1"/>
  <text x="320" y="138" text-anchor="middle" fill="#555" font-size="12">5</text>

  <!-- List 1 -->
  <text x="90" y="175" fill="#fbbf24" font-size="12">List 1:</text>
  <rect x="170" y="160" width="40" height="25" rx="4" fill="#0d0d0d" stroke="#fbbf24" stroke-width="2"/>
  <text x="190" y="178" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">1</text>
  <text x="220" y="178" fill="#555" font-size="12">→</text>
  <rect x="235" y="160" width="40" height="25" rx="4" fill="#0d0d0d" stroke="#555" stroke-width="1"/>
  <text x="255" y="178" text-anchor="middle" fill="#555" font-size="12">3</text>
  <text x="285" y="178" fill="#555" font-size="12">→</text>
  <rect x="300" y="160" width="40" height="25" rx="4" fill="#0d0d0d" stroke="#555" stroke-width="1"/>
  <text x="320" y="178" text-anchor="middle" fill="#555" font-size="12">4</text>

  <!-- List 2 -->
  <text x="90" y="215" fill="#a78bfa" font-size="12">List 2:</text>
  <rect x="170" y="200" width="40" height="25" rx="4" fill="#0d0d0d" stroke="#a78bfa" stroke-width="2"/>
  <text x="190" y="218" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">2</text>
  <text x="220" y="218" fill="#555" font-size="12">→</text>
  <rect x="235" y="200" width="40" height="25" rx="4" fill="#0d0d0d" stroke="#555" stroke-width="1"/>
  <text x="255" y="218" text-anchor="middle" fill="#555" font-size="12">6</text>

  <!-- Arrows pointing to heap -->
  <text x="400" y="178" fill="#fbbf24" font-size="16">→</text>

  <!-- Heap visualization -->
  <text x="470" y="135" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">Min-Heap</text>
  <circle cx="470" cy="163" r="18" fill="none" stroke="#34d399" stroke-width="2"/>
  <text x="470" y="168" text-anchor="middle" fill="#34d399" font-size="14" font-weight="700">1</text>

  <circle cx="440" cy="210" r="16" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <text x="440" y="215" text-anchor="middle" fill="#fbbf24" font-size="12">1</text>

  <circle cx="500" cy="210" r="16" fill="none" stroke="#a78bfa" stroke-width="2"/>
  <text x="500" y="215" text-anchor="middle" fill="#a78bfa" font-size="12">2</text>

  <line x1="457" y1="178" x2="447" y2="196" stroke="#555" stroke-width="1"/>
  <line x1="483" y1="178" x2="493" y2="196" stroke="#555" stroke-width="1"/>

  <text x="310" y="265" text-anchor="middle" fill="#555" font-size="10">Highlighted = current frontier (in heap)</text>

  <!-- Step-by-step merge -->
  <rect x="580" y="75" width="460" height="320" rx="8" fill="#111" stroke="#222"/>
  <text x="810" y="100" text-anchor="middle" fill="#38bdf8" font-size="14" font-weight="600">Merge Steps</text>

  <text x="610" y="128" fill="#555" font-size="11">Pop</text>
  <text x="680" y="128" fill="#555" font-size="11">From</text>
  <text x="750" y="128" fill="#555" font-size="11">Push next</text>
  <text x="880" y="128" fill="#555" font-size="11">Result so far</text>

  <line x1="600" y1="137" x2="1020" y2="137" stroke="#333" stroke-width="1"/>

  <text x="610" y="160" fill="#34d399" font-size="12">1</text>
  <text x="680" y="160" fill="#34d399" font-size="12">L0</text>
  <text x="750" y="160" fill="#ddd" font-size="12">4 from L0</text>
  <text x="880" y="160" fill="#ddd" font-size="12">[1]</text>

  <text x="610" y="185" fill="#fbbf24" font-size="12">1</text>
  <text x="680" y="185" fill="#fbbf24" font-size="12">L1</text>
  <text x="750" y="185" fill="#ddd" font-size="12">3 from L1</text>
  <text x="880" y="185" fill="#ddd" font-size="12">[1,1]</text>

  <text x="610" y="210" fill="#a78bfa" font-size="12">2</text>
  <text x="680" y="210" fill="#a78bfa" font-size="12">L2</text>
  <text x="750" y="210" fill="#ddd" font-size="12">6 from L2</text>
  <text x="880" y="210" fill="#ddd" font-size="12">[1,1,2]</text>

  <text x="610" y="235" fill="#ddd" font-size="12">3</text>
  <text x="680" y="235" fill="#ddd" font-size="12">L1</text>
  <text x="750" y="235" fill="#ddd" font-size="12">4 from L1</text>
  <text x="880" y="235" fill="#ddd" font-size="12">[1,1,2,3]</text>

  <text x="610" y="260" fill="#ddd" font-size="12">4</text>
  <text x="680" y="260" fill="#ddd" font-size="12">L0</text>
  <text x="750" y="260" fill="#ddd" font-size="12">5 from L0</text>
  <text x="880" y="260" fill="#ddd" font-size="12">[..,3,4]</text>

  <text x="610" y="285" fill="#ddd" font-size="12">4</text>
  <text x="680" y="285" fill="#ddd" font-size="12">L1</text>
  <text x="750" y="285" fill="#555" font-size="12">L1 empty</text>
  <text x="880" y="285" fill="#ddd" font-size="12">[..,4,4]</text>

  <text x="610" y="310" fill="#ddd" font-size="12">5</text>
  <text x="680" y="310" fill="#ddd" font-size="12">L0</text>
  <text x="750" y="310" fill="#555" font-size="12">L0 empty</text>
  <text x="880" y="310" fill="#ddd" font-size="12">[..,4,5]</text>

  <text x="610" y="335" fill="#ddd" font-size="12">6</text>
  <text x="680" y="335" fill="#ddd" font-size="12">L2</text>
  <text x="750" y="335" fill="#555" font-size="12">L2 empty</text>
  <text x="880" y="335" fill="#34d399" font-size="12" font-weight="600">[..,5,6]</text>

  <text x="610" y="375" fill="#34d399" font-size="12" font-weight="600">Final: [1,1,2,3,4,4,5,6]</text>

  <!-- Summary -->
  <rect x="60" y="415" width="980" height="80" rx="8" fill="#111" stroke="#222"/>
  <text x="300" y="442" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="600">Heap size = K (# of lists)</text>
  <text x="300" y="465" text-anchor="middle" fill="#777" font-size="11">NOT total elements N. This is what makes it O(N log K).</text>

  <line x1="550" y1="425" x2="550" y2="485" stroke="#333" stroke-width="1" stroke-dasharray="4"/>

  <text x="810" y="442" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="600">Also works on</text>
  <text x="810" y="465" text-anchor="middle" fill="#777" font-size="11">Sorted matrix rows, pair sums, range queries</text>
  <text x="810" y="485" text-anchor="middle" fill="#555" font-size="10">#378 matrix, #373 pair sums, #632 range</text>
</svg>
