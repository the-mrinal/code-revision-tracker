<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 580" font-family="SF Mono, Menlo, monospace">
  <rect width="1100" height="580" rx="12" fill="#0a0a0a"/>
  <text x="550" y="32" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="700">Scheduling / Minimum Cost — Heap as Resource Manager</text>
  <text x="550" y="52" text-anchor="middle" fill="#777" font-size="11">Heap tracks "what becomes available next" or "best marginal gain"</text>

  <!-- Meeting Rooms Example -->
  <rect x="60" y="75" width="500" height="280" rx="8" fill="#111" stroke="#222"/>
  <text x="310" y="100" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="600">#253 Meeting Rooms II — How Many Rooms?</text>
  <text x="310" y="120" text-anchor="middle" fill="#777" font-size="11">Intervals: [0,30], [5,10], [15,20]</text>

  <!-- Timeline visualization -->
  <line x1="100" y1="155" x2="520" y2="155" stroke="#555" stroke-width="1"/>
  <text x="90" y="152" fill="#555" font-size="10" text-anchor="end">time</text>

  <!-- Time markers -->
  <text x="100" y="170" fill="#555" font-size="9">0</text>
  <text x="170" y="170" fill="#555" font-size="9">5</text>
  <text x="240" y="170" fill="#555" font-size="9">10</text>
  <text x="310" y="170" fill="#555" font-size="9">15</text>
  <text x="380" y="170" fill="#555" font-size="9">20</text>
  <text x="520" y="170" fill="#555" font-size="9">30</text>

  <!-- Room 1: [0, 30] -->
  <text x="90" y="198" fill="#34d399" font-size="11" text-anchor="end">Room 1</text>
  <rect x="100" y="185" width="420" height="20" rx="4" fill="#34d399" fill-opacity="0.2" stroke="#34d399" stroke-width="1"/>
  <text x="310" y="200" text-anchor="middle" fill="#34d399" font-size="10">[0, 30]</text>

  <!-- Room 2: [5, 10] then [15, 20] -->
  <text x="90" y="228" fill="#38bdf8" font-size="11" text-anchor="end">Room 2</text>
  <rect x="170" y="215" width="70" height="20" rx="4" fill="#38bdf8" fill-opacity="0.2" stroke="#38bdf8" stroke-width="1"/>
  <text x="205" y="230" text-anchor="middle" fill="#38bdf8" font-size="10">[5,10]</text>
  <rect x="310" y="215" width="70" height="20" rx="4" fill="#38bdf8" fill-opacity="0.2" stroke="#38bdf8" stroke-width="1"/>
  <text x="345" y="230" text-anchor="middle" fill="#38bdf8" font-size="10">[15,20]</text>

  <!-- Step trace -->
  <text x="100" y="270" fill="#ddd" font-size="12">Sort by start: [0,30] [5,10] [15,20]</text>
  <text x="100" y="295" fill="#34d399" font-size="11">[0,30]: heap=[] empty → new room. heap=[30]</text>
  <text x="100" y="315" fill="#38bdf8" font-size="11">[5,10]: heap top=30 &gt; 5 → new room. heap=[10,30]</text>
  <text x="100" y="335" fill="#fbbf24" font-size="11">[15,20]: heap top=10 ≤ 15 → reuse!</text>
  <text x="100" y="350" fill="#fbbf24" font-size="11">  pop 10, push 20. heap=[20,30]. Answer = 2</text>

  <!-- Furthest Building Example -->
  <rect x="580" y="75" width="460" height="280" rx="8" fill="#111" stroke="#222"/>
  <text x="810" y="100" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="600">#1642 Furthest Building — Greedy Swap</text>
  <text x="810" y="120" text-anchor="middle" fill="#777" font-size="11">bricks=5, ladders=1</text>

  <!-- Idea text ABOVE the buildings -->
  <text x="620" y="145" fill="#ddd" font-size="11" font-weight="600">Min-heap of size = ladders.</text>
  <text x="620" y="162" fill="#ddd" font-size="11">Track largest climbs for ladders.</text>
  <text x="620" y="179" fill="#ddd" font-size="11">New climb &gt; heap min? Swap to bricks.</text>

  <!-- Building visualization — moved down, more space -->
  <rect x="640" y="200" width="35" height="55" rx="2" fill="#555"/>
  <text x="657" y="195" text-anchor="middle" fill="#ddd" font-size="10">4</text>

  <rect x="690" y="225" width="35" height="30" rx="2" fill="#555"/>
  <text x="707" y="220" text-anchor="middle" fill="#ddd" font-size="10">2</text>

  <rect x="740" y="185" width="35" height="70" rx="2" fill="#fbbf24" fill-opacity="0.3" stroke="#fbbf24"/>
  <text x="757" y="180" text-anchor="middle" fill="#fbbf24" font-size="10">7</text>

  <rect x="790" y="195" width="35" height="60" rx="2" fill="#555"/>
  <text x="807" y="190" text-anchor="middle" fill="#ddd" font-size="10">6</text>

  <rect x="840" y="175" width="35" height="80" rx="2" fill="#34d399" fill-opacity="0.3" stroke="#34d399"/>
  <text x="857" y="170" text-anchor="middle" fill="#34d399" font-size="10">9</text>

  <rect x="890" y="135" width="35" height="120" rx="2" fill="#f87171" fill-opacity="0.3" stroke="#f87171"/>
  <text x="907" y="130" text-anchor="middle" fill="#f87171" font-size="10">14</text>

  <rect x="940" y="155" width="35" height="100" rx="2" fill="#555"/>
  <text x="957" y="150" text-anchor="middle" fill="#ddd" font-size="10">12</text>

  <!-- Climb labels below buildings -->
  <text x="715" y="275" text-anchor="middle" fill="#fbbf24" font-size="9">↑ climb 5</text>
  <text x="815" y="275" text-anchor="middle" fill="#34d399" font-size="9">↑ climb 3</text>
  <text x="865" y="275" text-anchor="middle" fill="#f87171" font-size="9">↑ climb 5</text>

  <!-- Legend for buildings below -->
  <text x="620" y="300" fill="#fbbf24" font-size="11">climb 5: bricks. heap=[5]</text>
  <text x="620" y="318" fill="#34d399" font-size="11">climb 3: bricks. heap=[3] (3&lt;5, swap!)</text>
  <text x="620" y="336" fill="#f87171" font-size="11">climb 5: ladder on 5, bricks for 3. Stop.</text>

  <!-- Summary -->
  <rect x="60" y="380" width="980" height="175" rx="8" fill="#111" stroke="#222"/>
  <text x="550" y="410" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="600">Three Scheduling Flavors</text>

  <text x="120" y="445" fill="#34d399" font-size="13" font-weight="600">Peak Concurrency</text>
  <text x="120" y="468" fill="#777" font-size="11">Min-heap of end times.</text>
  <text x="120" y="488" fill="#777" font-size="11">Heap size = rooms needed.</text>
  <text x="120" y="510" fill="#555" font-size="10">#253, #2402, #1942</text>

  <line x1="400" y1="425" x2="400" y2="540" stroke="#333" stroke-width="1" stroke-dasharray="4"/>

  <text x="440" y="445" fill="#38bdf8" font-size="13" font-weight="600">Task Priority</text>
  <text x="440" y="468" fill="#777" font-size="11">Min-heap by processing time.</text>
  <text x="440" y="488" fill="#777" font-size="11">Pop shortest available task.</text>
  <text x="440" y="510" fill="#555" font-size="10">#1834, #767</text>

  <line x1="720" y1="425" x2="720" y2="540" stroke="#333" stroke-width="1" stroke-dasharray="4"/>

  <text x="760" y="445" fill="#a78bfa" font-size="13" font-weight="600">Greedy Gain</text>
  <text x="760" y="468" fill="#777" font-size="11">Max-heap by marginal improvement.</text>
  <text x="760" y="488" fill="#777" font-size="11">Always pick best bang-for-buck.</text>
  <text x="760" y="510" fill="#555" font-size="10">#857, #1642, #1792</text>
</svg>
