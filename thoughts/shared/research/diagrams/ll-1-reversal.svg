<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#34d399"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#f87171"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#666"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#fbbf24"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="450" y="35" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="16" font-weight="bold" text-anchor="middle">In-place Reversal — The Three-Pointer Dance</text>

  <!-- BEFORE: Original list -->
  <text x="40" y="75" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="12">BEFORE</text>

  <!-- Node 1 -->
  <rect x="120" y="60" width="60" height="36" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="150" y="83" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">1</text>
  <!-- Arrow 1→2 -->
  <line x1="180" y1="78" x2="230" y2="78" stroke="#666" stroke-width="2" marker-end="url(#arrow-gray)"/>

  <!-- Node 2 -->
  <rect x="240" y="60" width="60" height="36" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="270" y="83" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">2</text>
  <!-- Arrow 2→3 -->
  <line x1="300" y1="78" x2="350" y2="78" stroke="#666" stroke-width="2" marker-end="url(#arrow-gray)"/>

  <!-- Node 3 -->
  <rect x="360" y="60" width="60" height="36" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="390" y="83" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">3</text>
  <!-- Arrow 3→4 -->
  <line x1="420" y1="78" x2="470" y2="78" stroke="#666" stroke-width="2" marker-end="url(#arrow-gray)"/>

  <!-- Node 4 -->
  <rect x="480" y="60" width="60" height="36" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="510" y="83" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">4</text>
  <!-- Arrow 4→NULL -->
  <line x1="540" y1="78" x2="590" y2="78" stroke="#666" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <text x="600" y="83" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="11">NULL</text>

  <!-- Step-by-step reversal -->
  <!-- Step 1 -->
  <text x="40" y="135" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="11">Step 1</text>

  <rect x="70" y="120" width="44" height="30" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="92" y="140" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="middle">NULL</text>
  <text x="92" y="115" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">prev</text>

  <rect x="150" y="120" width="44" height="30" rx="6" fill="#1a1a2e" stroke="#fbbf24" stroke-width="2"/>
  <text x="172" y="140" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">1</text>
  <text x="172" y="115" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">curr</text>

  <!-- Reversed arrow 1→NULL -->
  <line x1="150" y1="135" x2="118" y2="135" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-green)"/>

  <rect x="230" y="120" width="44" height="30" rx="6" fill="#111" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="252" y="140" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">2</text>
  <line x1="274" y1="135" x2="310" y2="135" stroke="#666" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <rect x="320" y="120" width="44" height="30" rx="6" fill="#111" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="342" y="140" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">3</text>
  <line x1="364" y1="135" x2="400" y2="135" stroke="#666" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <rect x="410" y="120" width="44" height="30" rx="6" fill="#111" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="432" y="140" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">4</text>

  <!-- Step 2 -->
  <text x="40" y="195" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="11">Step 2</text>

  <rect x="70" y="180" width="44" height="30" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="92" y="200" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="middle">NULL</text>

  <rect x="150" y="180" width="44" height="30" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
  <text x="172" y="200" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">1</text>
  <text x="172" y="175" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">prev</text>
  <line x1="150" y1="195" x2="118" y2="195" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="230" y="180" width="44" height="30" rx="6" fill="#1a1a2e" stroke="#fbbf24" stroke-width="2"/>
  <text x="252" y="200" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">2</text>
  <text x="252" y="175" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">curr</text>
  <!-- Reversed arrow 2→1 -->
  <line x1="230" y1="195" x2="198" y2="195" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-green)"/>

  <rect x="320" y="180" width="44" height="30" rx="6" fill="#111" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="342" y="200" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">3</text>
  <line x1="364" y1="195" x2="400" y2="195" stroke="#666" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <rect x="410" y="180" width="44" height="30" rx="6" fill="#111" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="432" y="200" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">4</text>

  <!-- Step 3 -->
  <text x="40" y="255" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="11">Step 3</text>

  <rect x="70" y="240" width="44" height="30" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="92" y="260" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="middle">NULL</text>

  <rect x="150" y="240" width="44" height="30" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
  <text x="172" y="260" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">1</text>
  <line x1="150" y1="255" x2="118" y2="255" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="230" y="240" width="44" height="30" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
  <text x="252" y="260" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">2</text>
  <text x="252" y="235" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">prev</text>
  <line x1="230" y1="255" x2="198" y2="255" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="320" y="240" width="44" height="30" rx="6" fill="#1a1a2e" stroke="#fbbf24" stroke-width="2"/>
  <text x="342" y="260" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">3</text>
  <text x="342" y="235" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">curr</text>
  <!-- Reversed arrow 3→2 -->
  <line x1="320" y1="255" x2="278" y2="255" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-green)"/>

  <rect x="410" y="240" width="44" height="30" rx="6" fill="#111" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="432" y="260" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">4</text>

  <!-- Step 4 (final) -->
  <text x="40" y="315" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="11">Step 4</text>

  <rect x="70" y="300" width="44" height="30" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="92" y="320" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="middle">NULL</text>

  <rect x="150" y="300" width="44" height="30" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
  <text x="172" y="320" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">1</text>
  <line x1="150" y1="315" x2="118" y2="315" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="230" y="300" width="44" height="30" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
  <text x="252" y="320" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">2</text>
  <line x1="230" y1="315" x2="198" y2="315" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="320" y="300" width="44" height="30" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
  <text x="342" y="320" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">3</text>
  <text x="342" y="295" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">prev</text>
  <line x1="320" y1="315" x2="278" y2="315" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="410" y="300" width="44" height="30" rx="6" fill="#1a1a2e" stroke="#fbbf24" stroke-width="2"/>
  <text x="432" y="320" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">4</text>
  <text x="432" y="295" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">curr</text>
  <!-- Reversed arrow 4→3 -->
  <line x1="410" y1="315" x2="368" y2="315" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- AFTER: Final result -->
  <text x="40" y="375" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold">RESULT</text>

  <rect x="120" y="360" width="60" height="36" rx="6" fill="#111" stroke="#34d399" stroke-width="2"/>
  <text x="150" y="383" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">4</text>
  <line x1="180" y1="378" x2="230" y2="378" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-green)"/>

  <rect x="240" y="360" width="60" height="36" rx="6" fill="#111" stroke="#34d399" stroke-width="2"/>
  <text x="270" y="383" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">3</text>
  <line x1="300" y1="378" x2="350" y2="378" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-green)"/>

  <rect x="360" y="360" width="60" height="36" rx="6" fill="#111" stroke="#34d399" stroke-width="2"/>
  <text x="390" y="383" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">2</text>
  <line x1="420" y1="378" x2="470" y2="378" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-green)"/>

  <rect x="480" y="360" width="60" height="36" rx="6" fill="#111" stroke="#34d399" stroke-width="2"/>
  <text x="510" y="383" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">1</text>
  <line x1="540" y1="378" x2="590" y2="378" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="600" y="383" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="11">NULL</text>

  <!-- Legend -->
  <rect x="580" y="100" width="290" height="130" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="600" y="122" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold">Three-Pointer Dance</text>

  <rect x="600" y="132" width="12" height="12" rx="2" fill="#a78bfa"/>
  <text x="618" y="143" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="10">prev — reversed side</text>

  <rect x="600" y="152" width="12" height="12" rx="2" fill="#fbbf24"/>
  <text x="618" y="163" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="10">curr — being reversed</text>

  <line x1="600" y1="178" x2="630" y2="178" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="638" y="183" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10">reversed pointer</text>

  <line x1="600" y1="198" x2="630" y2="198" stroke="#666" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <text x="638" y="203" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">original pointer</text>

  <!-- Key insight box -->
  <rect x="580" y="410" width="290" height="70" rx="8" fill="#111" stroke="#5b6abf" stroke-width="1"/>
  <text x="600" y="432" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold">KEY INSIGHT</text>
  <text x="600" y="450" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">Save next → Reverse pointer →</text>
  <text x="600" y="466" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">Advance prev → Advance curr</text>
</svg>