<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#34d399"/>
    </marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#5b6abf"/>
    </marker>
    <marker id="arr-p" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="900" height="500" rx="12" fill="#0a0a0a"/>

  <text x="450" y="35" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="16" font-weight="bold" text-anchor="middle">Merging Sorted Lists — Compare &amp; Take</text>

  <!-- List 1 -->
  <text x="40" y="75" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="12">List 1</text>
  <rect x="110" y="58" width="50" height="32" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="135" y="79" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">1</text>
  <line x1="160" y1="74" x2="195" y2="74" stroke="#5b6abf" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <rect x="205" y="58" width="50" height="32" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="230" y="79" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">3</text>
  <line x1="255" y1="74" x2="290" y2="74" stroke="#5b6abf" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <rect x="300" y="58" width="50" height="32" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="325" y="79" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">5</text>

  <!-- List 2 -->
  <text x="40" y="125" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="12">List 2</text>
  <rect x="110" y="108" width="50" height="32" rx="6" fill="#111" stroke="#a78bfa" stroke-width="2"/>
  <text x="135" y="129" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">2</text>
  <line x1="160" y1="124" x2="195" y2="124" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <rect x="205" y="108" width="50" height="32" rx="6" fill="#111" stroke="#a78bfa" stroke-width="2"/>
  <text x="230" y="129" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">4</text>
  <line x1="255" y1="124" x2="290" y2="124" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <rect x="300" y="108" width="50" height="32" rx="6" fill="#111" stroke="#a78bfa" stroke-width="2"/>
  <text x="325" y="129" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">6</text>

  <!-- Merge steps -->
  <text x="450" y="75" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="12">Merge Process</text>

  <!-- Step labels -->
  <text x="460" y="105" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="10">1&lt;2 → take 1</text>
  <text x="460" y="125" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="10">3&gt;2 → take 2</text>
  <text x="460" y="145" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="10">3&lt;4 → take 3</text>
  <text x="460" y="165" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="10">5&gt;4 → take 4</text>
  <text x="460" y="185" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="10">5&lt;6 → take 5</text>
  <text x="460" y="205" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="10">rest → take 6</text>

  <!-- Result -->
  <text x="40" y="185" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold">Result</text>

  <!-- Dummy node -->
  <rect x="40" y="198" width="40" height="28" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="60" y="217" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">D</text>
  <line x1="80" y1="212" x2="98" y2="212" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- Merged nodes -->
  <rect x="108" y="198" width="40" height="28" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="128" y="217" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">1</text>
  <line x1="148" y1="212" x2="166" y2="212" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <rect x="176" y="198" width="40" height="28" rx="6" fill="#111" stroke="#a78bfa" stroke-width="2"/>
  <text x="196" y="217" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">2</text>
  <line x1="216" y1="212" x2="234" y2="212" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <rect x="244" y="198" width="40" height="28" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="264" y="217" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">3</text>
  <line x1="284" y1="212" x2="302" y2="212" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <rect x="312" y="198" width="40" height="28" rx="6" fill="#111" stroke="#a78bfa" stroke-width="2"/>
  <text x="332" y="217" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">4</text>
  <line x1="352" y1="212" x2="370" y2="212" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <rect x="380" y="198" width="40" height="28" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="400" y="217" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">5</text>
  <line x1="420" y1="212" x2="438" y2="212" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <rect x="448" y="198" width="40" height="28" rx="6" fill="#111" stroke="#a78bfa" stroke-width="2"/>
  <text x="468" y="217" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">6</text>

  <!-- K-way merge section -->
  <line x1="30" y1="260" x2="870" y2="260" stroke="#222" stroke-width="1"/>
  <text x="450" y="285" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="14" font-weight="bold" text-anchor="middle">K-Way Merge — Divide &amp; Conquer Approach</text>

  <!-- Round 1 -->
  <text x="60" y="315" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">Round 1</text>
  <text x="60" y="330" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">(k lists)</text>

  <!-- 4 small lists -->
  <rect x="160" y="305" width="120" height="24" rx="4" fill="#111" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="220" y="322" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">L1: 1→4→5</text>

  <rect x="300" y="305" width="120" height="24" rx="4" fill="#111" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="360" y="322" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">L2: 1→3→4</text>

  <rect x="440" y="305" width="120" height="24" rx="4" fill="#111" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="500" y="322" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">L3: 2→6</text>

  <rect x="580" y="305" width="120" height="24" rx="4" fill="#111" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="640" y="322" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">L4: 0→7</text>

  <!-- Merge arrows round 1 -->
  <line x1="220" y1="329" x2="265" y2="360" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="360" y1="329" x2="315" y2="360" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="500" y1="329" x2="545" y2="360" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="640" y1="329" x2="595" y2="360" stroke="#fbbf24" stroke-width="1.5"/>

  <!-- Round 2 -->
  <text x="60" y="375" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">Round 2</text>
  <text x="60" y="390" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">(k/2)</text>

  <rect x="200" y="360" width="180" height="24" rx="4" fill="#111" stroke="#34d399" stroke-width="1.5"/>
  <text x="290" y="377" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">M1: 1→1→3→4→4→5</text>

  <rect x="480" y="360" width="180" height="24" rx="4" fill="#111" stroke="#34d399" stroke-width="1.5"/>
  <text x="570" y="377" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">M2: 0→2→6→7</text>

  <!-- Merge arrows round 2 -->
  <line x1="290" y1="384" x2="400" y2="415" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="570" y1="384" x2="460" y2="415" stroke="#fbbf24" stroke-width="1.5"/>

  <!-- Final -->
  <text x="60" y="432" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">Final</text>
  <text x="60" y="447" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">(1 list)</text>

  <rect x="220" y="415" width="420" height="28" rx="4" fill="#111" stroke="#34d399" stroke-width="2"/>
  <text x="430" y="434" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="middle">0 → 1 → 1 → 2 → 3 → 4 → 4 → 5 → 6 → 7</text>

  <!-- Legend -->
  <rect x="650" y="55" width="220" height="105" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="670" y="77" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold">Legend</text>
  <rect x="670" y="87" width="10" height="10" rx="2" fill="#5b6abf"/>
  <text x="686" y="97" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">From list 1 / odd lists</text>
  <rect x="670" y="105" width="10" height="10" rx="2" fill="#a78bfa"/>
  <text x="686" y="115" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">From list 2 / even lists</text>
  <rect x="670" y="123" width="10" height="10" rx="2" fill="#34d399"/>
  <text x="686" y="133" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">Merged result</text>
  <rect x="670" y="141" width="10" height="10" rx="2" fill="#555"/>
  <text x="686" y="151" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">Dummy node</text>

  <!-- Complexity note -->
  <rect x="40" y="460" width="820" height="28" rx="6" fill="#111" stroke="#5b6abf" stroke-width="1"/>
  <text x="450" y="479" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">2-way: O(n+m) time, O(1) space  |  K-way D&amp;C: O(N log k) time, O(1) space  |  K-way Heap: O(N log k) time, O(k) space</text>
</svg>