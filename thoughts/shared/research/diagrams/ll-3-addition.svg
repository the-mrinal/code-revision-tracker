<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <marker id="a-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#34d399"/>
    </marker>
    <marker id="a-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#5b6abf"/>
    </marker>
    <marker id="a-p" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="900" height="480" rx="12" fill="#0a0a0a"/>

  <text x="450" y="35" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="16" font-weight="bold" text-anchor="middle">Number Addition — Column-by-Column Arithmetic</text>

  <!-- Example: 342 + 465 = 807 -->
  <text x="450" y="60" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="12" text-anchor="middle">Example: 342 + 465 = 807 (digits stored in reverse)</text>

  <!-- List 1: 2→4→3 -->
  <text x="40" y="100" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="12">l1 (342)</text>
  <rect x="150" y="84" width="50" height="32" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="175" y="105" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">2</text>
  <line x1="200" y1="100" x2="248" y2="100" stroke="#5b6abf" stroke-width="1.5" marker-end="url(#a-b)"/>
  <rect x="258" y="84" width="50" height="32" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="283" y="105" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">4</text>
  <line x1="308" y1="100" x2="356" y2="100" stroke="#5b6abf" stroke-width="1.5" marker-end="url(#a-b)"/>
  <rect x="366" y="84" width="50" height="32" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="391" y="105" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">3</text>

  <!-- List 2: 5→6→4 -->
  <text x="40" y="148" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="12">l2 (465)</text>
  <rect x="150" y="132" width="50" height="32" rx="6" fill="#111" stroke="#a78bfa" stroke-width="2"/>
  <text x="175" y="153" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">5</text>
  <line x1="200" y1="148" x2="248" y2="148" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#a-p)"/>
  <rect x="258" y="132" width="50" height="32" rx="6" fill="#111" stroke="#a78bfa" stroke-width="2"/>
  <text x="283" y="153" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">6</text>
  <line x1="308" y1="148" x2="356" y2="148" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#a-p)"/>
  <rect x="366" y="132" width="50" height="32" rx="6" fill="#111" stroke="#a78bfa" stroke-width="2"/>
  <text x="391" y="153" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">4</text>

  <!-- Column addition visualization -->
  <line x1="30" y1="180" x2="870" y2="180" stroke="#222" stroke-width="1"/>

  <!-- Column headers -->
  <text x="200" y="210" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="middle">Ones</text>
  <text x="400" y="210" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="middle">Tens</text>
  <text x="600" y="210" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="middle">Hundreds</text>

  <!-- Column 1: 2+5=7 -->
  <rect x="140" y="220" width="120" height="90" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="200" y="242" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">  2</text>
  <text x="200" y="258" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">+ 5</text>
  <text x="200" y="270" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">+ 0 (carry)</text>
  <line x1="155" y1="275" x2="245" y2="275" stroke="#444" stroke-width="1"/>
  <text x="200" y="298" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="15" font-weight="bold" text-anchor="middle">= 7</text>
  <text x="200" y="325" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">carry = 0</text>

  <!-- Arrow to next column -->
  <line x1="265" y1="265" x2="330" y2="265" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="298" y="258" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">c=0</text>

  <!-- Column 2: 4+6=10 -->
  <rect x="340" y="220" width="120" height="90" rx="8" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="400" y="242" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">  4</text>
  <text x="400" y="258" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">+ 6</text>
  <text x="400" y="270" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">+ 0 (carry)</text>
  <line x1="355" y1="275" x2="445" y2="275" stroke="#444" stroke-width="1"/>
  <text x="400" y="298" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="15" font-weight="bold" text-anchor="middle">= 0</text>
  <text x="400" y="325" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">carry = 1</text>

  <!-- Arrow to next column -->
  <line x1="465" y1="265" x2="530" y2="265" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="498" y="258" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">c=1</text>

  <!-- Column 3: 3+4+1=8 -->
  <rect x="540" y="220" width="120" height="90" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="600" y="242" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">  3</text>
  <text x="600" y="258" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">+ 4</text>
  <text x="600" y="270" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">+ 1 (carry)</text>
  <line x1="555" y1="275" x2="645" y2="275" stroke="#444" stroke-width="1"/>
  <text x="600" y="298" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="15" font-weight="bold" text-anchor="middle">= 8</text>
  <text x="600" y="325" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">carry = 0</text>

  <!-- Result -->
  <text x="40" y="375" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="13" font-weight="bold">Result (807)</text>
  <rect x="180" y="358" width="50" height="32" rx="6" fill="#111" stroke="#34d399" stroke-width="2"/>
  <text x="205" y="379" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">7</text>
  <line x1="230" y1="374" x2="278" y2="374" stroke="#34d399" stroke-width="1.5" marker-end="url(#a-g)"/>
  <rect x="288" y="358" width="50" height="32" rx="6" fill="#111" stroke="#34d399" stroke-width="2"/>
  <text x="313" y="379" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">0</text>
  <line x1="338" y1="374" x2="386" y2="374" stroke="#34d399" stroke-width="1.5" marker-end="url(#a-g)"/>
  <rect x="396" y="358" width="50" height="32" rx="6" fill="#111" stroke="#34d399" stroke-width="2"/>
  <text x="421" y="379" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">8</text>

  <!-- Key insight box -->
  <rect x="550" y="350" width="320" height="110" rx="8" fill="#111" stroke="#5b6abf" stroke-width="1"/>
  <text x="570" y="375" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold">KEY INSIGHT</text>
  <text x="570" y="395" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">Loop condition:</text>
  <text x="570" y="413" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="10">while l1 OR l2 OR carry</text>
  <text x="570" y="435" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">The carry check handles cases like</text>
  <text x="570" y="450" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">999+1=1000 (extra digit from carry)</text>

  <!-- Legend -->
  <rect x="700" y="80" width="170" height="80" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="720" y="100" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold">Legend</text>
  <rect x="720" y="108" width="10" height="10" rx="2" fill="#5b6abf"/>
  <text x="736" y="118" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="9">Digit from l1</text>
  <rect x="720" y="124" width="10" height="10" rx="2" fill="#a78bfa"/>
  <text x="736" y="134" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="9">Digit from l2</text>
  <rect x="720" y="140" width="10" height="10" rx="2" fill="#fbbf24"/>
  <text x="736" y="150" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="9">Carry propagation</text>
</svg>