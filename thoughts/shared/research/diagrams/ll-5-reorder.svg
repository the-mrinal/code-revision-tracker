<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <marker id="r-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#34d399"/>
    </marker>
    <marker id="r-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#5b6abf"/>
    </marker>
    <marker id="r-p" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#a78bfa"/>
    </marker>
    <marker id="r-y" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="900" height="520" rx="12" fill="#0a0a0a"/>

  <text x="450" y="32" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="16" font-weight="bold" text-anchor="middle">Reordering — Reorder List (#143) as Composition</text>

  <!-- Original -->
  <text x="40" y="68" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="12">Original: 1 → 2 → 3 → 4 → 5</text>

  <rect x="100" y="78" width="44" height="28" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="122" y="97" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">1</text>
  <line x1="144" y1="92" x2="175" y2="92" stroke="#666" stroke-width="1.5"/>
  <rect x="185" y="78" width="44" height="28" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="207" y="97" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">2</text>
  <line x1="229" y1="92" x2="260" y2="92" stroke="#666" stroke-width="1.5"/>
  <rect x="270" y="78" width="44" height="28" rx="6" fill="#111" stroke="#fbbf24" stroke-width="2"/>
  <text x="292" y="97" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">3</text>
  <text x="292" y="73" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="8" text-anchor="middle">middle</text>
  <line x1="314" y1="92" x2="345" y2="92" stroke="#666" stroke-width="1.5"/>
  <rect x="355" y="78" width="44" height="28" rx="6" fill="#111" stroke="#a78bfa" stroke-width="2"/>
  <text x="377" y="97" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">4</text>
  <line x1="399" y1="92" x2="430" y2="92" stroke="#666" stroke-width="1.5"/>
  <rect x="440" y="78" width="44" height="28" rx="6" fill="#111" stroke="#a78bfa" stroke-width="2"/>
  <text x="462" y="97" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="13" text-anchor="middle">5</text>

  <!-- Step 1: Find middle -->
  <rect x="40" y="125" width="820" height="90" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="60" y="148" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold">Step 1: Find Middle (slow/fast pointers)</text>

  <text x="60" y="170" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">slow moves 1 step, fast moves 2 steps</text>

  <!-- slow/fast trace -->
  <text x="60" y="190" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10">slow: 1 → 2 → 3 (stops at middle)</text>
  <text x="60" y="205" fill="#f87171" font-family="SF Mono, Menlo, monospace" font-size="10">fast: 1 → 3 → 5 (reaches end)</text>

  <!-- Split result -->
  <text x="500" y="155" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">Split into two halves:</text>
  <text x="500" y="175" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="11">First:  1 → 2 → 3</text>
  <text x="500" y="195" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="11">Second: 4 → 5</text>

  <!-- Step 2: Reverse second half -->
  <rect x="40" y="225" width="820" height="70" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="60" y="248" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold">Step 2: Reverse Second Half</text>

  <text x="60" y="270" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="11">4 → 5  becomes  5 → 4</text>
  <text x="60" y="285" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">(standard three-pointer reversal from Pattern 1)</text>

  <!-- Visual of two halves -->
  <rect x="500" y="252" width="44" height="24" rx="4" fill="#111" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="522" y="269" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="middle">1</text>
  <line x1="544" y1="264" x2="563" y2="264" stroke="#5b6abf" stroke-width="1.5" marker-end="url(#r-b)"/>
  <rect x="573" y="252" width="44" height="24" rx="4" fill="#111" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="595" y="269" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="middle">2</text>
  <line x1="617" y1="264" x2="636" y2="264" stroke="#5b6abf" stroke-width="1.5" marker-end="url(#r-b)"/>
  <rect x="646" y="252" width="44" height="24" rx="4" fill="#111" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="668" y="269" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="middle">3</text>

  <rect x="730" y="252" width="44" height="24" rx="4" fill="#111" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="752" y="269" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="middle">5</text>
  <line x1="774" y1="264" x2="793" y2="264" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#r-p)"/>
  <rect x="803" y="252" width="44" height="24" rx="4" fill="#111" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="825" y="269" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="middle">4</text>

  <!-- Step 3: Interleave -->
  <rect x="40" y="305" width="820" height="100" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="60" y="328" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold">Step 3: Interleave / Merge Alternately</text>

  <text x="60" y="350" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">Take one from first, one from second, repeat:</text>
  <text x="60" y="370" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="10">take 1 →</text>
  <text x="148" y="370" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="10">take 5 →</text>
  <text x="240" y="370" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="10">take 2 →</text>
  <text x="328" y="370" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="10">take 4 →</text>
  <text x="416" y="370" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="10">take 3</text>

  <!-- Final result -->
  <rect x="500" y="340" width="340" height="52" rx="6" fill="#0a0a0a" stroke="#34d399" stroke-width="2"/>
  <text x="520" y="358" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10" font-weight="bold">Result:</text>

  <rect x="520" y="365" width="30" height="20" rx="3" fill="#111" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="535" y="380" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">1</text>
  <text x="557" y="380" fill="#666" font-family="SF Mono, Menlo, monospace" font-size="10">→</text>
  <rect x="568" y="365" width="30" height="20" rx="3" fill="#111" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="583" y="380" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">5</text>
  <text x="605" y="380" fill="#666" font-family="SF Mono, Menlo, monospace" font-size="10">→</text>
  <rect x="616" y="365" width="30" height="20" rx="3" fill="#111" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="631" y="380" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">2</text>
  <text x="653" y="380" fill="#666" font-family="SF Mono, Menlo, monospace" font-size="10">→</text>
  <rect x="664" y="365" width="30" height="20" rx="3" fill="#111" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="679" y="380" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">4</text>
  <text x="701" y="380" fill="#666" font-family="SF Mono, Menlo, monospace" font-size="10">→</text>
  <rect x="712" y="365" width="30" height="20" rx="3" fill="#111" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="727" y="380" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">3</text>

  <!-- Other reordering patterns summary -->
  <line x1="30" y1="420" x2="870" y2="420" stroke="#222" stroke-width="1"/>

  <text x="450" y="445" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="13" font-weight="bold" text-anchor="middle">All Reordering Patterns Decompose Into Sub-Operations</text>

  <!-- Pattern boxes -->
  <rect x="40" y="455" width="155" height="50" rx="6" fill="#111" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="118" y="473" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle" font-weight="bold">Swap Pairs (#24)</text>
  <text x="118" y="493" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="8" text-anchor="middle">Pairwise pointer rewire</text>

  <rect x="210" y="455" width="155" height="50" rx="6" fill="#111" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="288" y="473" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle" font-weight="bold">Rotate (#61)</text>
  <text x="288" y="493" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="8" text-anchor="middle">Circular + cut at k%n</text>

  <rect x="380" y="455" width="155" height="50" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
  <text x="458" y="473" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle" font-weight="bold">Partition (#86)</text>
  <text x="458" y="493" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="8" text-anchor="middle">Two-chain split + join</text>

  <rect x="550" y="455" width="155" height="50" rx="6" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="628" y="473" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle" font-weight="bold">Odd-Even (#328)</text>
  <text x="628" y="493" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="8" text-anchor="middle">Index-parity split</text>

  <rect x="720" y="455" width="155" height="50" rx="6" fill="#111" stroke="#f87171" stroke-width="1.5"/>
  <text x="798" y="473" fill="#f87171" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle" font-weight="bold">Reorder (#143)</text>
  <text x="798" y="493" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="8" text-anchor="middle">Mid + reverse + merge</text>
</svg>