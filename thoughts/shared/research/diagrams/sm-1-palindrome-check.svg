<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="SF Mono, Menlo, monospace">
  <rect width="900" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" fill="#a78bfa" font-size="17" font-weight="bold" text-anchor="middle">Palindrome Check — Two Pointer</text>

  <!-- Section divider -->
  <line x1="450" y1="50" x2="450" y2="460" stroke="#222" stroke-width="1.5"/>

  <!-- LEFT: Two-pointer on "racecar" -->
  <text x="220" y="68" fill="#5b6abf" font-size="13" font-weight="bold" text-anchor="middle">Valid Palindrome — "racecar"</text>

  <!-- Characters -->
  <g id="chars">
    <!-- indices 0-6 for r a c e c a r -->
    <!-- boxes -->
    <rect x="44" y="82" width="46" height="46" rx="8" fill="#111" stroke="#34d399" stroke-width="2"/>
    <rect x="96" y="82" width="46" height="46" rx="8" fill="#111" stroke="#34d399" stroke-width="2"/>
    <rect x="148" y="82" width="46" height="46" rx="8" fill="#111" stroke="#34d399" stroke-width="2"/>
    <rect x="200" y="82" width="46" height="46" rx="8" fill="#111" stroke="#5b6abf" stroke-width="2"/>
    <rect x="252" y="82" width="46" height="46" rx="8" fill="#111" stroke="#34d399" stroke-width="2"/>
    <rect x="304" y="82" width="46" height="46" rx="8" fill="#111" stroke="#34d399" stroke-width="2"/>
    <rect x="356" y="82" width="46" height="46" rx="8" fill="#111" stroke="#34d399" stroke-width="2"/>

    <text x="67" y="113" fill="#f1f5f9" font-size="20" font-weight="bold" text-anchor="middle">r</text>
    <text x="119" y="113" fill="#f1f5f9" font-size="20" font-weight="bold" text-anchor="middle">a</text>
    <text x="171" y="113" fill="#f1f5f9" font-size="20" font-weight="bold" text-anchor="middle">c</text>
    <text x="223" y="113" fill="#f1f5f9" font-size="20" font-weight="bold" text-anchor="middle">e</text>
    <text x="275" y="113" fill="#f1f5f9" font-size="20" font-weight="bold" text-anchor="middle">c</text>
    <text x="327" y="113" fill="#f1f5f9" font-size="20" font-weight="bold" text-anchor="middle">a</text>
    <text x="379" y="113" fill="#f1f5f9" font-size="20" font-weight="bold" text-anchor="middle">r</text>

    <!-- index labels -->
    <text x="67" y="142" fill="#64748b" font-size="10" text-anchor="middle">0</text>
    <text x="119" y="142" fill="#64748b" font-size="10" text-anchor="middle">1</text>
    <text x="171" y="142" fill="#64748b" font-size="10" text-anchor="middle">2</text>
    <text x="223" y="142" fill="#64748b" font-size="10" text-anchor="middle">3</text>
    <text x="275" y="142" fill="#64748b" font-size="10" text-anchor="middle">4</text>
    <text x="327" y="142" fill="#64748b" font-size="10" text-anchor="middle">5</text>
    <text x="379" y="142" fill="#64748b" font-size="10" text-anchor="middle">6</text>
  </g>

  <!-- L pointer arrow -->
  <line x1="67" y1="148" x2="67" y2="162" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowY)"/>
  <text x="67" y="175" fill="#fbbf24" font-size="11" font-weight="bold" text-anchor="middle">L</text>

  <!-- R pointer arrow -->
  <line x1="379" y1="148" x2="379" y2="162" stroke="#f87171" stroke-width="2" marker-end="url(#arrowY)"/>
  <text x="379" y="175" fill="#f87171" font-size="11" font-weight="bold" text-anchor="middle">R</text>

  <!-- Match arc r==r -->
  <path d="M 67 80 Q 223 40 379 80" fill="none" stroke="#34d399" stroke-width="1.8" stroke-dasharray="5,3"/>
  <text x="223" y="48" fill="#34d399" font-size="10" text-anchor="middle">r == r ✓</text>

  <!-- Step 2 -->
  <text x="200" y="196" fill="#64748b" font-size="11" text-anchor="middle">Step 2: L=1, R=5</text>
  <rect x="96" y="202" width="46" height="38" rx="6" fill="#1a2a1a" stroke="#34d399" stroke-width="1.5"/>
  <text x="119" y="226" fill="#34d399" font-size="16" font-weight="bold" text-anchor="middle">a</text>
  <rect x="304" y="202" width="46" height="38" rx="6" fill="#1a2a1a" stroke="#34d399" stroke-width="1.5"/>
  <text x="327" y="226" fill="#34d399" font-size="16" font-weight="bold" text-anchor="middle">a</text>
  <path d="M 119 200 Q 223 178 327 200" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="223" y="194" fill="#34d399" font-size="10" text-anchor="middle">a == a ✓</text>

  <!-- Step 3 -->
  <text x="200" y="258" fill="#64748b" font-size="11" text-anchor="middle">Step 3: L=2, R=4</text>
  <rect x="148" y="264" width="46" height="38" rx="6" fill="#1a2a1a" stroke="#34d399" stroke-width="1.5"/>
  <text x="171" y="288" fill="#34d399" font-size="16" font-weight="bold" text-anchor="middle">c</text>
  <rect x="252" y="264" width="46" height="38" rx="6" fill="#1a2a1a" stroke="#34d399" stroke-width="1.5"/>
  <text x="275" y="288" fill="#34d399" font-size="16" font-weight="bold" text-anchor="middle">c</text>
  <path d="M 171 262 Q 223 244 275 262" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="223" y="258" fill="#34d399" font-size="10" text-anchor="middle">c == c ✓</text>

  <!-- Result -->
  <rect x="100" y="315" width="240" height="34" rx="8" fill="#0d2d1a" stroke="#34d399" stroke-width="1.5"/>
  <text x="220" y="337" fill="#34d399" font-size="13" font-weight="bold" text-anchor="middle">L &gt;= R → PALINDROME</text>

  <!-- RIGHT: Valid Palindrome II -->
  <text x="685" y="68" fill="#5b6abf" font-size="13" font-weight="bold" text-anchor="middle">Valid Palindrome II — skip one</text>

  <!-- "abcba" with mismatch example -->
  <text x="685" y="90" fill="#64748b" font-size="11" text-anchor="middle">Input: "abcxba" — one deletion allowed</text>

  <!-- Row 1: original -->
  <rect x="490" y="100" width="38" height="38" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
  <text x="509" y="124" fill="#f1f5f9" font-size="16" font-weight="bold" text-anchor="middle">a</text>
  <rect x="534" y="100" width="38" height="38" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
  <text x="553" y="124" fill="#f1f5f9" font-size="16" font-weight="bold" text-anchor="middle">b</text>
  <rect x="578" y="100" width="38" height="38" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
  <text x="597" y="124" fill="#f1f5f9" font-size="16" font-weight="bold" text-anchor="middle">c</text>
  <rect x="622" y="100" width="38" height="38" rx="6" fill="#111" stroke="#f87171" stroke-width="2"/>
  <text x="641" y="124" fill="#f87171" font-size="16" font-weight="bold" text-anchor="middle">x</text>
  <rect x="666" y="100" width="38" height="38" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
  <text x="685" y="124" fill="#f1f5f9" font-size="16" font-weight="bold" text-anchor="middle">b</text>
  <rect x="710" y="100" width="38" height="38" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
  <text x="729" y="124" fill="#f1f5f9" font-size="16" font-weight="bold" text-anchor="middle">a</text>

  <text x="509" y="149" fill="#fbbf24" font-size="10" text-anchor="middle">L</text>
  <text x="729" y="149" fill="#f87171" font-size="10" text-anchor="middle">R</text>
  <text x="620" y="149" fill="#f87171" font-size="9" text-anchor="middle">mismatch!</text>

  <!-- Branch: skip left -->
  <rect x="490" y="165" width="240" height="50" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="495" y="182" fill="#fbbf24" font-size="11" font-weight="bold">Try skip L+1 → R:</text>
  <text x="495" y="198" fill="#64748b" font-size="11">"bcxba" → not palindrome</text>
  <text x="495" y="211" fill="#f87171" font-size="10">b≠a  ✗</text>

  <!-- Branch: skip right -->
  <rect x="490" y="222" width="240" height="50" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="495" y="239" fill="#a78bfa" font-size="11" font-weight="bold">Try skip L → R-1:</text>
  <text x="495" y="255" fill="#64748b" font-size="11">"abcb" → palindrome</text>
  <text x="495" y="268" fill="#34d399" font-size="10">b=b, c=c  ✓</text>

  <!-- Result -->
  <rect x="490" y="280" width="240" height="34" rx="8" fill="#0d2d1a" stroke="#34d399" stroke-width="1.5"/>
  <text x="610" y="302" fill="#34d399" font-size="12" font-weight="bold" text-anchor="middle">Valid with 1 deletion ✓</text>

  <!-- Pseudocode -->
  <rect x="470" y="325" width="410" height="120" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="485" y="345" fill="#5b6abf" font-size="11" font-weight="bold">Palindrome II logic:</text>
  <text x="485" y="362" fill="#64748b" font-size="10">while L &lt; R:</text>
  <text x="495" y="376" fill="#64748b" font-size="10">  if s[L] != s[R]:</text>
  <text x="505" y="390" fill="#64748b" font-size="10">    return isPalin(s, L+1, R) or isPalin(s, L, R-1)</text>
  <text x="495" y="404" fill="#64748b" font-size="10">  L++, R--</text>
  <text x="485" y="418" fill="#34d399" font-size="10">return True   # at most 1 mismatch allowed</text>

  <!-- Pseudocode left -->
  <rect x="30" y="360" width="410" height="90" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="45" y="378" fill="#5b6abf" font-size="11" font-weight="bold">Two-pointer template:</text>
  <text x="45" y="394" fill="#64748b" font-size="10">L, R = 0, len(s) - 1</text>
  <text x="45" y="408" fill="#64748b" font-size="10">while L &lt; R:</text>
  <text x="55" y="422" fill="#64748b" font-size="10">  if s[L] != s[R]: return False</text>
  <text x="55" y="436" fill="#64748b" font-size="10">  L++, R--</text>
  <text x="45" y="450" fill="#34d399" font-size="10">return True   # O(n) time, O(1) space</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowY" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#fbbf24"/>
    </marker>
  </defs>
</svg>
