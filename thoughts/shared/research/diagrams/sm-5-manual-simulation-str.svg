<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="SF Mono, Menlo, monospace">
  <rect width="900" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" fill="#a78bfa" font-size="17" font-weight="bold" text-anchor="middle">Add Strings — "456" + "77"</text>

  <!-- Section divider -->
  <line x1="450" y1="50" x2="450" y2="460" stroke="#222" stroke-width="1.5"/>

  <!-- LEFT: Column addition visual -->
  <text x="220" y="66" fill="#5b6abf" font-size="13" font-weight="bold" text-anchor="middle">Right-to-Left Digit Addition</text>

  <!-- Traditional column layout -->
  <text x="44" y="92" fill="#64748b" font-size="11">num1 = "456"   num2 = "77"</text>

  <!-- Column layout aligned right -->
  <text x="280" y="118" fill="#fbbf24" font-size="22" font-weight="bold" text-anchor="end">4</text>
  <text x="310" y="118" fill="#fbbf24" font-size="22" font-weight="bold" text-anchor="end">5</text>
  <text x="340" y="118" fill="#fbbf24" font-size="22" font-weight="bold" text-anchor="end">6</text>

  <text x="280" y="148" fill="#a78bfa" font-size="22" font-weight="bold" text-anchor="end">+</text>
  <text x="310" y="148" fill="#a78bfa" font-size="22" font-weight="bold" text-anchor="end">7</text>
  <text x="340" y="148" fill="#a78bfa" font-size="22" font-weight="bold" text-anchor="end">7</text>

  <line x1="46" y1="155" x2="345" y2="155" stroke="#333" stroke-width="2"/>

  <!-- Carries row -->
  <text x="44" y="170" fill="#64748b" font-size="11">carry:</text>
  <text x="250" y="170" fill="#f87171" font-size="14" font-weight="bold" text-anchor="end">1</text>
  <text x="280" y="170" fill="#f87171" font-size="14" font-weight="bold" text-anchor="end">1</text>
  <text x="310" y="170" fill="#f87171" font-size="14" font-weight="bold" text-anchor="end">1</text>
  <text x="340" y="170" fill="#64748b" font-size="14" font-weight="bold" text-anchor="end">0</text>

  <!-- Result row -->
  <text x="220" y="196" fill="#34d399" font-size="22" font-weight="bold" text-anchor="end">5</text>
  <text x="250" y="196" fill="#34d399" font-size="22" font-weight="bold" text-anchor="end">3</text>
  <text x="280" y="196" fill="#34d399" font-size="22" font-weight="bold" text-anchor="end">3</text>

  <!-- Step by step -->
  <text x="44" y="222" fill="#64748b" font-size="11">Step-by-step:</text>

  <!-- Step 1: i1=2, i2=1 -->
  <rect x="44" y="228" width="380" height="48" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
  <text x="58" y="244" fill="#64748b" font-size="10" font-weight="bold">Step 1:  i1=2, i2=1  (rightmost)</text>
  <text x="58" y="258" fill="#f1f5f9" font-size="11">d1=6,  d2=7,  carry=0</text>
  <text x="200" y="258" fill="#64748b" font-size="11">→  6+7+0 = 13</text>
  <text x="58" y="272" fill="#34d399" font-size="11" font-weight="bold">digit = 13 % 10 = <tspan fill="#fbbf24">3</tspan>,   carry = 13 // 10 = <tspan fill="#f87171">1</tspan></text>

  <!-- Step 2: i1=1, i2=0 -->
  <rect x="44" y="282" width="380" height="48" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
  <text x="58" y="298" fill="#64748b" font-size="10" font-weight="bold">Step 2:  i1=1, i2=0</text>
  <text x="58" y="312" fill="#f1f5f9" font-size="11">d1=5,  d2=7,  carry=1</text>
  <text x="200" y="312" fill="#64748b" font-size="11">→  5+7+1 = 13</text>
  <text x="58" y="326" fill="#34d399" font-size="11" font-weight="bold">digit = 13 % 10 = <tspan fill="#fbbf24">3</tspan>,   carry = 13 // 10 = <tspan fill="#f87171">1</tspan></text>

  <!-- Step 3: i1=0, i2=-1 -->
  <rect x="44" y="336" width="380" height="48" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
  <text x="58" y="352" fill="#64748b" font-size="10" font-weight="bold">Step 3:  i1=0, i2 exhausted</text>
  <text x="58" y="366" fill="#f1f5f9" font-size="11">d1=4,  d2=0,  carry=1</text>
  <text x="200" y="366" fill="#64748b" font-size="11">→  4+0+1 = 5</text>
  <text x="58" y="380" fill="#34d399" font-size="11" font-weight="bold">digit = 5 % 10 = <tspan fill="#fbbf24">5</tspan>,   carry = 5 // 10 = <tspan fill="#f87171">0</tspan></text>

  <!-- Result -->
  <rect x="44" y="392" width="380" height="34" rx="8" fill="#0d2d1a" stroke="#34d399" stroke-width="2"/>
  <text x="234" y="414" fill="#34d399" font-size="14" font-weight="bold" text-anchor="middle">"456" + "77" = "533"</text>

  <!-- RIGHT: Carry chain visual + pseudocode -->
  <text x="685" y="66" fill="#5b6abf" font-size="13" font-weight="bold" text-anchor="middle">Carry Propagation Chain</text>

  <!-- Visual carry chain -->
  <text x="470" y="88" fill="#64748b" font-size="11">Carry propagates left-to-right in result (reversed)</text>

  <!-- The chain boxes -->
  <g>
    <!-- Step 1 -->
    <rect x="470" y="98" width="60" height="60" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
    <text x="500" y="118" fill="#64748b" font-size="9" text-anchor="middle">i1=2,i2=1</text>
    <text x="500" y="132" fill="#fbbf24" font-size="16" font-weight="bold" text-anchor="middle">13</text>
    <text x="500" y="148" fill="#34d399" font-size="11" text-anchor="middle">out:3</text>
    <text x="500" y="160" fill="#f87171" font-size="10" text-anchor="middle">carry→1</text>

    <!-- Arrow -->
    <line x1="530" y1="128" x2="548" y2="128" stroke="#f87171" stroke-width="2" marker-end="url(#arrowR)"/>

    <!-- Step 2 -->
    <rect x="548" y="98" width="60" height="60" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
    <text x="578" y="118" fill="#64748b" font-size="9" text-anchor="middle">i1=1,i2=0</text>
    <text x="578" y="132" fill="#fbbf24" font-size="16" font-weight="bold" text-anchor="middle">13</text>
    <text x="578" y="148" fill="#34d399" font-size="11" text-anchor="middle">out:3</text>
    <text x="578" y="160" fill="#f87171" font-size="10" text-anchor="middle">carry→1</text>

    <!-- Arrow -->
    <line x1="608" y1="128" x2="626" y2="128" stroke="#f87171" stroke-width="2" marker-end="url(#arrowR)"/>

    <!-- Step 3 -->
    <rect x="626" y="98" width="60" height="60" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
    <text x="656" y="118" fill="#64748b" font-size="9" text-anchor="middle">i1=0,i2=-</text>
    <text x="656" y="132" fill="#fbbf24" font-size="16" font-weight="bold" text-anchor="middle">5</text>
    <text x="656" y="148" fill="#34d399" font-size="11" text-anchor="middle">out:5</text>
    <text x="656" y="160" fill="#34d399" font-size="10" text-anchor="middle">carry→0</text>

    <!-- Arrow -->
    <line x1="686" y1="128" x2="704" y2="128" stroke="#34d399" stroke-width="2" marker-end="url(#arrowG)"/>

    <!-- Done -->
    <rect x="704" y="110" width="60" height="36" rx="6" fill="#0d2d1a" stroke="#34d399" stroke-width="1.5"/>
    <text x="734" y="128" fill="#34d399" font-size="12" font-weight="bold" text-anchor="middle">DONE</text>
    <text x="734" y="142" fill="#64748b" font-size="10" text-anchor="middle">carry=0</text>
  </g>

  <!-- Buffer output (reversed) -->
  <rect x="470" y="172" width="390" height="50" rx="6" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="484" y="190" fill="#64748b" font-size="10" font-weight="bold">Output buffer (prepend or reverse at end):</text>
  <text x="484" y="208" fill="#f1f5f9" font-size="13">appended: ['3', '3', '5']   →   reverse   →   "533"</text>

  <!-- Pseudocode -->
  <rect x="470" y="232" width="390" height="170" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="484" y="250" fill="#5b6abf" font-size="11" font-weight="bold">addStrings(num1, num2):</text>
  <text x="484" y="266" fill="#64748b" font-size="10">i, j = len(num1)-1, len(num2)-1</text>
  <text x="484" y="280" fill="#64748b" font-size="10">carry = 0,  result = []</text>
  <text x="484" y="294" fill="#64748b" font-size="10">while i &gt;= 0 or j &gt;= 0 or carry:</text>
  <text x="494" y="308" fill="#64748b" font-size="10">  d1 = int(num1[i]) if i &gt;= 0 else 0</text>
  <text x="494" y="322" fill="#64748b" font-size="10">  d2 = int(num2[j]) if j &gt;= 0 else 0</text>
  <text x="494" y="336" fill="#64748b" font-size="10">  total = d1 + d2 + carry</text>
  <text x="494" y="350" fill="#fbbf24" font-size="10">  carry = total // 10</text>
  <text x="494" y="364" fill="#34d399" font-size="10">  result.append(str(total % 10))</text>
  <text x="494" y="378" fill="#64748b" font-size="10">  i -= 1;  j -= 1</text>
  <text x="484" y="394" fill="#34d399" font-size="10">return ''.join(reversed(result))  # O(max(n,m))</text>

  <!-- Edge case note -->
  <rect x="470" y="414" width="390" height="46" rx="6" fill="#111" stroke="#fbbf24" stroke-width="1"/>
  <text x="484" y="432" fill="#fbbf24" font-size="10" font-weight="bold">Key edge cases:</text>
  <text x="484" y="446" fill="#64748b" font-size="10">• Final carry overflow: "9"+"9" → "18" (carry extends result)</text>
  <text x="484" y="458" fill="#64748b" font-size="10">• Unequal lengths: use 0 when one string is exhausted</text>

  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#f87171"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#34d399"/>
    </marker>
  </defs>
</svg>
