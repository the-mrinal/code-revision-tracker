<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="SF Mono, Menlo, monospace">
  <rect width="900" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" fill="#a78bfa" font-size="17" font-weight="bold" text-anchor="middle">Repeated Substring Pattern — "abab"</text>

  <!-- Section divider -->
  <line x1="450" y1="50" x2="450" y2="460" stroke="#222" stroke-width="1.5"/>

  <!-- LEFT: Doubled string trick -->
  <text x="220" y="66" fill="#5b6abf" font-size="13" font-weight="bold" text-anchor="middle">The (s+s)[1:-1] Doubled String Trick</text>

  <!-- Step 1: s+s -->
  <text x="44" y="90" fill="#64748b" font-size="11">s = "abab"   →   s + s = "abababab"</text>

  <!-- s+s boxes -->
  <g>
    <rect x="44" y="98" width="40" height="40" rx="6" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="64" y="123" fill="#fbbf24" font-size="17" font-weight="bold" text-anchor="middle">a</text>
    <rect x="88" y="98" width="40" height="40" rx="6" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="108" y="123" fill="#fbbf24" font-size="17" font-weight="bold" text-anchor="middle">b</text>
    <rect x="132" y="98" width="40" height="40" rx="6" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="152" y="123" fill="#fbbf24" font-size="17" font-weight="bold" text-anchor="middle">a</text>
    <rect x="176" y="98" width="40" height="40" rx="6" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="196" y="123" fill="#fbbf24" font-size="17" font-weight="bold" text-anchor="middle">b</text>

    <!-- divider between s and s copy -->
    <line x1="220" y1="94" x2="220" y2="142" stroke="#333" stroke-width="1.5" stroke-dasharray="4,2"/>

    <rect x="222" y="98" width="40" height="40" rx="6" fill="#111" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="242" y="123" fill="#a78bfa" font-size="17" font-weight="bold" text-anchor="middle">a</text>
    <rect x="266" y="98" width="40" height="40" rx="6" fill="#111" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="286" y="123" fill="#a78bfa" font-size="17" font-weight="bold" text-anchor="middle">b</text>
    <rect x="310" y="98" width="40" height="40" rx="6" fill="#111" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="330" y="123" fill="#a78bfa" font-size="17" font-weight="bold" text-anchor="middle">a</text>
    <rect x="354" y="98" width="40" height="40" rx="6" fill="#111" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="374" y="123" fill="#a78bfa" font-size="17" font-weight="bold" text-anchor="middle">b</text>
  </g>
  <!-- index labels -->
  <text x="64" y="148" fill="#64748b" font-size="9" text-anchor="middle">0</text>
  <text x="108" y="148" fill="#64748b" font-size="9" text-anchor="middle">1</text>
  <text x="152" y="148" fill="#64748b" font-size="9" text-anchor="middle">2</text>
  <text x="196" y="148" fill="#64748b" font-size="9" text-anchor="middle">3</text>
  <text x="242" y="148" fill="#64748b" font-size="9" text-anchor="middle">4</text>
  <text x="286" y="148" fill="#64748b" font-size="9" text-anchor="middle">5</text>
  <text x="330" y="148" fill="#64748b" font-size="9" text-anchor="middle">6</text>
  <text x="374" y="148" fill="#64748b" font-size="9" text-anchor="middle">7</text>

  <!-- Step 2: [1:-1] slice -->
  <text x="44" y="168" fill="#64748b" font-size="11">Step 2: Strip first and last char → (s+s)[1:-1] = "bababa"</text>

  <!-- stripped boxes -->
  <g>
    <!-- first char grayed out -->
    <rect x="44" y="176" width="40" height="40" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1" opacity="0.4"/>
    <text x="64" y="201" fill="#333" font-size="17" font-weight="bold" text-anchor="middle">a</text>
    <line x1="44" y1="176" x2="84" y2="216" stroke="#f87171" stroke-width="1.5"/>
    <line x1="84" y1="176" x2="44" y2="216" stroke="#f87171" stroke-width="1.5"/>

    <rect x="88" y="176" width="40" height="40" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
    <text x="108" y="201" fill="#34d399" font-size="17" font-weight="bold" text-anchor="middle">b</text>
    <rect x="132" y="176" width="40" height="40" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
    <text x="152" y="201" fill="#34d399" font-size="17" font-weight="bold" text-anchor="middle">a</text>
    <rect x="176" y="176" width="40" height="40" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
    <text x="196" y="201" fill="#34d399" font-size="17" font-weight="bold" text-anchor="middle">b</text>
    <rect x="220" y="176" width="40" height="40" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
    <text x="240" y="201" fill="#34d399" font-size="17" font-weight="bold" text-anchor="middle">a</text>
    <rect x="264" y="176" width="40" height="40" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
    <text x="284" y="201" fill="#34d399" font-size="17" font-weight="bold" text-anchor="middle">b</text>
    <rect x="308" y="176" width="40" height="40" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
    <text x="328" y="201" fill="#34d399" font-size="17" font-weight="bold" text-anchor="middle">a</text>

    <!-- last char grayed out -->
    <rect x="352" y="176" width="40" height="40" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1" opacity="0.4"/>
    <text x="372" y="201" fill="#333" font-size="17" font-weight="bold" text-anchor="middle">b</text>
    <line x1="352" y1="176" x2="392" y2="216" stroke="#f87171" stroke-width="1.5"/>
    <line x1="392" y1="176" x2="352" y2="216" stroke="#f87171" stroke-width="1.5"/>
  </g>

  <!-- Step 3: check if s in stripped -->
  <text x="44" y="232" fill="#64748b" font-size="11">Step 3: Is "abab" in "bababa"?</text>

  <!-- Show the match in "bababa" -->
  <rect x="44" y="240" width="380" height="44" rx="6" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="58" y="257" fill="#64748b" font-size="11">stripped = "</text>
  <text x="132" y="257" fill="#64748b" font-size="11">b</text>
  <text x="146" y="257" fill="#34d399" font-size="13" font-weight="bold">a</text>
  <text x="160" y="257" fill="#34d399" font-size="13" font-weight="bold">b</text>
  <text x="174" y="257" fill="#34d399" font-size="13" font-weight="bold">a</text>
  <text x="188" y="257" fill="#34d399" font-size="13" font-weight="bold">b</text>
  <text x="202" y="257" fill="#64748b" font-size="11">a</text>
  <text x="216" y="257" fill="#64748b" font-size="11">"</text>
  <!-- bracket under match -->
  <line x1="146" y1="268" x2="206" y2="268" stroke="#34d399" stroke-width="1.5"/>
  <line x1="146" y1="262" x2="146" y2="268" stroke="#34d399" stroke-width="1.5"/>
  <line x1="206" y1="262" x2="206" y2="268" stroke="#34d399" stroke-width="1.5"/>
  <text x="176" y="278" fill="#34d399" font-size="9" text-anchor="middle">"abab" found at [1:5]</text>

  <!-- Result -->
  <rect x="44" y="294" width="380" height="34" rx="8" fill="#0d2d1a" stroke="#34d399" stroke-width="2"/>
  <text x="234" y="316" fill="#34d399" font-size="14" font-weight="bold" text-anchor="middle">"abab" HAS repeated substring ✓</text>

  <!-- Why it eliminates trivial matches -->
  <rect x="44" y="338" width="380" height="66" rx="8" fill="#111" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="58" y="356" fill="#5b6abf" font-size="11" font-weight="bold">Why [1:-1] eliminates trivial matches:</text>
  <text x="58" y="372" fill="#64748b" font-size="10">Without stripping: s always appears at index 0 and n</text>
  <text x="58" y="386" fill="#64748b" font-size="10">Stripping removes those trivial positions.</text>
  <text x="58" y="400" fill="#34d399" font-size="10">Only non-trivial rotation (a repeated sub) can match.</text>

  <!-- Pseudocode -->
  <rect x="44" y="414" width="380" height="48" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="58" y="431" fill="#5b6abf" font-size="11" font-weight="bold">repeatedSubstringPattern(s):</text>
  <text x="58" y="445" fill="#34d399" font-size="10">return s in (s + s)[1:-1]    # O(n) time, O(n) space</text>
  <text x="58" y="459" fill="#64748b" font-size="9">  # or: (s+s)[1:len(s+s)-1].find(s) != -1</text>

  <!-- RIGHT: Counterexample — non-repeating -->
  <text x="685" y="66" fill="#5b6abf" font-size="13" font-weight="bold" text-anchor="middle">Counterexample — "aba" (no repeat)</text>

  <!-- s = aba -->
  <text x="470" y="88" fill="#64748b" font-size="11">s = "aba"   →   s+s = "abaaba"</text>
  <g>
    <rect x="470" y="96" width="40" height="40" rx="6" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="490" y="121" fill="#fbbf24" font-size="17" font-weight="bold" text-anchor="middle">a</text>
    <rect x="514" y="96" width="40" height="40" rx="6" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="534" y="121" fill="#fbbf24" font-size="17" font-weight="bold" text-anchor="middle">b</text>
    <rect x="558" y="96" width="40" height="40" rx="6" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="578" y="121" fill="#fbbf24" font-size="17" font-weight="bold" text-anchor="middle">a</text>
    <line x1="600" y1="92" x2="600" y2="140" stroke="#333" stroke-width="1.5" stroke-dasharray="4,2"/>
    <rect x="602" y="96" width="40" height="40" rx="6" fill="#111" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="622" y="121" fill="#a78bfa" font-size="17" font-weight="bold" text-anchor="middle">a</text>
    <rect x="646" y="96" width="40" height="40" rx="6" fill="#111" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="666" y="121" fill="#a78bfa" font-size="17" font-weight="bold" text-anchor="middle">b</text>
    <rect x="690" y="96" width="40" height="40" rx="6" fill="#111" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="710" y="121" fill="#a78bfa" font-size="17" font-weight="bold" text-anchor="middle">a</text>
  </g>

  <text x="470" y="154" fill="#64748b" font-size="11">(s+s)[1:-1] = "baab"</text>

  <!-- stripped aba -->
  <g>
    <rect x="470" y="160" width="40" height="40" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1" opacity="0.4"/>
    <line x1="470" y1="160" x2="510" y2="200" stroke="#f87171" stroke-width="1.5"/>
    <line x1="510" y1="160" x2="470" y2="200" stroke="#f87171" stroke-width="1.5"/>
    <rect x="514" y="160" width="40" height="40" rx="6" fill="#111" stroke="#222" stroke-width="1"/>
    <text x="534" y="185" fill="#f1f5f9" font-size="17" font-weight="bold" text-anchor="middle">b</text>
    <rect x="558" y="160" width="40" height="40" rx="6" fill="#111" stroke="#222" stroke-width="1"/>
    <text x="578" y="185" fill="#f1f5f9" font-size="17" font-weight="bold" text-anchor="middle">a</text>
    <rect x="602" y="160" width="40" height="40" rx="6" fill="#111" stroke="#222" stroke-width="1"/>
    <text x="622" y="185" fill="#f1f5f9" font-size="17" font-weight="bold" text-anchor="middle">a</text>
    <rect x="646" y="160" width="40" height="40" rx="6" fill="#111" stroke="#222" stroke-width="1"/>
    <text x="666" y="185" fill="#f1f5f9" font-size="17" font-weight="bold" text-anchor="middle">b</text>
    <rect x="690" y="160" width="40" height="40" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1" opacity="0.4"/>
    <line x1="690" y1="160" x2="730" y2="200" stroke="#f87171" stroke-width="1.5"/>
    <line x1="730" y1="160" x2="690" y2="200" stroke="#f87171" stroke-width="1.5"/>
  </g>

  <!-- Check -->
  <text x="470" y="218" fill="#64748b" font-size="11">Is "aba" in "baab"?</text>
  <rect x="470" y="224" width="390" height="34" rx="6" fill="#2d0d0d" stroke="#f87171" stroke-width="1.5"/>
  <text x="665" y="246" fill="#f87171" font-size="13" font-weight="bold" text-anchor="middle">"aba" NOT in "baab" → NO repeated pattern</text>

  <!-- More examples table -->
  <text x="470" y="278" fill="#64748b" font-size="11">More examples:</text>
  <rect x="470" y="284" width="390" height="148" rx="6" fill="#111" stroke="#222" stroke-width="1"/>

  <!-- Header -->
  <text x="484" y="300" fill="#5b6abf" font-size="10" font-weight="bold">s</text>
  <text x="580" y="300" fill="#5b6abf" font-size="10" font-weight="bold">(s+s)[1:-1]</text>
  <text x="720" y="300" fill="#5b6abf" font-size="10" font-weight="bold">s in stripped?</text>
  <line x1="470" y1="304" x2="860" y2="304" stroke="#222" stroke-width="1"/>

  <text x="484" y="320" fill="#fbbf24" font-size="11">"abcabc"</text>
  <text x="580" y="320" fill="#64748b" font-size="11">"bcabcab"</text>
  <text x="720" y="320" fill="#34d399" font-size="11">True  ✓  (repeat: "abc")</text>

  <text x="484" y="340" fill="#fbbf24" font-size="11">"aaa"</text>
  <text x="580" y="340" fill="#64748b" font-size="11">"aaaa"</text>
  <text x="720" y="340" fill="#34d399" font-size="11">True  ✓  (repeat: "a")</text>

  <text x="484" y="360" fill="#fbbf24" font-size="11">"abab"</text>
  <text x="580" y="360" fill="#64748b" font-size="11">"babab"</text>
  <text x="720" y="360" fill="#34d399" font-size="11">True  ✓  (repeat: "ab")</text>

  <text x="484" y="380" fill="#fbbf24" font-size="11">"ab"</text>
  <text x="580" y="380" fill="#64748b" font-size="11">"ba"</text>
  <text x="720" y="380" fill="#f87171" font-size="11">False  ✗</text>

  <text x="484" y="400" fill="#fbbf24" font-size="11">"a"</text>
  <text x="580" y="400" fill="#64748b" font-size="11">""</text>
  <text x="720" y="400" fill="#f87171" font-size="11">False  ✗  (single char)</text>

  <text x="484" y="420" fill="#fbbf24" font-size="11">"aba"</text>
  <text x="580" y="420" fill="#64748b" font-size="11">"baab"</text>
  <text x="720" y="420" fill="#f87171" font-size="11">False  ✗</text>

  <!-- Complexity note -->
  <rect x="470" y="442" width="390" height="30" rx="6" fill="#111" stroke="#fbbf24" stroke-width="1"/>
  <text x="484" y="457" fill="#fbbf24" font-size="10" font-weight="bold">Complexity: O(n) time, O(n) space</text>
  <text x="484" y="469" fill="#64748b" font-size="9">Alternative: KMP failure function gives O(n) time O(n) space</text>
</svg>
