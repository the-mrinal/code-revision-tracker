<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="SF Mono, Menlo, monospace">
  <rect width="900" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#5b6abf" font-size="18" font-weight="bold">Fixed Size Sliding Window</text>
  <text x="450" y="62" text-anchor="middle" fill="#888" font-size="12">Window of size k slides across array, computing aggregate at each position</text>

  <!-- Array elements -->
  <g transform="translate(100, 100)">
    <!-- Array boxes -->
    <rect x="0" y="0" width="60" height="50" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="30" y="32" text-anchor="middle" fill="#e0e0e0" font-size="16">1</text>
    <text x="30" y="-8" text-anchor="middle" fill="#666" font-size="10">0</text>

    <rect x="70" y="0" width="60" height="50" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="100" y="32" text-anchor="middle" fill="#e0e0e0" font-size="16">12</text>
    <text x="100" y="-8" text-anchor="middle" fill="#666" font-size="10">1</text>

    <rect x="140" y="0" width="60" height="50" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="170" y="32" text-anchor="middle" fill="#e0e0e0" font-size="16">-5</text>
    <text x="170" y="-8" text-anchor="middle" fill="#666" font-size="10">2</text>

    <rect x="210" y="0" width="60" height="50" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="240" y="32" text-anchor="middle" fill="#e0e0e0" font-size="16">-6</text>
    <text x="240" y="-8" text-anchor="middle" fill="#666" font-size="10">3</text>

    <rect x="280" y="0" width="60" height="50" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="310" y="32" text-anchor="middle" fill="#e0e0e0" font-size="16">50</text>
    <text x="310" y="-8" text-anchor="middle" fill="#666" font-size="10">4</text>

    <rect x="350" y="0" width="60" height="50" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="380" y="32" text-anchor="middle" fill="#e0e0e0" font-size="16">3</text>
    <text x="380" y="-8" text-anchor="middle" fill="#666" font-size="10">5</text>
  </g>

  <!-- Window Position 1 -->
  <g transform="translate(100, 180)">
    <rect x="-5" y="0" width="265" height="50" rx="6" fill="none" stroke="#5b6abf" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="127" y="32" text-anchor="middle" fill="#5b6abf" font-size="14">k = 4</text>
    <text x="460" y="20" fill="#888" font-size="13">sum = 1+12+(-5)+(-6) = 2</text>
    <text x="460" y="38" fill="#888" font-size="13">avg = 0.50</text>
  </g>

  <!-- Window Position 2 -->
  <g transform="translate(100, 250)">
    <rect x="65" y="0" width="265" height="50" rx="6" fill="none" stroke="#34d399" stroke-width="2.5"/>
    <text x="197" y="32" text-anchor="middle" fill="#34d399" font-size="14">k = 4</text>
    <text x="460" y="20" fill="#34d399" font-size="13" font-weight="bold">sum = 2 - 1 + 50 = 51</text>
    <text x="460" y="38" fill="#34d399" font-size="13" font-weight="bold">avg = 12.75 ★ max</text>
    <!-- Arrow showing the slide -->
    <line x1="0" y1="-10" x2="65" y2="-10" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowY)"/>
    <text x="32" y="-15" text-anchor="middle" fill="#fbbf24" font-size="9">slide</text>
  </g>

  <!-- Window Position 3 -->
  <g transform="translate(100, 320)">
    <rect x="135" y="0" width="265" height="50" rx="6" fill="none" stroke="#5b6abf" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="267" y="32" text-anchor="middle" fill="#5b6abf" font-size="14">k = 4</text>
    <text x="460" y="20" fill="#888" font-size="13">sum = 51 - 12 + 3 = 42</text>
    <text x="460" y="38" fill="#888" font-size="13">avg = 10.50</text>
    <line x1="70" y1="-10" x2="135" y2="-10" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowY)"/>
    <text x="102" y="-15" text-anchor="middle" fill="#fbbf24" font-size="9">slide</text>
  </g>

  <!-- Key insight box -->
  <rect x="60" y="400" width="780" height="80" rx="8" fill="#111" stroke="#5b6abf" stroke-width="1"/>
  <text x="450" y="425" text-anchor="middle" fill="#5b6abf" font-size="14" font-weight="bold">Key Insight: O(1) per slide</text>
  <text x="450" y="448" text-anchor="middle" fill="#ccc" font-size="12">new_sum = old_sum - nums[left] + nums[right]</text>
  <text x="450" y="468" text-anchor="middle" fill="#888" font-size="11">Don't recompute the whole window. Just update the delta: subtract what leaves, add what enters.</text>

  <!-- Legend -->
  <g transform="translate(700, 95)">
    <rect x="0" y="0" width="15" height="15" rx="3" fill="none" stroke="#34d399" stroke-width="2"/>
    <text x="22" y="12" fill="#34d399" font-size="10">Best window</text>
    <rect x="0" y="22" width="15" height="15" rx="3" fill="none" stroke="#5b6abf" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="22" y="34" fill="#5b6abf" font-size="10">Other windows</text>
    <line x1="0" y1="50" x2="15" y2="50" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="22" y="54" fill="#fbbf24" font-size="10">Slide direction</text>
  </g>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowY" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24"/>
    </marker>
  </defs>
</svg>
