<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="SF Mono, Menlo, monospace">
  <rect width="900" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#a78bfa" font-size="18" font-weight="bold">Variable Size Sliding Window</text>
  <text x="450" y="62" text-anchor="middle" fill="#888" font-size="12">Longest Substring Without Repeating Characters — "abcabcbb"</text>

  <!-- String characters -->
  <g transform="translate(90, 90)">
    <rect x="0" y="0" width="50" height="45" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="25" y="30" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">a</text>
    <text x="25" y="-8" text-anchor="middle" fill="#666" font-size="10">0</text>

    <rect x="60" y="0" width="50" height="45" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="85" y="30" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">b</text>
    <text x="85" y="-8" text-anchor="middle" fill="#666" font-size="10">1</text>

    <rect x="120" y="0" width="50" height="45" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="145" y="30" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">c</text>
    <text x="145" y="-8" text-anchor="middle" fill="#666" font-size="10">2</text>

    <rect x="180" y="0" width="50" height="45" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="205" y="30" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">a</text>
    <text x="205" y="-8" text-anchor="middle" fill="#666" font-size="10">3</text>

    <rect x="240" y="0" width="50" height="45" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="265" y="30" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">b</text>
    <text x="265" y="-8" text-anchor="middle" fill="#666" font-size="10">4</text>

    <rect x="300" y="0" width="50" height="45" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="325" y="30" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">c</text>
    <text x="325" y="-8" text-anchor="middle" fill="#666" font-size="10">5</text>

    <rect x="360" y="0" width="50" height="45" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="385" y="30" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">b</text>
    <text x="385" y="-8" text-anchor="middle" fill="#666" font-size="10">6</text>

    <rect x="420" y="0" width="50" height="45" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="445" y="30" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">b</text>
    <text x="445" y="-8" text-anchor="middle" fill="#666" font-size="10">7</text>
  </g>

  <!-- Window states -->
  <g transform="translate(90, 165)">
    <!-- Step 1: "a" len=1 -->
    <rect x="-3" y="0" width="56" height="30" rx="4" fill="none" stroke="#5b6abf" stroke-width="1.5"/>
    <text x="550" y="20" fill="#888" font-size="11">L=0 R=0  set={a}      len=1</text>

    <!-- Step 2: "ab" len=2 -->
    <rect x="-3" y="35" width="116" height="30" rx="4" fill="none" stroke="#5b6abf" stroke-width="1.5"/>
    <text x="550" y="55" fill="#888" font-size="11">L=0 R=1  set={a,b}    len=2</text>

    <!-- Step 3: "abc" len=3 — best! -->
    <rect x="-3" y="70" width="176" height="30" rx="4" fill="none" stroke="#34d399" stroke-width="2.5"/>
    <text x="550" y="90" fill="#34d399" font-size="11" font-weight="bold">L=0 R=2  set={a,b,c}  len=3 ★</text>

    <!-- Step 4: duplicate 'a' → shrink → "bca" len=3 -->
    <rect x="57" y="105" width="176" height="30" rx="4" fill="none" stroke="#34d399" stroke-width="2.5"/>
    <text x="550" y="125" fill="#fbbf24" font-size="11">L=0→1 R=3  'a' dup! shrink → len=3</text>
    <!-- Shrink arrow -->
    <line x1="0" y1="115" x2="50" y2="115" stroke="#f87171" stroke-width="1.5" marker-end="url(#arrowR)"/>

    <!-- Step 5: duplicate 'b' → shrink → "cab" len=3 -->
    <rect x="117" y="140" width="176" height="30" rx="4" fill="none" stroke="#34d399" stroke-width="2.5"/>
    <text x="550" y="160" fill="#fbbf24" font-size="11">L=1→2 R=4  'b' dup! shrink → len=3</text>
    <line x1="60" y1="150" x2="110" y2="150" stroke="#f87171" stroke-width="1.5" marker-end="url(#arrowR)"/>

    <!-- Step 6: duplicate 'c' → shrink → "abc" len=3 -->
    <rect x="177" y="175" width="176" height="30" rx="4" fill="none" stroke="#34d399" stroke-width="2.5"/>
    <text x="550" y="195" fill="#fbbf24" font-size="11">L=2→3 R=5  'c' dup! shrink → len=3</text>
    <line x1="120" y1="185" x2="170" y2="185" stroke="#f87171" stroke-width="1.5" marker-end="url(#arrowR)"/>
  </g>

  <!-- Key insight box -->
  <rect x="60" y="405" width="780" height="95" rx="8" fill="#111" stroke="#a78bfa" stroke-width="1"/>
  <text x="450" y="430" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold">Two Templates</text>
  <text x="250" y="455" text-anchor="middle" fill="#34d399" font-size="12">LONGEST: shrink while INVALID</text>
  <text x="250" y="475" text-anchor="middle" fill="#888" font-size="11">update answer AFTER shrinking</text>
  <text x="650" y="455" text-anchor="middle" fill="#fbbf24" font-size="12">SHORTEST: shrink while VALID</text>
  <text x="650" y="475" text-anchor="middle" fill="#888" font-size="11">update answer BEFORE shrinking</text>
  <text x="450" y="492" text-anchor="middle" fill="#ccc" font-size="11">Both pointers only move forward → each element touched at most twice → O(n)</text>

  <!-- Legend -->
  <g transform="translate(680, 90)">
    <rect x="0" y="0" width="15" height="15" rx="3" fill="none" stroke="#34d399" stroke-width="2"/>
    <text x="22" y="12" fill="#34d399" font-size="10">Valid / best</text>
    <rect x="0" y="22" width="15" height="15" rx="3" fill="none" stroke="#5b6abf" stroke-width="1.5"/>
    <text x="22" y="34" fill="#5b6abf" font-size="10">Expanding</text>
    <line x1="0" y1="50" x2="15" y2="50" stroke="#f87171" stroke-width="1.5"/>
    <text x="22" y="54" fill="#f87171" font-size="10">Shrink (left++)</text>
  </g>

  <defs>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f87171"/>
    </marker>
  </defs>
</svg>
