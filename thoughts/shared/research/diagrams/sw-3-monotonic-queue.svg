<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="SF Mono, Menlo, monospace">
  <rect width="900" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#fbbf24" font-size="18" font-weight="bold">Monotonic Queue (Deque)</text>
  <text x="450" y="62" text-anchor="middle" fill="#888" font-size="12">Sliding Window Maximum — nums=[1,3,-1,-3,5,3,6,7], k=3</text>

  <!-- Array -->
  <g transform="translate(80, 85)">
    <rect x="0" y="0" width="50" height="42" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="25" y="28" text-anchor="middle" fill="#e0e0e0" font-size="15">1</text>
    <text x="25" y="-6" text-anchor="middle" fill="#666" font-size="9">0</text>

    <rect x="58" y="0" width="50" height="42" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="83" y="28" text-anchor="middle" fill="#e0e0e0" font-size="15">3</text>
    <text x="83" y="-6" text-anchor="middle" fill="#666" font-size="9">1</text>

    <rect x="116" y="0" width="50" height="42" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="141" y="28" text-anchor="middle" fill="#e0e0e0" font-size="15">-1</text>
    <text x="141" y="-6" text-anchor="middle" fill="#666" font-size="9">2</text>

    <rect x="174" y="0" width="50" height="42" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="199" y="28" text-anchor="middle" fill="#e0e0e0" font-size="15">-3</text>
    <text x="199" y="-6" text-anchor="middle" fill="#666" font-size="9">3</text>

    <rect x="232" y="0" width="50" height="42" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="257" y="28" text-anchor="middle" fill="#e0e0e0" font-size="15">5</text>
    <text x="257" y="-6" text-anchor="middle" fill="#666" font-size="9">4</text>

    <rect x="290" y="0" width="50" height="42" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="315" y="28" text-anchor="middle" fill="#e0e0e0" font-size="15">3</text>
    <text x="315" y="-6" text-anchor="middle" fill="#666" font-size="9">5</text>

    <rect x="348" y="0" width="50" height="42" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="373" y="28" text-anchor="middle" fill="#e0e0e0" font-size="15">6</text>
    <text x="373" y="-6" text-anchor="middle" fill="#666" font-size="9">6</text>

    <rect x="406" y="0" width="50" height="42" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
    <text x="431" y="28" text-anchor="middle" fill="#e0e0e0" font-size="15">7</text>
    <text x="431" y="-6" text-anchor="middle" fill="#666" font-size="9">7</text>
  </g>

  <!-- Step-by-step deque state table -->
  <g transform="translate(60, 155)">
    <!-- Header -->
    <text x="30" y="15" fill="#666" font-size="11" font-weight="bold">Step</text>
    <text x="90" y="15" fill="#666" font-size="11" font-weight="bold">Val</text>
    <text x="160" y="15" fill="#666" font-size="11" font-weight="bold">Action</text>
    <text x="500" y="15" fill="#666" font-size="11" font-weight="bold">Deque</text>
    <text x="680" y="15" fill="#666" font-size="11" font-weight="bold">Max</text>
    <line x1="10" y1="22" x2="750" y2="22" stroke="#222" stroke-width="1"/>

    <!-- i=0 -->
    <text x="30" y="42" fill="#e0e0e0" font-size="11">i=0</text>
    <text x="90" y="42" fill="#e0e0e0" font-size="11">1</text>
    <text x="160" y="42" fill="#888" font-size="11">push 1</text>
    <rect x="490" y="28" width="40" height="22" rx="4" fill="#1a1a2e" stroke="#5b6abf" stroke-width="1"/>
    <text x="510" y="44" text-anchor="middle" fill="#5b6abf" font-size="11">1</text>
    <text x="680" y="42" fill="#444" font-size="11">—</text>

    <!-- i=1 -->
    <text x="30" y="68" fill="#e0e0e0" font-size="11">i=1</text>
    <text x="90" y="68" fill="#e0e0e0" font-size="11">3</text>
    <text x="160" y="68" fill="#f87171" font-size="11">1&lt;3 pop → push 3</text>
    <rect x="490" y="54" width="40" height="22" rx="4" fill="#1a1a2e" stroke="#34d399" stroke-width="1.5"/>
    <text x="510" y="70" text-anchor="middle" fill="#34d399" font-size="11">3</text>
    <text x="680" y="68" fill="#444" font-size="11">—</text>

    <!-- i=2 -->
    <text x="30" y="94" fill="#e0e0e0" font-size="11">i=2</text>
    <text x="90" y="94" fill="#e0e0e0" font-size="11">-1</text>
    <text x="160" y="94" fill="#888" font-size="11">-1&lt;3, push -1</text>
    <rect x="490" y="80" width="40" height="22" rx="4" fill="#1a1a2e" stroke="#34d399" stroke-width="1.5"/>
    <text x="510" y="96" text-anchor="middle" fill="#34d399" font-size="11">3</text>
    <rect x="535" y="80" width="40" height="22" rx="4" fill="#1a1a2e" stroke="#5b6abf" stroke-width="1"/>
    <text x="555" y="96" text-anchor="middle" fill="#5b6abf" font-size="11">-1</text>
    <text x="680" y="94" fill="#34d399" font-size="11" font-weight="bold">3</text>

    <!-- i=3 -->
    <text x="30" y="120" fill="#e0e0e0" font-size="11">i=3</text>
    <text x="90" y="120" fill="#e0e0e0" font-size="11">-3</text>
    <text x="160" y="120" fill="#888" font-size="11">-3&lt;-1, push -3</text>
    <rect x="490" y="106" width="40" height="22" rx="4" fill="#1a1a2e" stroke="#34d399" stroke-width="1.5"/>
    <text x="510" y="122" text-anchor="middle" fill="#34d399" font-size="11">3</text>
    <rect x="535" y="106" width="40" height="22" rx="4" fill="#1a1a2e" stroke="#5b6abf" stroke-width="1"/>
    <text x="555" y="122" text-anchor="middle" fill="#5b6abf" font-size="11">-1</text>
    <rect x="580" y="106" width="40" height="22" rx="4" fill="#1a1a2e" stroke="#5b6abf" stroke-width="1"/>
    <text x="600" y="122" text-anchor="middle" fill="#5b6abf" font-size="11">-3</text>
    <text x="680" y="120" fill="#34d399" font-size="11" font-weight="bold">3</text>

    <!-- i=4 -->
    <text x="30" y="146" fill="#e0e0e0" font-size="11">i=4</text>
    <text x="90" y="146" fill="#fbbf24" font-size="11" font-weight="bold">5</text>
    <text x="160" y="146" fill="#f87171" font-size="11">pop all &lt; 5 → push 5</text>
    <rect x="490" y="132" width="40" height="22" rx="4" fill="#1a1a2e" stroke="#fbbf24" stroke-width="2"/>
    <text x="510" y="148" text-anchor="middle" fill="#fbbf24" font-size="11">5</text>
    <text x="680" y="146" fill="#fbbf24" font-size="11" font-weight="bold">5</text>

    <!-- i=5 -->
    <text x="30" y="172" fill="#e0e0e0" font-size="11">i=5</text>
    <text x="90" y="172" fill="#e0e0e0" font-size="11">3</text>
    <text x="160" y="172" fill="#888" font-size="11">3&lt;5, push 3</text>
    <rect x="490" y="158" width="40" height="22" rx="4" fill="#1a1a2e" stroke="#34d399" stroke-width="1.5"/>
    <text x="510" y="174" text-anchor="middle" fill="#34d399" font-size="11">5</text>
    <rect x="535" y="158" width="40" height="22" rx="4" fill="#1a1a2e" stroke="#5b6abf" stroke-width="1"/>
    <text x="555" y="174" text-anchor="middle" fill="#5b6abf" font-size="11">3</text>
    <text x="680" y="172" fill="#34d399" font-size="11" font-weight="bold">5</text>

    <!-- i=6 -->
    <text x="30" y="198" fill="#e0e0e0" font-size="11">i=6</text>
    <text x="90" y="198" fill="#e0e0e0" font-size="11">6</text>
    <text x="160" y="198" fill="#f87171" font-size="11">pop 3, pop 5 → push 6</text>
    <rect x="490" y="184" width="40" height="22" rx="4" fill="#1a1a2e" stroke="#34d399" stroke-width="1.5"/>
    <text x="510" y="200" text-anchor="middle" fill="#34d399" font-size="11">6</text>
    <text x="680" y="198" fill="#34d399" font-size="11" font-weight="bold">6</text>

    <!-- i=7 -->
    <text x="30" y="224" fill="#e0e0e0" font-size="11">i=7</text>
    <text x="90" y="224" fill="#e0e0e0" font-size="11">7</text>
    <text x="160" y="224" fill="#f87171" font-size="11">pop 6 → push 7</text>
    <rect x="490" y="210" width="40" height="22" rx="4" fill="#1a1a2e" stroke="#fbbf24" stroke-width="2"/>
    <text x="510" y="226" text-anchor="middle" fill="#fbbf24" font-size="11">7</text>
    <text x="680" y="224" fill="#fbbf24" font-size="11" font-weight="bold">7</text>
  </g>

  <!-- Result -->
  <g transform="translate(60, 400)">
    <text x="30" y="15" fill="#888" font-size="12">Result:</text>
    <text x="100" y="15" fill="#34d399" font-size="14" font-weight="bold">[3, 3, 5, 5, 6, 7]</text>
  </g>

  <!-- Key insight box -->
  <rect x="60" y="425" width="780" height="78" rx="8" fill="#111" stroke="#fbbf24" stroke-width="1"/>
  <text x="450" y="448" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="bold">Why Discard? Dominated Elements Are Useless</text>
  <text x="450" y="468" text-anchor="middle" fill="#ccc" font-size="12">If nums[i] &gt; nums[back], then nums[back] can NEVER be the max of any future window</text>
  <text x="450" y="488" text-anchor="middle" fill="#888" font-size="11">(nums[i] entered later AND is bigger → it will always outlast and outperform nums[back])</text>

  <!-- Deque label -->
  <text x="560" y="152" text-anchor="middle" fill="#444" font-size="9">front ← deque → back</text>
</svg>
