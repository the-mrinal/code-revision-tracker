<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono', Menlo, monospace">
  <!-- Background -->
  <rect width="900" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#a78bfa" font-size="15" font-weight="bold" letter-spacing="0.5">Converging Pointers — Two Sum II</text>
  <text x="450" y="56" text-anchor="middle" fill="#555" font-size="11">numbers = [2, 7, 11, 15], target = 9</text>

  <!-- ── ARRAY BOXES ── -->
  <!-- Box 0: value 2 -->
  <rect x="230" y="72" width="60" height="44" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
  <text x="260" y="100" text-anchor="middle" fill="#e5e7eb" font-size="18" font-weight="bold">2</text>
  <text x="260" y="128" text-anchor="middle" fill="#555" font-size="11">[0]</text>

  <!-- Box 1: value 7 -->
  <rect x="310" y="72" width="60" height="44" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
  <text x="340" y="100" text-anchor="middle" fill="#e5e7eb" font-size="18" font-weight="bold">7</text>
  <text x="340" y="128" text-anchor="middle" fill="#555" font-size="11">[1]</text>

  <!-- Box 2: value 11 -->
  <rect x="390" y="72" width="60" height="44" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
  <text x="420" y="100" text-anchor="middle" fill="#e5e7eb" font-size="18" font-weight="bold">11</text>
  <text x="420" y="128" text-anchor="middle" fill="#555" font-size="11">[2]</text>

  <!-- Box 3: value 15 -->
  <rect x="470" y="72" width="60" height="44" rx="6" fill="#111" stroke="#222" stroke-width="1.5"/>
  <text x="500" y="100" text-anchor="middle" fill="#e5e7eb" font-size="18" font-weight="bold">15</text>
  <text x="500" y="128" text-anchor="middle" fill="#555" font-size="11">[3]</text>

  <!-- ═══════════════════════════════════════════
       STEP 1 CARD  (L=0, R=3, sum=17 > 9)
       ═══════════════════════════════════════════ -->
  <rect x="24" y="150" width="264" height="168" rx="10" fill="#111" stroke="#f87171" stroke-width="1.5"/>
  <!-- step label -->
  <text x="38" y="173" fill="#f87171" font-size="10" font-weight="bold" letter-spacing="0.8">STEP 1</text>

  <!-- mini array -->
  <!-- box 0 highlight L -->
  <rect x="38"  y="182" width="40" height="34" rx="5" fill="#1a1a2e" stroke="#5b6abf" stroke-width="2"/>
  <text x="58"  y="204" text-anchor="middle" fill="#5b6abf" font-size="15" font-weight="bold">2</text>
  <!-- box 1 -->
  <rect x="86"  y="182" width="40" height="34" rx="5" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="106" y="204" text-anchor="middle" fill="#9ca3af" font-size="15">7</text>
  <!-- box 2 -->
  <rect x="134" y="182" width="40" height="34" rx="5" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="154" y="204" text-anchor="middle" fill="#9ca3af" font-size="15">11</text>
  <!-- box 3 highlight R -->
  <rect x="182" y="182" width="40" height="34" rx="5" fill="#2d1a1a" stroke="#f87171" stroke-width="2"/>
  <text x="202" y="204" text-anchor="middle" fill="#f87171" font-size="15" font-weight="bold">15</text>

  <!-- L pointer arrow -->
  <line x1="58"  y1="222" x2="58"  y2="232" stroke="#5b6abf" stroke-width="1.5"/>
  <polygon points="54,232 62,232 58,240" fill="#5b6abf"/>
  <text x="58"  y="252" text-anchor="middle" fill="#5b6abf" font-size="10" font-weight="bold">L</text>

  <!-- R pointer arrow -->
  <line x1="202" y1="222" x2="202" y2="232" stroke="#f87171" stroke-width="1.5"/>
  <polygon points="198,232 206,232 202,240" fill="#f87171"/>
  <text x="202" y="252" text-anchor="middle" fill="#f87171" font-size="10" font-weight="bold">R</text>

  <!-- sum + result -->
  <text x="38" y="276" fill="#9ca3af" font-size="11">sum = 2 + 15 = <tspan fill="#f87171" font-weight="bold">17</tspan></text>
  <text x="38" y="294" fill="#9ca3af" font-size="11">17 &gt; 9  →  <tspan fill="#f87171" font-weight="bold">move R left</tspan></text>

  <!-- right-facing arrow from step 1 → step 2 -->
  <line x1="295" y1="234" x2="313" y2="234" stroke="#444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="313,230 321,234 313,238" fill="#444"/>

  <!-- ═══════════════════════════════════════════
       STEP 2 CARD  (L=0, R=2, sum=13 > 9)
       ═══════════════════════════════════════════ -->
  <rect x="323" y="150" width="254" height="168" rx="10" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="337" y="173" fill="#fbbf24" font-size="10" font-weight="bold" letter-spacing="0.8">STEP 2</text>

  <!-- mini array -->
  <rect x="337" y="182" width="40" height="34" rx="5" fill="#1a1a2e" stroke="#5b6abf" stroke-width="2"/>
  <text x="357" y="204" text-anchor="middle" fill="#5b6abf" font-size="15" font-weight="bold">2</text>

  <rect x="385" y="182" width="40" height="34" rx="5" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="405" y="204" text-anchor="middle" fill="#9ca3af" font-size="15">7</text>

  <!-- box 2 highlight R -->
  <rect x="433" y="182" width="40" height="34" rx="5" fill="#2d2200" stroke="#fbbf24" stroke-width="2"/>
  <text x="453" y="204" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="bold">11</text>

  <!-- box 3 dimmed (eliminated) -->
  <rect x="481" y="182" width="40" height="34" rx="5" fill="#0d0d0d" stroke="#1e1e1e" stroke-width="1"/>
  <text x="501" y="204" text-anchor="middle" fill="#333" font-size="15">15</text>
  <!-- strikethrough -->
  <line x1="481" y1="199" x2="521" y2="199" stroke="#333" stroke-width="1.5"/>

  <!-- L pointer -->
  <line x1="357" y1="222" x2="357" y2="232" stroke="#5b6abf" stroke-width="1.5"/>
  <polygon points="353,232 361,232 357,240" fill="#5b6abf"/>
  <text x="357" y="252" text-anchor="middle" fill="#5b6abf" font-size="10" font-weight="bold">L</text>

  <!-- R pointer -->
  <line x1="453" y1="222" x2="453" y2="232" stroke="#fbbf24" stroke-width="1.5"/>
  <polygon points="449,232 457,232 453,240" fill="#fbbf24"/>
  <text x="453" y="252" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">R</text>

  <text x="337" y="276" fill="#9ca3af" font-size="11">sum = 2 + 11 = <tspan fill="#fbbf24" font-weight="bold">13</tspan></text>
  <text x="337" y="294" fill="#9ca3af" font-size="11">13 &gt; 9  →  <tspan fill="#fbbf24" font-weight="bold">move R left</tspan></text>

  <!-- arrow step 2 → step 3 -->
  <line x1="584" y1="234" x2="602" y2="234" stroke="#444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="602,230 610,234 602,238" fill="#444"/>

  <!-- ═══════════════════════════════════════════
       STEP 3 CARD  (L=0, R=1, sum=9 = target)
       ═══════════════════════════════════════════ -->
  <rect x="612" y="150" width="264" height="168" rx="10" fill="#0a1f16" stroke="#34d399" stroke-width="2"/>
  <text x="626" y="173" fill="#34d399" font-size="10" font-weight="bold" letter-spacing="0.8">STEP 3 — FOUND</text>

  <!-- mini array -->
  <!-- box 0 highlight L + found -->
  <rect x="626" y="182" width="40" height="34" rx="5" fill="#0a2e1a" stroke="#34d399" stroke-width="2.5"/>
  <text x="646" y="204" text-anchor="middle" fill="#34d399" font-size="15" font-weight="bold">2</text>

  <!-- box 1 highlight R + found -->
  <rect x="674" y="182" width="40" height="34" rx="5" fill="#0a2e1a" stroke="#34d399" stroke-width="2.5"/>
  <text x="694" y="204" text-anchor="middle" fill="#34d399" font-size="15" font-weight="bold">7</text>

  <!-- boxes 2 & 3 dimmed -->
  <rect x="722" y="182" width="40" height="34" rx="5" fill="#0d0d0d" stroke="#1e1e1e" stroke-width="1"/>
  <text x="742" y="204" text-anchor="middle" fill="#333" font-size="15">11</text>
  <line x1="722" y1="199" x2="762" y2="199" stroke="#333" stroke-width="1.5"/>

  <rect x="770" y="182" width="40" height="34" rx="5" fill="#0d0d0d" stroke="#1e1e1e" stroke-width="1"/>
  <text x="790" y="204" text-anchor="middle" fill="#333" font-size="15">15</text>
  <line x1="770" y1="199" x2="810" y2="199" stroke="#333" stroke-width="1.5"/>

  <!-- L pointer -->
  <line x1="646" y1="222" x2="646" y2="232" stroke="#34d399" stroke-width="1.5"/>
  <polygon points="642,232 650,232 646,240" fill="#34d399"/>
  <text x="646" y="252" text-anchor="middle" fill="#34d399" font-size="10" font-weight="bold">L</text>

  <!-- R pointer -->
  <line x1="694" y1="222" x2="694" y2="232" stroke="#34d399" stroke-width="1.5"/>
  <polygon points="690,232 698,232 694,240" fill="#34d399"/>
  <text x="694" y="252" text-anchor="middle" fill="#34d399" font-size="10" font-weight="bold">R</text>

  <text x="626" y="276" fill="#9ca3af" font-size="11">sum = 2 + 7 = <tspan fill="#34d399" font-weight="bold">9</tspan></text>
  <text x="626" y="294" fill="#9ca3af" font-size="11">9 = 9  →  <tspan fill="#34d399" font-weight="bold">return [L, R]</tspan></text>

  <!-- ═══════════════════════════════════════════
       CONVERGENCE ARROWS (visual sweep)
       ═══════════════════════════════════════════ -->
  <!-- L arrow pointing right (under step 1 mini array at top level) -->
  <text x="200" y="145" text-anchor="middle" fill="#5b6abf" font-size="10">L →</text>
  <text x="700" y="145" text-anchor="middle" fill="#f87171" font-size="10">← R</text>

  <!-- ═══════════════════════════════════════════
       LEGEND
       ═══════════════════════════════════════════ -->
  <rect x="24" y="340" width="852" height="44" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <!-- legend dot 1 -->
  <circle cx="55" cy="362" r="6" fill="#f87171"/>
  <text x="68" y="366" fill="#9ca3af" font-size="11">Too big → move R left</text>
  <!-- divider -->
  <line x1="220" y1="344" x2="220" y2="384" stroke="#222" stroke-width="1"/>
  <!-- legend dot 2 -->
  <circle cx="255" cy="362" r="6" fill="#5b6abf"/>
  <text x="268" y="366" fill="#9ca3af" font-size="11">Too small → move L right</text>
  <!-- divider -->
  <line x1="445" y1="344" x2="445" y2="384" stroke="#222" stroke-width="1"/>
  <!-- legend dot 3 -->
  <circle cx="480" cy="362" r="6" fill="#34d399"/>
  <text x="493" y="366" fill="#9ca3af" font-size="11">Equal → return [L, R]</text>
  <!-- divider -->
  <line x1="650" y1="344" x2="650" y2="384" stroke="#222" stroke-width="1"/>
  <!-- complexity -->
  <text x="665" y="358" fill="#a78bfa" font-size="11" font-weight="bold">Time: O(n)</text>
  <text x="665" y="375" fill="#555" font-size="10">Space: O(1)</text>

  <!-- ═══════════════════════════════════════════
       SUMMARY BAR
       ═══════════════════════════════════════════ -->
  <rect x="24" y="402" width="852" height="58" rx="8" fill="#0d0d1a" stroke="#5b6abf" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="450" y="426" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold" letter-spacing="0.3">Key Insight</text>
  <text x="450" y="447" text-anchor="middle" fill="#6b7280" font-size="11">Sorted array enables O(n) pair search — each step eliminates an entire</text>
  <text x="450" y="462" text-anchor="middle" fill="#6b7280" font-size="11">half of remaining candidates, converging pointers toward the target.</text>
</svg>
