<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#34d399"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#f87171"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#5b6abf"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#fbbf24"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="450" y="34" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="15" font-weight="bold" text-anchor="middle">Fixed Separation Pointers — Remove 2nd Node From End</text>

  <!-- ─── PHASE 1 ─── -->
  <text x="30" y="68" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold">Phase 1: Advance fast by n=2</text>

  <!-- Node positions for phase 1: 1,2,3,4,5  -->
  <!-- node 1 -->
  <rect x="80"  y="80" width="52" height="36" rx="6" fill="#1a1a2e" stroke="#5b6abf" stroke-width="2"/>
  <text x="106" y="103" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">1</text>
  <!-- arrow 1→2 -->
  <line x1="132" y1="98" x2="166" y2="98" stroke="#555" stroke-width="1.8" marker-end="url(#arrow-gray)"/>

  <!-- node 2 -->
  <rect x="174" y="80" width="52" height="36" rx="6" fill="#111" stroke="#333" stroke-width="1.5"/>
  <text x="200" y="103" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">2</text>
  <!-- arrow 2→3 -->
  <line x1="226" y1="98" x2="260" y2="98" stroke="#555" stroke-width="1.8" marker-end="url(#arrow-gray)"/>

  <!-- node 3 -->
  <rect x="268" y="80" width="52" height="36" rx="6" fill="#1a1a2e" stroke="#fbbf24" stroke-width="2"/>
  <text x="294" y="103" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">3</text>
  <!-- arrow 3→4 -->
  <line x1="320" y1="98" x2="354" y2="98" stroke="#555" stroke-width="1.8" marker-end="url(#arrow-gray)"/>

  <!-- node 4 -->
  <rect x="362" y="80" width="52" height="36" rx="6" fill="#111" stroke="#333" stroke-width="1.5"/>
  <text x="388" y="103" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">4</text>
  <!-- arrow 4→5 -->
  <line x1="414" y1="98" x2="448" y2="98" stroke="#555" stroke-width="1.8" marker-end="url(#arrow-gray)"/>

  <!-- node 5 -->
  <rect x="456" y="80" width="52" height="36" rx="6" fill="#111" stroke="#333" stroke-width="1.5"/>
  <text x="482" y="103" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">5</text>
  <!-- arrow 5→NULL -->
  <line x1="508" y1="98" x2="542" y2="98" stroke="#555" stroke-width="1.8" marker-end="url(#arrow-gray)"/>
  <text x="548" y="103" fill="#444" font-family="SF Mono, Menlo, monospace" font-size="10">NULL</text>

  <!-- slow label under node 1 -->
  <text x="106" y="130" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">slow</text>
  <!-- slow pointer indicator -->
  <line x1="106" y1="116" x2="106" y2="121" stroke="#34d399" stroke-width="1.5"/>

  <!-- fast label under node 3 -->
  <text x="294" y="130" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">fast</text>
  <line x1="294" y1="116" x2="294" y2="121" stroke="#fbbf24" stroke-width="1.5"/>

  <!-- Gap highlight brace between node 1 and node 3 -->
  <rect x="132" y="84" width="136" height="28" rx="4" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="200" y="77" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle" opacity="0.9">gap = n = 2</text>

  <!-- ─── PHASE 2 ─── -->
  <text x="30" y="170" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold">Phase 2: Move both until fast reaches end</text>

  <!-- nodes for phase 2 -->
  <!-- node 1 -->
  <rect x="80"  y="182" width="52" height="36" rx="6" fill="#111" stroke="#333" stroke-width="1.5"/>
  <text x="106" y="205" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">1</text>
  <line x1="132" y1="200" x2="166" y2="200" stroke="#555" stroke-width="1.8" marker-end="url(#arrow-gray)"/>

  <!-- node 2 -->
  <rect x="174" y="182" width="52" height="36" rx="6" fill="#111" stroke="#333" stroke-width="1.5"/>
  <text x="200" y="205" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">2</text>
  <line x1="226" y1="200" x2="260" y2="200" stroke="#555" stroke-width="1.8" marker-end="url(#arrow-gray)"/>

  <!-- node 3 — slow is here -->
  <rect x="268" y="182" width="52" height="36" rx="6" fill="#1a1a2e" stroke="#34d399" stroke-width="2"/>
  <text x="294" y="205" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">3</text>
  <line x1="320" y1="200" x2="354" y2="200" stroke="#555" stroke-width="1.8" marker-end="url(#arrow-gray)"/>

  <!-- node 4 -->
  <rect x="362" y="182" width="52" height="36" rx="6" fill="#111" stroke="#333" stroke-width="1.5"/>
  <text x="388" y="205" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">4</text>
  <line x1="414" y1="200" x2="448" y2="200" stroke="#555" stroke-width="1.8" marker-end="url(#arrow-gray)"/>

  <!-- node 5 — fast is here -->
  <rect x="456" y="182" width="52" height="36" rx="6" fill="#1a1a2e" stroke="#fbbf24" stroke-width="2"/>
  <text x="482" y="205" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">5</text>
  <line x1="508" y1="200" x2="542" y2="200" stroke="#555" stroke-width="1.8" marker-end="url(#arrow-gray)"/>
  <text x="548" y="205" fill="#444" font-family="SF Mono, Menlo, monospace" font-size="10">NULL</text>

  <!-- slow label -->
  <text x="294" y="232" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">slow</text>
  <line x1="294" y1="218" x2="294" y2="223" stroke="#34d399" stroke-width="1.5"/>

  <!-- fast label -->
  <text x="482" y="232" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">fast</text>
  <line x1="482" y1="218" x2="482" y2="223" stroke="#fbbf24" stroke-width="1.5"/>

  <!-- Gap highlight brace between node 3 and node 5 -->
  <rect x="320" y="186" width="136" height="28" rx="4" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="388" y="179" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle" opacity="0.9">gap = n = 2</text>

  <!-- annotation: fast at tail -->
  <text x="482" y="246" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">at end</text>

  <!-- ─── PHASE 3 ─── -->
  <text x="30" y="272" fill="#f87171" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold">Phase 3: Remove slow.next (node 4)</text>

  <!-- nodes for phase 3 -->
  <!-- node 1 -->
  <rect x="80"  y="284" width="52" height="36" rx="6" fill="#111" stroke="#333" stroke-width="1.5"/>
  <text x="106" y="307" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">1</text>
  <line x1="132" y1="302" x2="166" y2="302" stroke="#555" stroke-width="1.8" marker-end="url(#arrow-gray)"/>

  <!-- node 2 -->
  <rect x="174" y="284" width="52" height="36" rx="6" fill="#111" stroke="#333" stroke-width="1.5"/>
  <text x="200" y="307" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">2</text>
  <line x1="226" y1="302" x2="260" y2="302" stroke="#555" stroke-width="1.8" marker-end="url(#arrow-gray)"/>

  <!-- node 3 — slow -->
  <rect x="268" y="284" width="52" height="36" rx="6" fill="#1a1a2e" stroke="#34d399" stroke-width="2"/>
  <text x="294" y="307" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">3</text>
  <!-- arrow 3→4 replaced with bypass arc to 5 -->
  <!-- Original edge shown dashed/red (to be deleted) -->
  <line x1="320" y1="302" x2="358" y2="302" stroke="#f87171" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-red)"/>

  <!-- node 4 — being deleted -->
  <rect x="362" y="284" width="52" height="36" rx="6" fill="#2a0e0e" stroke="#f87171" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="388" y="307" fill="#f87171" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">4</text>
  <!-- X mark on node 4 -->
  <line x1="368" y1="290" x2="408" y2="314" stroke="#f87171" stroke-width="1.5" opacity="0.6"/>
  <line x1="408" y1="290" x2="368" y2="314" stroke="#f87171" stroke-width="1.5" opacity="0.6"/>

  <!-- skip arrow from 3 over 4 to 5 -->
  <path d="M294,284 Q388,252 482,284" fill="none" stroke="#34d399" stroke-width="2" stroke-dasharray="0" marker-end="url(#arrow-green)"/>
  <text x="388" y="261" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">slow.next = slow.next.next</text>

  <!-- node 5 -->
  <rect x="456" y="284" width="52" height="36" rx="6" fill="#111" stroke="#333" stroke-width="1.5"/>
  <text x="482" y="307" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">5</text>
  <line x1="508" y1="302" x2="542" y2="302" stroke="#555" stroke-width="1.8" marker-end="url(#arrow-gray)"/>
  <text x="548" y="307" fill="#444" font-family="SF Mono, Menlo, monospace" font-size="10">NULL</text>

  <!-- slow label -->
  <text x="294" y="334" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">slow</text>
  <line x1="294" y1="320" x2="294" y2="325" stroke="#34d399" stroke-width="1.5"/>

  <!-- delete label -->
  <text x="388" y="334" fill="#f87171" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">delete</text>
  <line x1="388" y1="320" x2="388" y2="325" stroke="#f87171" stroke-width="1.5"/>

  <!-- ─── RESULT ─── -->
  <text x="30" y="372" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold">Result: 1→2→3→5</text>

  <!-- nodes for result -->
  <rect x="80"  y="384" width="52" height="36" rx="6" fill="#111" stroke="#34d399" stroke-width="2"/>
  <text x="106" y="407" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">1</text>
  <line x1="132" y1="402" x2="166" y2="402" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-green)"/>

  <rect x="174" y="384" width="52" height="36" rx="6" fill="#111" stroke="#34d399" stroke-width="2"/>
  <text x="200" y="407" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">2</text>
  <line x1="226" y1="402" x2="260" y2="402" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-green)"/>

  <rect x="268" y="384" width="52" height="36" rx="6" fill="#111" stroke="#34d399" stroke-width="2"/>
  <text x="294" y="407" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">3</text>
  <line x1="320" y1="402" x2="354" y2="402" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- node 5 (4 is gone) -->
  <rect x="362" y="384" width="52" height="36" rx="6" fill="#111" stroke="#34d399" stroke-width="2"/>
  <text x="388" y="407" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="14" text-anchor="middle">5</text>
  <line x1="414" y1="402" x2="448" y2="402" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="454" y="407" fill="#444" font-family="SF Mono, Menlo, monospace" font-size="10">NULL</text>

  <!-- ─── LEGEND / INFO PANEL ─── -->
  <rect x="620" y="60" width="258" height="130" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="640" y="82" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold">Pointer Key</text>

  <!-- slow indicator -->
  <rect x="640" y="92" width="12" height="12" rx="2" fill="#34d399"/>
  <text x="658" y="103" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10">slow — trails by n steps</text>

  <!-- fast indicator -->
  <rect x="640" y="112" width="12" height="12" rx="2" fill="#fbbf24"/>
  <text x="658" y="123" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="10">fast — leads the way</text>

  <!-- deleted indicator -->
  <rect x="640" y="132" width="12" height="12" rx="2" fill="#2a0e0e" stroke="#f87171" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="658" y="143" fill="#f87171" font-family="SF Mono, Menlo, monospace" font-size="10">node — marked for deletion</text>

  <!-- skip arrow legend -->
  <line x1="640" y1="160" x2="672" y2="160" stroke="#34d399" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <text x="680" y="164" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10">bypass pointer</text>

  <!-- Legend text box -->
  <rect x="620" y="205" width="258" height="62" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="640" y="224" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">Gap of n between pointers |</text>
  <text x="640" y="240" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">When fast reaches end, slow</text>
  <text x="640" y="256" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">is at position (length - n)</text>

  <!-- Key insight box -->
  <rect x="620" y="284" width="258" height="80" rx="8" fill="#111" stroke="#5b6abf" stroke-width="1"/>
  <text x="640" y="305" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold">KEY INSIGHT</text>
  <text x="640" y="323" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">Fixed gap encodes relative distance</text>
  <text x="640" y="339" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">— no need to count list length.</text>
  <text x="640" y="355" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">One pass. O(1) space.</text>

  <!-- Summary box at bottom -->
  <rect x="620" y="380" width="258" height="60" rx="8" fill="#0f0f1a" stroke="#5b6abf" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="749" y="400" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle" font-weight="bold">Pattern: Fixed Separation</text>
  <text x="749" y="416" fill="#666" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">Advance fast n steps, then move</text>
  <text x="749" y="430" fill="#666" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">both until fast.next == null</text>
</svg>
