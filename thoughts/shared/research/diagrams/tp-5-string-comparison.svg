<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480">
  <defs>
    <style>
      text { font-family: 'SF Mono', Menlo, monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#a78bfa" font-size="15" font-weight="bold">Backspace String Compare — Two Pointer (Right-to-Left)</text>
  <text x="450" y="56" text-anchor="middle" fill="#666" font-size="11">s = "ab#c"   t = "ad#c"   |   Process right → left, O(1) space</text>

  <!-- ═══════════════════ ROW LABELS ═══════════════════ -->
  <text x="52" y="124" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="bold">s</text>
  <text x="52" y="214" text-anchor="middle" fill="#5b6abf" font-size="12" font-weight="bold">t</text>

  <!-- ═══════════════════ STRING s = "ab#c" ═══════════════════ -->
  <!-- Index labels for s -->
  <text x="112" y="88" text-anchor="middle" fill="#444" font-size="10">i=0</text>
  <text x="192" y="88" text-anchor="middle" fill="#444" font-size="10">i=1</text>
  <text x="272" y="88" text-anchor="middle" fill="#444" font-size="10">i=2</text>
  <text x="352" y="88" text-anchor="middle" fill="#444" font-size="10">i=3</text>

  <!-- s[0] = 'a' — KEPT (green) -->
  <rect x="80" y="96" width="64" height="52" rx="8" fill="#111" stroke="#34d399" stroke-width="2"/>
  <text x="112" y="128" text-anchor="middle" fill="#34d399" font-size="22" font-weight="bold">a</text>
  <text x="112" y="142" text-anchor="middle" fill="#34d399" font-size="9">keep</text>

  <!-- s[1] = 'b' — SKIPPED (red with strikethrough) -->
  <rect x="160" y="96" width="64" height="52" rx="8" fill="#111" stroke="#f87171" stroke-width="2"/>
  <text x="192" y="128" text-anchor="middle" fill="#f87171" font-size="22" font-weight="bold">b</text>
  <line x1="170" y1="122" x2="214" y2="122" stroke="#f87171" stroke-width="2.5"/>
  <text x="192" y="142" text-anchor="middle" fill="#f87171" font-size="9">skip=1</text>

  <!-- s[2] = '#' — BACKSPACE (yellow) -->
  <rect x="240" y="96" width="64" height="52" rx="8" fill="#111" stroke="#fbbf24" stroke-width="2"/>
  <text x="272" y="128" text-anchor="middle" fill="#fbbf24" font-size="22" font-weight="bold">#</text>
  <text x="272" y="142" text-anchor="middle" fill="#fbbf24" font-size="9">skip+1</text>

  <!-- s[3] = 'c' — KEPT (green) -->
  <rect x="320" y="96" width="64" height="52" rx="8" fill="#111" stroke="#34d399" stroke-width="2"/>
  <text x="352" y="128" text-anchor="middle" fill="#34d399" font-size="22" font-weight="bold">c</text>
  <text x="352" y="142" text-anchor="middle" fill="#34d399" font-size="9">keep</text>

  <!-- Arrow direction for s -->
  <text x="432" y="110" fill="#666" font-size="11">←</text>
  <text x="446" y="110" fill="#666" font-size="10">scan</text>
  <text x="432" y="124" fill="#666" font-size="10">right</text>
  <text x="432" y="137" fill="#666" font-size="10">to left</text>

  <!-- Result for s -->
  <rect x="500" y="96" width="76" height="52" rx="8" fill="#111" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="538" y="116" text-anchor="middle" fill="#666" font-size="9">result</text>
  <text x="538" y="136" text-anchor="middle" fill="#34d399" font-size="18" font-weight="bold">"ac"</text>
  <text x="538" y="150" text-anchor="middle" fill="#34d399" font-size="9">s cleaned</text>

  <!-- ═══════════════════ STRING t = "ad#c" ═══════════════════ -->
  <!-- Index labels for t -->
  <text x="112" y="180" text-anchor="middle" fill="#444" font-size="10">i=0</text>
  <text x="192" y="180" text-anchor="middle" fill="#444" font-size="10">i=1</text>
  <text x="272" y="180" text-anchor="middle" fill="#444" font-size="10">i=2</text>
  <text x="352" y="180" text-anchor="middle" fill="#444" font-size="10">i=3</text>

  <!-- t[0] = 'a' — KEPT (green) -->
  <rect x="80" y="188" width="64" height="52" rx="8" fill="#111" stroke="#34d399" stroke-width="2"/>
  <text x="112" y="220" text-anchor="middle" fill="#34d399" font-size="22" font-weight="bold">a</text>
  <text x="112" y="234" text-anchor="middle" fill="#34d399" font-size="9">keep</text>

  <!-- t[1] = 'd' — SKIPPED (red with strikethrough) -->
  <rect x="160" y="188" width="64" height="52" rx="8" fill="#111" stroke="#f87171" stroke-width="2"/>
  <text x="192" y="220" text-anchor="middle" fill="#f87171" font-size="22" font-weight="bold">d</text>
  <line x1="170" y1="214" x2="214" y2="214" stroke="#f87171" stroke-width="2.5"/>
  <text x="192" y="234" text-anchor="middle" fill="#f87171" font-size="9">skip=1</text>

  <!-- t[2] = '#' — BACKSPACE (yellow) -->
  <rect x="240" y="188" width="64" height="52" rx="8" fill="#111" stroke="#fbbf24" stroke-width="2"/>
  <text x="272" y="220" text-anchor="middle" fill="#fbbf24" font-size="22" font-weight="bold">#</text>
  <text x="272" y="234" text-anchor="middle" fill="#fbbf24" font-size="9">skip+1</text>

  <!-- t[3] = 'c' — KEPT (green) -->
  <rect x="320" y="188" width="64" height="52" rx="8" fill="#111" stroke="#34d399" stroke-width="2"/>
  <text x="352" y="220" text-anchor="middle" fill="#34d399" font-size="22" font-weight="bold">c</text>
  <text x="352" y="234" text-anchor="middle" fill="#34d399" font-size="9">keep</text>

  <!-- Arrow direction for t -->
  <text x="432" y="202" fill="#666" font-size="11">←</text>
  <text x="446" y="202" fill="#666" font-size="10">scan</text>
  <text x="432" y="216" fill="#666" font-size="10">right</text>
  <text x="432" y="229" fill="#666" font-size="10">to left</text>

  <!-- Result for t -->
  <rect x="500" y="188" width="76" height="52" rx="8" fill="#111" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="538" y="208" text-anchor="middle" fill="#666" font-size="9">result</text>
  <text x="538" y="228" text-anchor="middle" fill="#34d399" font-size="18" font-weight="bold">"ac"</text>
  <text x="538" y="242" text-anchor="middle" fill="#34d399" font-size="9">t cleaned</text>

  <!-- ═══════════════════ COMPARISON RESULT ═══════════════════ -->
  <rect x="620" y="96" width="240" height="144" rx="10" fill="#111" stroke="#34d399" stroke-width="2"/>
  <text x="740" y="118" text-anchor="middle" fill="#666" font-size="10" font-weight="bold">COMPARISON</text>

  <text x="740" y="152" text-anchor="middle" fill="#34d399" font-size="20" font-weight="bold">"ac"  ==  "ac"</text>

  <!-- Checkmark -->
  <circle cx="740" cy="192" r="20" fill="#052e1a" stroke="#34d399" stroke-width="2"/>
  <polyline points="729,192 737,201 753,181" fill="none" stroke="#34d399" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="740" y="222" text-anchor="middle" fill="#34d399" font-size="13" font-weight="bold">true</text>
  <text x="740" y="236" text-anchor="middle" fill="#666" font-size="9">strings are equal</text>

  <!-- ═══════════════════ STEP TRACE TABLE ═══════════════════ -->
  <rect x="52" y="272" width="520" height="140" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="312" y="292" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold">Step-by-Step Trace (right to left)</text>

  <!-- Table header -->
  <rect x="52" y="298" width="520" height="20" rx="0" fill="#1a1a2e"/>
  <text x="100" y="312" text-anchor="middle" fill="#5b6abf" font-size="10" font-weight="bold">Step</text>
  <text x="190" y="312" text-anchor="middle" fill="#5b6abf" font-size="10" font-weight="bold">s char</text>
  <text x="280" y="312" text-anchor="middle" fill="#5b6abf" font-size="10" font-weight="bold">s skip</text>
  <text x="370" y="312" text-anchor="middle" fill="#5b6abf" font-size="10" font-weight="bold">t char</text>
  <text x="460" y="312" text-anchor="middle" fill="#5b6abf" font-size="10" font-weight="bold">t skip</text>
  <text x="545" y="312" text-anchor="middle" fill="#5b6abf" font-size="10" font-weight="bold">compare?</text>

  <!-- Row 1: i=3 -->
  <text x="100" y="332" text-anchor="middle" fill="#888" font-size="10">1  (i=3)</text>
  <text x="190" y="332" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold">c</text>
  <text x="280" y="332" text-anchor="middle" fill="#666" font-size="10">0</text>
  <text x="370" y="332" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold">c</text>
  <text x="460" y="332" text-anchor="middle" fill="#666" font-size="10">0</text>
  <text x="545" y="332" text-anchor="middle" fill="#34d399" font-size="10">c == c ✓</text>

  <!-- Row 2: i=2 -->
  <text x="100" y="352" text-anchor="middle" fill="#888" font-size="10">2  (i=2)</text>
  <text x="190" y="352" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">#</text>
  <text x="280" y="352" text-anchor="middle" fill="#fbbf24" font-size="10">→ 1</text>
  <text x="370" y="352" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">#</text>
  <text x="460" y="352" text-anchor="middle" fill="#fbbf24" font-size="10">→ 1</text>
  <text x="545" y="352" text-anchor="middle" fill="#666" font-size="10">skip, no compare</text>

  <!-- Row 3: i=1 -->
  <text x="100" y="372" text-anchor="middle" fill="#888" font-size="10">3  (i=1)</text>
  <text x="190" y="372" text-anchor="middle" fill="#f87171" font-size="11" font-weight="bold">b</text>
  <text x="280" y="372" text-anchor="middle" fill="#f87171" font-size="10">1→0</text>
  <text x="370" y="372" text-anchor="middle" fill="#f87171" font-size="11" font-weight="bold">d</text>
  <text x="460" y="372" text-anchor="middle" fill="#f87171" font-size="10">1→0</text>
  <text x="545" y="372" text-anchor="middle" fill="#666" font-size="10">skip, no compare</text>

  <!-- Row 4: i=0 -->
  <text x="100" y="392" text-anchor="middle" fill="#888" font-size="10">4  (i=0)</text>
  <text x="190" y="392" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold">a</text>
  <text x="280" y="392" text-anchor="middle" fill="#666" font-size="10">0</text>
  <text x="370" y="392" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold">a</text>
  <text x="460" y="392" text-anchor="middle" fill="#666" font-size="10">0</text>
  <text x="545" y="392" text-anchor="middle" fill="#34d399" font-size="10">a == a ✓</text>

  <!-- ═══════════════════ LEGEND ═══════════════════ -->
  <rect x="620" y="272" width="240" height="140" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="740" y="292" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold">Legend</text>

  <!-- Yellow: # -->
  <rect x="634" y="302" width="14" height="14" rx="3" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="641" y="313" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold">#</text>
  <text x="656" y="313" fill="#888" font-size="9"># increments skip counter</text>

  <!-- Red: skipped -->
  <rect x="634" y="322" width="14" height="14" rx="3" fill="#111" stroke="#f87171" stroke-width="1.5"/>
  <line x1="636" y1="331" x2="646" y2="331" stroke="#f87171" stroke-width="1.5"/>
  <text x="641" y="333" text-anchor="middle" fill="#f87171" font-size="9" font-weight="bold">x</text>
  <text x="656" y="333" fill="#888" font-size="9">skip&gt;0: char deleted</text>

  <!-- Green: kept -->
  <rect x="634" y="342" width="14" height="14" rx="3" fill="#111" stroke="#34d399" stroke-width="1.5"/>
  <text x="641" y="353" text-anchor="middle" fill="#34d399" font-size="9" font-weight="bold">a</text>
  <text x="656" y="353" fill="#888" font-size="9">skip=0: char kept</text>

  <!-- Complexity note -->
  <rect x="628" y="364" width="224" height="38" rx="5" fill="#0d1a0d" stroke="#34d399" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="740" y="378" text-anchor="middle" fill="#34d399" font-size="9" font-weight="bold">Right-to-left = O(1) space</text>
  <text x="740" y="392" text-anchor="middle" fill="#666" font-size="8.5">No stack needed — skip counter replaces stack</text>

  <!-- ═══════════════════ BOTTOM PATTERN NOTE ═══════════════════ -->
  <text x="450" y="460" text-anchor="middle" fill="#444" font-size="9">Two Pointer · String Comparison · Skip Counter · O(n) time · O(1) space</text>
</svg>
