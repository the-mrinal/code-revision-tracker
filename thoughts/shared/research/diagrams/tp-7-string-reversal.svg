<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#34d399"/>
    </marker>
    <marker id="arrow-green-left" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="#34d399"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#fbbf24"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="450" y="32" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="15" font-weight="bold" text-anchor="middle">String Reversal — Two-Pointer Swap</text>

  <!-- ============================================================ -->
  <!-- ORIGINAL array label -->
  <!-- ============================================================ -->
  <text x="30" y="62" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="11">ORIGINAL</text>

  <!-- Original array: h e l l o -->
  <!-- index labels -->
  <text x="192" y="62" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">0</text>
  <text x="252" y="62" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">1</text>
  <text x="312" y="62" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">2</text>
  <text x="372" y="62" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">3</text>
  <text x="432" y="62" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle">4</text>

  <rect x="167" y="67" width="50" height="36" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="192" y="90" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">h</text>

  <rect x="227" y="67" width="50" height="36" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="252" y="90" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">e</text>

  <rect x="287" y="67" width="50" height="36" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="312" y="90" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">l</text>

  <rect x="347" y="67" width="50" height="36" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="372" y="90" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">l</text>

  <rect x="407" y="67" width="50" height="36" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="432" y="90" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">o</text>

  <!-- ============================================================ -->
  <!-- STEP 1: swap h <-> o -->
  <!-- ============================================================ -->
  <text x="30" y="138" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="11">Step 1</text>
  <text x="30" y="152" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="9">swap h↔o</text>

  <!-- L pointer box (h, now swapped to o) -->
  <rect x="167" y="122" width="50" height="36" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="2"/>
  <text x="192" y="145" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">o</text>
  <text x="192" y="117" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle" font-weight="bold">L</text>

  <rect x="227" y="122" width="50" height="36" rx="6" fill="#111" stroke="#333" stroke-width="1.5"/>
  <text x="252" y="145" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">e</text>

  <rect x="287" y="122" width="50" height="36" rx="6" fill="#111" stroke="#333" stroke-width="1.5"/>
  <text x="312" y="145" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">l</text>

  <rect x="347" y="122" width="50" height="36" rx="6" fill="#111" stroke="#333" stroke-width="1.5"/>
  <text x="372" y="145" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">l</text>

  <!-- R pointer box (o, now swapped to h) -->
  <rect x="407" y="122" width="50" height="36" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="2"/>
  <text x="432" y="145" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">h</text>
  <text x="432" y="117" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle" font-weight="bold">R</text>

  <!-- Swap arrows: curved above the array for h <-> o -->
  <!-- Arrow from L going right toward R -->
  <path d="M 192,122 Q 312,100 432,122" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <!-- Arrow from R going left toward L -->
  <path d="M 432,122 Q 312,105 192,122" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arrow-green-left)"/>

  <!-- ============================================================ -->
  <!-- STEP 2: swap e <-> l -->
  <!-- ============================================================ -->
  <text x="30" y="208" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="11">Step 2</text>
  <text x="30" y="222" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="9">swap e↔l</text>

  <rect x="167" y="192" width="50" height="36" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
  <text x="192" y="215" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">o</text>

  <!-- L pointer (e -> swapped to l) -->
  <rect x="227" y="192" width="50" height="36" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="2"/>
  <text x="252" y="215" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">l</text>
  <text x="252" y="187" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle" font-weight="bold">L</text>

  <rect x="287" y="192" width="50" height="36" rx="6" fill="#111" stroke="#333" stroke-width="1.5"/>
  <text x="312" y="215" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">l</text>

  <!-- R pointer (l -> swapped to e) -->
  <rect x="347" y="192" width="50" height="36" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="2"/>
  <text x="372" y="215" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">e</text>
  <text x="372" y="187" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10" text-anchor="middle" font-weight="bold">R</text>

  <rect x="407" y="192" width="50" height="36" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
  <text x="432" y="215" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">h</text>

  <!-- Swap arrows for e <-> l -->
  <path d="M 252,192 Q 312,170 372,192" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 372,192 Q 312,175 252,192" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arrow-green-left)"/>

  <!-- ============================================================ -->
  <!-- STEP 3: L=R=2, done -->
  <!-- ============================================================ -->
  <text x="30" y="278" fill="#f87171" font-family="SF Mono, Menlo, monospace" font-size="11">Step 3</text>
  <text x="30" y="292" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="9">L=R=2, done</text>

  <rect x="167" y="262" width="50" height="36" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
  <text x="192" y="285" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">o</text>

  <rect x="227" y="262" width="50" height="36" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
  <text x="252" y="285" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">l</text>

  <!-- Middle element, L=R, highlighted with warning -->
  <rect x="287" y="262" width="50" height="36" rx="6" fill="#1a1a0a" stroke="#fbbf24" stroke-width="2"/>
  <text x="312" y="285" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">l</text>
  <text x="293" y="257" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="9" font-weight="bold">L=R</text>

  <rect x="347" y="262" width="50" height="36" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
  <text x="372" y="285" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">e</text>

  <rect x="407" y="262" width="50" height="36" rx="6" fill="#111" stroke="#34d399" stroke-width="1.5"/>
  <text x="432" y="285" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">h</text>

  <!-- "No swap needed" label -->
  <text x="312" y="310" fill="#f87171" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">no swap</text>

  <!-- ============================================================ -->
  <!-- RESULT row -->
  <!-- ============================================================ -->
  <text x="30" y="348" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold">RESULT</text>

  <rect x="167" y="330" width="50" height="36" rx="6" fill="#0d1f0d" stroke="#34d399" stroke-width="2"/>
  <text x="192" y="353" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">o</text>

  <rect x="227" y="330" width="50" height="36" rx="6" fill="#0d1f0d" stroke="#34d399" stroke-width="2"/>
  <text x="252" y="353" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">l</text>

  <rect x="287" y="330" width="50" height="36" rx="6" fill="#0d1f0d" stroke="#34d399" stroke-width="2"/>
  <text x="312" y="353" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">l</text>

  <rect x="347" y="330" width="50" height="36" rx="6" fill="#0d1f0d" stroke="#34d399" stroke-width="2"/>
  <text x="372" y="353" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">e</text>

  <rect x="407" y="330" width="50" height="36" rx="6" fill="#0d1f0d" stroke="#34d399" stroke-width="2"/>
  <text x="432" y="353" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="16" text-anchor="middle">h</text>

  <!-- "hello" -> "olleh" label -->
  <text x="550" y="325" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="11">"hello"  →  "olleh"</text>

  <!-- ============================================================ -->
  <!-- REVERSE WORDS section -->
  <!-- ============================================================ -->
  <rect x="30" y="378" width="840" height="82" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="50" y="398" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold">Reverse Words Technique</text>

  <!-- Step 1 label + string -->
  <text x="50" y="418" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="10">① Input</text>
  <rect x="105" y="406" width="110" height="22" rx="4" fill="#1a1a2e" stroke="#5b6abf" stroke-width="1"/>
  <text x="160" y="421" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="middle">"hello world"</text>

  <!-- Arrow 1 -->
  <line x1="218" y1="417" x2="248" y2="417" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-yellow)"/>
  <text x="233" y="412" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="8" text-anchor="middle">rev all</text>

  <!-- Step 2 -->
  <text x="252" y="418" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="10">② Rev all</text>
  <rect x="313" y="406" width="118" height="22" rx="4" fill="#1a1a0a" stroke="#fbbf24" stroke-width="1"/>
  <text x="372" y="421" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="middle">"dlrow olleh"</text>

  <!-- Arrow 2 -->
  <line x1="434" y1="417" x2="464" y2="417" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="449" y="412" fill="#a78bfa" font-family="SF Mono, Menlo, monospace" font-size="8" text-anchor="middle">rev words</text>

  <!-- Step 3 -->
  <text x="468" y="418" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="10">③ Rev each word</text>
  <rect x="573" y="406" width="110" height="22" rx="4" fill="#0d1f0d" stroke="#34d399" stroke-width="1.5"/>
  <text x="628" y="421" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="11" text-anchor="middle">"world hello"</text>

  <!-- Word boundary markers under step 2 string -->
  <text x="315" y="436" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="8">└──────┘ └──────┘</text>
  <text x="322" y="447" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="8"> dlrow    olleh</text>
  <text x="374" y="447" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="8">→ each reversed →</text>
  <text x="574" y="436" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="8">└──────┘ └──────┘</text>
  <text x="580" y="447" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="8"> world    hello</text>

  <!-- ============================================================ -->
  <!-- RIGHT PANEL: pointer steps legend -->
  <!-- ============================================================ -->
  <rect x="590" y="50" width="280" height="268" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="610" y="72" fill="#e2e8f0" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold">Pointer Steps</text>

  <!-- Step rows -->
  <!-- Step 1 summary -->
  <rect x="610" y="82" width="240" height="46" rx="5" fill="#0d1f0d" stroke="#34d399" stroke-width="1"/>
  <text x="622" y="97" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="10" font-weight="bold">Step 1</text>
  <text x="622" y="111" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">L=0  R=4  →  swap h↔o</text>
  <text x="622" y="123" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10">[ o  e  l  l  h ]</text>

  <!-- Step 2 summary -->
  <rect x="610" y="136" width="240" height="46" rx="5" fill="#0d1f0d" stroke="#34d399" stroke-width="1"/>
  <text x="622" y="151" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="10" font-weight="bold">Step 2</text>
  <text x="622" y="165" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">L=1  R=3  →  swap e↔l</text>
  <text x="622" y="177" fill="#34d399" font-family="SF Mono, Menlo, monospace" font-size="10">[ o  l  l  e  h ]</text>

  <!-- Step 3 summary -->
  <rect x="610" y="190" width="240" height="46" rx="5" fill="#1a1a0a" stroke="#fbbf24" stroke-width="1"/>
  <text x="622" y="205" fill="#f87171" font-family="SF Mono, Menlo, monospace" font-size="10" font-weight="bold">Step 3</text>
  <text x="622" y="219" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">L=2  R=2  →  L≥R, stop</text>
  <text x="622" y="231" fill="#fbbf24" font-family="SF Mono, Menlo, monospace" font-size="10">[ o  l  l  e  h ]  done</text>

  <!-- Complexity -->
  <rect x="610" y="244" width="240" height="60" rx="5" fill="#0d0d1a" stroke="#5b6abf" stroke-width="1"/>
  <text x="622" y="260" fill="#5b6abf" font-family="SF Mono, Menlo, monospace" font-size="10" font-weight="bold">Complexity</text>
  <text x="622" y="276" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">Time:  O(n)  — one pass, n/2 swaps</text>
  <text x="622" y="292" fill="#888" font-family="SF Mono, Menlo, monospace" font-size="10">Space: O(1)  — in-place, no extra</text>

  <!-- ============================================================ -->
  <!-- Bottom legend bar -->
  <!-- ============================================================ -->
  <rect x="30" y="465" width="840" height="8" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <!-- Gradient bar just decorative, showing accent colors -->
  <text x="450" y="462" fill="#555" font-family="SF Mono, Menlo, monospace" font-size="9" text-anchor="middle">Swap L↔R, move inward  |  Two-step reversal: reverse all → reverse each word</text>
</svg>
