<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      text { font-family: 'SF Mono', Menlo, monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="bold">Recursive Preorder — Invert Binary Tree</text>
  <text x="450" y="56" text-anchor="middle" fill="#94a3b8" font-size="12">Process node BEFORE children (top-down transformation)</text>

  <!-- Original Tree (Left) -->
  <text x="225" y="85" text-anchor="middle" fill="#5b6abf" font-size="13" font-weight="bold">Original</text>

  <!-- Root 4 -->
  <rect x="200" y="95" width="50" height="34" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="225" y="117" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">4</text>

  <line x1="215" y1="129" x2="145" y2="160" stroke="#333" stroke-width="1.5"/>
  <line x1="235" y1="129" x2="305" y2="160" stroke="#333" stroke-width="1.5"/>

  <!-- Node 2 -->
  <rect x="120" y="160" width="50" height="34" rx="6" fill="#111" stroke="#34d399" stroke-width="2"/>
  <text x="145" y="182" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">2</text>

  <!-- Node 7 -->
  <rect x="280" y="160" width="50" height="34" rx="6" fill="#111" stroke="#34d399" stroke-width="2"/>
  <text x="305" y="182" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">7</text>

  <line x1="135" y1="194" x2="95" y2="225" stroke="#333" stroke-width="1.5"/>
  <line x1="155" y1="194" x2="195" y2="225" stroke="#333" stroke-width="1.5"/>
  <line x1="295" y1="194" x2="255" y2="225" stroke="#333" stroke-width="1.5"/>
  <line x1="315" y1="194" x2="355" y2="225" stroke="#333" stroke-width="1.5"/>

  <!-- Leaves -->
  <rect x="70" y="225" width="50" height="34" rx="6" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="95" y="247" text-anchor="middle" fill="#e2e8f0" font-size="14">1</text>

  <rect x="170" y="225" width="50" height="34" rx="6" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="195" y="247" text-anchor="middle" fill="#e2e8f0" font-size="14">3</text>

  <rect x="230" y="225" width="50" height="34" rx="6" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="255" y="247" text-anchor="middle" fill="#e2e8f0" font-size="14">6</text>

  <rect x="330" y="225" width="50" height="34" rx="6" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="355" y="247" text-anchor="middle" fill="#e2e8f0" font-size="14">9</text>

  <!-- Arrow -->
  <text x="450" y="180" text-anchor="middle" fill="#a78bfa" font-size="28">→</text>
  <text x="450" y="200" text-anchor="middle" fill="#a78bfa" font-size="10">swap at</text>
  <text x="450" y="212" text-anchor="middle" fill="#a78bfa" font-size="10">each node</text>

  <!-- Inverted Tree (Right) -->
  <text x="675" y="85" text-anchor="middle" fill="#34d399" font-size="13" font-weight="bold">Inverted</text>

  <!-- Root 4 -->
  <rect x="650" y="95" width="50" height="34" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="675" y="117" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">4</text>

  <line x1="665" y1="129" x2="595" y2="160" stroke="#333" stroke-width="1.5"/>
  <line x1="685" y1="129" x2="755" y2="160" stroke="#333" stroke-width="1.5"/>

  <!-- Node 7 (was right, now left) -->
  <rect x="570" y="160" width="50" height="34" rx="6" fill="#111" stroke="#34d399" stroke-width="2"/>
  <text x="595" y="182" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">7</text>

  <!-- Node 2 (was left, now right) -->
  <rect x="730" y="160" width="50" height="34" rx="6" fill="#111" stroke="#34d399" stroke-width="2"/>
  <text x="755" y="182" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">2</text>

  <line x1="585" y1="194" x2="545" y2="225" stroke="#333" stroke-width="1.5"/>
  <line x1="605" y1="194" x2="645" y2="225" stroke="#333" stroke-width="1.5"/>
  <line x1="745" y1="194" x2="705" y2="225" stroke="#333" stroke-width="1.5"/>
  <line x1="765" y1="194" x2="805" y2="225" stroke="#333" stroke-width="1.5"/>

  <!-- Inverted leaves -->
  <rect x="520" y="225" width="50" height="34" rx="6" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="545" y="247" text-anchor="middle" fill="#e2e8f0" font-size="14">9</text>

  <rect x="620" y="225" width="50" height="34" rx="6" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="645" y="247" text-anchor="middle" fill="#e2e8f0" font-size="14">6</text>

  <rect x="680" y="225" width="50" height="34" rx="6" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="705" y="247" text-anchor="middle" fill="#e2e8f0" font-size="14">3</text>

  <rect x="780" y="225" width="50" height="34" rx="6" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="805" y="247" text-anchor="middle" fill="#e2e8f0" font-size="14">1</text>

  <!-- Process Order -->
  <rect x="60" y="285" width="780" height="190" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="80" y="311" fill="#a78bfa" font-size="14" font-weight="bold">Preorder Execution (top-down)</text>

  <text x="80" y="340" fill="#5b6abf" font-size="11" font-weight="bold">1.</text>
  <text x="100" y="340" fill="#e2e8f0" font-size="11">Visit 4 → swap(left=2, right=7)</text>
  <text x="430" y="340" fill="#34d399" font-size="11">✓ Process BEFORE recursing</text>

  <text x="80" y="365" fill="#5b6abf" font-size="11" font-weight="bold">2.</text>
  <text x="100" y="365" fill="#e2e8f0" font-size="11">Visit 7 → swap(left=6, right=9)</text>
  <text x="430" y="365" fill="#94a3b8" font-size="11">(was right child, now left after step 1)</text>

  <text x="80" y="390" fill="#5b6abf" font-size="11" font-weight="bold">3.</text>
  <text x="100" y="390" fill="#e2e8f0" font-size="11">Visit 9, Visit 6 → leaves, no swap</text>

  <text x="80" y="415" fill="#5b6abf" font-size="11" font-weight="bold">4.</text>
  <text x="100" y="415" fill="#e2e8f0" font-size="11">Visit 2 → swap(left=1, right=3)</text>

  <text x="80" y="440" fill="#5b6abf" font-size="11" font-weight="bold">5.</text>
  <text x="100" y="440" fill="#e2e8f0" font-size="11">Visit 3, Visit 1 → leaves, no swap</text>

  <!-- Key takeaway -->
  <rect x="500" y="420" width="320" height="40" rx="6" fill="#1e1b4b" stroke="#5b6abf" stroke-width="1" opacity="0.8"/>
  <text x="510" y="438" fill="#a78bfa" font-size="10" font-weight="bold">PREORDER = TOP-DOWN</text>
  <text x="510" y="452" fill="#e2e8f0" font-size="10">Parent acts first, children inherit result</text>
</svg>
