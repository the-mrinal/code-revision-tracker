<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <style>
      text { font-family: 'SF Mono', Menlo, monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="bold">Recursive Inorder — BST Sorted Traversal</text>
  <text x="450" y="56" text-anchor="middle" fill="#94a3b8" font-size="12">Left → Process → Right gives sorted order in BST</text>

  <!-- BST Tree -->
  <!-- Root 8 -->
  <rect x="400" y="80" width="50" height="34" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="425" y="102" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">8</text>

  <line x1="415" y1="114" x2="275" y2="150" stroke="#333" stroke-width="1.5"/>
  <line x1="435" y1="114" x2="575" y2="150" stroke="#333" stroke-width="1.5"/>

  <!-- Node 4 -->
  <rect x="250" y="150" width="50" height="34" rx="6" fill="#111" stroke="#34d399" stroke-width="2"/>
  <text x="275" y="172" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">4</text>

  <!-- Node 12 -->
  <rect x="550" y="150" width="50" height="34" rx="6" fill="#111" stroke="#34d399" stroke-width="2"/>
  <text x="575" y="172" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">12</text>

  <line x1="265" y1="184" x2="185" y2="215" stroke="#333" stroke-width="1.5"/>
  <line x1="285" y1="184" x2="365" y2="215" stroke="#333" stroke-width="1.5"/>
  <line x1="565" y1="184" x2="485" y2="215" stroke="#333" stroke-width="1.5"/>
  <line x1="585" y1="184" x2="665" y2="215" stroke="#333" stroke-width="1.5"/>

  <!-- Leaves -->
  <rect x="160" y="215" width="50" height="34" rx="6" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="185" y="237" text-anchor="middle" fill="#e2e8f0" font-size="14">2</text>

  <rect x="340" y="215" width="50" height="34" rx="6" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="365" y="237" text-anchor="middle" fill="#e2e8f0" font-size="14">6</text>

  <rect x="460" y="215" width="50" height="34" rx="6" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="485" y="237" text-anchor="middle" fill="#e2e8f0" font-size="14">10</text>

  <rect x="640" y="215" width="50" height="34" rx="6" fill="#111" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="665" y="237" text-anchor="middle" fill="#e2e8f0" font-size="14">14</text>

  <!-- Visit order numbers (circled) -->
  <circle cx="185" cy="260" r="10" fill="#5b6abf" opacity="0.9"/>
  <text x="185" y="264" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">1</text>

  <circle cx="275" cy="195" r="10" fill="#5b6abf" opacity="0.9"/>
  <text x="275" y="199" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">2</text>

  <circle cx="365" cy="260" r="10" fill="#5b6abf" opacity="0.9"/>
  <text x="365" y="264" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">3</text>

  <circle cx="425" cy="125" r="10" fill="#5b6abf" opacity="0.9"/>
  <text x="425" y="129" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">4</text>

  <circle cx="485" cy="260" r="10" fill="#5b6abf" opacity="0.9"/>
  <text x="485" y="264" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">5</text>

  <circle cx="575" cy="195" r="10" fill="#5b6abf" opacity="0.9"/>
  <text x="575" y="199" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">6</text>

  <circle cx="665" cy="260" r="10" fill="#5b6abf" opacity="0.9"/>
  <text x="665" y="264" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">7</text>

  <!-- Sorted output arrow -->
  <rect x="100" y="290" width="700" height="40" rx="8" fill="#111" stroke="#34d399" stroke-width="1"/>
  <text x="120" y="314" fill="#34d399" font-size="12" font-weight="bold">Sorted Output:</text>
  <text x="260" y="314" fill="#e2e8f0" font-size="14">2 → 4 → 6 → 8 → 10 → 12 → 14</text>
  <text x="640" y="314" fill="#94a3b8" font-size="11">ascending!</text>

  <!-- prev pointer technique -->
  <rect x="60" y="350" width="780" height="150" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="80" y="376" fill="#a78bfa" font-size="14" font-weight="bold">The "prev" Pointer Technique</text>

  <text x="80" y="400" fill="#94a3b8" font-size="11">Visit</text>
  <text x="120" y="400" fill="#fbbf24" font-size="11">prev</text>
  <text x="170" y="400" fill="#5b6abf" font-size="11">curr</text>
  <text x="230" y="400" fill="#94a3b8" font-size="11">diff</text>
  <text x="300" y="400" fill="#94a3b8" font-size="11">Action</text>

  <text x="80" y="420" fill="#e2e8f0" font-size="11">1st</text>
  <text x="120" y="420" fill="#fbbf24" font-size="11">null</text>
  <text x="170" y="420" fill="#5b6abf" font-size="11">2</text>
  <text x="230" y="420" fill="#94a3b8" font-size="11">—</text>
  <text x="300" y="420" fill="#e2e8f0" font-size="11">set prev = 2</text>

  <text x="80" y="440" fill="#e2e8f0" font-size="11">2nd</text>
  <text x="120" y="440" fill="#fbbf24" font-size="11">2</text>
  <text x="170" y="440" fill="#5b6abf" font-size="11">4</text>
  <text x="230" y="440" fill="#34d399" font-size="11">2</text>
  <text x="300" y="440" fill="#e2e8f0" font-size="11">4&gt;2 ✓ (BST valid), min_diff=2</text>

  <text x="80" y="460" fill="#e2e8f0" font-size="11">3rd</text>
  <text x="120" y="460" fill="#fbbf24" font-size="11">4</text>
  <text x="170" y="460" fill="#5b6abf" font-size="11">6</text>
  <text x="230" y="460" fill="#34d399" font-size="11">2</text>
  <text x="300" y="460" fill="#e2e8f0" font-size="11">6&gt;4 ✓ (BST valid), min_diff=2</text>

  <text x="80" y="480" fill="#e2e8f0" font-size="11">4th</text>
  <text x="120" y="480" fill="#fbbf24" font-size="11">6</text>
  <text x="170" y="480" fill="#5b6abf" font-size="11">8</text>
  <text x="230" y="480" fill="#34d399" font-size="11">2</text>
  <text x="300" y="480" fill="#e2e8f0" font-size="11">8&gt;6 ✓ ... same prev trick for validate/minDiff/mode</text>

  <!-- Key insight -->
  <rect x="530" y="365" width="290" height="36" rx="6" fill="#1e1b4b" stroke="#5b6abf" stroke-width="1" opacity="0.8"/>
  <text x="540" y="383" fill="#a78bfa" font-size="10" font-weight="bold">BST + INORDER = SORTED ARRAY</text>
  <text x="540" y="395" fill="#e2e8f0" font-size="9">Validate, kth element, min diff — all use prev</text>
</svg>
