<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      text { font-family: 'SF Mono', Menlo, monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="bold">Lowest Common Ancestor (LCA)</text>
  <text x="450" y="56" text-anchor="middle" fill="#94a3b8" font-size="12">Find where two paths diverge — the split point</text>

  <!-- Tree -->
  <!-- Root 3 -->
  <rect x="400" y="75" width="50" height="34" rx="6" fill="#111" stroke="#5b6abf" stroke-width="2"/>
  <text x="425" y="97" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">3</text>

  <line x1="415" y1="109" x2="265" y2="150" stroke="#34d399" stroke-width="2.5"/>
  <line x1="435" y1="109" x2="585" y2="150" stroke="#fbbf24" stroke-width="2.5"/>

  <!-- Node 5 (target p) -->
  <rect x="240" y="150" width="50" height="34" rx="6" fill="#1a2e1a" stroke="#34d399" stroke-width="2.5"/>
  <text x="265" y="172" text-anchor="middle" fill="#34d399" font-size="14" font-weight="bold">5</text>
  <text x="298" y="162" fill="#34d399" font-size="9" font-weight="bold">← p</text>

  <!-- Node 1 (target q) -->
  <rect x="560" y="150" width="50" height="34" rx="6" fill="#2e2a1a" stroke="#fbbf24" stroke-width="2.5"/>
  <text x="585" y="172" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="bold">1</text>
  <text x="618" y="162" fill="#fbbf24" font-size="9" font-weight="bold">← q</text>

  <line x1="255" y1="184" x2="175" y2="215" stroke="#333" stroke-width="1.5"/>
  <line x1="275" y1="184" x2="355" y2="215" stroke="#333" stroke-width="1.5"/>
  <line x1="575" y1="184" x2="515" y2="215" stroke="#333" stroke-width="1.5"/>
  <line x1="595" y1="184" x2="655" y2="215" stroke="#333" stroke-width="1.5"/>

  <!-- Leaves -->
  <rect x="150" y="215" width="50" height="34" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="175" y="237" text-anchor="middle" fill="#94a3b8" font-size="14">6</text>

  <rect x="330" y="215" width="50" height="34" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="355" y="237" text-anchor="middle" fill="#94a3b8" font-size="14">2</text>

  <rect x="490" y="215" width="50" height="34" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="515" y="237" text-anchor="middle" fill="#94a3b8" font-size="14">0</text>

  <rect x="630" y="215" width="50" height="34" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="655" y="237" text-anchor="middle" fill="#94a3b8" font-size="14">8</text>

  <!-- LCA indicator -->
  <rect x="390" y="62" width="70" height="14" rx="4" fill="#5b6abf"/>
  <text x="425" y="73" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">LCA = 3</text>

  <!-- Algorithm trace -->
  <rect x="60" y="270" width="780" height="210" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="80" y="296" fill="#a78bfa" font-size="14" font-weight="bold">Algorithm: LCA(root=3, p=5, q=1)</text>

  <!-- Step by step -->
  <text x="80" y="322" fill="#94a3b8" font-size="11">1. At node 3: not p, not q → search both subtrees</text>

  <text x="80" y="347" fill="#34d399" font-size="11">2. Left subtree → LCA(5, p=5, q=1)</text>
  <text x="100" y="365" fill="#e2e8f0" font-size="11">node == p? YES → return 5 immediately</text>
  <text x="500" y="356" fill="#34d399" font-size="11">left = 5 ✓</text>

  <text x="80" y="390" fill="#fbbf24" font-size="11">3. Right subtree → LCA(1, p=5, q=1)</text>
  <text x="100" y="408" fill="#e2e8f0" font-size="11">node == q? YES → return 1 immediately</text>
  <text x="500" y="399" fill="#fbbf24" font-size="11">right = 1 ✓</text>

  <text x="80" y="435" fill="#5b6abf" font-size="12" font-weight="bold">4. Back at node 3: left≠null AND right≠null</text>
  <text x="100" y="453" fill="#e2e8f0" font-size="12">→ Both sides found a target → node 3 IS the LCA!</text>

  <!-- Two-case summary -->
  <rect x="530" y="290" width="290" height="80" rx="6" fill="#0a0a0a" stroke="#5b6abf" stroke-width="1"/>
  <text x="545" y="310" fill="#5b6abf" font-size="11" font-weight="bold">Three cases at any node:</text>
  <text x="545" y="328" fill="#e2e8f0" font-size="10">both non-null → THIS is the LCA</text>
  <text x="545" y="344" fill="#e2e8f0" font-size="10">one non-null  → propagate it up</text>
  <text x="545" y="360" fill="#e2e8f0" font-size="10">both null     → neither found here</text>

  <!-- BST optimization note -->
  <rect x="60" y="465" width="380" height="25" rx="4" fill="#1e1b4b" stroke="#5b6abf" stroke-width="1" opacity="0.7"/>
  <text x="70" y="482" fill="#a78bfa" font-size="10" font-weight="bold">BST shortcut:</text>
  <text x="160" y="482" fill="#e2e8f0" font-size="10">both &lt; node → go left, both &gt; → go right, else LCA</text>
</svg>
